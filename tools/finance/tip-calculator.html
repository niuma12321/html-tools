      [data-theme="light"] {

        --bg-surface: #fff;

        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #0a0a0f;
        --card: #12121a;
        --border: #2a2a3a;
        --text: #fff;
        --text2: #888;
        --accent: #ec4899;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 500px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 1.8rem;
      }
      .subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      input {
        width: 100%;
        padding: 14px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1.2rem;
        text-align: center;
      }
      input:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }
      .tip-buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .tip-btn {
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;

        font-size: 1rem;
      }
      .tip-btn.active {
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
        color: white;
      }
      .tip-btn:hover {
        border-color: var(--accent-cyan);
      }
      .people-control {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }
      .people-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1.5rem;
        cursor: pointer;
      }
      .people-btn:hover {
        border-color: var(--accent-cyan);
      }
      .people-count {
        font-size: 2rem;
        font-weight: 700;
        min-width: 60px;
        text-align: center;
      }
      .result-hero {
        background: linear-gradient(135deg, var(--accent-cyan), #8b5cf6);
        padding: 24px;
        border-radius: 12px;
        text-align: center;
        color: white;
        margin-bottom: 16px;
      }
      .result-hero .label {
        opacity: 0.9;
        font-size: 0.9rem;
      }
      .result-hero .big {
        font-size: 2.5rem;
        font-weight: 700;
      }
      .result-row {
        display: flex;
        justify-content: space-between;
        padding: 14px;
        background: var(--bg-deep);
        border-radius: 8px;
        margin-bottom: 8px;
      }
      .result-row .label {
        color: var(--text-secondary);
      }
      .result-row .value {
        font-weight: 600;

      .back-link {
        display: inline-block;

        font-size: 0.9rem;
      }

      .breadcrumb {
        background: rgba(255, 255, 255, 0.95);
        padding: 8px 15px;
        border-radius: 20px;

  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      小费计算器
    </nav>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <h1>🍽️ 小费计算器</h1>
      <p class="subtitle">快速计算餐厅小费和AA账单</p>

      <div class="card">
        <div class="form-group">
          <label>账单金额</label>
          <input
            type="number"
            id="bill"
            value="100"
            oninput="calculate()"
            placeholder="输入账单金额"
          />
        </div>

        <div class="form-group">
          <label>小费比例</label>
          <div class="tip-buttons">
            <button class="tip-btn" data-tip="10" onclick="setTip(10)">10%</button>
            <button class="tip-btn active" data-tip="15" onclick="setTip(15)">15%</button>
            <button class="tip-btn" data-tip="18" onclick="setTip(18)">18%</button>
            <button class="tip-btn" data-tip="20" onclick="setTip(20)">20%</button>
          </div>
          <input
            type="number"
            id="customTip"
            placeholder="自定义 %"
            style="margin-top: 8px"
            oninput="setCustomTip()"
          />
        </div>

        <div class="form-group">
          <label style="text-align: center">用餐人数</label>
          <div class="people-control">
            <button class="people-btn" onclick="changePeople(-1)">−</button>
            <div class="people-count" id="peopleCount">2</div>
            <button class="people-btn" onclick="changePeople(1)">+</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="result-hero">
          <div class="label">每人支付</div>
          <div class="big" id="perPerson">¥0</div>
        </div>

        <div class="result-row">
          <span class="label">账单金额</span>
          <span class="value" id="displayBill">¥0</span>
        </div>
        <div class="result-row">
          <span class="label">小费金额</span>
          <span class="value" id="tipAmount">¥0</span>
        </div>
        <div class="result-row" style="background: rgba(236, 72, 153, 0.1)">
          <span class="label">总计</span>
          <span class="value" style="color: var(--accent-cyan)" id="total">¥0</span>
        </div>
      </div>

      <div class="card" style="background: var(--bg-deep); border: none">
        <h4 style="margin-bottom: 12px; font-size: 0.9rem; color: var(--text-secondary)">
          小费参考指南
        </h4>
        <div style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.8">
          <div>🇺🇸 美国：15-20% (服务员、外卖、酒吧)</div>
          <div>🇬🇧 英国：10-15% (可选)</div>
          <div>🇯🇵 日本：无需小费 (可能被视为不礼貌)</div>
          <div>🇨🇳 中国：无需小费 (高端餐厅已含服务费)</div>
          <div>🇪🇺 欧洲：5-10% (部分国家已含服务费)</div>
        </div>
      </div>
    </div>

    <script>
      let tipPercent = 15;
      let people = 2;

      function setTip(percent) {
        tipPercent = percent;
        document.querySelectorAll(".tip-btn").forEach((btn) => {
          btn.classList.toggle("active", parseInt(btn.dataset.tip) === percent);
        });
        document.getElementById("customTip").value = "";
        calculate();
      }

      function setCustomTip() {
        const custom = parseFloat(document.getElementById("customTip").value);
        if (!isNaN(custom) && custom >= 0) {
          tipPercent = custom;
          document.querySelectorAll(".tip-btn").forEach((btn) => btn.classList.remove("active"));
          calculate();
        }
      }

      function changePeople(delta) {
        people = Math.max(1, people + delta);
        document.getElementById("peopleCount").textContent = people;
        calculate();
      }

      function calculate() {
        const bill = parseFloat(document.getElementById("bill").value) || 0;
        const tip = bill * (tipPercent / 100);
        const total = bill + tip;
        const perPerson = total / people;

        const fmt = (n) => "¥" + n.toFixed(2);

        document.getElementById("displayBill").textContent = fmt(bill);
        document.getElementById("tipAmount").textContent = fmt(tip) + " (" + tipPercent + "%)";
        document.getElementById("total").textContent = fmt(total);
        document.getElementById("perPerson").textContent = fmt(perPerson);
      }

      calculate();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
