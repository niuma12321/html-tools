        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;

        --bg-input: #0e0e14;

        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;

      *,

      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;

      .bg-grid {
        position: fixed;

          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),

        color: var(--color-text-secondary);

        display: block;

      .form-group select {

      }

      .calc-btn {
        width: 100%;
        padding: 0.75rem;

        border-radius: var(--radius-sm);

      .result-grid {
        display: grid;

        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);

      .result-value {

        font-size: 0.9rem;

        font-size: 0.85rem;

        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);

  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <a href="../../index.html#automotive">汽车工具</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">油耗计算</span>
      </nav>

      <h1>⛽ 油耗计算器</h1>
      <p class="subtitle">计算燃油效率和行驶成本</p>

      <div class="input-card">
        <div class="form-row">
          <div class="form-group">
            <label>行驶里程（公里）</label>
            <input type="number" id="distance" placeholder="100" step="0.1" />
          </div>
          <div class="form-group">
            <label>加油量（升）</label>
            <input type="number" id="fuel" placeholder="8" step="0.01" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>油价（元/升）</label>
            <input type="number" id="price" placeholder="7.5" step="0.01" value="7.5" />
          </div>
          <div class="form-group">
            <label>计算方式</label>
            <select id="mode">
              <option value="consumption">计算油耗</option>
              <option value="cost">计算成本</option>
              <option value="distance">计算里程</option>
            </select>
          </div>
        </div>

        <button class="calc-btn" onclick="calculate()">计算</button>
      </div>

      <div class="result-card" id="resultCard">
        <div class="result-title">📊 计算结果</div>

        <div class="result-grid">
          <div class="result-item">
            <div class="result-value" id="consumption">-</div>
            <div class="result-label">百公里油耗</div>
            <div class="result-detail" id="mpg">-</div>
          </div>

          <div class="result-item">
            <div class="result-value" id="totalCost">-</div>
            <div class="result-label">总成本</div>
            <div class="result-detail" id="perKm">-</div>
          </div>

          <div class="result-item">
            <div class="result-value" id="range">-</div>
            <div class="result-label">续航里程</div>
            <div class="result-detail" id="tankInfo">基于当前油耗</div>
          </div>
        </div>

        <div class="tips">
          <strong>省油建议：</strong>
          <br />
          • 保持匀速行驶，避免急加速和急刹车
          <br />
          • 定期检查胎压，低胎压会增加油耗
          <br />
          • 减少车内负重，每10kg额外重量增加1%油耗
          <br />
          • 关闭不必要的电器设备（空调、音响等）
          <br />
          • 高速时关闭车窗以减少风阻
        </div>
      </div>
    </div>

    <script>
      function calculate() {
        const distance = parseFloat(document.getElementById("distance").value);
        const fuel = parseFloat(document.getElementById("fuel").value);
        const price = parseFloat(document.getElementById("price").value);

        if (!distance || !fuel || distance <= 0 || fuel <= 0) {
          alert("请输入有效的里程和油量");
          return;
        }

        // Calculate consumption (L/100km)
        const consumption = (fuel / distance) * 100;

        // Calculate MPG (Miles per Gallon) for reference
        const mpg = 235.21 / consumption; // Conversion factor

        // Calculate total cost
        const totalCost = fuel * price;
        const costPerKm = totalCost / distance;

        // Calculate range with full tank (assume 50L tank)
        const tankSize = 50;
        const estimatedRange = (tankSize / consumption) * 100;

        // Display results
        document.getElementById("consumption").textContent = consumption.toFixed(2) + " L";
        document.getElementById("mpg").textContent = `≈ ${mpg.toFixed(1)} MPG`;
        document.getElementById("totalCost").textContent = "¥" + totalCost.toFixed(2);
        document.getElementById("perKm").textContent = `¥${costPerKm.toFixed(2)}/公里`;
        document.getElementById("range").textContent = estimatedRange.toFixed(0) + " km";
        document.getElementById("tankInfo").textContent = `满油箱 (${tankSize}L) 预估`;

        document.getElementById("resultCard").classList.add("show");

        // Fuel efficiency rating
        let rating = "";
        if (consumption < 6) rating = "🌟 非常省油";
        else if (consumption < 8) rating = "✅ 较为省油";
        else if (consumption < 10) rating = "⚠️ 中等油耗";
        else if (consumption < 12) rating = "😐 较高油耗";
        else rating = "🔴 油耗偏高";

        document.querySelector(".result-title").textContent = `📊 计算结果 ${rating}`;
      }

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
