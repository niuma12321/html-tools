<!doctype html>
<html lang="zh-CN">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Open Graph -->
    <meta property="og:title" content="油费计算器 - WebUtils" />

    <meta property="og:url" content="https://tools.realtime-ai.chat/tools/travel/fuel-cost.html" />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />

    <!-- Preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        transition:
          background-color var(--transition-normal),
          color var(--transition-normal);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(circle at 20% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
      }

      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: calc(var(--nav-height) + var(--safe-area-top));
        padding-top: var(--safe-area-top);
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        -webkit-backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .nav-content {
        width: 100%;
        max-width: var(--container-max);
        height: var(--nav-height);
        padding: 0 var(--space-6);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: var(--space-4);
      }

      .nav-back {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        color: var(--color-accent-primary);
        text-decoration: none;
        font-size: 0.9375rem;
        font-weight: 500;
        padding: var(--space-2) var(--space-1);
        margin-left: calc(var(--space-2) * -1);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
        justify-self: start;
      }

      .nav-back:hover {
        background: var(--color-border-subtle);
      }

      .nav-back-icon {
        width: 20px;
        height: 20px;
        stroke-width: 2.5;
      }

      .nav-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
        white-space: nowrap;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-self: end;
      }

      .theme-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: var(--radius-full);
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .theme-toggle:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        transform: scale(1.05);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-icon-dark,
      .theme-icon-light {
        display: none;
      }

      [data-theme="dark"] .theme-icon-light,
      :root:not([data-theme]) .theme-icon-light {
        display: block;
      }

      [data-theme="light"] .theme-icon-dark {
        display: block;
      }

      .main-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding-top: calc(var(--nav-height) + var(--safe-area-top) + var(--space-6));
        padding-bottom: calc(var(--space-8) + var(--safe-area-bottom));
        padding-left: var(--space-6);
        padding-right: var(--space-6);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: var(--container-max);
      }

      .card {
        background: var(--glass-bg);
        backdrop-filter: saturate(var(--glass-saturate)) blur(var(--glass-blur));
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-lg);
        padding: var(--space-6);
        margin-bottom: var(--space-5);
        box-shadow: var(--shadow-md);
      }

      .card-title {
        font-size: 1.125rem;
        font-weight: 600;
        margin-bottom: var(--space-5);
        color: var(--color-text-primary);
      }

      .input-group {
        margin-bottom: var(--space-4);
      }

      .input-group label {
        display: block;
        font-weight: 500;
        margin-bottom: var(--space-2);
        font-size: 0.9375rem;
        color: var(--color-text-secondary);
      }

      input[type="number"] {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        font-size: 1rem;
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        background: var(--color-bg-input);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        transition: all var(--transition-fast);
      }

      input:focus {
        outline: none;
        border-color: var(--color-accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
      }

      .input-hint {
        font-size: 0.8125rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }

      .presets-section {
        margin-bottom: var(--space-5);
      }

      .presets-label {
        font-size: 0.9375rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-3);
        display: block;
      }

      .presets-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-2);
      }

      .preset-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-1);
        padding: var(--space-3) var(--space-2);
        background: var(--color-bg-subtle);
        border: 1px solid var(--color-border-default);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
        color: var(--color-text-primary);
      }

      .preset-btn:hover {
        background: var(--color-border-strong);
        border-color: var(--color-accent-primary);
      }

      .preset-btn.active {
        background: rgba(0, 212, 170, 0.1);
        border-color: var(--color-accent-primary);
      }

      .preset-icon {
        font-size: 1.5rem;
      }

      .preset-name {
        font-size: 0.8125rem;
        font-weight: 500;
      }

      .preset-value {
        font-size: 0.75rem;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }

      .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-4);
      }

      .result-card {
        background: var(--color-bg-subtle);
        border-radius: var(--radius-md);
        padding: var(--space-5);
        text-align: center;
      }

      .result-card.primary {
        grid-column: 1 / -1;
        background: linear-gradient(135deg, rgba(0, 212, 170, 0.1), rgba(139, 92, 246, 0.1));
        border: 1px solid rgba(0, 212, 170, 0.2);
      }

      .result-label {
        font-size: 0.875rem;
        color: var(--color-text-secondary);
        margin-bottom: var(--space-2);
      }

      .result-value {
        font-size: 2rem;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--color-accent-primary);
      }

      .result-card:not(.primary) .result-value {
        font-size: 1.5rem;
        color: var(--color-text-primary);
      }

      .result-unit {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: var(--space-1);
      }

      .btn-group {
        display: flex;
        gap: var(--space-3);
        margin-top: var(--space-4);
      }

      button {
        flex: 1;
        padding: var(--space-4);
        font-size: 1rem;
        font-weight: 600;
        border: none;
        border-radius: var(--radius-md);
        background: var(--color-accent-primary);
        color: #fff;
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: var(--font-sans);
      }

      button:hover {
        background: #00c299;
        box-shadow: var(--shadow-glow);
        transform: translateY(-1px);
      }

      button.btn-secondary {
        background: var(--color-bg-subtle);
        color: var(--color-text-secondary);
        border: 1px solid var(--color-border-default);
      }

      button.btn-secondary:hover {
        background: var(--color-border-strong);
        color: var(--color-text-primary);
        box-shadow: none;
      }

      .share-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        width: 100%;
        margin-top: var(--space-3);
        padding: var(--space-3);
        background: transparent;
        border: 1px solid var(--color-border-default);
        color: var(--color-text-secondary);
        font-size: 0.875rem;
      }

      .share-btn:hover {
        background: var(--color-bg-subtle);
        color: var(--color-text-primary);
        box-shadow: none;
        transform: none;
      }

      .share-btn svg {
        width: 16px;
        height: 16px;
      }

      .toast {
        position: fixed;
        bottom: calc(var(--space-6) + var(--safe-area-bottom));
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        padding: var(--space-3) var(--space-5);
        border-radius: var(--radius-full);
        font-size: 0.875rem;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--color-border-default);
        opacity: 0;
        transition: all var(--transition-normal);
        z-index: 2000;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      @media (max-width: 480px) {
        .nav-content {
          padding: 0 var(--space-4);
        }

        .main-content {
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }

        .card {
          padding: var(--space-4);
        }

        .presets-grid {
          grid-template-columns: repeat(2, 1fr);
        }

        .result-grid {
          grid-template-columns: 1fr;
        }

        .result-card.primary {
          grid-column: 1;
        }

        .result-value {
          font-size: 1.75rem;
        }

        .btn-group {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav-bar">
      <div class="nav-content">
        <a href="../../index.html" class="nav-back" aria-label="返回首页">
          <svg
            class="nav-back-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          <span class="nav-back-text">首页</span>
        </a>
        <h1 class="nav-title">油费计算器</h1>
        <div class="nav-actions">
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
            <svg
              class="theme-icon-light"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg
              class="theme-icon-dark"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <div class="container">
        <div class="card">
          <h2 class="card-title">选择车型</h2>

          <div class="presets-section">
            <div class="presets-grid" id="presetsGrid">
              <button
                type="button"
                class="preset-btn"
                data-fuel="6.5"
                onclick="selectPreset(this, 6.5)"
              >
                <span class="preset-icon">🚗</span>
                <span class="preset-name">经济型轿车</span>
                <span class="preset-value">6.5 L/100km</span>
              </button>
              <button
                type="button"
                class="preset-btn"
                data-fuel="8"
                onclick="selectPreset(this, 8)"
              >
                <span class="preset-icon">🚙</span>
                <span class="preset-name">家用轿车</span>
                <span class="preset-value">8 L/100km</span>
              </button>
              <button
                type="button"
                class="preset-btn"
                data-fuel="10"
                onclick="selectPreset(this, 10)"
              >
                <span class="preset-icon">🚐</span>
                <span class="preset-name">SUV</span>
                <span class="preset-value">10 L/100km</span>
              </button>
              <button
                type="button"
                class="preset-btn"
                data-fuel="12"
                onclick="selectPreset(this, 12)"
              >
                <span class="preset-icon">🏎️</span>
                <span class="preset-name">性能车</span>
                <span class="preset-value">12 L/100km</span>
              </button>
              <button
                type="button"
                class="preset-btn"
                data-fuel="15"
                onclick="selectPreset(this, 15)"
              >
                <span class="preset-icon">🚌</span>
                <span class="preset-name">MPV/面包车</span>
                <span class="preset-value">15 L/100km</span>
              </button>
              <button
                type="button"
                class="preset-btn"
                data-fuel="18"
                onclick="selectPreset(this, 18)"
              >
                <span class="preset-icon">🚚</span>
                <span class="preset-name">皮卡/轻卡</span>
                <span class="preset-value">18 L/100km</span>
              </button>
            </div>
          </div>
        </div>

        <div class="card">
          <h2 class="card-title">输入行程信息</h2>

          <div class="input-group">
            <label for="distance">行驶距离（公里）</label>
            <input type="number" id="distance" min="0" step="1" placeholder="输入总行驶距离" />
            <div class="input-hint">往返请输入总公里数</div>
          </div>

          <div class="input-group">
            <label for="fuelEfficiency">油耗（升/100公里）</label>
            <input type="number" id="fuelEfficiency" min="0" step="0.1" placeholder="如: 8.5" />
            <div class="input-hint">可点击上方车型快速选择，或手动输入</div>
          </div>

          <div class="input-group">
            <label for="fuelPrice">油价（元/升）</label>
            <input type="number" id="fuelPrice" min="0" step="0.01" placeholder="如: 7.89" />
            <div class="input-hint">当前92号汽油参考价格约 7.5-8.5 元/升</div>
          </div>

          <div class="btn-group">
            <button type="button" onclick="calculate()">计算油费</button>
            <button type="button" class="btn-secondary" onclick="clearInputs()">清空</button>
          </div>
        </div>

        <div class="card" id="resultCard">
          <h2 class="card-title">计算结果</h2>
          <div class="result-grid">
            <div class="result-card primary">
              <div class="result-label">预计油费</div>
              <div class="result-value" id="totalCost">¥0.00</div>
            </div>
            <div class="result-card">
              <div class="result-label">需加油量</div>
              <div class="result-value" id="fuelNeeded">0</div>
              <div class="result-unit">升</div>
            </div>
            <div class="result-card">
              <div class="result-label">每公里成本</div>
              <div class="result-value" id="costPerKm">¥0.00</div>
              <div class="result-unit">元/km</div>
            </div>
          </div>

          <button type="button" class="share-btn" onclick="shareResult()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
            分享结果
          </button>
        </div>
      </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
      var LS_KEY = "fuel_cost_data";
      var currentPreset = null;

      function showToast(message) {
        var toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(function () {
          toast.classList.remove("show");
        }, 2000);
      }

      function selectPreset(btn, fuelEfficiency) {
        document.querySelectorAll(".preset-btn").forEach(function (b) {
          b.classList.remove("active");
        });
        btn.classList.add("active");
        document.getElementById("fuelEfficiency").value = fuelEfficiency;
        currentPreset = fuelEfficiency;
        calculate();
      }

      function updatePresetSelection() {
        var currentValue = parseFloat(document.getElementById("fuelEfficiency").value);
        document.querySelectorAll(".preset-btn").forEach(function (btn) {
          var btnValue = parseFloat(btn.dataset.fuel);
          if (btnValue === currentValue) {
            btn.classList.add("active");
            currentPreset = currentValue;
          } else {
            btn.classList.remove("active");
          }
        });
      }

      function loadData() {
        var hash = window.location.hash.slice(1);
        if (hash) {
          try {
            var data = JSON.parse(decodeURIComponent(atob(hash)));
            if (data.distance) document.getElementById("distance").value = data.distance;
            if (data.fuelEfficiency)
              document.getElementById("fuelEfficiency").value = data.fuelEfficiency;
            if (data.fuelPrice) document.getElementById("fuelPrice").value = data.fuelPrice;
            updatePresetSelection();
            calculate();
            return;
          } catch (e) {
            console.error("Failed to parse URL hash:", e);
          }
        }

        try {
          var saved = localStorage.getItem(LS_KEY);
          if (saved) {
            var data = JSON.parse(saved);
            if (data.distance) document.getElementById("distance").value = data.distance;
            if (data.fuelEfficiency)
              document.getElementById("fuelEfficiency").value = data.fuelEfficiency;
            if (data.fuelPrice) document.getElementById("fuelPrice").value = data.fuelPrice;
            updatePresetSelection();
            calculate();
          }
        } catch (e) {
          console.error("Failed to load data:", e);
        }
      }

      function saveData() {
        var data = {
          distance: document.getElementById("distance").value,
          fuelEfficiency: document.getElementById("fuelEfficiency").value,
          fuelPrice: document.getElementById("fuelPrice").value
        };
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }

      function calculate() {
        var distance = parseFloat(document.getElementById("distance").value) || 0;
        var fuelEfficiency = parseFloat(document.getElementById("fuelEfficiency").value) || 0;
        var fuelPrice = parseFloat(document.getElementById("fuelPrice").value) || 0;

        var fuelNeeded = (distance / 100) * fuelEfficiency;
        var totalCost = fuelNeeded * fuelPrice;
        var costPerKm = distance > 0 ? totalCost / distance : 0;

        document.getElementById("fuelNeeded").textContent = fuelNeeded.toFixed(1);
        document.getElementById("totalCost").textContent = "¥" + totalCost.toFixed(2);
        document.getElementById("costPerKm").textContent = "¥" + costPerKm.toFixed(2);

        saveData();
      }

      function clearInputs() {
        document.getElementById("distance").value = "";
        document.getElementById("fuelEfficiency").value = "";
        document.getElementById("fuelPrice").value = "";
        document.getElementById("fuelNeeded").textContent = "0";
        document.getElementById("totalCost").textContent = "¥0.00";
        document.getElementById("costPerKm").textContent = "¥0.00";

        document.querySelectorAll(".preset-btn").forEach(function (btn) {
          btn.classList.remove("active");
        });
        currentPreset = null;

        localStorage.removeItem(LS_KEY);
        history.replaceState(null, "", window.location.pathname);
        showToast("已清空所有输入");
      }

      function shareResult() {
        var data = {
          distance: document.getElementById("distance").value,
          fuelEfficiency: document.getElementById("fuelEfficiency").value,
          fuelPrice: document.getElementById("fuelPrice").value
        };

        if (!data.distance && !data.fuelEfficiency && !data.fuelPrice) {
          showToast("请先输入数据");
          return;
        }

        try {
          var hash = btoa(encodeURIComponent(JSON.stringify(data)));
          var url = window.location.origin + window.location.pathname + "#" + hash;

          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard
              .writeText(url)
              .then(function () {
                showToast("链接已复制到剪贴板");
              })
              .catch(function () {
                showToast("复制失败，请手动复制");
              });
          } else {
            var textArea = document.createElement("textarea");
            textArea.value = url;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);
            showToast("链接已复制到剪贴板");
          }

          history.replaceState(null, "", "#" + hash);
        } catch (e) {
          showToast("分享失败");
          console.error("Share failed:", e);
        }
      }

      function toggleTheme() {
        var html = document.documentElement;
        var currentTheme = html.getAttribute("data-theme") || "dark";
        var newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      }

      function initTheme() {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      }

      document.querySelectorAll("input").forEach(function (input) {
        input.addEventListener("input", function () {
          if (input.id === "fuelEfficiency") {
            updatePresetSelection();
          }
          calculate();
        });
      });

      initTheme();
      loadData();
    </script>
  </body>
</html>
