<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>旅行预算计算器 - WebUtils</title>
    <meta property="og:title" content="旅行预算计算器 - WebUtils" />
    <meta
      property="og:description"
      content="旅行预算计算器：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/travel/travel-budget.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="智能旅行预算规划，按类别估算交通、住宿、餐饮、门票等费用" />
    <meta name="keywords" content="旅行预算 旅游费用 出行计划 travel budget trip cost" />
    <meta name="author" content="WebUtils" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/travel/travel-budget.html" />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        font-size: 16px;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-orange));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
      }
      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .card-title {
        font-size: 1rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .form-group label {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
      }
      .form-group input,
      .form-group select {
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        font-size: 0.95rem;
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .budget-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .budget-item {
        display: grid;
        grid-template-columns: auto 1fr 120px 40px;
        gap: 1rem;
        align-items: center;
        padding: 0.75rem 1rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
      }
      .budget-icon {
        font-size: 1.2rem;
        width: 32px;
        text-align: center;
      }
      .budget-name {
        font-weight: 500;
      }
      .budget-input {
        padding: 0.5rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-card);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        text-align: right;
        width: 100%;
      }
      .budget-input:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .delete-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1.2rem;
        opacity: 0.5;
        transition: all 0.2s;
      }
      .delete-btn:hover {
        opacity: 1;
        color: var(--accent-orange);
      }
      .add-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: 100%;
        padding: 0.75rem;
        border: 2px dashed var(--border-subtle);
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--color-text-secondary);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.9rem;
        transition: all 0.2s;
        margin-top: 0.75rem;
      }
      .add-btn:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }
      .summary-card {
        background: linear-gradient(135deg, rgba(255, 159, 67, 0.1), rgba(0, 245, 212, 0.1));
        border: 1px solid var(--accent-orange);
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
      }
      .summary-item {
        text-align: center;
        padding: 1rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
      }
      .summary-label {
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        margin-bottom: 0.25rem;
      }
      .summary-value {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--accent-orange);
      }
      .summary-value.total {
        font-size: 2rem;
        color: var(--color-accent-cyan);
      }
      .chart-container {
        margin-top: 1.5rem;
      }
      .chart-bar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.5rem;
      }
      .chart-label {
        width: 80px;
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        text-align: right;
      }
      .chart-track {
        flex: 1;
        height: 24px;
        background: var(--color-bg-surface);
        border-radius: 4px;
        overflow: hidden;
      }
      .chart-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.3s;
      }
      .chart-value {
        width: 80px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--color-text-primary);
      }
      .tips {
        margin-top: 1rem;
        padding: 1rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
        border-left: 3px solid var(--color-accent-cyan);
      }
      .tips-title {
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: var(--color-accent-cyan);
      }
      .tips-content {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        line-height: 1.8;
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
      @media (max-width: 600px) {
        .budget-item {
          grid-template-columns: auto 1fr 100px 30px;
          gap: 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌙">
        🌙
      </button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">旅行预算计算器</span>
      </nav>

      <h1>旅行预算计算器</h1>
      <p class="subtitle">智能规划旅行费用，掌控出行开支</p>

      <div class="card">
        <div class="card-title">📅 行程信息</div>
        <div class="form-row">
          <div class="form-group">
            <label for="input-----">出行天数</label>
            <input
              type="number"
              id="days"
              value="5"
              min="1"
              max="365"
              oninput="calculate()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-----">出行人数</label>
            <input
              type="number"
              id="people"
              value="2"
              min="1"
              max="20"
              oninput="calculate()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label>货币单位</label>
            <select id="currency" onchange="calculate()">
              <option value="¥">人民币 (¥)</option>
              <option value="$">美元 ($)</option>
              <option value="€">欧元 (€)</option>
              <option value="£">英镑 (£)</option>
              <option value="¥">日元 (¥)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">💰 费用明细</div>
        <div class="budget-list" id="budgetList">
          <!-- Items will be rendered here -->
        </div>
        <button class="add-btn" onclick="addItem()">
          <span>+</span>
          添加费用项
        </button>
      </div>

      <div class="card summary-card">
        <div class="card-title">📊 预算汇总</div>
        <div class="summary-grid">
          <div class="summary-item">
            <div class="summary-label">总预算</div>
            <div class="summary-value total" id="totalBudget">¥0</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">人均费用</div>
            <div class="summary-value" id="perPerson">¥0</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">日均费用</div>
            <div class="summary-value" id="perDay">¥0</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">人均日消费</div>
            <div class="summary-value" id="perPersonDay">¥0</div>
          </div>
        </div>

        <div class="chart-container" id="chartContainer">
          <!-- Chart will be rendered here -->
        </div>
      </div>

      <div class="tips">
        <div class="tips-title">💡 预算建议</div>
        <div class="tips-content" id="tips">输入费用后将显示预算建议...</div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const defaultItems = [
        { icon: "✈️", name: "交通费用", amount: 2000, color: "#4d9fff" },
        { icon: "🏨", name: "住宿费用", amount: 1500, color: "#00f5d4" },
        { icon: "🍜", name: "餐饮费用", amount: 800, color: "#ff9f43" },
        { icon: "🎫", name: "景点门票", amount: 500, color: "#00d26a" },
        { icon: "🛍️", name: "购物预算", amount: 1000, color: "#ff6b6b" },
        { icon: "🚕", name: "当地交通", amount: 300, color: "#a55eea" }
      ];

      let budgetItems = [...defaultItems];
      let nextId = budgetItems.length;

      const icons = [
        "✈️",
        "🏨",
        "🍜",
        "🎫",
        "🛍️",
        "🚕",
        "🎭",
        "🎢",
        "🍺",
        "📱",
        "💊",
        "🎁",
        "📷",
        "🧳",
        "🎿",
        "⛵"
      ];

      function render() {
        const list = document.getElementById("budgetList");
        list.innerHTML = budgetItems
          .map(
            (item, index) => `
        <div class="budget-item" data-index="${index}">
          <span class="budget-icon">${item.icon}</span>
          <input type="text" class="budget-name" value="${item.name}"
            onchange="updateItem(${index}, 'name', this.value)" style="background:transparent;border:none;color:var(--color-text-primary);font-family:inherit" aria-label="文本输入框" placeholder="请输入文本输入框">
          <input type="number" class="budget-input" value="${item.amount}" min="0"
            oninput="updateItem(${index}, 'amount', parseFloat(this.value) || 0)" aria-label="数字输入框" placeholder="请输入数字输入框">
          <button class="delete-btn" onclick="removeItem(${index})" title="删除" aria-label="×">×</button>
        </div>
      `
          )
          .join("");
        calculate();
      }

      function addItem() {
        const randomIcon = icons[Math.floor(Math.random() * icons.length)];
        const colors = ["#4d9fff", "#00f5d4", "#ff9f43", "#00d26a", "#ff6b6b", "#a55eea"];
        budgetItems.push({
          icon: randomIcon,
          name: "新费用项",
          amount: 0,
          color: colors[budgetItems.length % colors.length]
        });
        render();
      }

      function removeItem(index) {
        if (budgetItems.length <= 1) {
          alert("至少保留一项费用");
          return;
        }
        budgetItems.splice(index, 1);
        render();
      }

      function updateItem(index, field, value) {
        budgetItems[index][field] = value;
        calculate();
      }

      function calculate() {
        const days = parseInt(document.getElementById("days").value) || 1;
        const people = parseInt(document.getElementById("people").value) || 1;
        const currency = document.getElementById("currency").value;

        const total = budgetItems.reduce((sum, item) => sum + (item.amount || 0), 0);
        const perPerson = total / people;
        const perDay = total / days;
        const perPersonDay = total / people / days;

        document.getElementById("totalBudget").textContent = currency + total.toLocaleString();
        document.getElementById("perPerson").textContent = currency + perPerson.toFixed(0);
        document.getElementById("perDay").textContent = currency + perDay.toFixed(0);
        document.getElementById("perPersonDay").textContent = currency + perPersonDay.toFixed(0);

        // Render chart
        const maxAmount = Math.max(...budgetItems.map((i) => i.amount || 0));
        const chartHtml = budgetItems
          .map((item) => {
            const percent = maxAmount > 0 ? ((item.amount || 0) / maxAmount) * 100 : 0;
            const ratio = total > 0 ? (((item.amount || 0) / total) * 100).toFixed(1) : 0;
            return `
          <div class="chart-bar">
            <div class="chart-label">${item.icon} ${item.name.slice(0, 4)}</div>
            <div class="chart-track">
              <div class="chart-fill" style="width:${percent}%;background:${item.color}"></div>
            </div>
            <div class="chart-value">${ratio}%</div>
          </div>
        `;
          })
          .join("");
        document.getElementById("chartContainer").innerHTML = chartHtml;

        // Generate tips
        generateTips(total, perPersonDay, days, currency);
      }

      function generateTips(total, perPersonDay, days, currency) {
        const tips = [];

        if (perPersonDay < 200) {
          tips.push("✅ 人均日消费较低，属于经济型旅行");
        } else if (perPersonDay < 500) {
          tips.push("💡 人均日消费适中，属于舒适型旅行");
        } else if (perPersonDay < 1000) {
          tips.push("⭐ 人均日消费较高，属于品质型旅行");
        } else {
          tips.push("👑 人均日消费很高，属于奢华型旅行");
        }

        const accommodation = budgetItems.find((i) => i.name.includes("住宿"));
        const food = budgetItems.find((i) => i.name.includes("餐饮"));

        if (accommodation && food && accommodation.amount > food.amount * 3) {
          tips.push("📊 住宿占比较高，可考虑民宿或青旅节省开支");
        }

        if (days > 7) {
          tips.push("📅 长途旅行建议预留10-15%应急资金");
        }

        tips.push("💳 建议携带多种支付方式，现金+银行卡+移动支付");

        document.getElementById("tips").innerHTML = tips.join("<br>");
      }

      // Initialize
      render();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
