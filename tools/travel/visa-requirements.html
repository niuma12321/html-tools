<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>签证要求查询 - WebUtils</title>
    <meta property="og:title" content="签证要求查询 - WebUtils" />
    <meta property="og:description" content="签证要求查询：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/travel/visa-requirements.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="查询不同国家的签证要求和入境政策" />
    <meta name="keywords" content="签证 护照 入境 旅游 visa passport travel requirements" />
    <meta name="author" content="WebUtils" />
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/travel/visa-requirements.html"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        font-size: 16px;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .card-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--color-accent-cyan);
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-bottom: 0.5rem;
      }
      .form-group select,
      . form-group input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: inherit;
        font-size: 1rem;
      }
      .form-group select:focus,
      .form-group input:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .visa-result {
        background: var(--color-bg-card);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 2rem;
        margin-bottom: 1.5rem;
        display: none;
      }
      .visa-result.show {
        display: block;
      }
      .visa-result.visa-free {
        border-color: var(--accent-green);
        background: linear-gradient(135deg, rgba(0, 210, 106, 0.1), transparent);
      }
      .visa-result.visa-on-arrival {
        border-color: var(--accent-yellow);
        background: linear-gradient(135deg, rgba(255, 217, 61, 0.1), transparent);
      }
      .visa-result.visa-required {
        border-color: var(--accent-red);
        background: linear-gradient(135deg, rgba(255, 107, 107, 0.1), transparent);
      }
      .visa-status {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .visa-icon {
        font-size: 3rem;
      }
      .visa-text h2 {
        font-size: 1.5rem;
        margin-bottom: 0.25rem;
      }
      .visa-text p {
        color: var(--color-text-secondary);
        font-size: 0.9rem;
      }
      .visa-details {
        display: grid;
        gap: 1rem;
      }
      .detail-item {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 1rem;
      }
      .detail-label {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
      }
      .detail-value {
        font-weight: 600;
      }
      .notice {
        background: var(--color-bg-surface);
        border-left: 4px solid var(--accent-blue);
        padding: 1rem;
        border-radius: var(--radius-sm);
        margin-top: 1rem;
      }
      .notice-title {
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--accent-blue);
      }
      .notice-text {
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--color-text-secondary);
      }
      .country-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
      }
      .country-card {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 1rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .country-card:hover {
        border-color: var(--color-accent-cyan);
        transform: translateY(-2px);
      }
      .country-name {
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .country-type {
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌙">
        🌙
      </button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">签证要求查询</span>
      </nav>

      <h1>✈️ 签证要求查询</h1>
      <p class="subtitle">查询不同国家的签证政策和入境要求</p>

      <div class="card">
        <div class="card-title">🔍 查询签证要求</div>
        <div class="form-group">
          <label>您的护照国籍</label>
          <select id="passportCountry" onchange="checkVisa()">
            <option value="">-- 选择国籍 --</option>
            <option value="CN">中国 🇨🇳</option>
            <option value="US">美国 🇺🇸</option>
            <option value="GB">英国 🇬🇧</option>
            <option value="JP">日本 🇯🇵</option>
            <option value="KR">韩国 🇰🇷</option>
            <option value="SG">新加坡 🇸🇬</option>
            <option value="AU">澳大利亚 🇦🇺</option>
            <option value="CA">加拿大 🇨🇦</option>
            <option value="DE">德国 🇩🇪</option>
            <option value="FR">法国 🇫🇷</option>
          </select>
        </div>
        <div class="form-group">
          <label>目的地国家</label>
          <select id="destination" onchange="checkVisa()">
            <option value="">-- 选择目的地 --</option>
            <optgroup label="亚洲">
              <option value="TH">泰国</option>
              <option value="JP">日本</option>
              <option value="KR">韩国</option>
              <option value="SG">新加坡</option>
              <option value="MY">马来西亚</option>
              <option value="VN">越南</option>
              <option value="ID">印度尼西亚</option>
            </optgroup>
            <optgroup label="欧洲">
              <option value="GB">英国</option>
              <option value="FR">法国</option>
              <option value="DE">德国</option>
              <option value="IT">意大利</option>
              <option value="ES">西班牙</option>
            </optgroup>
            <optgroup label="美洲">
              <option value="US">美国</option>
              <option value="CA">加拿大</option>
              <option value="MX">墨西哥</option>
              <option value="BR">巴西</option>
            </optgroup>
            <optgroup label="大洋洲">
              <option value="AU">澳大利亚</option>
              <option value="NZ">新西兰</option>
            </optgroup>
          </select>
        </div>
      </div>

      <div class="visa-result" id="visaResult">
        <div class="visa-status">
          <div class="visa-icon" id="visaIcon">✅</div>
          <div class="visa-text">
            <h2 id="visaTitle">免签入境</h2>
            <p id="visaSubtitle">无需申请签证即可入境</p>
          </div>
        </div>

        <div class="visa-details">
          <div class="detail-item">
            <div class="detail-label">停留时间</div>
            <div class="detail-value" id="stayDuration">--</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">入境要求</div>
            <div class="detail-value" id="entryRequirements">--</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">护照有效期</div>
            <div class="detail-value" id="passportValidity">--</div>
          </div>
        </div>

        <div class="notice">
          <div class="notice-title">⚠️ 重要提示</div>
          <div class="notice-text" id="noticeText">
            签证政策可能随时变化，请在出行前访问目的地国家使领馆官网确认最新要求。
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🌍 热门目的地（中国护照）</div>
        <div class="country-list">
          <div class="country-card" onclick="selectDestination('TH')">
            <div class="country-name">🇹🇭 泰国</div>
            <div class="country-type">免签 30天</div>
          </div>
          <div class="country-card" onclick="selectDestination('SG')">
            <div class="country-name">🇸🇬 新加坡</div>
            <div class="country-type">免签 30天</div>
          </div>
          <div class="country-card" onclick="selectDestination('MY')">
            <div class="country-name">🇲🇾 马来西亚</div>
            <div class="country-type">免签 30天</div>
          </div>
          <div class="country-card" onclick="selectDestination('JP')">
            <div class="country-name">🇯🇵 日本</div>
            <div class="country-type">需要签证</div>
          </div>
          <div class="country-card" onclick="selectDestination('KR')">
            <div class="country-name">🇰🇷 韩国</div>
            <div class="country-type">免签 60天</div>
          </div>
          <div class="country-card" onclick="selectDestination('VN')">
            <div class="country-name">🇻🇳 越南</div>
            <div class="country-type">落地签</div>
          </div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      // Simplified visa data (for demonstration)
      const VISA_DATA = {
        "CN-TH": {
          type: "free",
          stay: "30天",
          requirements: "有效护照",
          validity: "入境时至少6个月"
        },
        "CN-SG": {
          type: "free",
          stay: "30天",
          requirements: "有效护照、返程机票",
          validity: "入境时至少6个月"
        },
        "CN-MY": {
          type: "free",
          stay: "30天",
          requirements: "有效护照",
          validity: "入境时至少6个月"
        },
        "CN-JP": {
          type: "required",
          stay: "依签证类型",
          requirements: "提前申请签证",
          validity: "申请时至少6个月",
          notice: "需要通过旅行社或代办机构申请"
        },
        "CN-KR": {
          type: "free",
          stay: "60天",
          requirements: "有效护照",
          validity: "入境时至少6个月"
        },
        "CN-VN": {
          type: "arrival",
          stay: "30天",
          requirements: "落地签申请表、照片",
          validity: "入境时至少6个月",
          notice: "建议提前办理电子签证"
        },
        "CN-US": {
          type: "required",
          stay: "依签证类型",
          requirements: "B1/B2签证",
          validity: "申请时至少6个月",
          notice: "需要面试，建议提前3个月申请"
        },
        "CN-GB": {
          type: "required",
          stay: "依签证类型",
          requirements: "旅游签证",
          validity: "行程结束后至少3个月",
          notice: "需要提供财务证明和行程单"
        },
        "US-CN": {
          type: "required",
          stay: "依签证类型",
          requirements: "提前申请签证",
          validity: "申请时至少6个月"
        },
        "US-JP": { type: "free", stay: "90天", requirements: "有效护照", validity: "整个行程有效" },
        "US-GB": { type: "free", stay: "180天", requirements: "有效护照", validity: "整个行程有效" }
      };

      function selectDestination(dest) {
        document.getElementById("passportCountry").value = "CN";
        document.getElementById("destination").value = dest;
        checkVisa();
      }

      function checkVisa() {
        const passport = document.getElementById("passportCountry").value;
        const destination = document.getElementById("destination").value;

        if (!passport || !destination) {
          document.getElementById("visaResult").classList.remove("show");
          return;
        }

        const key = `${passport}-${destination}`;
        const data = VISA_DATA[key] || {
          type: "required",
          stay: "依签证类型",
          requirements: "请联系使领馆确认",
          validity: "建议至少6个月",
          notice: "签证政策未收录，请访问目的地国家使领馆官网查询最新信息。"
        };

        const result = document.getElementById("visaResult");
        result.classList.remove("visa-free", "visa-on-arrival", "visa-required");

        if (data.type === "free") {
          result.classList.add("visa-free");
          document.getElementById("visaIcon").textContent = "✅";
          document.getElementById("visaTitle").textContent = "免签入境";
          document.getElementById("visaSubtitle").textContent = "无需申请签证即可入境";
        } else if (data.type === "arrival") {
          result.classList.add("visa-on-arrival");
          document.getElementById("visaIcon").textContent = "🛂";
          document.getElementById("visaTitle").textContent = "落地签";
          document.getElementById("visaSubtitle").textContent = "抵达时在机场办理签证";
        } else {
          result.classList.add("visa-required");
          document.getElementById("visaIcon").textContent = "📄";
          document.getElementById("visaTitle").textContent = "需要签证";
          document.getElementById("visaSubtitle").textContent = "出发前需提前申请签证";
        }

        document.getElementById("stayDuration").textContent = data.stay;
        document.getElementById("entryRequirements").textContent = data.requirements;
        document.getElementById("passportValidity").textContent = data.validity;
        document.getElementById("noticeText").textContent =
          data.notice || "签证政策可能随时变化，请在出行前访问目的地国家使领馆官网确认最新要求。";

        result.classList.add("show");
      }

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
