<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>出境换汇指南 - WebUtils</title>
    <meta property="og:title" content="出境换汇指南 - WebUtils" />
    <meta property="og:description" content="出境换汇指南：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/travel/currency-tips.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="各国货币换汇建议、支付方式、小费习惯、注意事项一览" />
    <meta name="keywords" content="换汇 货币 外汇 出境 travel currency exchange tips" />
    <meta name="author" content="WebUtils" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/travel/currency-tips.html" />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 700px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-yellow));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
      }
      .search-box {
        margin-bottom: 1.5rem;
      }
      .search-input {
        width: 100%;
        padding: 1rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-card);
        color: var(--color-text-primary);
        font-family: inherit;
        font-size: 1rem;
      }
      .search-input:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .search-input::placeholder {
        color: var(--text-muted);
      }
      .country-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .country-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        overflow: hidden;
        transition: all 0.2s;
      }
      .country-card:hover {
        border-color: var(--color-accent-cyan);
      }
      .country-header {
        padding: 1rem 1.5rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .country-flag {
        font-size: 2rem;
      }
      .country-info {
        flex: 1;
      }
      .country-name {
        font-weight: 600;
        font-size: 1.1rem;
      }
      .country-currency {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }
      .expand-icon {
        color: var(--text-muted);
        transition: transform 0.2s;
      }
      .country-card.expanded .expand-icon {
        transform: rotate(180deg);
      }
      .country-details {
        display: none;
        padding: 0 1.5rem 1.5rem;
        border-top: 1px solid var(--border-subtle);
      }
      .country-card.expanded .country-details {
        display: block;
      }
      .detail-section {
        margin-top: 1rem;
      }
      .detail-title {
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--color-accent-cyan);
        margin-bottom: 0.5rem;
      }
      .detail-content {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        line-height: 1.8;
      }
      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        margin-top: 0.5rem;
      }
      .detail-item {
        padding: 0.75rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
      }
      .detail-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
      }
      .detail-value {
        font-size: 0.9rem;
        font-weight: 500;
      }
      .tag {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        margin-right: 0.25rem;
        margin-bottom: 0.25rem;
      }
      .tag-green {
        background: rgba(0, 210, 106, 0.2);
        color: var(--accent-green);
      }
      .tag-yellow {
        background: rgba(255, 217, 61, 0.2);
        color: var(--accent-yellow);
      }
      .tag-blue {
        background: rgba(77, 159, 255, 0.2);
        color: var(--accent-blue);
      }
      .tips-box {
        margin-top: 1rem;
        padding: 1rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
        border-left: 3px solid var(--accent-yellow);
      }
      .tips-title {
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: var(--accent-yellow);
      }
      .tips-content {
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        line-height: 1.8;
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">出境换汇指南</span>
      </nav>

      <h1>出境换汇指南</h1>
      <p class="subtitle">各国货币、支付方式、小费习惯一览</p>

      <div class="search-box">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="🔍 搜索国家/地区..."
          oninput="filterCountries()"
        />
      </div>

      <div class="country-list" id="countryList">
        <!-- Countries will be rendered here -->
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const countries = [
        {
          flag: "🇺🇸",
          name: "美国",
          currency: "USD 美元",
          symbol: "$",
          exchange: "银行换汇或当地ATM取现，汇率较好",
          payment: ["信用卡", "Apple Pay", "现金"],
          tip: "餐厅15-20%，酒店行李员$1-2/件，出租车10-15%",
          notes: "信用卡非常普及，建议带芯片卡。部分商店可能要求ID证件。",
          prepareAmount: "建议准备$200-500现金零用"
        },
        {
          flag: "🇯🇵",
          name: "日本",
          currency: "JPY 日元",
          symbol: "¥",
          exchange: "机场或市内银行换汇，7-11便利店ATM支持银联",
          payment: ["现金为主", "IC卡(Suica/Pasmo)", "信用卡"],
          tip: "不需要小费，给小费可能被视为不礼貌",
          notes: "日本仍以现金为主，很多小店不收卡。建议多准备现金。",
          prepareAmount: "建议准备¥30,000-50,000现金"
        },
        {
          flag: "🇰🇷",
          name: "韩国",
          currency: "KRW 韩元",
          symbol: "₩",
          exchange: "明洞换汇所汇率最好，银行其次",
          payment: ["信用卡", "T-money卡", "支付宝/微信"],
          tip: "一般不需要小费",
          notes: "信用卡接受度高，支付宝在大型商场可用。",
          prepareAmount: "建议准备₩200,000-300,000现金"
        },
        {
          flag: "🇹🇭",
          name: "泰国",
          currency: "THB 泰铢",
          symbol: "฿",
          exchange: "Super Rich等换汇店汇率最好，避免机场换汇",
          payment: ["现金", "支付宝/微信", "信用卡"],
          tip: "高档餐厅5-10%，按摩50-100泰铢",
          notes: "现金仍是主流，小摊小店只收现金。",
          prepareAmount: "建议准备฿5,000-10,000现金"
        },
        {
          flag: "🇸🇬",
          name: "新加坡",
          currency: "SGD 新加坡元",
          symbol: "S$",
          exchange: "牛车水换汇店汇率较好",
          payment: ["信用卡", "GrabPay", "NETS", "现金"],
          tip: "账单通常已含10%服务费，不需额外小费",
          notes: "电子支付非常发达，大部分地方支持无现金。",
          prepareAmount: "建议准备S$100-200现金"
        },
        {
          flag: "🇬🇧",
          name: "英国",
          currency: "GBP 英镑",
          symbol: "£",
          exchange: "银行或正规换汇店，避免机场",
          payment: ["信用卡", "Apple Pay", "现金"],
          tip: "餐厅10-15%（常已含服务费），出租车10%",
          notes: "接受度高的是芯片卡和非接触支付。",
          prepareAmount: "建议准备£100-200现金"
        },
        {
          flag: "🇫🇷",
          name: "法国",
          currency: "EUR 欧元",
          symbol: "€",
          exchange: "银行或ATM取现，避免街头换汇店",
          payment: ["信用卡", "现金"],
          tip: "账单已含服务费，可留零头表示满意",
          notes: "大部分商户接受信用卡，但小店可能只收现金。",
          prepareAmount: "建议准备€100-300现金"
        },
        {
          flag: "🇦🇺",
          name: "澳大利亚",
          currency: "AUD 澳元",
          symbol: "A$",
          exchange: "机场换少量，市区换汇店更划算",
          payment: ["信用卡", "Apple Pay", "现金"],
          tip: "不是必须，满意可给10%",
          notes: "非接触支付非常普及，很多地方甚至不收现金。",
          prepareAmount: "建议准备A$100-200现金"
        },
        {
          flag: "🇻🇳",
          name: "越南",
          currency: "VND 越南盾",
          symbol: "₫",
          exchange: "金店换汇汇率最好，银行其次",
          payment: ["现金为主", "大城市支持支付宝"],
          tip: "高档场所$1-2美元小费",
          notes: "现金为王，准备足够现金。美元也广泛接受。",
          prepareAmount: "建议准备2,000,000-5,000,000₫"
        },
        {
          flag: "🇲🇾",
          name: "马来西亚",
          currency: "MYR 林吉特",
          symbol: "RM",
          exchange: "换汇店汇率好于银行",
          payment: ["现金", "GrabPay", "信用卡"],
          tip: "已含服务费，不需额外小费",
          notes: "现金仍是主流，尤其是小店和夜市。",
          prepareAmount: "建议准备RM300-500现金"
        }
      ];

      function renderCountries(filter = "") {
        const list = document.getElementById("countryList");
        const filtered = filter
          ? countries.filter(
              (c) =>
                c.name.includes(filter) || c.currency.toLowerCase().includes(filter.toLowerCase())
            )
          : countries;

        list.innerHTML = filtered
          .map(
            (c, i) => `
        <div class="country-card" data-index="${i}">
          <div class="country-header" onclick="toggleCard(${i})">
            <span class="country-flag">${c.flag}</span>
            <div class="country-info">
              <div class="country-name">${c.name}</div>
              <div class="country-currency">${c.currency} (${c.symbol})</div>
            </div>
            <span class="expand-icon">▼</span>
          </div>
          <div class="country-details">
            <div class="detail-section">
              <div class="detail-title">💱 换汇建议</div>
              <div class="detail-content">${c.exchange}</div>
            </div>

            <div class="detail-section">
              <div class="detail-title">💳 支付方式</div>
              <div class="detail-content">
                ${c.payment.map((p) => `<span class="tag tag-blue">${p}</span>`).join("")}
              </div>
            </div>

            <div class="detail-section">
              <div class="detail-title">💰 小费习惯</div>
              <div class="detail-content">${c.tip}</div>
            </div>

            <div class="detail-grid">
              <div class="detail-item">
                <div class="detail-label">建议携带现金</div>
                <div class="detail-value">${c.prepareAmount}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">货币符号</div>
                <div class="detail-value">${c.symbol}</div>
              </div>
            </div>

            <div class="tips-box">
              <div class="tips-title">📝 注意事项</div>
              <div class="tips-content">${c.notes}</div>
            </div>
          </div>
        </div>
      `
          )
          .join("");
      }

      function toggleCard(index) {
        const cards = document.querySelectorAll(".country-card");
        cards[index].classList.toggle("expanded");
      }

      function filterCountries() {
        const query = document.getElementById("searchInput").value.trim();
        renderCountries(query);
      }

      // Initialize
      renderCountries();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
