  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      Bcrypt 工具
    </nav>
    <div class="header">
      <div class="nav">
        <button class="theme-toggle" onclick="toggleTheme()">🌓 主题</button>
      </div>
      <h1>🔒 Bcrypt 工具</h1>
      <p>密码哈希生成与验证</p>
    </div>
    <div class="container">
      <div class="card">
        <div class="card-title">🔐 生成 Bcrypt 哈希</div>
        <div class="input-group">
          <label>密码明文</label>
          <input type="text" id="password" placeholder="输入要加密的密码" value="mypassword123" />
        </div>
        <div class="input-group">
          <label>
            Salt Rounds:
            <span id="roundsValue">10</span>
          </label>
          <div class="slider-row">
            <input
              type="range"
              id="rounds"
              min="4"
              max="14"
              value="10"
              oninput="document.getElementById('roundsValue').textContent = this.value"
            />
          </div>
          <small style="color: var(--color-text-secondary)">值越大越安全，但计算时间越长</small>
        </div>
        <button class="btn btn-primary" id="generateBtn" onclick="generateHash()">生成哈希</button>
        <div class="result-box" id="hashResult" onclick="copyHash()" style="display: none"></div>
        <div class="info-box">
          <strong>Bcrypt 特点:</strong>
          <br />
          • 自动生成随机盐值
          <br />
          • 可调节计算成本 (salt rounds)
          <br />
          • 抵抗彩虹表攻击
          <br />
          • 适合密码存储
        </div>
      </div>

      <div class="card">
        <div class="card-title">✅ 验证 Bcrypt 哈希</div>
        <div class="input-group">
          <label>密码明文</label>
          <input type="text" id="verifyPassword" placeholder="输入密码" />
        </div>
        <div class="input-group">
          <label>Bcrypt 哈希</label>
          <textarea id="verifyHash" placeholder="输入 bcrypt 哈希值 (以 $2 开头)"></textarea>
        </div>
        <button class="btn btn-primary" id="verifyBtn" onclick="verifyHash()">验证</button>
        <div class="verify-result" id="verifyResult" style="display: none"></div>
      </div>
    </div>
    <div class="toast" id="toast">已复制到剪贴板</div>
    <script>
      window.generateHash = async function () {
        const password = document.getElementById("password").value;
        const rounds = parseInt(document.getElementById("rounds").value);
        const btn = document.getElementById("generateBtn");

        if (!password) {
          alert("请输入密码");
          return;
        }

        btn.disabled = true;
        btn.textContent = "计算中...";

        try {
          const hash = await new Promise((resolve, reject) => {
            dcodeIO.bcrypt.hash(password, rounds, (err, hash) => {
              if (err) reject(err);
              else resolve(hash);
            });
          });

          const resultBox = document.getElementById("hashResult");
          resultBox.textContent = hash;
          resultBox.style.display = "block";

          // Auto fill verify section
          document.getElementById("verifyPassword").value = password;
          document.getElementById("verifyHash").value = hash;
        } catch (err) {
          alert("生成失败: " + err.message);
        } finally {
          btn.disabled = false;
          btn.textContent = "生成哈希";
        }
      };

      window.verifyHash = async function () {
        const password = document.getElementById("verifyPassword").value;
        const hash = document.getElementById("verifyHash").value.trim();
        const btn = document.getElementById("verifyBtn");
        const result = document.getElementById("verifyResult");

        if (!password || !hash) {
          alert("请输入密码和哈希值");
          return;
        }

        btn.disabled = true;
        btn.textContent = "验证中...";

        try {
          const isValid = await new Promise((resolve, reject) => {
            dcodeIO.bcrypt.compare(password, hash, (err, res) => {
              if (err) reject(err);
              else resolve(res);
            });
          });

          result.style.display = "block";
          if (isValid) {
            result.className = "verify-result success";
            result.textContent = "✅ 验证成功！密码匹配";
          } else {
            result.className = "verify-result failure";
            result.textContent = "❌ 验证失败！密码不匹配";
          }
        } catch (err) {
          result.style.display = "block";
          result.className = "verify-result failure";
          result.textContent = "❌ 错误: " + err.message;
        } finally {
          btn.disabled = false;
          btn.textContent = "验证";
        }
      };

      window.copyHash = function () {
        const hash = document.getElementById("hashResult").textContent;
        navigator.clipboard.writeText(hash);
        document.getElementById("toast").classList.add("show");
        setTimeout(() => document.getElementById("toast").classList.remove("show"), 2000);
      };

      window.toggleTheme = function () {
        const t = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };

      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
    </script>
