<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>商品价格对比器 - WebUtils</title>
    <meta property="og:title" content="商品价格对比器 - WebUtils" />
    <meta
      property="og:description"
      content="商品价格对比器：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/shopping/price-comparison.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="对比不同商品价格、折扣和性价比，做出明智购物决策" />
    <meta name="keywords" content="价格对比 购物 折扣 性价比 price comparison shopping deal" />
    <meta name="author" content="WebUtils" />
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/shopping/price-comparison.html"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-green));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .add-item {
        display: flex;
        gap: 1rem;
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .add-item input {
        flex: 1;
        min-width: 150px;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: inherit;
        font-size: 1rem;
      }
      .add-item input:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .add-item button {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: var(--radius-sm);
        background: var(--accent-green);
        color: #000;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .add-item button:hover {
        background: var(--color-accent-cyan);
        transform: translateY(-2px);
      }
      .items-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .item-card {
        background: var(--color-bg-card);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        position: relative;
        transition: all 0.2s;
      }
      .item-card.best {
        border-color: var(--accent-green);
        background: linear-gradient(135deg, rgba(0, 210, 106, 0.1), transparent);
      }
      .item-card.best::before {
        content: "🏆 最佳选择";
        position: absolute;
        top: -12px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--accent-green);
        color: #000;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 700;
      }
      .item-delete {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1.2rem;
        transition: all 0.2s;
      }
      .item-delete:hover {
        color: var(--accent-red);
        transform: scale(1.2);
      }
      .item-name {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        padding-right: 2rem;
      }
      .item-details {
        display: grid;
        gap: 0.75rem;
      }
      .detail-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .detail-label {
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      .detail-value {
        font-family: var(--font-mono);
        font-weight: 600;
      }
      .price-big {
        font-size: 2rem;
        color: var(--color-accent-cyan);
      }
      .savings {
        color: var(--accent-green);
      }
      .final-price {
        font-size: 1.5rem;
        color: var(--accent-orange);
      }
      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
      }
      .empty-state .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      .summary {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
      }
      .summary-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--color-accent-cyan);
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
      }
      .summary-item {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 1rem;
        text-align: center;
      }
      .summary-value {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent-green);
        margin-bottom: 0.25rem;
      }
      .summary-label {
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
      @media (max-width: 768px) {
        .add-item {
          flex-direction: column;
        }
        .items-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">价格对比</span>
      </nav>

      <h1>🛒 商品价格对比器</h1>
      <p class="subtitle">对比不同商品，找到最优惠的购物选择</p>

      <div class="add-item">
        <input type="text" id="itemName" placeholder="商品名称" onkeypress="handleEnter(event)" />
        <input
          type="number"
          id="originalPrice"
          placeholder="原价 (元)"
          min="0"
          step="0.01"
          onkeypress="handleEnter(event)"
        />
        <input
          type="number"
          id="discount"
          placeholder="折扣 (%)"
          min="0"
          max="100"
          step="1"
          value="0"
          onkeypress="handleEnter(event)"
        />
        <input
          type="number"
          id="shipping"
          placeholder="运费 (元)"
          min="0"
          step="0.01"
          value="0"
          onkeypress="handleEnter(event)"
        />
        <button onclick="addItem()">+ 添加商品</button>
      </div>

      <div class="items-grid" id="itemsGrid">
        <div class="empty-state">
          <div class="icon">📦</div>
          <div>
            还没有添加商品
            <br />
            开始添加商品进行价格对比吧！
          </div>
        </div>
      </div>

      <div class="summary" id="summary" style="display: none">
        <div class="summary-title">📊 对比总结</div>
        <div class="summary-grid">
          <div class="summary-item">
            <div class="summary-value" id="totalItems">0</div>
            <div class="summary-label">对比商品数</div>
          </div>
          <div class="summary-item">
            <div class="summary-value" id="avgPrice">¥0</div>
            <div class="summary-label">平均价格</div>
          </div>
          <div class="summary-item">
            <div class="summary-value" id="maxSavings">¥0</div>
            <div class="summary-label">最大优惠</div>
          </div>
          <div class="summary-item">
            <div class="summary-value" id="bestDeal">--</div>
            <div class="summary-label">性价比之选</div>
          </div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const STORAGE_KEY = "html_tools_price_comparison_v1";
      let items = [];

      function loadItems() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          items = saved ? JSON.parse(saved) : [];
        } catch (e) {
          items = [];
        }
        renderItems();
      }

      function saveItems() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      }

      function handleEnter(event) {
        if (event.key === "Enter") {
          addItem();
        }
      }

      function addItem() {
        const name = document.getElementById("itemName").value.trim();
        const originalPrice = parseFloat(document.getElementById("originalPrice").value) || 0;
        const discount = parseFloat(document.getElementById("discount").value) || 0;
        const shipping = parseFloat(document.getElementById("shipping").value) || 0;

        if (!name || originalPrice <= 0) {
          alert("请输入商品名称和原价");
          return;
        }

        const discountAmount = originalPrice * (discount / 100);
        const finalPrice = originalPrice - discountAmount + shipping;

        items.push({
          id: Date.now(),
          name,
          originalPrice,
          discount,
          discountAmount,
          shipping,
          finalPrice
        });

        // Clear inputs
        document.getElementById("itemName").value = "";
        document.getElementById("originalPrice").value = "";
        document.getElementById("discount").value = "0";
        document.getElementById("shipping").value = "0";

        saveItems();
        renderItems();
      }

      function deleteItem(id) {
        items = items.filter((item) => item.id !== id);
        saveItems();
        renderItems();
      }

      function renderItems() {
        const container = document.getElementById("itemsGrid");

        if (items.length === 0) {
          container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📦</div>
            <div>还没有添加商品<br>开始添加商品进行价格对比吧！</div>
          </div>
        `;
          document.getElementById("summary").style.display = "none";
          return;
        }

        // Find best deal (lowest final price)
        const bestDeal = items.reduce((best, item) =>
          item.finalPrice < best.finalPrice ? item : best
        );

        container.innerHTML = items
          .map((item) => {
            const isBest = item.id === bestDeal.id;
            const savingsPercent = ((item.discountAmount / item.originalPrice) * 100).toFixed(0);

            return `
          <div class="item-card ${isBest ? "best" : ""}">
            <button class="item-delete" onclick="deleteItem(${item.id})">×</button>
            <div class="item-name">${item.name}</div>
            <div class="item-details">
              <div class="detail-row">
                <span class="detail-label">原价</span>
                <span class="detail-value">¥${item.originalPrice.toFixed(2)}</span>
              </div>
              ${
                item.discount > 0
                  ? `
                <div class="detail-row">
                  <span class="detail-label">折扣 (${item.discount}%)</span>
                  <span class="detail-value savings">-¥${item.discountAmount.toFixed(2)}</span>
                </div>
              `
                  : ""
              }
              ${
                item.shipping > 0
                  ? `
                <div class="detail-row">
                  <span class="detail-label">运费</span>
                  <span class="detail-value">+¥${item.shipping.toFixed(2)}</span>
                </div>
              `
                  : ""
              }
              <hr style="border:1px solid var(--border-subtle);margin:.5rem 0">
              <div class="detail-row">
                <span class="detail-label">实付金额</span>
                <span class="detail-value final-price">¥${item.finalPrice.toFixed(2)}</span>
              </div>
            </div>
          </div>
        `;
          })
          .join("");

        // Update summary
        updateSummary();
      }

      function updateSummary() {
        if (items.length === 0) {
          document.getElementById("summary").style.display = "none";
          return;
        }

        document.getElementById("summary").style.display = "block";

        const totalItems = items.length;
        const avgPrice = items.reduce((sum, item) => sum + item.finalPrice, 0) / totalItems;
        const maxSavings = Math.max(...items.map((item) => item.discountAmount));
        const bestDeal = items.reduce((best, item) =>
          item.finalPrice < best.finalPrice ? item : best
        );

        document.getElementById("totalItems").textContent = totalItems;
        document.getElementById("avgPrice").textContent = "¥" + avgPrice.toFixed(2);
        document.getElementById("maxSavings").textContent = "¥" + maxSavings.toFixed(2);
        document.getElementById("bestDeal").textContent = bestDeal.name;
      }

      // Initialize
      loadItems();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
