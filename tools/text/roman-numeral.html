  <body>
    <nav class="breadcrumb">

    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
      <h1>罗马数字转换器</h1>
      <p class="desc">阿拉伯数字与罗马数字互相转换 (支持 1-3999)</p>

      <div class="card">
        <div class="converter">
          <div class="input-group">
            <label for="arabic">阿拉伯数字</label>
            <input type="text" id="arabic" placeholder="2024" />
          </div>
          <div class="arrow">⇄</div>
          <div class="input-group">
            <label for="roman">罗马数字</label>
            <input type="text" id="roman" placeholder="MMXXIV" />
          </div>
        </div>

        <div class="btn-row">
          <button id="btnToRoman" class="primary">→ 转罗马数字</button>
          <button id="btnToArabic" class="primary">← 转阿拉伯数字</button>
          <button id="btnClear">清空</button>
        </div>

        <div id="status" class="status"></div>

        <div class="reference">
          <h3>罗马数字参考</h3>
          <div class="ref-grid">
            <div class="ref-item">
              <div class="roman">I</div>
              <div class="arabic">1</div>
            </div>
            <div class="ref-item">
              <div class="roman">V</div>
              <div class="arabic">5</div>
            </div>
            <div class="ref-item">
              <div class="roman">X</div>
              <div class="arabic">10</div>
            </div>
            <div class="ref-item">
              <div class="roman">L</div>
              <div class="arabic">50</div>
            </div>
            <div class="ref-item">
              <div class="roman">C</div>
              <div class="arabic">100</div>
            </div>
            <div class="ref-item">
              <div class="roman">D</div>
              <div class="arabic">500</div>
            </div>
            <div class="ref-item">
              <div class="roman">M</div>
              <div class="arabic">1000</div>
            </div>
            <div class="ref-item">
              <div class="roman">IV</div>
              <div class="arabic">4</div>
            </div>
            <div class="ref-item">
              <div class="roman">IX</div>
              <div class="arabic">9</div>
            </div>
            <div class="ref-item">
              <div class="roman">XL</div>
              <div class="arabic">40</div>
            </div>
            <div class="ref-item">
              <div class="roman">XC</div>
              <div class="arabic">90</div>
            </div>
            <div class="ref-item">
              <div class="roman">CD</div>
              <div class="arabic">400</div>
            </div>
            <div class="ref-item">
              <div class="roman">CM</div>
              <div class="arabic">900</div>
            </div>
          </div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/chicogong/html-tools" target="_blank" rel="noreferrer">
          View source

    </div>

    <script>
      var arabicEl = document.getElementById("arabic");
      var romanEl = document.getElementById("roman");
      var statusEl = document.getElementById("status");

      var romanNumerals = [
        { value: 1000, numeral: "M" },
        { value: 900, numeral: "CM" },
        { value: 500, numeral: "D" },
        { value: 400, numeral: "CD" },
        { value: 100, numeral: "C" },
        { value: 90, numeral: "XC" },
        { value: 50, numeral: "L" },
        { value: 40, numeral: "XL" },
        { value: 10, numeral: "X" },
        { value: 9, numeral: "IX" },
        { value: 5, numeral: "V" },
        { value: 4, numeral: "IV" },
        { value: 1, numeral: "I" }
      ];

      var romanValues = {
        I: 1,
        V: 5,
        X: 10,
        L: 50,
        C: 100,
        D: 500,
        M: 1000
      };

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function toRoman(num) {
        if (num < 1 || num > 3999) {
          return null;
        }
        var result = "";
        for (var i = 0; i < romanNumerals.length; i++) {
          while (num >= romanNumerals[i].value) {
            result += romanNumerals[i].numeral;
            num -= romanNumerals[i].value;
          }
        }
        return result;
      }

      function toArabic(roman) {
        roman = roman.toUpperCase().trim();
        if (!roman) return null;

        if (!/^[IVXLCDM]+$/.test(roman)) {
          return null;
        }

        var result = 0;
        var prevValue = 0;

        for (var i = roman.length - 1; i >= 0; i--) {
          var current = romanValues[roman[i]];
          if (!current) return null;

          if (current < prevValue) {
            result -= current;
          } else {
            result += current;
          }
          prevValue = current;
        }

        if (toRoman(result) !== roman) {
          return null;
        }

        return result;
      }

      document.getElementById("btnToRoman").onclick = function () {
        var num = parseInt(arabicEl.value.trim(), 10);
        if (isNaN(num)) {
          showStatus("请输入有效的数字", "error");
          return;
        }
        if (num < 1 || num > 3999) {
          showStatus("数字必须在 1-3999 范围内", "error");
          return;
        }
        var roman = toRoman(num);
        romanEl.value = roman;
        showStatus(num + " → " + roman, "success");
      };

      document.getElementById("btnToArabic").onclick = function () {
        var roman = romanEl.value.trim();
        if (!roman) {
          showStatus("请输入罗马数字", "error");
          return;
        }
        var num = toArabic(roman);
        if (num === null) {
          showStatus("无效的罗马数字", "error");
          return;
        }
        arabicEl.value = num;
        showStatus(roman.toUpperCase() + " → " + num, "success");
      };

      document.getElementById("btnClear").onclick = function () {
        arabicEl.value = "";
        romanEl.value = "";
        showStatus("已清空", "success");
      };

      arabicEl.addEventListener("keyup", function (e) {
        if (e.key === "Enter") {
          document.getElementById("btnToRoman").click();
        }
      });

      romanEl.addEventListener("keyup", function (e) {
        if (e.key === "Enter") {
          document.getElementById("btnToArabic").click();
        }
      });

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
