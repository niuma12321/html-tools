  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>

      列处理工具

    <div class="container">
      <div class="header">
        <h1>📊 列文本处理</h1>
        <p>按列提取、删除、重排文本数据</p>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
      </div>

      <div class="card">
        <div class="options">
          <div class="form-group">
            <label>操作类型</label>
            <select id="operation" onchange="process()">
              <option value="extract">提取列</option>
              <option value="remove">删除列</option>
              <option value="reorder">重排列</option>
              <option value="swap">交换两列</option>
            </select>
          </div>
          <div class="form-group">
            <label>输入分隔符</label>
            <select id="inputDelimiter">
              <option value="\t">Tab</option>
              <option value=",">逗号 (CSV)</option>
              <option value=";">分号</option>
              <option value="|">竖线</option>
              <option value=" ">空格</option>
            </select>
          </div>
          <div class="form-group">
            <label>输出分隔符</label>
            <select id="outputDelimiter">
              <option value="\t">Tab</option>
              <option value=",">逗号</option>
              <option value=";">分号</option>
              <option value="|">竖线</option>
              <option value=" ">空格</option>
            </select>
          </div>
          <div class="form-group">
            <label>列号 (如: 1,3,5 或 1-3)</label>
            <input
              type="text"
              id="columns"
              value="1"
              placeholder="1,2,3 或 1-3"
              oninput="process()"
            />
          </div>
        </div>

        <div class="text-panels">
          <div class="panel">
            <label>输入数据</label>
            <textarea id="input" oninput="process()" placeholder="粘贴CSV/TSV数据...">
姓名	年龄	城市	职业
张三	25	北京	工程师
李四	30	上海	设计师
王五	28	广州	产品经理</textarea
            >
          </div>
          <div class="panel">
            <label>输出结果</label>
            <textarea id="output" readonly></textarea>
          </div>
        </div>

        <div class="column-info" id="columnInfo"></div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="process()">🔄 处理</button>
          <button class="btn btn-secondary" onclick="copyOutput()">📋 复制</button>
          <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
        </div>
      </div>
    </div>
    <div class="toast" id="toast">已复制</div>

    <script>
      window.toggleTheme = function () {
        const t =
          document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };
      document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");

      function parseColumnSpec(spec, maxCol) {
        const cols = [];
        spec.split(",").forEach((part) => {
          part = part.trim();
          if (part.includes("-")) {
            const [start, end] = part.split("-").map((n) => parseInt(n.trim()));
            for (let i = start; i <= end && i <= maxCol; i++) cols.push(i);
          } else {
            const n = parseInt(part);
            if (n && n <= maxCol) cols.push(n);
          }
        });
        return cols;
      }

      function process() {
        const input = document.getElementById("input").value;
        const operation = document.getElementById("operation").value;
        const inDelim = document.getElementById("inputDelimiter").value.replace("\\t", "\t");
        const outDelim = document.getElementById("outputDelimiter").value.replace("\\t", "\t");
        const colSpec = document.getElementById("columns").value;

        const lines = input.split("\n").filter((l) => l.trim());
        if (!lines.length) {
          document.getElementById("output").value = "";
          document.getElementById("columnInfo").innerHTML = "";
          return;
        }

        const data = lines.map((line) => line.split(inDelim));
        const maxCols = Math.max(...data.map((row) => row.length));
        const cols = parseColumnSpec(colSpec, maxCols);

        let result;
        switch (operation) {
          case "extract":
            result = data.map((row) => cols.map((c) => row[c - 1] || "").join(outDelim));
            break;
          case "remove":
            result = data.map((row) => row.filter((_, i) => !cols.includes(i + 1)).join(outDelim));
            break;
          case "reorder":
            result = data.map((row) => cols.map((c) => row[c - 1] || "").join(outDelim));
            break;
          case "swap":
            if (cols.length >= 2) {
              const [a, b] = [cols[0] - 1, cols[1] - 1];
              result = data.map((row) => {
                const newRow = [...row];
                [newRow[a], newRow[b]] = [newRow[b], newRow[a]];
                return newRow.join(outDelim);
              });
            } else {
              result = data.map((row) => row.join(outDelim));
            }
            break;
        }

        document.getElementById("output").value = result.join("\n");

        // Show column info
        const firstRow = data[0] || [];
        document.getElementById("columnInfo").innerHTML =
          '<strong style="color:var(--color-text-secondary);margin-right:0.5rem;">检测到的列:</strong>' +
          firstRow
            .map(
              (col, i) =>
                `<span>列${i + 1}: ${col.substring(0, 10)}${col.length > 10 ? "..." : ""}</span>`
            )
            .join("");
      }

      window.copyOutput = function () {
        navigator.clipboard.writeText(document.getElementById("output").value);
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      };

      window.clearAll = function () {
        document.getElementById("input").value = "";
        document.getElementById("output").value = "";
        document.getElementById("columnInfo").innerHTML = "";
      };

      process();
    </script>
