    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-sans);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      h1 {
        color: white;
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      textarea {
        width: 100%;
        height: 200px;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 16px;
        resize: vertical;
        font-family: inherit;
      }
      textarea:focus {
        outline: none;
        border-color: #667eea;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-top: 25px;
      }
      .stat-item {
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        color: white;
      }
      .stat-value {
        font-size: 32px;
        font-weight: 700;
      }
      .stat-label {
        font-size: 12px;
        opacity: 0.9;
        margin-top: 5px;
      }
      .details {
        margin-top: 25px;
      }
      .detail-section {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 15px;
      }
      .detail-title {
        font-weight: 600;
        color: #333;
        margin-bottom: 15px;
      }
      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .detail-item {
        display: flex;
        justify-content: space-between;
        padding: 8px 12px;
        background: white;
        border-radius: 6px;
      }
      .detail-key {
        color: #666;
      }
      .detail-val {
        font-weight: 600;
        color: #333;
      }
      @media (max-width: 600px) {
        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"

    />

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      文本统计
    </nav>
    <div class="container">
      <h1>📊 文本统计工具</h1>
      <div class="card">
        <textarea id="input" placeholder="在此输入或粘贴文本...">
这是一段示例文本。This is sample text. 用于测试文本统计功能。

包含多个段落、中英文字符、数字123和标点符号！</textarea
        >
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="chars">0</div>
            <div class="stat-label">总字符</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="words">0</div>
            <div class="stat-label">单词/词语</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="sentences">0</div>
            <div class="stat-label">句子</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="paragraphs">0</div>
            <div class="stat-label">段落</div>
          </div>
        </div>
        <div class="details">
          <div class="detail-section">
            <div class="detail-title">字符详情</div>
            <div class="detail-grid">
              <div class="detail-item">
                <span class="detail-key">不含空格</span>
                <span class="detail-val" id="charsNoSpace">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">中文字符</span>
                <span class="detail-val" id="chinese">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">英文字母</span>
                <span class="detail-val" id="letters">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">数字</span>
                <span class="detail-val" id="numbers">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">空格</span>
                <span class="detail-val" id="spaces">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">标点符号</span>
                <span class="detail-val" id="punctuation">0</span>
              </div>
            </div>
          </div>
          <div class="detail-section">
            <div class="detail-title">阅读估算</div>
            <div class="detail-grid">
              <div class="detail-item">
                <span class="detail-key">阅读时间</span>
                <span class="detail-val" id="readTime">0 分钟</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">朗读时间</span>
                <span class="detail-val" id="speakTime">0 分钟</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">平均词长</span>
                <span class="detail-val" id="avgWordLen">0</span>
              </div>
              <div class="detail-item">
                <span class="detail-key">行数</span>
                <span class="detail-val" id="lines">0</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      function analyze() {
        const text = document.getElementById("input").value;
        const chars = text.length;
        const charsNoSpace = text.replace(/\s/g, "").length;
        const chinese = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
        const letters = (text.match(/[a-zA-Z]/g) || []).length;
        const numbers = (text.match(/[0-9]/g) || []).length;
        const spaces = (text.match(/ /g) || []).length;
        const punctuation = (text.match(/[.,!?;:'"()[\]{}，。！？；：""''（）【】、]/g) || [])
          .length;
        const englishWords = (text.match(/[a-zA-Z]+/g) || []).length;
        const words = chinese + englishWords;
        const sentences = (text.match(/[.!?。！？]+/g) || []).length || (text.trim() ? 1 : 0);
        const paragraphs =
          text.split(/\n\s*\n/).filter((p) => p.trim()).length || (text.trim() ? 1 : 0);
        const lines = text.split("\n").length;
        const readTime = Math.ceil(words / 200);
        const speakTime = Math.ceil(words / 150);
        const avgWordLen = words > 0 ? (charsNoSpace / words).toFixed(1) : 0;
        document.getElementById("chars").textContent = chars;
        document.getElementById("words").textContent = words;
        document.getElementById("sentences").textContent = sentences;
        document.getElementById("paragraphs").textContent = paragraphs;
        document.getElementById("charsNoSpace").textContent = charsNoSpace;
        document.getElementById("chinese").textContent = chinese;
        document.getElementById("letters").textContent = letters;
        document.getElementById("numbers").textContent = numbers;
        document.getElementById("spaces").textContent = spaces;
        document.getElementById("punctuation").textContent = punctuation;
        document.getElementById("readTime").textContent = readTime + " 分钟";
        document.getElementById("speakTime").textContent = speakTime + " 分钟";
        document.getElementById("avgWordLen").textContent = avgWordLen;
        document.getElementById("lines").textContent = lines;
      }
      document.getElementById("input").addEventListener("input", analyze);
      analyze();
    </script>
  </body>
