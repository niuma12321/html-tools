  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      文本重复工具
    </nav>
    <div class="container">
      <div class="header">
        <h1>🔁 文本重复工具</h1>
        <p>快速重复文本内容</p>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
      </div>

      <div class="card">
        <div class="form-group">
          <label>输入文本</label>
          <textarea id="input" placeholder="输入要重复的文本...">Hello World</textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>重复次数</label>
            <input type="number" id="count" value="5" min="1" max="10000" />
          </div>
          <div class="form-group">
            <label>分隔符</label>
            <select id="separator">
              <option value="\n">换行</option>
              <option value=" ">空格</option>
              <option value=", ">逗号</option>
              <option value="">无分隔符</option>
              <option value="custom">自定义</option>
            </select>
          </div>
          <div class="form-group" id="customSepGroup" style="display: none">
            <label>自定义分隔符</label>
            <input type="text" id="customSep" placeholder="输入分隔符" />
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="repeatText()">🔁 重复文本</button>
          <button class="btn btn-secondary" onclick="copyResult()">📋 复制结果</button>
          <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
        </div>

        <div class="form-group">
          <label>输出结果</label>
          <textarea
            id="output"
            readonly
            placeholder="结果将显示在这里..."
            style="height: 200px"
          ></textarea>
        </div>

        <div class="output-stats">
          <div class="stat-item">
            <div class="stat-value" id="totalChars">0</div>
            <div class="stat-label">总字符数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalLines">0</div>
            <div class="stat-label">总行数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalSize">0 B</div>
            <div class="stat-label">估计大小</div>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast">已复制到剪贴板</div>

    <script>
      document.getElementById("separator").addEventListener("change", function () {
        document.getElementById("customSepGroup").style.display =
          this.value === "custom" ? "block" : "none";
      });

      window.toggleTheme = function () {
        const html = document.documentElement;
        const theme = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      };

      (function () {
        const theme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", theme);
      })();

      function repeatText() {
        const input = document.getElementById("input").value;
        const count = parseInt(document.getElementById("count").value) || 1;
        const sepSelect = document.getElementById("separator").value;
        const separator =
          sepSelect === "custom"
            ? document.getElementById("customSep").value
            : sepSelect.replace(/\\n/g, "\n");

        const result = Array(Math.min(count, 10000)).fill(input).join(separator);
        document.getElementById("output").value = result;

        document.getElementById("totalChars").textContent = result.length.toLocaleString();
        document.getElementById("totalLines").textContent = (result.match(/\n/g) || []).length + 1;
        document.getElementById("totalSize").textContent = formatSize(new Blob([result]).size);
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + " KB";
        return (bytes / (1024 * 1024)).toFixed(2) + " MB";
      }

      window.copyResult = function () {
        const output = document.getElementById("output").value;
        if (output) {
          navigator.clipboard.writeText(output);
          const toast = document.getElementById("toast");
          toast.classList.add("show");
          setTimeout(() => toast.classList.remove("show"), 2000);
        }
      };

      window.clearAll = function () {
        document.getElementById("input").value = "";
        document.getElementById("output").value = "";
        document.getElementById("totalChars").textContent = "0";
        document.getElementById("totalLines").textContent = "0";
        document.getElementById("totalSize").textContent = "0 B";
      };

      repeatText();
    </script>
  </body>
