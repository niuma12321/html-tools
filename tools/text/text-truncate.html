  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      文本截断工具
    </nav>
    <div class="container">
      <div class="header">
        <h1>✂️ 文本截断工具</h1>
        <p>按字符、单词或行数截断文本</p>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
      </div>

      <div class="card">
        <div class="form-group">
          <label>输入文本</label>
          <textarea id="input" placeholder="输入要截断的文本..." oninput="truncateText()">
Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.</textarea
          >
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>截断方式</label>
            <select id="mode" onchange="truncateText()">
              <option value="char">按字符</option>
              <option value="word">按单词</option>
              <option value="line">按行</option>
            </select>
          </div>
          <div class="form-group">
            <label>截断位置</label>
            <input type="number" id="limit" value="50" min="1" oninput="truncateText()" />
          </div>
          <div class="form-group">
            <label>省略符号</label>
            <select id="ellipsis" onchange="truncateText()">
              <option value="...">...</option>
              <option value="…">…</option>
              <option value=" [更多]">[更多]</option>
              <option value="">无</option>
              <option value="custom">自定义</option>
            </select>
          </div>
          <div class="form-group" id="customEllipsisGroup" style="display: none">
            <label>自定义省略符</label>
            <input type="text" id="customEllipsis" placeholder="..." oninput="truncateText()" />
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="truncateText()">✂️ 截断</button>
          <button class="btn btn-secondary" onclick="copyResult()">📋 复制</button>
          <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
        </div>

        <div class="form-group">
          <label>截断结果</label>
          <div class="preview" id="preview"></div>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="stat-value" id="originalLen">0</div>
            <div class="stat-label">原始长度</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="truncatedLen">0</div>
            <div class="stat-label">截断后长度</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="removedLen">0</div>
            <div class="stat-label">移除字符</div>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast">已复制</div>

    <script>
      let truncatedResult = "";

      document.getElementById("ellipsis").addEventListener("change", function () {
        document.getElementById("customEllipsisGroup").style.display =
          this.value === "custom" ? "block" : "none";
        truncateText();
      });

      window.toggleTheme = function () {
        const t =
          document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };
      (function () {
        document.documentElement.setAttribute(
          "data-theme",
          localStorage.getItem("theme") || "dark"
        );
      })();

      function truncateText() {
        const input = document.getElementById("input").value;
        const mode = document.getElementById("mode").value;
        const limit = parseInt(document.getElementById("limit").value) || 1;
        const ellipsisSelect = document.getElementById("ellipsis").value;
        const ellipsis =
          ellipsisSelect === "custom"
            ? document.getElementById("customEllipsis").value
            : ellipsisSelect;

        let result = "";
        let isTruncated = false;

        switch (mode) {
          case "char":
            if (input.length > limit) {
              result = input.slice(0, limit) + ellipsis;
              isTruncated = true;
            } else {
              result = input;
            }
            break;
          case "word":
            const words = input.split(/\s+/);
            if (words.length > limit) {
              result = words.slice(0, limit).join(" ") + ellipsis;
              isTruncated = true;
            } else {
              result = input;
            }
            break;
          case "line":
            const lines = input.split("\n");
            if (lines.length > limit) {
              result = lines.slice(0, limit).join("\n") + ellipsis;
              isTruncated = true;
            } else {
              result = input;
            }
            break;
        }

        truncatedResult = result;
        const preview = document.getElementById("preview");

        if (isTruncated) {
          const mainText = result.slice(0, -ellipsis.length);
          preview.innerHTML =
            escapeHtml(mainText) + '<span class="ellipsis">' + escapeHtml(ellipsis) + "</span>";
        } else {
          preview.textContent = result;
        }

        document.getElementById("originalLen").textContent = input.length;
        document.getElementById("truncatedLen").textContent = result.length;
        document.getElementById("removedLen").textContent = Math.max(
          0,
          input.length - result.length + ellipsis.length
        );
      }

      window.escapeHtml = function (str) {
        return str.replace(
          /[&<>"']/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[m]
        );
      };

      window.copyResult = function () {
        if (truncatedResult) {
          navigator.clipboard.writeText(truncatedResult);
          const toast = document.getElementById("toast");
          toast.classList.add("show");
          setTimeout(() => toast.classList.remove("show"), 2000);
        }
      };

      window.clearAll = function () {
        document.getElementById("input").value = "";
        document.getElementById("preview").textContent = "";
        truncatedResult = "";
        document.getElementById("originalLen").textContent = "0";
        document.getElementById("truncatedLen").textContent = "0";
        document.getElementById("removedLen").textContent = "0";
      };

      truncateText();
    </script>
  </body>
