      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #12121a;
        --bg-tertiary: #1a1a25;
        --color-text-primary: #fff;
        --color-text-secondary: #88a;

      .header h1 {
        font-size: 2rem;
        background: linear-gradient(135deg, var(--accent-cyan) 0%, #a855f7 100%);

      .back-link {
        position: absolute;
        left: 0;

        text-decoration: none;
        display: flex;

        gap: 0.5rem;
        font-size: 0.875rem;
      }
      .theme-toggle {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        background: var(--bg-tertiary);
        border: 1px solid var(--border-subtle);
        color: var(--color-text-primary);
        width: 40px;
        height: 40px;

      }
      .card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-subtle);
        border-radius: 16px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .mode-selector {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

        padding: 0.75rem 1.25rem;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-subtle);
        border-radius: 10px;
        color: var(--color-text-secondary);
        cursor: pointer;
        font-size: 0.875rem;
        transition: all 0.2s;
      }
      .mode-btn:hover {
        border-color: var(--accent-cyan);
        color: var(--color-text-primary);
      }
      .mode-btn.active {
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
        color: white;
      }
      .textarea-group {
        margin-bottom: 1rem;
      }
      .textarea-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--color-text-secondary);
        font-size: 0.875rem;
      }
      textarea {
        width: 100%;
        height: 200px;
        padding: 1rem;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-subtle);
        border-radius: 10px;
        color: var(--color-text-primary);
        font-family: Monaco, monospace;
        font-size: 0.875rem;

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      文本翻转工具
    </nav>
    <div class="container">
      <div class="header">
        <h1>🔄 文本反转工具</h1>
        <p>按字符、单词或行反转文本</p>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
      </div>

      <div class="card">
        <div class="mode-selector">
          <button class="mode-btn active" data-mode="char" onclick="setMode('char')">
            按字符反转
          </button>
          <button class="mode-btn" data-mode="word" onclick="setMode('word')">按单词反转</button>
          <button class="mode-btn" data-mode="line" onclick="setMode('line')">按行反转</button>
          <button class="mode-btn" data-mode="sentence" onclick="setMode('sentence')">
            按句子反转
          </button>
        </div>

        <div class="textarea-group">
          <label>输入文本</label>
          <textarea id="input" placeholder="在此输入要反转的文本..." oninput="processText()">
Hello World
你好世界
This is a test.</textarea
          >
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="processText()">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="23 4 23 10 17 10" />
              <polyline points="1 20 1 14 7 14" />
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
            </svg>
            反转
          </button>
          <button class="btn btn-secondary" onclick="swapTexts()">↕️ 交换</button>
          <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
          <button class="btn btn-secondary" onclick="copyResult()">📋 复制结果</button>
        </div>

        <div class="textarea-group" style="margin-top: 1.5rem">
          <label>反转结果</label>
          <textarea id="output" readonly placeholder="反转结果将显示在这里..."></textarea>
        </div>

        <div class="stats">
          <div class="stat-item">
            <div class="stat-value" id="charCount">0</div>
            <div class="stat-label">字符数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="wordCount">0</div>
            <div class="stat-label">单词数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="lineCount">0</div>
            <div class="stat-label">行数</div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">已复制到剪贴板</div>

    <script>
      let currentMode = "char";

      window.toggleTheme = function () {
        const html = document.documentElement;
        const theme = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      };

      function loadTheme() {
        const theme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", theme);
      }

      window.setMode = function (mode) {
        currentMode = mode;
        document.querySelectorAll(".mode-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.mode === mode);
        });
        processText();
      };

      function processText() {
        const input = document.getElementById("input").value;
        let output = "";

        switch (currentMode) {
          case "char":
            output = [...input].reverse().join("");
            break;
          case "word":
            output = input.split(/(\s+)/).reverse().join("");
            break;
          case "line":
            output = input.split("\n").reverse().join("\n");
            break;
          case "sentence":
            output = input
              .split(/([.!?。！？]+)/)
              .reduce((acc, part, i, arr) => {
                if (i % 2 === 0 && i < arr.length - 1) {
                  return [part + (arr[i + 1] || ""), ...acc];
                }
                return acc;
              }, [])
              .join(" ")
              .trim();
            break;
        }

        document.getElementById("output").value = output;
        updateStats(input);
      }

      function updateStats(text) {
        document.getElementById("charCount").textContent = text.length;
        document.getElementById("wordCount").textContent = text.trim()
          ? text.trim().split(/\s+/).length
          : 0;
        document.getElementById("lineCount").textContent = text ? text.split("\n").length : 0;
      }

      window.swapTexts = function () {
        const input = document.getElementById("input");
        const output = document.getElementById("output");
        const temp = input.value;
        input.value = output.value;
        output.value = temp;
        updateStats(input.value);
      };

      window.clearAll = function () {
        document.getElementById("input").value = "";
        document.getElementById("output").value = "";
        updateStats("");
      };

      window.copyResult = function () {
        const output = document.getElementById("output").value;
        if (output) {
          navigator.clipboard.writeText(output);
          showToast("已复制到剪贴板");
        }
      };

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      loadTheme();
      processText();
    </script>
  </body>
