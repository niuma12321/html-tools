<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>世界时钟 - WebUtils</title>
    <meta property="og:title" content="世界时钟 - WebUtils" />
    <meta property="og:description" content="世界时钟：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tools.realtime-ai.chat/tools/life/world-clock.html" />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/life/world-clock.html" />
    <meta name="description" content="查看全球各时区的当前时间" />
    <meta name="keywords" content="world clock 世界时钟 时区 timezone" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .local-time {
        text-align: center;
        padding: 30px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        margin-bottom: 20px;
      }
      .local-time .time {
        font-size: 3.5rem;
        font-weight: 700;
        font-family: ui-monospace, monospace;
        color: var(--accent-cyan);
      }
      .local-time .date {
        font-size: 1.1rem;
        color: var(--text-muted);
        margin-top: 8px;
      }
      .local-time .timezone {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin-top: 4px;
      }
      .add-city {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
      }
      .add-city select {
        flex: 1;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1rem;
      }
      .add-city button {
        padding: 12px 24px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--accent-cyan);
        color: #fff;
        cursor: pointer;
        font-size: 1rem;
      }
      .clocks-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 16px;
      }
      .clock-card {
        padding: 20px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        position: relative;
      }
      .clock-card .city {
        font-weight: 600;
        font-size: 1.1rem;
        margin-bottom: 4px;
      }
      .clock-card .tz-name {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 12px;
      }
      .clock-card .time {
        font-size: 2rem;
        font-weight: 700;
        font-family: ui-monospace, monospace;
        color: var(--accent-cyan);
      }
      .clock-card .date {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 4px;
      }
      .clock-card .offset {
        font-size: 0.8rem;
        color: var(--accent-green);
        margin-top: 8px;
      }
      .clock-card .remove-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 24px;
        height: 24px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1.2rem;
      }
      .clock-card .remove-btn:hover {
        color: #dc3545;
      }
      .clock-card.day {
        border-left: 3px solid #f59e0b;
      }
      .clock-card.night {
        border-left: 3px solid #6366f1;
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>世界时钟</h1>
      <p class="desc">查看全球各时区的当前时间</p>

      <div class="card">
        <div class="local-time">
          <div class="time" id="localTime">00:00:00</div>
          <div class="date" id="localDate">2024年1月1日 星期一</div>
          <div class="timezone" id="localTimezone">本地时间</div>
        </div>

        <div class="add-city">
          <select id="citySelect">
            <option value="">选择城市...</option>
            <option value="America/New_York">🇺🇸 纽约</option>
            <option value="America/Los_Angeles">🇺🇸 洛杉矶</option>
            <option value="America/Chicago">🇺🇸 芝加哥</option>
            <option value="Europe/London">🇬🇧 伦敦</option>
            <option value="Europe/Paris">🇫🇷 巴黎</option>
            <option value="Europe/Berlin">🇩🇪 柏林</option>
            <option value="Europe/Moscow">🇷🇺 莫斯科</option>
            <option value="Asia/Tokyo">🇯🇵 东京</option>
            <option value="Asia/Shanghai">🇨🇳 上海</option>
            <option value="Asia/Hong_Kong">🇭🇰 香港</option>
            <option value="Asia/Singapore">🇸🇬 新加坡</option>
            <option value="Asia/Seoul">🇰🇷 首尔</option>
            <option value="Asia/Dubai">🇦🇪 迪拜</option>
            <option value="Asia/Kolkata">🇮🇳 孟买</option>
            <option value="Australia/Sydney">🇦🇺 悉尼</option>
            <option value="Pacific/Auckland">🇳🇿 奥克兰</option>
            <option value="America/Sao_Paulo">🇧🇷 圣保罗</option>
            <option value="Africa/Cairo">🇪🇬 开罗</option>
          </select>
          <button onclick="addCity()" aria-label="添加">添加</button>
        </div>

        <div class="clocks-grid" id="clocksGrid"></div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      const STORAGE_KEY = "world_clock_cities";

      const cityNames = {
        "America/New_York": "🇺🇸 纽约",
        "America/Los_Angeles": "🇺🇸 洛杉矶",
        "America/Chicago": "🇺🇸 芝加哥",
        "Europe/London": "🇬🇧 伦敦",
        "Europe/Paris": "🇫🇷 巴黎",
        "Europe/Berlin": "🇩🇪 柏林",
        "Europe/Moscow": "🇷🇺 莫斯科",
        "Asia/Tokyo": "🇯🇵 东京",
        "Asia/Shanghai": "🇨🇳 上海",
        "Asia/Hong_Kong": "🇭🇰 香港",
        "Asia/Singapore": "🇸🇬 新加坡",
        "Asia/Seoul": "🇰🇷 首尔",
        "Asia/Dubai": "🇦🇪 迪拜",
        "Asia/Kolkata": "🇮🇳 孟买",
        "Australia/Sydney": "🇦🇺 悉尼",
        "Pacific/Auckland": "🇳🇿 奥克兰",
        "America/Sao_Paulo": "🇧🇷 圣保罗",
        "Africa/Cairo": "🇪🇬 开罗"
      };

      let cities = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
        "America/New_York",
        "Europe/London",
        "Asia/Tokyo"
      ];

      function formatDate(date, locale = "zh-CN") {
        return date.toLocaleDateString(locale, {
          year: "numeric",
          month: "long",
          day: "numeric",
          weekday: "long"
        });
      }

      function formatTime(date) {
        return date.toLocaleTimeString("zh-CN", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        });
      }

      function getTimeInTimezone(timezone) {
        const date = new Date();
        const options = {
          timeZone: timezone,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        };
        const time = date.toLocaleTimeString("zh-CN", options);

        const dateOptions = {
          timeZone: timezone,
          year: "numeric",
          month: "short",
          day: "numeric",
          weekday: "short"
        };
        const dateStr = date.toLocaleDateString("zh-CN", dateOptions);

        // Get hour to determine day/night
        const hourOptions = { timeZone: timezone, hour: "numeric", hour12: false };
        const hour = parseInt(date.toLocaleTimeString("en-US", hourOptions));
        const isDay = hour >= 6 && hour < 18;

        // Calculate offset
        const localOffset = date.getTimezoneOffset();
        const tzDate = new Date(date.toLocaleString("en-US", { timeZone: timezone }));
        const diff = Math.round((tzDate - date) / (1000 * 60 * 60));
        const offsetStr = diff >= 0 ? `+${diff}` : `${diff}`;

        return { time, date: dateStr, isDay, offset: offsetStr };
      }

      function updateClocks() {
        // Update local time
        const now = new Date();
        document.getElementById("localTime").textContent = formatTime(now);
        document.getElementById("localDate").textContent = formatDate(now);
        document.getElementById("localTimezone").textContent =
          Intl.DateTimeFormat().resolvedOptions().timeZone;

        // Update city clocks
        const grid = document.getElementById("clocksGrid");
        grid.innerHTML = cities
          .map((tz) => {
            const info = getTimeInTimezone(tz);
            const name = cityNames[tz] || tz;
            return `
          <div class="clock-card ${info.isDay ? "day" : "night"}">
            <button class="remove-btn" onclick="removeCity('${tz}')" aria-label="×">×</button>
            <div class="city">${name}</div>
            <div class="tz-name">${tz}</div>
            <div class="time">${info.time}</div>
            <div class="date">${info.date}</div>
            <div class="offset">与本地时差: ${info.offset} 小时</div>
          </div>
        `;
          })
          .join("");
      }

      function addCity() {
        const select = document.getElementById("citySelect");
        const tz = select.value;
        if (tz && !cities.includes(tz)) {
          cities.push(tz);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(cities));
          updateClocks();
        }
        select.value = "";
      }

      function removeCity(tz) {
        cities = cities.filter((c) => c !== tz);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cities));
        updateClocks();
      }

      updateClocks();
      setInterval(updateClocks, 1000);

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
