<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />

    <title>通用单位转换 - WebUtils</title>
    <meta property="og:title" content="通用单位转换 - WebUtils" />

    <meta property="og:type" content="website" />

      property="og:url"
      content="https://tools.realtime-ai.chat/tools/life/unit-converter.html"
    />

    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/life/unit-converter.html" />
    <meta name="description" content="长度、重量、面积、体积等单位转换" />
    <meta name="keywords" content="unit converter 单位转换 长度 重量 面积 体积" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .tab {
        padding: 10px 16px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 0.9rem;
      }
      .tab:hover {
        border-color: var(--accent-cyan);
      }
      .tab.active {
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
        color: #fff;
      }
      .converter {
        display: flex;
        gap: 16px;
        align-items: center;
        margin-bottom: 20px;
      }
      .converter-input {
        flex: 1;
      }
      .converter-input label {
        display: block;
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 4px;
      }
      .converter-input input {
        width: 100%;
        padding: 14px;
        font-size: 1.2rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-deep);
        color: var(--text-primary);
        text-align: center;
      }
      .converter-input select {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-deep);
        color: var(--text-primary);
        margin-top: 8px;
      }
      .swap-btn {
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 50%;
        background: var(--bg-card);
        color: var(--accent-cyan);
        cursor: pointer;
        font-size: 1.2rem;
        flex-shrink: 0;
      }
      .swap-btn:hover {
        background: var(--accent-cyan);
        color: #fff;
      }
      .result {
        text-align: center;
        padding: 24px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
      }
      .result .value {
        font-size: 2.5rem;
        font-weight: 700;
        font-family: ui-monospace, monospace;
        color: var(--accent-cyan);
      }
      .result .unit {
        font-size: 1rem;
        color: var(--text-muted);
        margin-top: 4px;
      }
      .quick-conversions {
        margin-top: 20px;
      }
      .quick-conversions h4 {
        margin: 0 0 12px;
        font-size: 0.95rem;
      }
      .conversion-list {
        display: grid;
        gap: 8px;
      }
      .conversion-item {
        display: flex;
        justify-content: space-between;
        padding: 10px 12px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        font-size: 0.9rem;
      }
      .conversion-item .label {
        color: var(--text-muted);
      }
      .conversion-item .value {
        font-family: ui-monospace, monospace;
        font-weight: 500;
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>通用单位转换</h1>
      <p class="desc">各种常用单位快速转换</p>

      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="setCategory('length', this)" aria-label="长度">
            长度
          </button>
          <button class="tab" onclick="setCategory('weight', this)" aria-label="重量">重量</button>
          <button class="tab" onclick="setCategory('area', this)" aria-label="面积">面积</button>
          <button class="tab" onclick="setCategory('volume', this)" aria-label="体积">体积</button>
          <button class="tab" onclick="setCategory('speed', this)" aria-label="速度">速度</button>
          <button class="tab" onclick="setCategory('data', this)" aria-label="数据">数据</button>
        </div>

        <div class="converter">
          <div class="converter-input">
            <label for="input--">从</label>
            <input
              type="number"
              id="fromValue"
              value="1"
              oninput="convert()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
            <select id="fromUnit" onchange="convert()"></select>
          </div>
          <button class="swap-btn" onclick="swapUnits()" aria-label="⇄">⇄</button>
          <div class="converter-input">
            <label for="input--">到</label>
            <input
              type="number"
              id="toValue"
              readonly
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
            <select id="toUnit" onchange="convert()"></select>
          </div>
        </div>

        <div class="result">
          <div class="value" id="resultValue">1</div>
          <div class="unit" id="resultUnit">米 = 100 厘米</div>
        </div>

        <div class="quick-conversions">
          <h4>常用转换</h4>
          <div class="conversion-list" id="quickList"></div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      const units = {
        length: {
          name: "长度",
          base: "m",
          units: {
            km: { name: "千米", factor: 1000 },
            m: { name: "米", factor: 1 },
            cm: { name: "厘米", factor: 0.01 },
            mm: { name: "毫米", factor: 0.001 },
            mi: { name: "英里", factor: 1609.344 },
            yd: { name: "码", factor: 0.9144 },
            ft: { name: "英尺", factor: 0.3048 },
            in: { name: "英寸", factor: 0.0254 }
          },
          quick: [
            { from: 1, fromUnit: "km", toUnit: "m" },
            { from: 1, fromUnit: "mi", toUnit: "km" },
            { from: 1, fromUnit: "m", toUnit: "ft" },
            { from: 1, fromUnit: "in", toUnit: "cm" }
          ]
        },
        weight: {
          name: "重量",
          base: "kg",
          units: {
            t: { name: "吨", factor: 1000 },
            kg: { name: "千克", factor: 1 },
            g: { name: "克", factor: 0.001 },
            mg: { name: "毫克", factor: 0.000001 },
            lb: { name: "磅", factor: 0.453592 },
            oz: { name: "盎司", factor: 0.0283495 },
            jin: { name: "斤", factor: 0.5 },
            liang: { name: "两", factor: 0.05 }
          },
          quick: [
            { from: 1, fromUnit: "kg", toUnit: "lb" },
            { from: 1, fromUnit: "kg", toUnit: "jin" },
            { from: 1, fromUnit: "oz", toUnit: "g" },
            { from: 1, fromUnit: "t", toUnit: "kg" }
          ]
        },
        area: {
          name: "面积",
          base: "m2",
          units: {
            km2: { name: "平方千米", factor: 1000000 },
            ha: { name: "公顷", factor: 10000 },
            m2: { name: "平方米", factor: 1 },
            cm2: { name: "平方厘米", factor: 0.0001 },
            mi2: { name: "平方英里", factor: 2589988.11 },
            ac: { name: "英亩", factor: 4046.86 },
            ft2: { name: "平方英尺", factor: 0.092903 },
            mu: { name: "亩", factor: 666.67 }
          },
          quick: [
            { from: 1, fromUnit: "km2", toUnit: "ha" },
            { from: 1, fromUnit: "ha", toUnit: "mu" },
            { from: 1, fromUnit: "m2", toUnit: "ft2" },
            { from: 1, fromUnit: "ac", toUnit: "m2" }
          ]
        },
        volume: {
          name: "体积",
          base: "l",
          units: {
            m3: { name: "立方米", factor: 1000 },
            l: { name: "升", factor: 1 },
            ml: { name: "毫升", factor: 0.001 },
            gal: { name: "加仑(美)", factor: 3.78541 },
            qt: { name: "夸脱", factor: 0.946353 },
            pt: { name: "品脱", factor: 0.473176 },
            cup: { name: "杯", factor: 0.236588 },
            floz: { name: "液盎司", factor: 0.0295735 }
          },
          quick: [
            { from: 1, fromUnit: "l", toUnit: "ml" },
            { from: 1, fromUnit: "gal", toUnit: "l" },
            { from: 1, fromUnit: "m3", toUnit: "l" },
            { from: 1, fromUnit: "cup", toUnit: "ml" }
          ]
        },
        speed: {
          name: "速度",
          base: "mps",
          units: {
            kmh: { name: "千米/时", factor: 0.277778 },
            mps: { name: "米/秒", factor: 1 },
            mph: { name: "英里/时", factor: 0.44704 },
            kn: { name: "节", factor: 0.514444 },
            fps: { name: "英尺/秒", factor: 0.3048 },
            mach: { name: "马赫", factor: 340.29 }
          },
          quick: [
            { from: 100, fromUnit: "kmh", toUnit: "mph" },
            { from: 1, fromUnit: "mps", toUnit: "kmh" },
            { from: 1, fromUnit: "kn", toUnit: "kmh" },
            { from: 1, fromUnit: "mach", toUnit: "kmh" }
          ]
        },
        data: {
          name: "数据",
          base: "B",
          units: {
            TB: { name: "TB", factor: 1099511627776 },
            GB: { name: "GB", factor: 1073741824 },
            MB: { name: "MB", factor: 1048576 },
            KB: { name: "KB", factor: 1024 },
            B: { name: "字节", factor: 1 },
            bit: { name: "比特", factor: 0.125 }
          },
          quick: [
            { from: 1, fromUnit: "GB", toUnit: "MB" },
            { from: 1, fromUnit: "TB", toUnit: "GB" },
            { from: 1, fromUnit: "MB", toUnit: "KB" },
            { from: 8, fromUnit: "bit", toUnit: "B" }
          ]
        }
      };

      let currentCategory = "length";

      function setCategory(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        btn.classList.add("active");

        const catData = units[cat];
        const fromSelect = document.getElementById("fromUnit");
        const toSelect = document.getElementById("toUnit");

        const options = Object.entries(catData.units)
          .map(([key, val]) => `<option value="${key}">${val.name}</option>`)
          .join("");

        fromSelect.innerHTML = options;
        toSelect.innerHTML = options;

        // Set default selections
        const unitKeys = Object.keys(catData.units);
        fromSelect.value = unitKeys[1] || unitKeys[0];
        toSelect.value = unitKeys[2] || unitKeys[1] || unitKeys[0];

        convert();
        updateQuickList();
      }

      function convert() {
        const catData = units[currentCategory];
        const fromValue = parseFloat(document.getElementById("fromValue").value) || 0;
        const fromUnit = document.getElementById("fromUnit").value;
        const toUnit = document.getElementById("toUnit").value;

        const fromFactor = catData.units[fromUnit].factor;
        const toFactor = catData.units[toUnit].factor;

        const result = (fromValue * fromFactor) / toFactor;

        document.getElementById("toValue").value = formatNumber(result);
        document.getElementById("resultValue").textContent = formatNumber(result);
        document.getElementById("resultUnit").textContent =
          `${fromValue} ${catData.units[fromUnit].name} = ${formatNumber(result)} ${catData.units[toUnit].name}`;
      }

      function formatNumber(num) {
        if (Math.abs(num) < 0.0001 || Math.abs(num) >= 1000000) {
          return num.toExponential(4);
        }
        return parseFloat(num.toPrecision(8)).toString();
      }

      function swapUnits() {
        const fromSelect = document.getElementById("fromUnit");
        const toSelect = document.getElementById("toUnit");
        const fromValue = document.getElementById("fromValue");
        const toValue = document.getElementById("toValue");

        [fromSelect.value, toSelect.value] = [toSelect.value, fromSelect.value];
        fromValue.value = toValue.value;
        convert();
      }

      function updateQuickList() {
        const catData = units[currentCategory];
        const list = document.getElementById("quickList");

        list.innerHTML = catData.quick
          .map((q) => {
            const result =
              (q.from * catData.units[q.fromUnit].factor) / catData.units[q.toUnit].factor;
            return `
          <div class="conversion-item">
            <span class="label">${q.from} ${catData.units[q.fromUnit].name}</span>
            <span class="value">= ${formatNumber(result)} ${catData.units[q.toUnit].name}</span>
          </div>
        `;
          })
          .join("");
      }

      setCategory("length");

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
