      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;

      .theme-toggle {
        position: fixed;
        top: 1rem;

        width: 40px;
        height: 40px;
        border-radius: 50%;

        background: var(--color-bg-card);

        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;

        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

        display: flex;
        gap: 15px;

        padding: 15px 30px;

  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      番茄钟
    </nav>
    <div class="container">
      <h1>🍅 番茄钟</h1>
      <div class="mode" id="mode">工作时间</div>
      <div class="timer" id="timer">25:00</div>
      <div class="btns">
        <button class="btn primary" id="startBtn" onclick="toggleTimer()">开始</button>
        <button class="btn secondary" onclick="resetTimer()">重置</button>
      </div>
      <div class="settings">
        <div class="setting active" onclick="setMode('work')">工作 25分</div>
        <div class="setting" onclick="setMode('short')">短休 5分</div>
        <div class="setting" onclick="setMode('long')">长休 15分</div>
      </div>
      <div class="count">
        完成番茄:
        <span id="count">0</span>
        个
      </div>
    </div>
    <script>
      const times = { work: 25 * 60, short: 5 * 60, long: 15 * 60 };
      let mode = "work",
        timeLeft = times.work,
        running = false,
        interval,
        count = 0;
      function updateDisplay() {
        const m = Math.floor(timeLeft / 60)
          .toString()
          .padStart(2, "0");
        const s = (timeLeft % 60).toString().padStart(2, "0");
        document.getElementById("timer").textContent = m + ":" + s;
      }
      function toggleTimer() {
        if (running) {
          clearInterval(interval);
          running = false;
          document.getElementById("startBtn").textContent = "继续";
        } else {
          running = true;
          document.getElementById("startBtn").textContent = "暂停";
          interval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
              clearInterval(interval);
              running = false;
              if (mode === "work") {
                count++;
                document.getElementById("count").textContent = count;
              }
              new Audio(
                "data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2teleQQJQ5ri8cJsCQlMn9r72J0AC0id2P7epQYLSJ3Z/96lBgtIndj/3qUGC0id2P/epQYLSJ3Y/96lBgtIndj/3qUGC0id2P/epQ=="
              )
                .play()
                .catch(() => {});
              alert(mode === "work" ? "休息一下!" : "继续工作!");
              document.getElementById("startBtn").textContent = "开始";
            }
            updateDisplay();
          }, 1000);
        }
      }
      function resetTimer() {
        clearInterval(interval);
        running = false;
        timeLeft = times[mode];
        updateDisplay();
        document.getElementById("startBtn").textContent = "开始";
      }
      function setMode(m) {
        mode = m;
        timeLeft = times[m];
        updateDisplay();
        document.querySelectorAll(".setting").forEach((s) => s.classList.remove("active"));
        event.target.classList.add("active");
        document.getElementById("mode").textContent =
          m === "work" ? "工作时间" : m === "short" ? "短休息" : "长休息";
        clearInterval(interval);
        running = false;
        document.getElementById("startBtn").textContent = "开始";
      }
      updateDisplay();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
