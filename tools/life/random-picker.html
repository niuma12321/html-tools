  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>

    </nav>
    <div class="container">
      <h1>🎯 随机点名器</h1>
      <p class="subtitle">课堂点名、随机抽签、抽奖必备工具</p>

      <div class="card">
        <div class="display-area">
          <button class="sound-btn" id="soundBtn" title="声音开关">🔊</button>
          <div class="display-name" id="displayName">准备就绪</div>
          <div class="display-hint" id="displayHint">请先导入名单，然后点击"开始"</div>
        </div>

        <div class="controls">
          <button class="btn btn-primary" id="startBtn" disabled>
            <span>▶</span>
            开始
          </button>
          <button class="btn btn-secondary" id="resetBtn">
            <span>↺</span>
            重置
          </button>
        </div>

        <div class="stats">
          <div class="stat-item">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">总人数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="remainCount">0</div>
            <div class="stat-label">剩余</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="pickedCount">0</div>
            <div class="stat-label">已抽取</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📝 名单管理</div>

        <div class="input-section">
          <label>输入名单（每行一个名字，或用逗号、空格分隔）</label>
          <textarea
            id="nameInput"
            placeholder="张三
李四
王五
或者：张三, 李四, 王五"
          ></textarea>
        </div>

        <div class="quick-actions">
          <button class="btn btn-secondary btn-small" id="importBtn">导入名单</button>
          <button class="btn btn-secondary btn-small" id="clearNamesBtn">清空名单</button>
          <button class="btn btn-secondary btn-small" id="sampleBtn">示例名单</button>
        </div>

        <div class="options">
          <label class="option-item">
            <input type="checkbox" id="noRepeat" checked />
            <span>不重复抽取</span>
          </label>
          <label class="option-item">
            <span>抽取人数</span>
            <input type="number" id="pickCount" value="1" min="1" max="99" />
          </label>
          <label class="option-item">
            <span>滚动速度(ms)</span>
            <input type="number" id="rollSpeed" value="80" min="30" max="500" step="10" />
          </label>
        </div>

        <div id="nameTagsContainer" style="display: none">
          <div class="card-title" style="margin-top: 16px">👥 当前名单（点击可排除/恢复）</div>
          <div class="name-tags" id="nameTags"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📋 抽取记录</div>
        <div class="history-list" id="historyList">
          <div class="empty-state">暂无抽取记录</div>
        </div>
        <div class="quick-actions">
          <button class="btn btn-secondary btn-small" id="clearHistoryBtn">清空记录</button>
          <button class="btn btn-secondary btn-small" id="exportHistoryBtn">导出记录</button>
        </div>
      </div>
    </div>

    <script>
      // 状态管理
      const state = {
        allNames: [],
        availableNames: [],
        pickedNames: [],
        excludedNames: new Set(),
        history: [],
        isRolling: false,
        soundEnabled: true
      };

      // DOM 元素
      const elements = {
        displayName: document.getElementById("displayName"),
        displayHint: document.getElementById("displayHint"),
        startBtn: document.getElementById("startBtn"),
        resetBtn: document.getElementById("resetBtn"),
        nameInput: document.getElementById("nameInput"),
        importBtn: document.getElementById("importBtn"),
        clearNamesBtn: document.getElementById("clearNamesBtn"),
        sampleBtn: document.getElementById("sampleBtn"),
        noRepeat: document.getElementById("noRepeat"),
        pickCount: document.getElementById("pickCount"),
        rollSpeed: document.getElementById("rollSpeed"),
        totalCount: document.getElementById("totalCount"),
        remainCount: document.getElementById("remainCount"),
        pickedCount: document.getElementById("pickedCount"),
        nameTags: document.getElementById("nameTags"),
        nameTagsContainer: document.getElementById("nameTagsContainer"),
        historyList: document.getElementById("historyList"),
        clearHistoryBtn: document.getElementById("clearHistoryBtn"),
        exportHistoryBtn: document.getElementById("exportHistoryBtn"),
        soundBtn: document.getElementById("soundBtn")
      };

      // 音效
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();

      function playSound(type) {
        if (!state.soundEnabled) return;

        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        if (type === "tick") {
          oscillator.frequency.value = 800;
          gainNode.gain.value = 0.1;
          oscillator.start();
          oscillator.stop(audioContext.currentTime + 0.05);
        } else if (type === "result") {
          oscillator.frequency.value = 1200;
          gainNode.gain.value = 0.2;
          oscillator.start();
          setTimeout(() => {
            oscillator.frequency.value = 1500;
          }, 100);
          oscillator.stop(audioContext.currentTime + 0.3);
        }
      }

      // HTML 转义函数，防止 XSS
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // 解析名单
      function parseNames(text) {
        return text
          .split(/[\n,，、\s]+/)
          .map((name) => name.trim())
          .filter((name) => name.length > 0);
      }

      // 导入名单
      function importNames() {
        const names = parseNames(elements.nameInput.value);
        if (names.length === 0) {
          alert("请输入有效的名单");
          return;
        }

        state.allNames = [...new Set(names)]; // 去重
        state.availableNames = [...state.allNames];
        state.pickedNames = [];
        state.excludedNames.clear();

        updateUI();
        renderNameTags();
        elements.nameTagsContainer.style.display = "block";

        elements.displayName.textContent = "准备就绪";
        elements.displayHint.textContent = `已导入 ${state.allNames.length} 人，点击"开始"抽取`;
      }

      // 更新UI
      function updateUI() {
        const available = state.allNames.filter(
          (n) =>
            !state.excludedNames.has(n) &&
            (!elements.noRepeat.checked || !state.pickedNames.includes(n))
        );
        state.availableNames = available;

        elements.totalCount.textContent = state.allNames.length;
        elements.remainCount.textContent = available.length;
        elements.pickedCount.textContent = state.pickedNames.length;

        elements.startBtn.disabled = available.length === 0 || state.isRolling;
      }

      // 渲染名单标签
      function renderNameTags() {
        elements.nameTags.innerHTML = state.allNames
          .map((name) => {
            let className = "name-tag";
            if (state.excludedNames.has(name)) {
              className += " excluded";
            } else if (state.pickedNames.includes(name) && elements.noRepeat.checked) {
              className += " picked";
            }
            const safeName = escapeHtml(name);
            return `<span class="${className}" data-name="${safeName}">${safeName}</span>`;
          })
          .join("");

        // 绑定点击事件
        elements.nameTags.querySelectorAll(".name-tag").forEach((tag) => {
          tag.addEventListener("click", () => toggleExclude(tag.dataset.name));
        });
      }

      // 切换排除状态
      function toggleExclude(name) {
        if (state.excludedNames.has(name)) {
          state.excludedNames.delete(name);
        } else {
          state.excludedNames.add(name);
        }
        updateUI();
        renderNameTags();
      }

      // 开始抽取
      async function startPicking() {
        if (state.availableNames.length === 0) return;

        const count = Math.min(
          parseInt(elements.pickCount.value) || 1,
          state.availableNames.length
        );
        const speed = parseInt(elements.rollSpeed.value) || 80;

        state.isRolling = true;
        elements.startBtn.disabled = true;
        elements.startBtn.innerHTML = "<span>⏸</span> 抽取中...";
        elements.displayName.classList.add("rolling");

        // 滚动效果
        const rollDuration = 2000 + Math.random() * 1000;
        const startTime = Date.now();

        while (Date.now() - startTime < rollDuration) {
          const randomName =
            state.availableNames[Math.floor(Math.random() * state.availableNames.length)];
          elements.displayName.textContent = randomName;
          playSound("tick");
          await sleep(speed);
        }

        // 抽取结果
        const results = [];
        const available = [...state.availableNames];

        for (let i = 0; i < count; i++) {
          if (available.length === 0) break;
          const index = Math.floor(Math.random() * available.length);
          const picked = available.splice(index, 1)[0];
          results.push(picked);
          state.pickedNames.push(picked);
        }

        // 显示结果
        elements.displayName.classList.remove("rolling");
        elements.displayName.textContent = results.join("、");
        elements.displayHint.textContent =
          count > 1 ? `本次抽取 ${results.length} 人` : "恭喜被抽中！";

        playSound("result");

        // 添加历史记录
        addHistory(results);

        state.isRolling = false;
        elements.startBtn.innerHTML = "<span>▶</span> 开始";

        updateUI();
        renderNameTags();
      }

      // 添加历史记录
      function addHistory(names) {
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}:${now.getSeconds().toString().padStart(2, "0")}`;

        names.forEach((name) => {
          state.history.unshift({ name, time: timeStr });
        });

        renderHistory();
      }

      // 渲染历史记录
      function renderHistory() {
        if (state.history.length === 0) {
          elements.historyList.innerHTML = '<div class="empty-state">暂无抽取记录</div>';
          return;
        }

        elements.historyList.innerHTML = state.history
          .map(
            (item, index) => `
        <div class="history-item">
          <span class="history-index">${state.history.length - index}</span>
          <span class="history-name">${escapeHtml(item.name)}</span>
          <span class="history-time">${item.time}</span>
        </div>
      `
          )
          .join("");
      }

      // 重置
      function reset() {
        state.pickedNames = [];
        state.history = [];

        elements.displayName.textContent = state.allNames.length > 0 ? "准备就绪" : "请导入名单";
        elements.displayHint.textContent =
          state.allNames.length > 0
            ? `共 ${state.allNames.length} 人，点击"开始"抽取`
            : '请先导入名单，然后点击"开始"';

        updateUI();
        renderNameTags();
        renderHistory();
      }

      // 清空名单
      function clearNames() {
        state.allNames = [];
        state.availableNames = [];
        state.pickedNames = [];
        state.excludedNames.clear();

        elements.nameInput.value = "";
        elements.nameTagsContainer.style.display = "none";
        elements.displayName.textContent = "请导入名单";
        elements.displayHint.textContent = '请先导入名单，然后点击"开始"';

        updateUI();
      }

      // 示例名单
      function loadSample() {
        const sampleNames = [
          "张三",
          "李四",
          "王五",
          "赵六",
          "钱七",
          "孙八",
          "周九",
          "吴十",
          "郑十一",
          "王十二",
          "冯十三",
          "陈十四",
          "褚十五",
          "卫十六",
          "蒋十七",
          "沈十八",
          "韩十九",
          "杨二十"
        ];
        elements.nameInput.value = sampleNames.join("\n");
        importNames();
      }

      // 清空历史
      function clearHistory() {
        state.history = [];
        renderHistory();
      }

      // 导出历史
      function exportHistory() {
        if (state.history.length === 0) {
          alert("暂无记录可导出");
          return;
        }

        const content = state.history
          .map((item, index) => `${state.history.length - index}. ${item.name} (${item.time})`)
          .join("\n");

        const blob = new Blob([`抽取记录\n${"=".repeat(20)}\n${content}`], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `抽取记录_${new Date().toLocaleDateString()}.txt`;
        a.click();
        URL.revokeObjectURL(url);
      }

      // 切换声音
      function toggleSound() {
        state.soundEnabled = !state.soundEnabled;
        elements.soundBtn.textContent = state.soundEnabled ? "🔊" : "🔇";
      }

      // 工具函数
      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      // 事件绑定
      elements.startBtn.addEventListener("click", startPicking);
      elements.resetBtn.addEventListener("click", reset);
      elements.importBtn.addEventListener("click", importNames);
      elements.clearNamesBtn.addEventListener("click", clearNames);
      elements.sampleBtn.addEventListener("click", loadSample);
      elements.clearHistoryBtn.addEventListener("click", clearHistory);
      elements.exportHistoryBtn.addEventListener("click", exportHistory);
      elements.soundBtn.addEventListener("click", toggleSound);
      elements.noRepeat.addEventListener("change", updateUI);

      // 键盘快捷键
      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" && !state.isRolling && state.availableNames.length > 0) {
          e.preventDefault();
          startPicking();
        }
      });

      // 初始化
      updateUI();
    </script>
  </body>
</html>
