<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>植物浇水提醒 - WebUtils</title>
    <meta property="og:title" content="植物浇水提醒 - WebUtils" />
    <meta property="og:description" content="植物浇水提醒：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/gardening/plant-watering.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="管理植物浇水时间，设置提醒，记录浇水历史" />
    <meta name="keywords" content="植物 浇水 园艺 提醒 plant watering garden reminder schedule" />
    <meta name="author" content="WebUtils" />
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/gardening/plant-watering.html"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 700px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-green));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .add-form {
        display: none;
        margin-bottom: 1.5rem;
        padding: 1.5rem;
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
      }
      .add-form.show {
        display: block;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-bottom: 0.5rem;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: inherit;
        font-size: 0.95rem;
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .form-btns {
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
        margin-top: 1rem;
      }
      .btn {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.9rem;
        transition: all 0.2s;
      }
      .btn-primary {
        background: var(--accent-green);
        color: #000;
        font-weight: 600;
      }
      .btn-secondary {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        border: 1px solid var(--border-subtle);
      }
      .plants-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .plant-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        position: relative;
        transition: all 0.3s;
      }
      .plant-card.overdue {
        border-color: var(--accent-red);
        background: linear-gradient(135deg, rgba(255, 107, 107, 0.1), transparent);
      }
      .plant-card.soon {
        border-color: var(--accent-yellow);
        background: linear-gradient(135deg, rgba(255, 217, 61, 0.1), transparent);
      }
      .plant-card.ok {
        border-color: var(--accent-green);
      }
      .plant-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1rem;
      }
      .plant-info {
        flex: 1;
      }
      .plant-name {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .plant-type {
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      .plant-actions {
        display: flex;
        gap: 0.5rem;
      }
      .action-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1.2rem;
        transition: all 0.2s;
        padding: 0.25rem;
      }
      .action-btn:hover {
        transform: scale(1.1);
      }
      .plant-details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      .detail-item {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .detail-label {
        font-size: 0.85rem;
        color: var(--color-text-secondary);
      }
      .detail-value {
        font-family: var(--font-mono);
        font-weight: 600;
        color: var(--color-text-primary);
      }
      .water-btn {
        width: 100%;
        padding: 0.75rem;
        border: none;
        border-radius: var(--radius-sm);
        background: var(--accent-blue);
        color: #000;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .water-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(77, 159, 255, 0.3);
      }
      .water-btn.watered {
        background: var(--accent-green);
      }
      .add-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        width: 100%;
        padding: 1rem;
        border: 2px dashed var(--border-subtle);
        border-radius: var(--radius-lg);
        background: transparent;
        color: var(--color-text-secondary);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.9rem;
        transition: all 0.2s;
      }
      .add-btn:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }
      .empty-state {
        text-align: center;
        padding: 3rem;
        color: var(--text-muted);
      }
      .empty-icon {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }
      .status-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-top: 0.5rem;
      }
      .status-badge.overdue {
        background: var(--accent-red);
        color: #000;
      }
      .status-badge.soon {
        background: var(--accent-yellow);
        color: #000;
      }
      .status-badge.ok {
        background: var(--accent-green);
        color: #000;
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
      @media (max-width: 500px) {
        .plant-details {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">植物浇水提醒</span>
      </nav>

      <h1>🌱 植物浇水提醒</h1>
      <p class="subtitle">科学管理浇水时间，让植物茁壮成长</p>

      <div class="add-form" id="addForm">
        <div class="form-group">
          <label>植物名称</label>
          <input type="text" id="plantName" placeholder="如：绿萝、多肉..." />
        </div>
        <div class="form-group">
          <label>植物类型</label>
          <select id="plantType">
            <option value="">请选择</option>
            <option value="观叶植物">观叶植物 (绿萝、龟背竹)</option>
            <option value="多肉植物">多肉植物 (仙人掌、芦荟)</option>
            <option value="开花植物">开花植物 (月季、茉莉)</option>
            <option value="水生植物">水生植物 (铜钱草、富贵竹)</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>浇水间隔 (天)</label>
          <input type="number" id="waterInterval" value="3" min="1" max="30" />
        </div>
        <div class="form-btns">
          <button class="btn btn-secondary" onclick="hideForm()">取消</button>
          <button class="btn btn-primary" onclick="addPlant()">添加</button>
        </div>
      </div>

      <div class="plants-list" id="plantsList">
        <!-- Plants will be rendered here -->
      </div>

      <button class="add-btn" onclick="showForm()">
        <span>+</span>
        添加植物
      </button>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      let plants = JSON.parse(localStorage.getItem("plant_watering") || "[]");

      function showForm() {
        document.getElementById("addForm").classList.add("show");
        document.getElementById("plantName").focus();
      }

      function hideForm() {
        document.getElementById("addForm").classList.remove("show");
        document.getElementById("plantName").value = "";
        document.getElementById("plantType").value = "";
        document.getElementById("waterInterval").value = "3";
      }

      function addPlant() {
        const name = document.getElementById("plantName").value.trim();
        const type = document.getElementById("plantType").value;
        const interval = parseInt(document.getElementById("waterInterval").value);

        if (!name || !type) {
          alert("请填写植物名称和类型");
          return;
        }

        plants.push({
          id: Date.now(),
          name,
          type,
          interval,
          lastWatered: new Date().toISOString(),
          history: [new Date().toISOString()]
        });

        localStorage.setItem("plant_watering", JSON.stringify(plants));
        hideForm();
        render();
      }

      function waterPlant(id) {
        const plant = plants.find((p) => p.id === id);
        if (plant) {
          plant.lastWatered = new Date().toISOString();
          plant.history.push(plant.lastWatered);
          localStorage.setItem("plant_watering", JSON.stringify(plants));
          render();
        }
      }

      function deletePlant(id) {
        if (confirm("确定要删除这个植物吗？")) {
          plants = plants.filter((p) => p.id !== id);
          localStorage.setItem("plant_watering", JSON.stringify(plants));
          render();
        }
      }

      function getDaysUntilWater(plant) {
        const lastWatered = new Date(plant.lastWatered);
        const nextWater = new Date(lastWatered);
        nextWater.setDate(nextWater.getDate() + plant.interval);

        const now = new Date();
        const diffMs = nextWater - now;
        const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

        return diffDays;
      }

      function getStatus(daysUntil) {
        if (daysUntil < 0) return { class: "overdue", text: "需要浇水", icon: "🚨" };
        if (daysUntil === 0) return { class: "soon", text: "今天浇水", icon: "⏰" };
        if (daysUntil === 1) return { class: "soon", text: "明天浇水", icon: "📅" };
        return { class: "ok", text: `${daysUntil}天后浇水`, icon: "✅" };
      }

      function formatDate(isoString) {
        const date = new Date(isoString);
        const now = new Date();
        const diffMs = now - date;
        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

        if (diffDays === 0) return "今天";
        if (diffDays === 1) return "昨天";
        if (diffDays < 7) return `${diffDays}天前`;

        return date.toLocaleDateString("zh-CN", { month: "short", day: "numeric" });
      }

      function render() {
        const list = document.getElementById("plantsList");

        if (plants.length === 0) {
          list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🪴</div>
            <div>还没有添加植物</div>
            <div style="font-size:.85rem;margin-top:.25rem">点击下方按钮开始管理你的植物</div>
          </div>
        `;
          return;
        }

        // Sort plants by days until water (overdue first)
        const sortedPlants = [...plants].sort((a, b) => {
          return getDaysUntilWater(a) - getDaysUntilWater(b);
        });

        list.innerHTML = sortedPlants
          .map((plant) => {
            const daysUntil = getDaysUntilWater(plant);
            const status = getStatus(daysUntil);
            const lastWatered = formatDate(plant.lastWatered);
            const nextWater = new Date(plant.lastWatered);
            nextWater.setDate(nextWater.getDate() + plant.interval);

            return `
          <div class="plant-card ${status.class}">
            <div class="plant-header">
              <div class="plant-info">
                <div class="plant-name">${plant.name}</div>
                <div class="plant-type">${plant.type}</div>
                <span class="status-badge ${status.class}">${status.icon} ${status.text}</span>
              </div>
              <div class="plant-actions">
                <button class="action-btn" onclick="deletePlant(${plant.id})" title="删除">🗑️</button>
              </div>
            </div>
            <div class="plant-details">
              <div class="detail-item">
                <div class="detail-label">上次浇水</div>
                <div class="detail-value">${lastWatered}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">下次浇水</div>
                <div class="detail-value">${nextWater.toLocaleDateString("zh-CN", { month: "short", day: "numeric" })}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">浇水间隔</div>
                <div class="detail-value">${plant.interval} 天</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">浇水次数</div>
                <div class="detail-value">${plant.history.length} 次</div>
              </div>
            </div>
            <button class="water-btn ${daysUntil > 1 ? "" : "watered"}" onclick="waterPlant(${plant.id})">
              ${daysUntil <= 0 ? "💧 立即浇水" : "💧 已浇水"}
            </button>
          </div>
        `;
          })
          .join("");
      }

      // Check for overdue plants on load
      function checkOverdue() {
        const overduePlants = plants.filter((p) => getDaysUntilWater(p) < 0);
        if (overduePlants.length > 0 && Notification.permission === "granted") {
          new Notification("植物需要浇水 🌱", {
            body: `${overduePlants.length} 个植物需要浇水了！`,
            icon: "🌱"
          });
        }
      }

      // Request notification permission
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }

      // Initialize
      render();
      checkOverdue();

      // Handle Enter key
      document.getElementById("plantName").addEventListener("keypress", (e) => {
        if (e.key === "Enter") addPlant();
      });

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
