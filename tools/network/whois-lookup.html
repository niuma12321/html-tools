    <meta name="twitter:description" content="WHOIS查询" />

    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-sans);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      h1 {
        color: white;
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .search-box {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .search-box input {
        flex: 1;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 16px;
      }
      .search-box input:focus {
        outline: none;
        border-color: #667eea;
      }
      .search-box button {
        padding: 15px 30px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
      }
      .result {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 12px;
        min-height: 200px;
      }
      .result-item {
        padding: 10px 0;
        border-bottom: 1px solid #e9ecef;
      }
      .result-item:last-child {
        border-bottom: none;
      }
      .result-label {
        font-weight: 600;
        color: #666;
        font-size: 12px;
        margin-bottom: 3px;
      }
      .result-value {
        color: #333;
      }
      .info {
        margin-top: 15px;
        padding: 15px;
        background: #fff3cd;
        border-radius: 10px;
        font-size: 14px;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      WHOIS查询
    </nav>
    <div class="container">
      <h1>🔍 WHOIS查询</h1>
      <div class="card">
        <div class="search-box">
          <input
            type="text"
            id="domain"
            placeholder="输入域名，如 example.com"
            onkeypress="if (event.key === 'Enter') lookup();"
          />
          <button onclick="lookup()">查询</button>
        </div>
        <div class="result" id="result">
          <p style="text-align: center; color: #999; padding: 40px">输入域名进行查询</p>
        </div>
        <div class="info">
          💡 注意：由于浏览器安全限制，此工具显示的是模拟数据。实际WHOIS查询需要服务器端支持。
        </div>
      </div>
    </div>
    <script>
      function lookup() {
        const domain = document.getElementById("domain").value.trim();
        if (!domain) return;
        // 模拟数据
        const data = [
          { label: "域名", value: domain },
          { label: "注册商", value: "Example Registrar Inc." },
          { label: "注册日期", value: "2020-01-15" },
          { label: "到期日期", value: "2025-01-15" },
          { label: "更新日期", value: "2024-01-10" },
          { label: "状态", value: "clientTransferProhibited" },
          { label: "DNS服务器", value: "ns1.example.com, ns2.example.com" }
        ];
        document.getElementById("result").innerHTML = data
          .map(
            (d) =>
              '<div class="result-item"><div class="result-label">' +
              d.label +
              '</div><div class="result-value">' +
              d.value +
              "</div></div>"
          )
          .join("");
      }
    </script>
  </body>
</html>
