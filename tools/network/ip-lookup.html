    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-sans);
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        max-width: 500px;
        width: 100%;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }
      h1 {
        text-align: center;
        margin-bottom: 20px;
      }
      .search {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      input {
        flex: 1;
        padding: 12px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
      }
      button {
        padding: 12px 20px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      .my-ip {
        text-align: center;
        padding: 15px;
        background: #f7fafc;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      .my-ip-value {
        font-size: 1.5rem;
        font-weight: bold;
        color: #667eea;
      }
      .results {
        background: #f7fafc;
        padding: 20px;
        border-radius: 10px;
      }
      .result-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #e2e8f0;
      }
      .result-row:last-child {
        border-bottom: none;
      }
      .loading {
        text-align: center;
        color: #666;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      IP 地址查询
    </nav>
    <div class="container">
      <h1>🌐 IP查询</h1>
      <div class="my-ip">
        你的IP:
        <span class="my-ip-value" id="myIp">加载中...</span>
      </div>
      <div class="search">
        <input type="text" id="ip" placeholder="输入IP地址查询" />
        <button onclick="lookup()">查询</button>
      </div>
      <div class="results" id="results">
        <div class="loading">输入IP地址进行查询</div>
      </div>
    </div>
    <script>
      fetch("https://api.ipify.org?format=json")
        .then((r) => r.json())
        .then((d) => {
          document.getElementById("myIp").textContent = d.ip;
          document.getElementById("ip").value = d.ip;
          lookup();
        })
        .catch(() => (document.getElementById("myIp").textContent = "获取失败"));
      function lookup() {
        const ip = document.getElementById("ip").value.trim();
        if (!ip) return;
        document.getElementById("results").innerHTML = '<div class="loading">查询中...</div>';
        fetch("https://ipapi.co/" + ip + "/json/")
          .then((r) => r.json())
          .then((d) => {
            if (d.error) throw new Error(d.reason);
            document.getElementById("results").innerHTML = [
              ["IP", d.ip],
              ["城市", d.city],
              ["地区", d.region],
              ["国家", d.country_name],
              ["ISP", d.org],
              ["时区", d.timezone],
              ["经纬度", d.latitude + ", " + d.longitude]
            ]
              .map(
                ([k, v]) =>
                  '<div class="result-row"><span>' +
                  k +
                  "</span><span>" +
                  (v || "-") +
                  "</span></div>"
              )
              .join("");
          })
          .catch(
            (e) =>
              (document.getElementById("results").innerHTML =
                '<div class="loading">查询失败: ' + e.message + "</div>")
          );
      }
    </script>
  </body>
</html>
