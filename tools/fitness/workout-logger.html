<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>健身记录 - WebUtils</title>
    <meta property="og:title" content="健身记录 - WebUtils" />
    <meta property="og:description" content="健身记录：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/fitness/workout-logger.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="记录每日健身运动,追踪卡路里消耗,帮助您保持健康的运动习惯" />
    <meta name="keywords" content="健身 运动 记录 卡路里 fitness workout logger exercise" />
    <meta name="author" content="WebUtils" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/fitness/workout-logger.html" />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-orange));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .stat-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        text-align: center;
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 2rem;
        font-weight: 700;
        color: var(--color-accent-cyan);
        margin-bottom: 0.5rem;
      }
      .stat-label {
        font-size: 0.9rem;
        color: var(--text-muted);
      }
      .add-form {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 2rem;
      }
      .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--color-text-secondary);
        font-size: 0.9rem;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: inherit;
      }
      .add-btn {
        width: 100%;
        padding: 0.75rem;
        border: none;
        border-radius: var(--radius-sm);
        background: var(--accent-orange);
        color: #000;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .add-btn:hover {
        background: var(--color-accent-cyan);
      }
      .workout-list {
        display: grid;
        gap: 1rem;
      }
      .workout-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .workout-info {
        flex: 1;
      }
      .workout-name {
        font-weight: 600;
        color: var(--color-accent-cyan);
        margin-bottom: 0.5rem;
      }
      .workout-details {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }
      .workout-delete {
        padding: 0.5rem;
        border: none;
        background: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1.2rem;
      }
      .workout-delete:hover {
        color: var(--accent-orange);
      }
      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <a href="../../index.html#fitness">健身工具</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">健身记录</span>
      </nav>

      <h1>💪 健身记录</h1>
      <p class="subtitle">追踪您的运动进度</p>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalWorkouts">0</div>
          <div class="stat-label">总次数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalDuration">0</div>
          <div class="stat-label">总时长（分钟）</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalCalories">0</div>
          <div class="stat-label">总卡路里</div>
        </div>
      </div>

      <div class="add-form">
        <div class="form-row">
          <div class="form-group">
            <label>运动类型</label>
            <select id="type">
              <option value="跑步">跑步</option>
              <option value="骑行">骑行</option>
              <option value="游泳">游泳</option>
              <option value="力量训练">力量训练</option>
              <option value="瑜伽">瑜伽</option>
              <option value="HIIT">HIIT</option>
              <option value="走路">走路</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label>时长（分钟）</label>
            <input type="number" id="duration" placeholder="30" min="1" />
          </div>
          <div class="form-group">
            <label>卡路里（可选）</label>
            <input type="number" id="calories" placeholder="200" min="0" />
          </div>
        </div>
        <button class="add-btn" onclick="addWorkout()">➕ 添加记录</button>
      </div>

      <div class="workout-list" id="workoutList">
        <div class="empty-state">
          还没有运动记录
          <br />
          开始您的第一次运动吧！
        </div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "html_tools_workout_v1";
      let workouts = [];

      function loadData() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          workouts = saved ? JSON.parse(saved) : [];
        } catch (e) {
          workouts = [];
        }
        renderWorkouts();
      }

      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(workouts));
      }

      function addWorkout() {
        const type = document.getElementById("type").value;
        const duration = parseInt(document.getElementById("duration").value);
        const calories = parseInt(document.getElementById("calories").value) || 0;

        if (!duration || duration < 1) {
          alert("请输入运动时长");
          return;
        }

        workouts.unshift({
          id: Date.now(),
          type,
          duration,
          calories,
          date: new Date().toLocaleString("zh-CN", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
          })
        });

        saveData();
        renderWorkouts();

        document.getElementById("duration").value = "";
        document.getElementById("calories").value = "";
      }

      function deleteWorkout(id) {
        workouts = workouts.filter((w) => w.id !== id);
        saveData();
        renderWorkouts();
      }

      function renderWorkouts() {
        const container = document.getElementById("workoutList");

        // Update stats
        const totalWorkouts = workouts.length;
        const totalDuration = workouts.reduce((sum, w) => sum + w.duration, 0);
        const totalCalories = workouts.reduce((sum, w) => sum + w.calories, 0);

        document.getElementById("totalWorkouts").textContent = totalWorkouts;
        document.getElementById("totalDuration").textContent = totalDuration;
        document.getElementById("totalCalories").textContent = totalCalories;

        if (workouts.length === 0) {
          container.innerHTML =
            '<div class="empty-state">还没有运动记录<br>开始您的第一次运动吧！</div>';
          return;
        }

        container.innerHTML = workouts
          .map(
            (w) => `
        <div class="workout-card">
          <div class="workout-info">
            <div class="workout-name">${w.type}</div>
            <div class="workout-details">${w.date} · ${w.duration}分钟${w.calories > 0 ? " · " + w.calories + "kcal" : ""}</div>
          </div>
          <button class="workout-delete" onclick="deleteWorkout(${w.id})">×</button>
        </div>
      `
          )
          .join("");
      }

      loadData();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
