<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>喝水提醒 - WebUtils</title>
    <meta property="og:title" content="喝水提醒 - WebUtils" />
    <meta property="og:description" content="喝水提醒：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/health/water-tracker.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="记录每日饮水量，养成健康喝水习惯" />
    <meta name="keywords" content="喝水 饮水 健康 提醒 water intake hydration tracker reminder" />
    <meta name="author" content="WebUtils" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/health/water-tracker.html" />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 600px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--color-accent-cyan));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .progress-card {
        background: linear-gradient(135deg, rgba(0, 245, 212, 0.1), rgba(77, 159, 255, 0.1));
        border: 2px solid var(--color-accent-cyan);
        border-radius: var(--radius-lg);
        padding: 2rem;
        text-align: center;
        margin-bottom: 2rem;
      }
      .progress-label {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-bottom: 0.5rem;
      }
      .progress-value {
        font-family: var(--font-mono);
        font-size: 3rem;
        font-weight: 700;
        color: var(--color-accent-cyan);
        margin-bottom: 0.5rem;
      }
      .progress-target {
        font-size: 0.9rem;
        color: var(--text-muted);
      }
      .progress-bar-container {
        width: 100%;
        height: 30px;
        background: var(--color-bg-surface);
        border-radius: 20px;
        overflow: hidden;
        margin: 1.5rem 0;
        border: 1px solid var(--border-subtle);
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--color-accent-cyan), var(--accent-blue));
        transition: width 0.5s ease;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 1rem;
        font-size: 0.85rem;
        font-weight: 600;
        color: #000;
      }
      .quick-add {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.75rem;
        margin-bottom: 2rem;
      }
      .quick-btn {
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--color-bg-card);
        cursor: pointer;
        transition: all 0.2s;
        padding: 1rem;
      }
      .quick-btn:hover {
        border-color: var(--color-accent-cyan);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(0, 245, 212, 0.2);
      }
      .quick-btn-icon {
        font-size: 1.8rem;
      }
      .quick-btn-text {
        font-size: 0.85rem;
        color: var(--color-text-secondary);
        font-weight: 500;
      }
      .custom-add {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 2rem;
      }
      .custom-add-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--color-accent-cyan);
      }
      .custom-input-group {
        display: flex;
        gap: 0.75rem;
      }
      .custom-input-group input {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        font-size: 0.95rem;
        text-align: center;
      }
      .custom-input-group input:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .custom-input-group button {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: var(--radius-sm);
        background: var(--accent-blue);
        color: #000;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .custom-input-group button:hover {
        transform: translateY(-1px);
      }
      .history {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
      }
      .history-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--color-accent-cyan);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .clear-btn {
        font-size: 0.85rem;
        color: var(--text-muted);
        cursor: pointer;
        font-weight: 400;
        transition: all 0.2s;
      }
      .clear-btn:hover {
        color: var(--color-accent-cyan);
      }
      .history-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .history-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
      }
      .history-time {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      .history-amount {
        font-family: var(--font-mono);
        font-weight: 600;
        color: var(--color-accent-cyan);
      }
      .history-delete {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 0.25rem;
        transition: all 0.2s;
      }
      .history-delete:hover {
        color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .empty-history {
        text-align: center;
        padding: 2rem;
        color: var(--text-muted);
        font-size: 0.9rem;
      }
      .goal-reached {
        background: linear-gradient(135deg, rgba(0, 210, 106, 0.1), rgba(0, 245, 212, 0.1));
        border-color: var(--accent-green);
      }
      .goal-reached .progress-value {
        color: var(--accent-green);
      }
      .goal-reached .progress-bar {
        background: linear-gradient(90deg, var(--accent-green), var(--color-accent-cyan));
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
      @media (max-width: 500px) {
        .quick-add {
          grid-template-columns: repeat(2, 1fr);
        }
        .progress-value {
          font-size: 2.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">喝水提醒</span>
      </nav>

      <h1>💧 喝水提醒</h1>
      <p class="subtitle">记录每日饮水，养成健康习惯</p>

      <div class="progress-card" id="progressCard">
        <div class="progress-label">今日饮水量</div>
        <div class="progress-value" id="currentAmount">0 ml</div>
        <div class="progress-target">
          目标:
          <span id="targetAmount">2000</span>
          ml
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar" style="width: 0%">
            <span id="progressPercent">0%</span>
          </div>
        </div>
      </div>

      <div class="quick-add">
        <button class="quick-btn" onclick="addWater(100)">
          <div class="quick-btn-icon">☕</div>
          <div class="quick-btn-text">100ml</div>
        </button>
        <button class="quick-btn" onclick="addWater(200)">
          <div class="quick-btn-icon">🥤</div>
          <div class="quick-btn-text">200ml</div>
        </button>
        <button class="quick-btn" onclick="addWater(300)">
          <div class="quick-btn-icon">🥛</div>
          <div class="quick-btn-text">300ml</div>
        </button>
        <button class="quick-btn" onclick="addWater(500)">
          <div class="quick-btn-icon">🍶</div>
          <div class="quick-btn-text">500ml</div>
        </button>
      </div>

      <div class="custom-add">
        <div class="custom-add-title">⚙️ 自定义</div>
        <div class="custom-input-group">
          <input
            type="number"
            id="customAmount"
            placeholder="输入毫升数"
            min="1"
            max="2000"
            step="50"
          />
          <button onclick="addCustom()">添加</button>
        </div>
      </div>

      <div class="history">
        <div class="history-title">
          <span>📜 今日记录</span>
          <span class="clear-btn" onclick="clearHistory()">清空</span>
        </div>
        <div class="history-list" id="historyList">
          <div class="empty-history">今天还没有喝水记录</div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const TARGET = 2000; // ml
      let todayData = loadTodayData();

      function loadTodayData() {
        const saved = localStorage.getItem("water_tracker");
        if (!saved) return { date: getToday(), records: [], total: 0 };

        const data = JSON.parse(saved);
        if (data.date !== getToday()) {
          // New day, reset
          return { date: getToday(), records: [], total: 0 };
        }

        return data;
      }

      function saveTodayData() {
        localStorage.setItem("water_tracker", JSON.stringify(todayData));
      }

      function getToday() {
        return new Date().toISOString().split("T")[0];
      }

      function addWater(amount) {
        todayData.records.push({
          time: new Date().toISOString(),
          amount
        });
        todayData.total += amount;

        saveTodayData();
        render();

        // Check if goal reached
        if (todayData.total >= TARGET && todayData.total - amount < TARGET) {
          setTimeout(() => {
            alert("🎉 恭喜！今日饮水目标已达成！");
          }, 500);
        }
      }

      function addCustom() {
        const input = document.getElementById("customAmount");
        const amount = parseInt(input.value);

        if (!amount || amount <= 0) {
          alert("请输入有效的毫升数");
          return;
        }

        addWater(amount);
        input.value = "";
      }

      function deleteRecord(index) {
        const record = todayData.records[index];
        todayData.total -= record.amount;
        todayData.records.splice(index, 1);

        saveTodayData();
        render();
      }

      function clearHistory() {
        if (confirm("确定要清空今日所有记录吗？")) {
          todayData.records = [];
          todayData.total = 0;
          saveTodayData();
          render();
        }
      }

      function formatTime(isoString) {
        const date = new Date(isoString);
        return date.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
      }

      function render() {
        // Update progress
        document.getElementById("currentAmount").textContent = todayData.total + " ml";
        document.getElementById("targetAmount").textContent = TARGET;

        const percent = Math.min(100, Math.round((todayData.total / TARGET) * 100));
        const progressBar = document.getElementById("progressBar");
        progressBar.style.width = percent + "%";
        document.getElementById("progressPercent").textContent = percent + "%";

        // Update card style if goal reached
        const progressCard = document.getElementById("progressCard");
        if (todayData.total >= TARGET) {
          progressCard.classList.add("goal-reached");
        } else {
          progressCard.classList.remove("goal-reached");
        }

        // Update history
        const historyList = document.getElementById("historyList");
        if (todayData.records.length === 0) {
          historyList.innerHTML = '<div class="empty-history">今天还没有喝水记录</div>';
          return;
        }

        historyList.innerHTML = todayData.records
          .map(
            (record, index) => `
        <div class="history-item">
          <span class="history-time">${formatTime(record.time)}</span>
          <span class="history-amount">+${record.amount} ml</span>
          <button class="history-delete" onclick="deleteRecord(${index})">×</button>
        </div>
      `
          )
          .reverse()
          .join("");
      }

      // Initialize
      render();

      // Handle Enter key
      document.getElementById("customAmount").addEventListener("keypress", (e) => {
        if (e.key === "Enter") addCustom();
      });

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
