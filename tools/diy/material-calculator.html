        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;

        --radius-sm: 4px;

        --font-sans:

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;

        --text-muted: #999;

        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      * {
        box-sizing: border-box;
        margin: 0;

      body {

        font-size: 16px;

  <body>
    <a
      href="../../index.html"
      style="
        position: fixed;
        top: 1rem;
        left: 1rem;
        color: #00f5d4;
        text-decoration: none;
        font-size: 0.9rem;

      "
    >
      ← 首页
    </a>
    <div class="container">
      <h1>🔨 材料用量计算</h1>
      <div class="card">
        <label for="input---------">房间长度 (米)</label>
        <input
          type="number"
          id="length"
          value="5"
          aria-label="数字输入框"
          placeholder="请输入数字输入框"
        />
        <label for="input---------">房间宽度 (米)</label>
        <input
          type="number"
          id="width"
          value="4"
          aria-label="数字输入框"
          placeholder="请输入数字输入框"
        />
        <button onclick="calc()" aria-label="计算面积">计算面积</button>
        <div class="result" id="result"></div>
      </div>
    </div>
    <script>
      function calc() {
        const l = parseFloat(document.getElementById("length").value) || 0;
        const w = parseFloat(document.getElementById("width").value) || 0;
        const area = l * w;
        document.getElementById("result").textContent = `面积: ${area.toFixed(2)} 平方米`;
      }
    </script>
  </body>
