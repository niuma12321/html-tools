  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      温度转换器
    </nav>
    <div class="container">
      <div class="header">
        <a href="../../index.html" class="back-link">← 返回</a>
        <h1>🌡️ 温度转换器</h1>
        <p>摄氏度、华氏度、开尔文互转</p>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓">🌓</button>
      </div>

      <div class="card">
        <div class="thermometer">
          <div class="temp-visual">
            <div class="temp-fill" id="tempFill" style="height: 50%"></div>
          </div>
          <div class="temp-label" id="tempLabel">25°C</div>
        </div>
        <div class="quick-temps">
          <button class="quick-btn" onclick="setTemp(-40)" aria-label="-40°">-40°</button>
          <button class="quick-btn" onclick="setTemp(0)" aria-label="0° 冰点">0° 冰点</button>
          <button class="quick-btn" onclick="setTemp(20)" aria-label="20° 室温">20° 室温</button>
          <button class="quick-btn" onclick="setTemp(37)" aria-label="37° 体温">37° 体温</button>
          <button class="quick-btn" onclick="setTemp(100)" aria-label="100° 沸点">100° 沸点</button>
        </div>
      </div>

      <div class="card">
        <div class="input-group">
          <label>输入温度</label>
          <div class="input-row">
            <input
              type="number"
              id="inputValue"
              value="25"
              oninput="convert()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
            <select id="inputUnit" onchange="convert()">
              <option value="C">°C 摄氏</option>
              <option value="F">°F 华氏</option>
              <option value="K">K 开尔文</option>
            </select>
          </div>
        </div>

        <div class="results">
          <div class="result-item" onclick="copyValue('celsius')">
            <span class="result-unit">摄氏度 °C</span>
            <span class="result-value" id="celsius">25.00</span>
          </div>
          <div class="result-item" onclick="copyValue('fahrenheit')">
            <span class="result-unit">华氏度 °F</span>
            <span class="result-value" id="fahrenheit">77.00</span>
          </div>
          <div class="result-item" onclick="copyValue('kelvin')">
            <span class="result-unit">开尔文 K</span>
            <span class="result-value" id="kelvin">298.15</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.toggleTheme = function () {
        const t =
          document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
      };
      document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");

      window.setTemp = function (celsius) {
        document.getElementById("inputValue").value = celsius;
        document.getElementById("inputUnit").value = "C";
        convert();
      };

      function convert() {
        const value = parseFloat(document.getElementById("inputValue").value) || 0;
        const unit = document.getElementById("inputUnit").value;

        let celsius;
        switch (unit) {
          case "C":
            celsius = value;
            break;
          case "F":
            celsius = ((value - 32) * 5) / 9;
            break;
          case "K":
            celsius = value - 273.15;
            break;
        }

        const fahrenheit = (celsius * 9) / 5 + 32;
        const kelvin = celsius + 273.15;

        document.getElementById("celsius").textContent = celsius.toFixed(2);
        document.getElementById("fahrenheit").textContent = fahrenheit.toFixed(2);
        document.getElementById("kelvin").textContent = kelvin.toFixed(2);

        // Update visual
        const fillHeight = Math.max(0, Math.min(100, ((celsius + 40) / 140) * 100));
        document.getElementById("tempFill").style.height = fillHeight + "%";
        document.getElementById("tempLabel").textContent = celsius.toFixed(1) + "°C";
      }

      window.copyValue = function (type) {
        const value = document.getElementById(type).textContent;
        navigator.clipboard.writeText(value);
      };

      convert();
    </script>
  </body>
