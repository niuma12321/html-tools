    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        padding: 20px;
        line-height: 1.6;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 30px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1 {
        text-align: center;
        margin-bottom: 20px;
      }
      .current {
        text-align: center;
        padding: 15px;
        background: #f7fafc;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      .current-ts {
        font-size: 1.5rem;
        font-weight: bold;
        color: #667eea;
      }
      .section {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
      }
      input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 1rem;
      }
      .result {
        padding: 15px;
        background: #f7fafc;
        border-radius: 8px;
        margin-top: 10px;
      }
      .btn {
        padding: 12px 24px;
        background: var(--color-accent-cyan);
        color: var(--color-bg-deep);
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s ease;
      }

      .btn:hover {
        background: #00dfc4;
        box-shadow: 0 0 20px var(--glow-cyan);
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;

      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"

  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      时间戳转换
    </nav>
    <div class="container">
      <h1>🕐 时间戳转换</h1>
      <div class="current">
        当前时间戳:
        <span class="current-ts" id="currentTs"></span>
      </div>
      <div class="section">
        <label>时间戳转日期</label>
        <input type="number" id="tsInput" placeholder="输入Unix时间戳" oninput="tsToDate()" />
        <div class="result" id="dateResult">-</div>
      </div>
      <div class="section">
        <label>日期转时间戳</label>
        <input type="datetime-local" id="dateInput" onchange="dateToTs()" />
        <div class="result" id="tsResult">-</div>
      </div>
    </div>
    <script>
      function updateCurrent() {
        document.getElementById("currentTs").textContent = Math.floor(Date.now() / 1000);
      }
      setInterval(updateCurrent, 1000);
      updateCurrent();
      function tsToDate() {
        const ts = document.getElementById("tsInput").value;
        if (!ts) {
          document.getElementById("dateResult").textContent = "-";
          return;
        }
        const date = new Date(ts * 1000);
        document.getElementById("dateResult").textContent =
          date.toLocaleString("zh-CN") + "\n" + date.toISOString();
      }
      function dateToTs() {
        const date = document.getElementById("dateInput").value;
        if (!date) {
          document.getElementById("tsResult").textContent = "-";
          return;
        }
        const ts = Math.floor(new Date(date).getTime() / 1000);
        document.getElementById("tsResult").textContent = "秒: " + ts + "\n毫秒: " + ts * 1000;
      }

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>
