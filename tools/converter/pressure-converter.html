  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      压力单位转换器
    </nav>
    <div class="container">
      <h1>🌡️ 压力换算器</h1>
      <div class="card">
        <div class="input-group">
          <label>输入数值</label>
          <label for="value" class="visually-hidden">输入数值</label>
          <input type="number" id="value" value="1" min="0" step="any" placeholder="输入数值" />
        </div>
        <div class="input-group">
          <label>选择单位</label>
          <select id="unit">
            <option value="pa">帕斯卡 (Pa)</option>
            <option value="kpa">千帕 (kPa)</option>
            <option value="mpa">兆帕 (MPa)</option>
            <option value="bar">巴 (bar)</option>
            <option value="atm" selected>标准大气压 (atm)</option>
            <option value="psi">磅/平方英寸 (psi)</option>
            <option value="mmhg">毫米汞柱 (mmHg)</option>
            <option value="torr">托 (Torr)</option>
          </select>
        </div>
        <div class="results" id="results"></div>
      </div>
    </div>
    <script>
      const toPa = {
        pa: 1,
        kpa: 1000,
        mpa: 1000000,
        bar: 100000,
        atm: 101325,
        psi: 6894.76,
        mmhg: 133.322,
        torr: 133.322
      };
      const labels = {
        pa: "帕斯卡 (Pa)",
        kpa: "千帕 (kPa)",
        mpa: "兆帕 (MPa)",
        bar: "巴 (bar)",
        atm: "标准大气压 (atm)",
        psi: "psi",
        mmhg: "毫米汞柱 (mmHg)",
        torr: "托 (Torr)"
      };
      function convert() {
        const value = parseFloat(document.getElementById("value").value) || 0;
        const unit = document.getElementById("unit").value;
        const pa = value * toPa[unit];
        let html = "";
        for (const [key, factor] of Object.entries(toPa)) {
          const result = pa / factor;
          const formatted =
            result < 0.0001
              ? result.toExponential(4)
              : result > 999999
                ? result.toExponential(4)
                : result.toLocaleString("zh-CN", { maximumFractionDigits: 6 });
          html += `<div class="result-item"><span class="result-label">${labels[key]}</span><span class="result-value">${formatted}</span></div>`;
        }
        document.getElementById("results").innerHTML = html;
      }
      document.getElementById("value").addEventListener("input", convert);
      document.getElementById("unit").addEventListener("change", convert);
      convert();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
