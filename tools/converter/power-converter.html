      [data-theme="light"] {

      .theme-toggle {
        position: fixed;
        top: 1rem;

        transform: scale(1.1);

  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      功率换算器
    </nav>
    <div class="container">
      <h1>💪 功率换算器</h1>
      <div class="card">
        <div class="input-group">
          <label for="input-----">输入数值</label>
          <input
            type="number"
            id="value"
            value="1"
            min="0"
            step="any"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
        <div class="input-group">
          <label>选择单位</label>
          <select id="unit">
            <option value="w" selected>瓦特 (W)</option>
            <option value="kw">千瓦 (kW)</option>
            <option value="mw">兆瓦 (MW)</option>
            <option value="hp">马力 (hp)</option>
            <option value="ps">公制马力 (PS)</option>
            <option value="ftlbs">英尺·磅力/秒</option>
            <option value="btuhr">BTU/小时</option>
            <option value="cals">卡路里/秒</option>
          </select>
        </div>
        <div class="results" id="results"></div>
      </div>
    </div>
    <script>
      const toW = {
        w: 1,
        kw: 1000,
        mw: 1000000,
        hp: 745.7,
        ps: 735.5,
        ftlbs: 1.356,
        btuhr: 0.293,
        cals: 4.184
      };
      const labels = {
        w: "瓦特 (W)",
        kw: "千瓦 (kW)",
        mw: "兆瓦 (MW)",
        hp: "马力 (hp)",
        ps: "公制马力 (PS)",
        ftlbs: "英尺·磅力/秒",
        btuhr: "BTU/小时",
        cals: "卡路里/秒"
      };
      function convert() {
        const value = parseFloat(document.getElementById("value").value) || 0;
        const unit = document.getElementById("unit").value;
        const watts = value * toW[unit];
        let html = "";
        for (const [key, factor] of Object.entries(toW)) {
          const result = watts / factor;
          const formatted =
            result < 0.0001 || result > 999999
              ? result.toExponential(4)
              : result.toLocaleString("zh-CN", { maximumFractionDigits: 6 });
          html += `<div class="result-item"><span class="result-label">${labels[key]}</span><span class="result-value">${formatted}</span></div>`;
        }
        document.getElementById("results").innerHTML = html;
      }
      document.getElementById("value").addEventListener("input", convert);
      document.getElementById("unit").addEventListener("change", convert);
      convert();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
