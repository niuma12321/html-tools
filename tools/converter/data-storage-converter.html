  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>

      数据存储换算
    </nav>
    <div class="container">
      <h1>📦 数据存储换算器</h1>
      <div class="card">
        <div class="input-group">
          <label for="input-----">输入数值</label>
          <input
            type="number"
            id="value"
            value="1"
            min="0"
            step="any"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
        <div class="input-group">
          <label>选择单位</label>
          <select id="unit">
            <option value="bit">比特 (bit)</option>
            <option value="byte" selected>字节 (Byte)</option>
            <option value="kb">千字节 (KB)</option>
            <option value="mb">兆字节 (MB)</option>
            <option value="gb">吉字节 (GB)</option>
            <option value="tb">太字节 (TB)</option>
            <option value="pb">拍字节 (PB)</option>
            <option value="kib">KiB (1024字节)</option>
            <option value="mib">MiB (1024 KiB)</option>
            <option value="gib">GiB (1024 MiB)</option>
            <option value="tib">TiB (1024 GiB)</option>
          </select>
        </div>
        <div class="results" id="results"></div>
        <div class="info">
          💡 提示：KB/MB/GB 使用 1000 进制（SI标准），KiB/MiB/GiB 使用 1024 进制（IEC标准）
        </div>
      </div>
    </div>
    <script>
      const units = {
        bit: 1 / 8,
        byte: 1,
        kb: 1000,
        mb: 1000000,
        gb: 1000000000,
        tb: 1000000000000,
        pb: 1000000000000000,
        kib: 1024,
        mib: 1048576,
        gib: 1073741824,
        tib: 1099511627776
      };
      const labels = {
        bit: "比特 (bit)",
        byte: "字节 (Byte)",
        kb: "千字节 (KB)",
        mb: "兆字节 (MB)",
        gb: "吉字节 (GB)",
        tb: "太字节 (TB)",
        pb: "拍字节 (PB)",
        kib: "KiB",
        mib: "MiB",
        gib: "GiB",
        tib: "TiB"
      };
      function convert() {
        const value = parseFloat(document.getElementById("value").value) || 0;
        const unit = document.getElementById("unit").value;
        const bytes = value * units[unit];
        let html = "";
        for (const [key, factor] of Object.entries(units)) {
          const result = bytes / factor;
          const formatted =
            result < 0.0001
              ? result.toExponential(4)
              : result > 999999
                ? result.toExponential(4)
                : result.toLocaleString("zh-CN", { maximumFractionDigits: 6 });
          html += `<div class="result-item"><span class="result-label">${labels[key]}</span><span class="result-value">${formatted}</span></div>`;
        }
        document.getElementById("results").innerHTML = html;
      }
      document.getElementById("value").addEventListener("input", convert);
      document.getElementById("unit").addEventListener("change", convert);
      convert();
    </script>
