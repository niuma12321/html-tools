<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>用户名可用性检查 - WebUtils</title>
    <meta property="og:title" content="用户名可用性检查 - WebUtils" />
    <meta
      property="og:description"
      content="用户名可用性检查：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/social-media/username-checker.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/social-media/username-checker.html"
    />
    <meta name="description" content="模拟检查用户名在各社交平台的可用性" />
    <meta name="keywords" content="username 用户名 可用性 检查" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0, 245, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0, 245, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }
      .title-section {
        flex: 1;
      }
      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .title-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--accent-green), #34d399);
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: #fff;
      }
      .title-section .desc {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-top: 4px;
      }
      .main-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        flex: 1;
      }
      .notice {
        background: rgb(251, 191, 36, 0.1);
        border: 1px solid var(--accent-yellow);
        border-radius: var(--radius-md);
        padding: 12px 16px;
        margin-bottom: 20px;
        font-size: 0.85rem;
        color: var(--accent-yellow);
      }
      .input-section {
        margin-bottom: 20px;
      }
      .input-section label {
        display: block;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 8px;
      }
      .input-row {
        display: flex;
        gap: 12px;
      }
      input[type="text"] {
        flex: 1;
        padding: 14px 18px;
        font-family: var(--font-mono);
        font-size: 1rem;
        background: var(--bg-input);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-md);
        color: var(--color-text-primary);
        transition: all 0.2s;
      }
      input:focus {
        outline: none;
        border-color: var(--color-accent-cyan);
        box-shadow: 0 0 0 4px var(--glow-cyan);
      }
      input::placeholder {
        color: var(--text-muted);
      }
      button {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        padding: 14px 24px;
        background: var(--color-accent-cyan);
        border: none;
        border-radius: var(--radius-md);
        color: var(--color-bg-deep);
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      button:hover {
        background: #00dfc4;
        box-shadow: 0 0 20px var(--glow-cyan);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .validation-rules {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 12px;
        padding: 12px;
        background: var(--color-bg-surface);
        border-radius: var(--radius-md);
      }
      .rule {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.8rem;
        color: var(--text-muted);
      }
      .rule.valid {
        color: var(--accent-green);
      }
      .rule.invalid {
        color: var(--accent-red);
      }
      .rule-icon {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        background: var(--bg-input);
      }
      .rule.valid .rule-icon {
        background: var(--accent-green);
        color: #fff;
      }
      .rule.invalid .rule-icon {
        background: var(--accent-red);
        color: #fff;
      }
      .results-section {
        margin-top: 24px;
      }
      .results-label {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 16px;
      }
      .platform-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 12px;
      }
      .platform-card {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: all 0.2s;
      }
      .platform-card:hover {
        border-color: var(--border-strong);
      }
      .platform-card.checking {
        opacity: 0.7;
      }
      .platform-icon {
        width: 40px;
        height: 40px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #fff;
        flex-shrink: 0;
      }
      .platform-icon.twitter {
        background: #1da1f2;
      }
      .platform-icon.instagram {
        background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      }
      .platform-icon.tiktok {
        background: #000;
      }
      .platform-icon.youtube {
        background: #f00;
      }
      .platform-icon.github {
        background: #333;
      }
      .platform-icon.linkedin {
        background: #0a66c2;
      }
      .platform-icon.weibo {
        background: #e6162d;
      }
      .platform-icon.xiaohongshu {
        background: #fe2c55;
      }
      .platform-info {
        flex: 1;
        min-width: 0;
      }
      .platform-name {
        font-family: var(--font-mono);
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--color-text-primary);
        margin-bottom: 4px;
      }
      .platform-status {
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .platform-status.available {
        color: var(--accent-green);
      }
      .platform-status.taken {
        color: var(--accent-red);
      }
      .platform-status.checking {
        color: var(--text-muted);
      }
      .platform-status.unknown {
        color: var(--accent-yellow);
      }
      .platform-link {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--color-accent-cyan);
        text-decoration: none;
        padding: 6px 10px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        transition: all 0.2s;
      }
      .platform-link:hover {
        border-color: var(--color-accent-cyan);
        background: var(--glow-cyan);
      }
      .status {
        font-family: var(--font-mono);
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 16px;
      }
      .status.success {
        color: var(--accent-green);
      }
      .status.error {
        color: var(--accent-red);
      }
      footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
      }
      footer p {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      footer a {
        color: var(--color-accent-cyan);
        text-decoration: none;
      }
      footer a:hover {
        color: var(--color-text-primary);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .checking-animation {
        animation: pulse 1s infinite;
      }
      @media (max-width: 640px) {
        .container {
          padding: 16px;
        }
        .header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
        .input-row {
          flex-direction: column;
        }
        .platform-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>

    <div class="container">
      <div class="header">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../index.html">首页</a>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-current">用户名可用性检查</span>
        </nav>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        <div class="title-section">
          <h1>
            <span class="title-icon">@</span>
            用户名可用性检查
          </h1>
          <p class="desc">模拟检查用户名在各社交平台的可用性（演示功能）</p>
        </div>
      </div>

      <div class="main-card">
        <div class="notice">
          注意：此工具为模拟演示，使用随机算法生成结果。实际可用性请到各平台官方网站验证。
        </div>

        <div class="input-section">
          <label>输入用户名</label>
          <div class="input-row">
            <input type="text" id="username" placeholder="例如: cooluser123" />
            <button id="btnCheck">检查可用性</button>
          </div>
          <div class="validation-rules" id="validationRules">
            <div class="rule" id="ruleLength">
              <span class="rule-icon">?</span>
              <span>3-20 个字符</span>
            </div>
            <div class="rule" id="ruleStart">
              <span class="rule-icon">?</span>
              <span>以字母开头</span>
            </div>
            <div class="rule" id="ruleChars">
              <span class="rule-icon">?</span>
              <span>仅字母、数字、下划线</span>
            </div>
            <div class="rule" id="ruleEnd">
              <span class="rule-icon">?</span>
              <span>不以下划线结尾</span>
            </div>
          </div>
        </div>

        <div class="results-section">
          <div class="results-label">各平台检查结果</div>
          <div class="platform-grid" id="platformGrid"></div>
        </div>

        <div id="status" class="status"></div>
      </div>

      <footer>
        <p>
          <a href="https://github.com/nicogong/html-tools" target="_blank" rel="noreferrer">
            GitHub
          </a>
          <span>·</span>
          <span>纯前端 · 无服务器</span>
          <span>·</span>
          <a href="../../index.html">WebUtils</a>
        </p>
      </footer>
    </div>

    <script>
      const usernameEl = document.getElementById("username");
      const platformGridEl = document.getElementById("platformGrid");
      const statusEl = document.getElementById("status");
      const btnCheckEl = document.getElementById("btnCheck");

      const LS_KEY = "username_checker_v1";

      const platforms = [
        {
          id: "twitter",
          name: "Twitter/X",
          icon: "𝕏",
          urlTemplate: "https://twitter.com/{username}"
        },
        {
          id: "instagram",
          name: "Instagram",
          icon: "📷",
          urlTemplate: "https://instagram.com/{username}"
        },
        { id: "tiktok", name: "TikTok", icon: "🎵", urlTemplate: "https://tiktok.com/@{username}" },
        {
          id: "youtube",
          name: "YouTube",
          icon: "▶️",
          urlTemplate: "https://youtube.com/@{username}"
        },
        { id: "github", name: "GitHub", icon: "🐙", urlTemplate: "https://github.com/{username}" },
        {
          id: "linkedin",
          name: "LinkedIn",
          icon: "💼",
          urlTemplate: "https://linkedin.com/in/{username}"
        },
        { id: "weibo", name: "微博", icon: "🔴", urlTemplate: "https://weibo.com/{username}" },
        { id: "xiaohongshu", name: "小红书", icon: "📕", urlTemplate: "#" }
      ];

      function validateUsername(username) {
        const rules = {
          length: username.length >= 3 && username.length <= 20,
          start: /^[a-zA-Z]/.test(username),
          chars: /^[a-zA-Z0-9_]+$/.test(username),
          end: !username.endsWith("_")
        };

        updateRuleDisplay("ruleLength", rules.length);
        updateRuleDisplay("ruleStart", rules.start);
        updateRuleDisplay("ruleChars", rules.chars);
        updateRuleDisplay("ruleEnd", rules.end);

        return rules.length && rules.start && rules.chars && rules.end;
      }

      function updateRuleDisplay(ruleId, isValid) {
        const rule = document.getElementById(ruleId);
        rule.className = "rule " + (isValid ? "valid" : "invalid");
        const icon = rule.querySelector(".rule-icon");
        icon.textContent = isValid ? "✓" : "✗";
      }

      function resetRules() {
        const ruleIds = ["ruleLength", "ruleStart", "ruleChars", "ruleEnd"];
        for (const id of ruleIds) {
          const rule = document.getElementById(id);
          rule.className = "rule";
          rule.querySelector(".rule-icon").textContent = "?";
        }
      }

      function checkUsername() {
        const username = usernameEl.value.trim().toLowerCase();

        if (!username) {
          showStatus("请输入用户名", "error");
          return;
        }

        if (!validateUsername(username)) {
          showStatus("用户名格式不正确", "error");
          return;
        }

        btnCheckEl.disabled = true;
        showStatus("正在检查...", "");

        renderPlatforms(username, true);

        // Simulate async checking
        let checked = 0;
        for (const platform of platforms) {
          const delay = 300 + Math.random() * 700;
          setTimeout(function () {
            updatePlatformStatus(platform.id, username);
            checked++;
            if (checked === platforms.length) {
              btnCheckEl.disabled = false;
              showStatus("检查完成", "success");
              saveToStorage();
            }
          }, delay);
        }
      }

      function renderPlatforms(username, checking) {
        platformGridEl.textContent = "";

        for (const platform of platforms) {
          const card = document.createElement("div");
          card.className = "platform-card" + (checking ? " checking" : "");
          card.id = "card-" + platform.id;

          const icon = document.createElement("div");
          icon.className = "platform-icon " + platform.id;
          icon.textContent = platform.icon;

          const info = document.createElement("div");
          info.className = "platform-info";

          const name = document.createElement("div");
          name.className = "platform-name";
          name.textContent = platform.name;

          const status = document.createElement("div");
          status.className = "platform-status checking checking-animation";
          status.id = "status-" + platform.id;
          status.textContent = "检查中...";

          info.appendChild(name);
          info.appendChild(status);

          const link = document.createElement("a");
          link.className = "platform-link";
          link.textContent = "访问";
          link.href = platform.urlTemplate.replace("{username}", username);
          link.target = "_blank";
          link.rel = "noreferrer";

          card.appendChild(icon);
          card.appendChild(info);
          card.appendChild(link);
          platformGridEl.appendChild(card);
        }
      }

      function updatePlatformStatus(platformId, username) {
        const statusEl = document.getElementById("status-" + platformId);
        const card = document.getElementById("card-" + platformId);

        if (!statusEl || !card) return;

        card.classList.remove("checking");
        statusEl.classList.remove("checking-animation");

        // Simulate availability based on username hash
        const hash = simpleHash(username + platformId);
        const isAvailable = hash % 100 > 40; // 60% chance available

        statusEl.className = "platform-status " + (isAvailable ? "available" : "taken");
        statusEl.textContent = isAvailable ? "✓ 可能可用" : "✗ 可能已被占用";
      }

      function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          const char = str.charCodeAt(i);
          hash = (hash << 5) - hash + char;
          hash = hash & hash;
        }
        return Math.abs(hash);
      }

      function showStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      function saveToStorage() {
        localStorage.setItem(LS_KEY, usernameEl.value);
      }

      function loadFromStorage() {
        const saved = localStorage.getItem(LS_KEY);
        if (saved) {
          usernameEl.value = saved;
        }
      }

      btnCheckEl.addEventListener("click", checkUsername);

      usernameEl.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          checkUsername();
        }
      });

      usernameEl.addEventListener("input", function () {
        const username = usernameEl.value.trim();
        if (username) {
          validateUsername(username);
        } else {
          resetRules();
        }
      });

      loadFromStorage();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
