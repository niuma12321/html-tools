<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>每日正能量 - WebUtils</title>
    <meta property="og:title" content="每日正能量 - WebUtils" />
    <meta property="og:description" content="每日正能量：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/lifestyle/daily-affirmation.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="每日正能量语录，积极心理暗示，提升心理健康" />
    <meta name="keywords" content="正能量 心理 暗示 励志 语录 affirmation positive motivation" />
    <meta name="author" content="WebUtils" />
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/lifestyle/daily-affirmation.html"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 700px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        position: fixed;
        top: 1rem;
        left: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        z-index: 100;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      .affirmation-card {
        background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(157, 78, 221, 0.1));
        border: 3px solid var(--accent-pink);
        border-radius: var(--radius-lg);
        padding: 3rem 2rem;
        text-align: center;
        margin-bottom: 2rem;
        animation: fade-in 0.5s ease;
      }
      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .affirmation-icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
      }
      .affirmation-text {
        font-size: 1.8rem;
        font-weight: 600;
        line-height: 1.6;
        color: var(--color-text-primary);
        margin-bottom: 1rem;
      }
      .affirmation-category {
        font-size: 0.9rem;
        color: var(--accent-pink);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 2rem;
      }
      .controls {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 2rem;
      }
      .btn {
        padding: 1rem 2rem;
        border: 2px solid;
        border-radius: var(--radius-md);
        font-family: inherit;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-primary {
        background: var(--accent-pink);
        border-color: var(--accent-pink);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--color-accent-purple);
        border-color: var(--color-accent-purple);
      }
      .btn-secondary {
        background: transparent;
        border-color: var(--border-subtle);
        color: var(--color-text-primary);
      }
      .btn-secondary:hover {
        border-color: var(--color-accent-cyan);
      }
      .categories {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .category-btn {
        padding: 0.5rem 1rem;
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--color-bg-card);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        font-size: 0.85rem;
      }
      .category-btn:hover {
        border-color: var(--color-accent-cyan);
      }
      .category-btn.active {
        background: var(--color-accent-cyan);
        border-color: var(--color-accent-cyan);
        color: #000;
      }
      footer {
        margin-top: auto;
        padding-top: 1.5rem;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
      @media (max-width: 600px) {
        .affirmation-text {
          font-size: 1.4rem;
        }
        .affirmation-icon {
          font-size: 3rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span class="breadcrumb-separator">/</span>
      <a href="../../index.html#lifestyle">生活工具</a>
      <span class="breadcrumb-separator">/</span>
      <span class="breadcrumb-current">正能量</span>
    </nav>

    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

    <div class="container">
      <div class="affirmation-card" id="affirmationCard">
        <div class="affirmation-icon" id="icon">✨</div>
        <div class="affirmation-text" id="text">点击下方按钮获取正能量</div>
        <div class="affirmation-category" id="category">DAILY AFFIRMATION</div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" onclick="getAffirmation()">获取正能量</button>
        <button class="btn btn-secondary" onclick="copyText()">复制</button>
      </div>

      <div class="categories">
        <button class="category-btn active" data-category="all" onclick="setCategory('all')">
          全部
        </button>
        <button class="category-btn" data-category="confidence" onclick="setCategory('confidence')">
          自信
        </button>
        <button class="category-btn" data-category="success" onclick="setCategory('success')">
          成功
        </button>
        <button class="category-btn" data-category="health" onclick="setCategory('health')">
          健康
        </button>
        <button class="category-btn" data-category="happiness" onclick="setCategory('happiness')">
          快乐
        </button>
        <button class="category-btn" data-category="peace" onclick="setCategory('peace')">
          平静
        </button>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const AFFIRMATIONS = {
        confidence: [
          { icon: "💪", text: "我相信自己的能力，能够克服任何挑战" },
          { icon: "⭐", text: "我值得拥有美好的事物和体验" },
          { icon: "🌟", text: "我的声音很重要，我的想法有价值" },
          { icon: "✨", text: "我每天都在进步，变得更好" },
          { icon: "🎯", text: "我有能力实现自己的目标" }
        ],
        success: [
          { icon: "🚀", text: "成功属于那些永不放弃的人，我就是其中之一" },
          { icon: "🎯", text: "我专注于目标，一步步走向成功" },
          { icon: "💎", text: "我创造自己的机会，抓住每一个可能" },
          { icon: "🏆", text: "我值得拥有成功和成就" },
          { icon: "🌈", text: "每一次努力都让我离成功更近一步" }
        ],
        health: [
          { icon: "💚", text: "我的身体强壮健康，充满活力" },
          { icon: "🍃", text: "我每天都在滋养我的身心灵" },
          { icon: "🧘", text: "我倾听身体的需求，给予它应有的关爱" },
          { icon: "✨", text: "健康是我的自然状态" },
          { icon: "🌿", text: "我选择对身体有益的食物和习惯" }
        ],
        happiness: [
          { icon: "😊", text: "快乐是我的选择，我选择快乐" },
          { icon: "🌸", text: "我感激生活中的每一个美好瞬间" },
          { icon: "☀️", text: "我的笑容能照亮他人的一天" },
          { icon: "🎉", text: "我值得感受纯粹的喜悦" },
          { icon: "💝", text: "我周围充满了爱与快乐" }
        ],
        peace: [
          { icon: "🕊️", text: "我内心平静，能够从容应对一切" },
          { icon: "🌊", text: "我放下担忧，活在当下" },
          { icon: "🌙", text: "平静是我的力量源泉" },
          { icon: "🧘", text: "我呼吸着平静，呼出焦虑" },
          { icon: "🌌", text: "我信任生活的进程，一切都会好起来" }
        ]
      };

      let currentCategory = "all";
      let lastAffirmation = null;

      function getAllAffirmations() {
        if (currentCategory === "all") {
          return Object.values(AFFIRMATIONS).flat();
        }
        return AFFIRMATIONS[currentCategory] || [];
      }

      function getAffirmation() {
        const affirmations = getAllAffirmations();

        // Get a different affirmation from last time
        let affirmation;
        do {
          affirmation = affirmations[Math.floor(Math.random() * affirmations.length)];
        } while (affirmations.length > 1 && affirmation === lastAffirmation);

        lastAffirmation = affirmation;

        const categoryName =
          currentCategory === "all"
            ? "正能量"
            : {
                confidence: "自信",
                success: "成功",
                health: "健康",
                happiness: "快乐",
                peace: "平静"
              }[currentCategory];

        document.getElementById("icon").textContent = affirmation.icon;
        document.getElementById("text").textContent = affirmation.text;
        document.getElementById("category").textContent = categoryName.toUpperCase();

        // Restart animation
        const card = document.getElementById("affirmationCard");
        card.style.animation = "none";
        setTimeout(() => (card.style.animation = ""), 10);
      }

      function setCategory(category) {
        currentCategory = category;
        document.querySelectorAll(".category-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.category === category);
        });
        getAffirmation();
      }

      function copyText() {
        const text = document.getElementById("text").textContent;
        navigator.clipboard.writeText(text).then(() => {
          const btn = event.target;
          const original = btn.textContent;
          btn.textContent = "已复制！";
          setTimeout(() => (btn.textContent = original), 2000);
        });
      }

      // Auto-show affirmation on load
      setTimeout(() => getAffirmation(), 500);

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
