<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>利润率计算器 - WebUtils</title>
    <meta
      name="description"
      content="在线计算毛利率、净利率等利润指标，帮助企业分析盈利能力和经营效率"
    />
    <meta name="keywords" content="利润率, 毛利率, 净利率, 盈利分析, 财务指标, 企业盈利" />
    <meta property="og:title" content="利润率计算器 - WebUtils" />
    <meta
      property="og:description"
      content="在线计算毛利率、净利率等利润指标，帮助企业分析盈利能力和经营效率"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/business/profit-margin.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/business/profit-margin.html" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
        font-size: 0.9rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 1.8rem;
      }
      .subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card-title {
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1rem;
      }
      input:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
      }
      .result-item {
        background: var(--bg-deep);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
      }
      .result-icon {
        font-size: 2rem;
        margin-bottom: 8px;
      }
      .result-label {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .result-value {
        font-size: 1.8rem;
        font-weight: 700;
      }
      .result-value.green {
        color: var(--accent-green);
      }
      .result-value.red {
        color: var(--accent-red);
      }
      .result-value.orange {
        color: var(--orange);
      }
      .gauge-container {
        margin: 20px 0;
        text-align: center;
      }
      .gauge {
        width: 200px;
        height: 100px;
        margin: 0 auto;
        position: relative;
        overflow: hidden;
      }
      .gauge-bg {
        width: 200px;
        height: 100px;
        border-radius: 100px 100px 0 0;
        background: var(--border-subtle);
        position: absolute;
      }
      .gauge-fill {
        width: 200px;
        height: 100px;
        border-radius: 100px 100px 0 0;
        background: linear-gradient(90deg, var(--accent-red), var(--orange), var(--accent-green));
        position: absolute;
        transform-origin: bottom center;
        transform: rotate(-90deg);
        transition: transform 0.5s;
      }
      .gauge-cover {
        width: 160px;
        height: 80px;
        border-radius: 80px 80px 0 0;
        background: var(--bg-card);
        position: absolute;
        top: 20px;
        left: 20px;
      }
      .gauge-value {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.5rem;
        font-weight: 700;
      }
      .formula-box {
        background: var(--bg-deep);
        border-radius: 8px;
        padding: 16px;
        margin-top: 16px;
      }
      .formula-title {
        font-size: 0.9rem;
        color: var(--accent-cyan);
        margin-bottom: 8px;
      }
      .formula {
        font-family: var(--font-mono);
        color: var(--text-secondary);
        line-height: 1.8;
      }
      .hidden {
        display: none;
      }
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
        🌓
      </button>
      <h1>📊 利润率计算器</h1>
      <p class="subtitle">计算毛利率、净利率等关键盈利指标</p>

      <div class="card">
        <div class="card-title">💰 收入信息</div>
        <div class="grid">
          <div class="form-group">
            <label for="input---------">销售收入 (元)</label>
            <input
              type="number"
              id="revenue"
              value="100000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">销售成本 (元)</label>
            <input
              type="number"
              id="cogs"
              value="60000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📋 运营费用</div>
        <div class="grid">
          <div class="form-group">
            <label for="input---------">管理费用 (元)</label>
            <input
              type="number"
              id="adminExpense"
              value="10000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">销售费用 (元)</label>
            <input
              type="number"
              id="salesExpense"
              value="8000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">财务费用 (元)</label>
            <input
              type="number"
              id="financeExpense"
              value="2000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-------">税费 (元)</label>
            <input
              type="number"
              id="tax"
              value="5000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <button class="btn btn-primary" onclick="calculate()" aria-label="计算利润率">
          计算利润率
        </button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="card">
          <div class="card-title">📈 利润分析</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-icon">💵</div>
              <div class="result-label">毛利润</div>
              <div class="result-value green" id="grossProfit"></div>
            </div>
            <div class="result-item">
              <div class="result-icon">📊</div>
              <div class="result-label">毛利率</div>
              <div class="result-value" id="grossMargin"></div>
            </div>
            <div class="result-item">
              <div class="result-icon">💰</div>
              <div class="result-label">营业利润</div>
              <div class="result-value" id="operatingProfit"></div>
            </div>
            <div class="result-item">
              <div class="result-icon">📈</div>
              <div class="result-label">营业利润率</div>
              <div class="result-value" id="operatingMargin"></div>
            </div>
            <div class="result-item">
              <div class="result-icon">🏆</div>
              <div class="result-label">净利润</div>
              <div class="result-value" id="netProfit"></div>
            </div>
            <div class="result-item">
              <div class="result-icon">⭐</div>
              <div class="result-label">净利率</div>
              <div class="result-value" id="netMargin"></div>
            </div>
          </div>

          <div class="gauge-container">
            <p style="color: var(--text-secondary); margin-bottom: 10px">净利率健康度</p>
            <div class="gauge">
              <div class="gauge-bg"></div>
              <div class="gauge-fill" id="gaugeFill"></div>
              <div class="gauge-cover"></div>
              <div class="gauge-value" id="gaugeValue"></div>
            </div>
          </div>

          <div class="formula-box">
            <div class="formula-title">计算公式</div>
            <div class="formula">
              毛利润 = 销售收入 - 销售成本
              <br />
              毛利率 = 毛利润 / 销售收入 × 100%
              <br />
              营业利润 = 毛利润 - 管理费用 - 销售费用 - 财务费用
              <br />
              净利润 = 营业利润 - 税费
              <br />
              净利率 = 净利润 / 销售收入 × 100%
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function toggleTheme() {
        var theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      }
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved) {
          document.body.setAttribute("data-theme", saved);
        } else if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      function formatMoney(num) {
        if (Math.abs(num) >= 10000) {
          return (num / 10000).toFixed(2) + "万";
        }
        return num.toFixed(2) + "元";
      }

      function getMarginColor(margin) {
        if (margin >= 20) return "green";
        if (margin >= 10) return "orange";
        return "red";
      }

      function calculate() {
        var revenue = parseFloat(document.getElementById("revenue").value) || 0;
        var cogs = parseFloat(document.getElementById("cogs").value) || 0;
        var adminExpense = parseFloat(document.getElementById("adminExpense").value) || 0;
        var salesExpense = parseFloat(document.getElementById("salesExpense").value) || 0;
        var financeExpense = parseFloat(document.getElementById("financeExpense").value) || 0;
        var tax = parseFloat(document.getElementById("tax").value) || 0;

        var grossProfit = revenue - cogs;
        var grossMargin = revenue > 0 ? (grossProfit / revenue) * 100 : 0;
        var operatingExpenses = adminExpense + salesExpense + financeExpense;
        var operatingProfit = grossProfit - operatingExpenses;
        var operatingMargin = revenue > 0 ? (operatingProfit / revenue) * 100 : 0;
        var netProfit = operatingProfit - tax;
        var netMargin = revenue > 0 ? (netProfit / revenue) * 100 : 0;

        document.getElementById("resultSection").classList.remove("hidden");

        var grossProfitEl = document.getElementById("grossProfit");
        grossProfitEl.textContent = formatMoney(grossProfit);
        grossProfitEl.className = "result-value " + (grossProfit >= 0 ? "green" : "red");

        var grossMarginEl = document.getElementById("grossMargin");
        grossMarginEl.textContent = grossMargin.toFixed(2) + "%";
        grossMarginEl.className = "result-value " + getMarginColor(grossMargin);

        var operatingProfitEl = document.getElementById("operatingProfit");
        operatingProfitEl.textContent = formatMoney(operatingProfit);
        operatingProfitEl.className = "result-value " + (operatingProfit >= 0 ? "green" : "red");

        var operatingMarginEl = document.getElementById("operatingMargin");
        operatingMarginEl.textContent = operatingMargin.toFixed(2) + "%";
        operatingMarginEl.className = "result-value " + getMarginColor(operatingMargin);

        var netProfitEl = document.getElementById("netProfit");
        netProfitEl.textContent = formatMoney(netProfit);
        netProfitEl.className = "result-value " + (netProfit >= 0 ? "green" : "red");

        var netMarginEl = document.getElementById("netMargin");
        netMarginEl.textContent = netMargin.toFixed(2) + "%";
        netMarginEl.className = "result-value " + getMarginColor(netMargin);

        // 更新仪表盘
        var gaugeRotation = (Math.min(Math.max(netMargin, -10), 30) / 40) * 180 - 90;
        document.getElementById("gaugeFill").style.transform = "rotate(" + gaugeRotation + "deg)";
        document.getElementById("gaugeValue").textContent = netMargin.toFixed(1) + "%";
      }

      calculate();
    </script>
  </body>
</html>
