  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
        🌓
      </button>
      <h1>📉 固定资产折旧计算器</h1>
      <p class="subtitle">计算固定资产的年度折旧和净值变化</p>

      <div class="card">
        <div class="card-title">🏭 资产信息</div>
        <div class="grid">
          <div class="form-group">
            <label for="input---------">资产原值 (元)</label>
            <input
              type="number"
              id="originalValue"
              value="100000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">预计残值 (元)</label>
            <input
              type="number"
              id="salvageValue"
              value="5000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">使用年限 (年)</label>
            <input
              type="number"
              id="usefulLife"
              value="5"
              min="1"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label>折旧方法</label>
            <select id="method">
              <option value="straight">直线法（平均年限法）</option>
              <option value="doubleDecline">双倍余额递减法</option>
              <option value="sumOfYears">年数总和法</option>
              <option value="units">工作量法</option>
            </select>
          </div>
        </div>
        <div class="form-group hidden" id="unitsGroup">
          <label for="input-------">预计总工作量</label>
          <input
            type="number"
            id="totalUnits"
            value="100000"
            min="1"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
        <button class="btn btn-primary" onclick="calculate()" aria-label="计算折旧">
          计算折旧
        </button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="card">
          <div class="card-title">📊 折旧概要</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">应计折旧总额</div>
              <div class="result-value" id="totalDepreciation"></div>
            </div>
            <div class="result-item">
              <div class="result-label">年均折旧额</div>
              <div class="result-value" id="avgDepreciation"></div>
            </div>
            <div class="result-item">
              <div class="result-label">月均折旧额</div>
              <div class="result-value" id="monthlyDepreciation"></div>
            </div>
            <div class="result-item">
              <div class="result-label">折旧率</div>
              <div class="result-value" id="depreciationRate"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📅 年度折旧明细</div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>年份</th>
                  <th>年初净值</th>
                  <th>本年折旧</th>
                  <th>累计折旧</th>
                  <th>年末净值</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      function toggleTheme() {
        var theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      }
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved) {
          document.body.setAttribute("data-theme", saved);
        } else if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      document.getElementById("method").addEventListener("change", function () {
        document.getElementById("unitsGroup").classList.toggle("hidden", this.value !== "units");
      });

      function formatMoney(num) {
        if (Math.abs(num) >= 10000) {
          return (num / 10000).toFixed(2) + "万";
        }
        return num.toFixed(2) + "元";
      }

      function calculate() {
        var originalValue = parseFloat(document.getElementById("originalValue").value) || 0;
        var salvageValue = parseFloat(document.getElementById("salvageValue").value) || 0;
        var usefulLife = parseInt(document.getElementById("usefulLife").value) || 1;
        var method = document.getElementById("method").value;

        var depreciableAmount = originalValue - salvageValue;
        var schedule = [];
        var netValue = originalValue;
        var cumulative = 0;

        for (var year = 1; year <= usefulLife; year++) {
          var depreciation = 0;

          switch (method) {
            case "straight":
              depreciation = depreciableAmount / usefulLife;
              break;
            case "doubleDecline":
              var rate = 2 / usefulLife;
              if (year <= usefulLife - 2) {
                depreciation = netValue * rate;
              } else {
                depreciation = (netValue - salvageValue) / (usefulLife - year + 1);
              }
              break;
            case "sumOfYears":
              var sumOfYears = (usefulLife * (usefulLife + 1)) / 2;
              var factor = (usefulLife - year + 1) / sumOfYears;
              depreciation = depreciableAmount * factor;
              break;
            case "units":
              depreciation = depreciableAmount / usefulLife;
              break;
          }

          depreciation = Math.min(depreciation, netValue - salvageValue);
          cumulative += depreciation;
          var endNetValue = originalValue - cumulative;

          schedule.push({
            year: year,
            startValue: netValue,
            depreciation: depreciation,
            cumulative: cumulative,
            endValue: endNetValue
          });

          netValue = endNetValue;
        }

        document.getElementById("resultSection").classList.remove("hidden");

        document.getElementById("totalDepreciation").textContent = formatMoney(depreciableAmount);
        document.getElementById("avgDepreciation").textContent = formatMoney(
          depreciableAmount / usefulLife
        );
        document.getElementById("monthlyDepreciation").textContent = formatMoney(
          depreciableAmount / usefulLife / 12
        );
        document.getElementById("depreciationRate").textContent =
          ((depreciableAmount / usefulLife / originalValue) * 100).toFixed(2) + "%";

        var tbody = document.getElementById("tableBody");
        while (tbody.firstChild) {
          tbody.removeChild(tbody.firstChild);
        }

        schedule.forEach(function (row) {
          var tr = document.createElement("tr");

          var cells = [
            "第" + row.year + "年",
            formatMoney(row.startValue),
            formatMoney(row.depreciation),
            formatMoney(row.cumulative),
            formatMoney(row.endValue)
          ];

          cells.forEach(function (text) {
            var td = document.createElement("td");
            td.textContent = text;
            tr.appendChild(td);
          });

          tbody.appendChild(tr);
        });
      }

      calculate();
    </script>
