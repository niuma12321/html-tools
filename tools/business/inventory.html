  <head>

    <meta

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
        font-size: 0.9rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 1.8rem;
      }
      .subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card-title {
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1rem;
      }
      input:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      }
      .highlight {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        border-radius: 12px;
        padding: 24px;
        color: white;
        text-align: center;
        margin-bottom: 16px;
      }
      .highlight-label {
        font-size: 0.9rem;
        opacity: 0.9;
        margin-bottom: 8px;
      }
      .highlight-value {
        font-size: 2.5rem;
        font-weight: 700;
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
      }
      .result-item {
        background: var(--bg-deep);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .result-label {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .result-value {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--accent-cyan);
      }
      .result-value.green {
        color: var(--accent-green);
      }
      .result-value.orange {
        color: var(--orange);
      }
      .result-value.red {
        color: var(--accent-red);
      }
      .assessment {
        padding: 16px;
        border-radius: 12px;
        text-align: center;
        margin-top: 16px;
      }
      .assessment.good {
        background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.1));
        border: 2px solid var(--accent-green);
      }
      .assessment.warning {
        background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.1));
        border: 2px solid var(--orange);
      }
      .assessment.bad {
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));
        border: 2px solid var(--accent-red);
      }
      .assessment-icon {
        font-size: 2rem;
        margin-bottom: 8px;
      }
      .assessment-text {
        font-weight: 600;
      }
      .hidden {
        display: none;
      }
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
        🌓
      </button>
      <h1>📦 库存周转计算器</h1>
      <p class="subtitle">分析库存效率，优化资金占用</p>

      <div class="card">
        <div class="card-title">📊 库存数据</div>
        <div class="grid">
          <div class="form-group">
            <label for="input--------------">销售成本/出库成本 (元)</label>
            <input
              type="number"
              id="cogs"
              value="1000000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">期初库存 (元)</label>
            <input
              type="number"
              id="openingInventory"
              value="200000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">期末库存 (元)</label>
            <input
              type="number"
              id="closingInventory"
              value="300000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">分析周期 (天)</label>
            <input
              type="number"
              id="period"
              value="365"
              min="1"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <button class="btn btn-primary" onclick="calculate()" aria-label="计算周转率">
          计算周转率
        </button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="highlight">
          <div class="highlight-label">库存周转率</div>
          <div class="highlight-value" id="turnoverRate"></div>
        </div>

        <div class="card">
          <div class="card-title">📈 分析结果</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">平均库存</div>
              <div class="result-value" id="avgInventory"></div>
            </div>
            <div class="result-item">
              <div class="result-label">周转天数</div>
              <div class="result-value" id="turnoverDays"></div>
            </div>
            <div class="result-item">
              <div class="result-label">日均销售</div>
              <div class="result-value" id="dailySales"></div>
            </div>
            <div class="result-item">
              <div class="result-label">库存可供天数</div>
              <div class="result-value" id="daysOfSupply"></div>
            </div>
          </div>

          <div class="assessment" id="assessment">
            <div class="assessment-icon" id="assessmentIcon"></div>
            <div class="assessment-text" id="assessmentText"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function toggleTheme() {
        var theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      }
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved) {
          document.body.setAttribute("data-theme", saved);
        } else if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      function formatMoney(num) {
        if (Math.abs(num) >= 10000) {
          return (num / 10000).toFixed(2) + "万";
        }
        return num.toFixed(0) + "元";
      }

      function calculate() {
        var cogs = parseFloat(document.getElementById("cogs").value) || 0;
        var openingInventory = parseFloat(document.getElementById("openingInventory").value) || 0;
        var closingInventory = parseFloat(document.getElementById("closingInventory").value) || 0;
        var period = parseInt(document.getElementById("period").value) || 365;

        var avgInventory = (openingInventory + closingInventory) / 2;
        var turnoverRate = avgInventory > 0 ? cogs / avgInventory : 0;
        var turnoverDays = turnoverRate > 0 ? period / turnoverRate : 0;
        var dailySales = cogs / period;
        var daysOfSupply = dailySales > 0 ? closingInventory / dailySales : 0;

        document.getElementById("resultSection").classList.remove("hidden");

        document.getElementById("turnoverRate").textContent = turnoverRate.toFixed(2) + "次";
        document.getElementById("avgInventory").textContent = formatMoney(avgInventory);
        document.getElementById("turnoverDays").textContent = turnoverDays.toFixed(1) + "天";
        document.getElementById("dailySales").textContent = formatMoney(dailySales);
        document.getElementById("daysOfSupply").textContent = daysOfSupply.toFixed(1) + "天";

        var assessment = document.getElementById("assessment");
        var assessmentIcon = document.getElementById("assessmentIcon");
        var assessmentText = document.getElementById("assessmentText");

        if (turnoverRate >= 12) {
          assessment.className = "assessment good";
          assessmentIcon.textContent = "🚀";
          assessmentText.textContent = "优秀：库存周转快，资金利用效率高";
        } else if (turnoverRate >= 6) {
          assessment.className = "assessment good";
          assessmentIcon.textContent = "✅";
          assessmentText.textContent = "良好：库存周转正常，建议持续优化";
        } else if (turnoverRate >= 3) {
          assessment.className = "assessment warning";
          assessmentIcon.textContent = "⚠️";
          assessmentText.textContent = "一般：库存周转偏慢，建议优化采购和销售策略";
        } else {
          assessment.className = "assessment bad";
          assessmentIcon.textContent = "❌";
          assessmentText.textContent = "较差：库存积压严重，需要及时处理滞销品";
        }
      }

      calculate();
    </script>
  </body>
</html>
