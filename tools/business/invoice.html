<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>发票计算器 - WebUtils</title>
    <meta
      name="description"
      content="在线计算发票金额和税额，支持增值税普票和专票计算，帮助企业财务快速核算"
    />
    <meta name="keywords" content="发票计算, 增值税, 税额计算, 发票金额, 财务计算, 税务工具" />
    <meta property="og:title" content="发票计算器 - WebUtils" />
    <meta
      property="og:description"
      content="在线计算发票金额和税额，支持增值税普票和专票计算，帮助企业财务快速核算"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tools.realtime-ai.chat/tools/business/invoice.html" />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/business/invoice.html" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
        font-size: 0.9rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 1.8rem;
      }
      .subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card-title {
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1rem;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .tab {
        flex: 1;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-deep);
        color: var(--text-primary);
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
      }
      .tab.active {
        border-color: var(--accent-cyan);
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
        color: var(--accent-cyan);
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .result-item {
        background: var(--bg-deep);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
      }
      .result-label {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .result-value {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent-cyan);
      }
      .tax-rates {
        margin-top: 16px;
        padding: 16px;
        background: var(--bg-deep);
        border-radius: 8px;
      }
      .tax-rates-title {
        font-weight: 600;
        margin-bottom: 12px;
      }
      .rate-item {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid var(--border-subtle);
        font-size: 0.9rem;
      }
      .rate-item:last-child {
        border-bottom: none;
      }
      .hidden {
        display: none;
      }
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
        🌓
      </button>
      <h1>🧾 发票计算器</h1>
      <p class="subtitle">计算含税价、不含税价和税额</p>

      <div class="card">
        <div class="card-title">💰 计算方式</div>
        <div class="tabs">
          <div class="tab active" onclick="switchMode('withTax')">已知含税价</div>
          <div class="tab" onclick="switchMode('withoutTax')">已知不含税价</div>
        </div>

        <div class="grid">
          <div class="form-group" id="withTaxInput">
            <label for="input---------">含税金额 (元)</label>
            <input
              type="number"
              id="amountWithTax"
              value="11300"
              min="0"
              step="0.01"
              oninput="calculate()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group hidden" id="withoutTaxInput">
            <label for="input----------">不含税金额 (元)</label>
            <input
              type="number"
              id="amountWithoutTax"
              value="10000"
              min="0"
              step="0.01"
              oninput="calculate()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label>税率</label>
            <select id="taxRate" onchange="calculate()">
              <option value="0.13">13% (一般商品)</option>
              <option value="0.09">9% (农产品/运输)</option>
              <option value="0.06">6% (服务业)</option>
              <option value="0.05">5% (简易征收)</option>
              <option value="0.03">3% (小规模)</option>
              <option value="0.01">1% (优惠税率)</option>
              <option value="0">0% (免税)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📊 计算结果</div>
        <div class="result-grid">
          <div class="result-item">
            <div class="result-label">不含税金额</div>
            <div class="result-value" id="resultWithoutTax"></div>
          </div>
          <div class="result-item">
            <div class="result-label">税额</div>
            <div class="result-value" id="resultTax"></div>
          </div>
          <div class="result-item">
            <div class="result-label">含税金额</div>
            <div class="result-value" id="resultWithTax"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="tax-rates">
          <div class="tax-rates-title">📋 常用税率说明</div>
          <div class="rate-item">
            <span>13%</span>
            <span>一般货物、有形动产租赁</span>
          </div>
          <div class="rate-item">
            <span>9%</span>
            <span>农产品、交通运输、建筑服务、不动产租赁</span>
          </div>
          <div class="rate-item">
            <span>6%</span>
            <span>现代服务、生活服务、金融服务</span>
          </div>
          <div class="rate-item">
            <span>5%</span>
            <span>不动产销售（简易征收）</span>
          </div>
          <div class="rate-item">
            <span>3%</span>
            <span>小规模纳税人</span>
          </div>
          <div class="rate-item">
            <span>1%</span>
            <span>小规模纳税人优惠税率</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      function toggleTheme() {
        var theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      }
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved) {
          document.body.setAttribute("data-theme", saved);
        } else if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      var mode = "withTax";

      function switchMode(newMode) {
        mode = newMode;
        var tabs = document.querySelectorAll(".tab");
        tabs.forEach(function (tab, index) {
          tab.classList.remove("active");
          if ((newMode === "withTax" && index === 0) || (newMode === "withoutTax" && index === 1)) {
            tab.classList.add("active");
          }
        });

        document.getElementById("withTaxInput").classList.toggle("hidden", newMode !== "withTax");
        document
          .getElementById("withoutTaxInput")
          .classList.toggle("hidden", newMode !== "withoutTax");
        calculate();
      }

      function formatMoney(num) {
        return "¥" + num.toFixed(2);
      }

      function calculate() {
        var taxRate = parseFloat(document.getElementById("taxRate").value) || 0;
        var amountWithTax, amountWithoutTax, taxAmount;

        if (mode === "withTax") {
          amountWithTax = parseFloat(document.getElementById("amountWithTax").value) || 0;
          amountWithoutTax = amountWithTax / (1 + taxRate);
          taxAmount = amountWithTax - amountWithoutTax;
        } else {
          amountWithoutTax = parseFloat(document.getElementById("amountWithoutTax").value) || 0;
          taxAmount = amountWithoutTax * taxRate;
          amountWithTax = amountWithoutTax + taxAmount;
        }

        document.getElementById("resultWithoutTax").textContent = formatMoney(amountWithoutTax);
        document.getElementById("resultTax").textContent = formatMoney(taxAmount);
        document.getElementById("resultWithTax").textContent = formatMoney(amountWithTax);
      }

      calculate();
    </script>
  </body>
</html>
