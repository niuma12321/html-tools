<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工资计算器 - WebUtils</title>
    <meta
      name="description"
      content="在线计算工资薪酬，支持税前税后工资换算、五险一金计算，快速得出实发工资"
    />
    <meta name="keywords" content="工资计算, 薪酬计算, 税后工资, 五险一金, 个税计算, 实发工资" />
    <meta property="og:title" content="工资计算器 - WebUtils" />
    <meta
      property="og:description"
      content="在线计算工资薪酬，支持税前税后工资换算、五险一金计算，快速得出实发工资"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tools.realtime-ai.chat/tools/business/salary.html" />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/business/salary.html" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
        font-size: 0.9rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 1.8rem;
      }
      .subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card-title {
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1rem;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      }
      .highlight {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        border-radius: 12px;
        padding: 24px;
        color: white;
        text-align: center;
        margin-bottom: 16px;
      }
      .highlight-label {
        font-size: 0.9rem;
        opacity: 0.9;
        margin-bottom: 8px;
      }
      .highlight-value {
        font-size: 2.5rem;
        font-weight: 700;
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
      }
      .result-item {
        background: var(--bg-deep);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .result-label {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .result-value {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--accent-cyan);
      }
      .breakdown {
        margin-top: 16px;
      }
      .breakdown-item {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid var(--border-subtle);
      }
      .breakdown-item:last-child {
        border-bottom: none;
      }
      .breakdown-label {
        color: var(--text-secondary);
      }
      .breakdown-value {
        font-weight: 500;
      }
      .breakdown-value.deduct {
        color: var(--accent-red);
      }
      .hidden {
        display: none;
      }
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
        🌓
      </button>
      <h1>💰 工资计算器</h1>
      <p class="subtitle">计算五险一金和个税，得出实发工资</p>

      <div class="card">
        <div class="card-title">📋 基本信息</div>
        <div class="grid">
          <div class="form-group">
            <label for="input---------">税前月薪 (元)</label>
            <input
              type="number"
              id="grossSalary"
              value="15000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-----------">社保缴纳基数 (元)</label>
            <input
              type="number"
              id="socialBase"
              value="15000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input------------">公积金缴纳基数 (元)</label>
            <input
              type="number"
              id="fundBase"
              value="15000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input----------">公积金比例 (%)</label>
            <input
              type="number"
              id="fundRate"
              value="12"
              min="5"
              max="12"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🏠 专项附加扣除</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-----------">子女教育 (元/月)</label>
            <input
              type="number"
              id="childEducation"
              value="0"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-----------">继续教育 (元/月)</label>
            <input
              type="number"
              id="continuingEducation"
              value="0"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-------------">住房贷款利息 (元/月)</label>
            <input
              type="number"
              id="housingLoan"
              value="0"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-----------">住房租金 (元/月)</label>
            <input
              type="number"
              id="housingRent"
              value="0"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-----------">赡养老人 (元/月)</label>
            <input
              type="number"
              id="elderlySupport"
              value="0"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input------------">婴幼儿照护 (元/月)</label>
            <input
              type="number"
              id="babycare"
              value="0"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <button class="btn btn-primary" onclick="calculate()" aria-label="计算工资">
          计算工资
        </button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="highlight">
          <div class="highlight-label">实发工资</div>
          <div class="highlight-value" id="netSalary"></div>
        </div>

        <div class="card">
          <div class="card-title">📊 工资构成</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">五险个人</div>
              <div class="result-value" id="socialPersonal"></div>
            </div>
            <div class="result-item">
              <div class="result-label">公积金个人</div>
              <div class="result-value" id="fundPersonal"></div>
            </div>
            <div class="result-item">
              <div class="result-label">个人所得税</div>
              <div class="result-value" id="incomeTax"></div>
            </div>
            <div class="result-item">
              <div class="result-label">总扣除</div>
              <div class="result-value" id="totalDeduction"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📋 详细明细</div>
          <div class="breakdown">
            <div class="breakdown-item">
              <span class="breakdown-label">税前工资</span>
              <span class="breakdown-value" id="detailGross"></span>
            </div>
            <div class="breakdown-item">
              <span class="breakdown-label">养老保险 (8%)</span>
              <span class="breakdown-value deduct" id="detailPension"></span>
            </div>
            <div class="breakdown-item">
              <span class="breakdown-label">医疗保险 (2%)</span>
              <span class="breakdown-value deduct" id="detailMedical"></span>
            </div>
            <div class="breakdown-item">
              <span class="breakdown-label">失业保险 (0.5%)</span>
              <span class="breakdown-value deduct" id="detailUnemployment"></span>
            </div>
            <div class="breakdown-item">
              <span class="breakdown-label">住房公积金</span>
              <span class="breakdown-value deduct" id="detailFund"></span>
            </div>
            <div class="breakdown-item">
              <span class="breakdown-label">专项附加扣除</span>
              <span class="breakdown-value" id="detailSpecial"></span>
            </div>
            <div class="breakdown-item">
              <span class="breakdown-label">应纳税所得额</span>
              <span class="breakdown-value" id="detailTaxable"></span>
            </div>
            <div class="breakdown-item">
              <span class="breakdown-label">个人所得税</span>
              <span class="breakdown-value deduct" id="detailTax"></span>
            </div>
            <div class="breakdown-item" style="font-weight: 600">
              <span class="breakdown-label">实发工资</span>
              <span
                class="breakdown-value"
                style="color: var(--accent-green)"
                id="detailNet"
              ></span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">🏢 企业成本</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">五险企业</div>
              <div class="result-value" id="socialCompany"></div>
            </div>
            <div class="result-item">
              <div class="result-label">公积金企业</div>
              <div class="result-value" id="fundCompany"></div>
            </div>
            <div class="result-item">
              <div class="result-label">用工总成本</div>
              <div class="result-value" id="totalCost"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function toggleTheme() {
        var theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      }
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved) {
          document.body.setAttribute("data-theme", saved);
        } else if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      function formatMoney(num) {
        return num.toFixed(2) + "元";
      }

      function calculateTax(taxableIncome) {
        // 年度累计应纳税所得额对应税率（简化为月度计算）
        var monthlyTaxable = taxableIncome;
        var tax = 0;

        if (monthlyTaxable <= 0) {
          tax = 0;
        } else if (monthlyTaxable <= 3000) {
          tax = monthlyTaxable * 0.03;
        } else if (monthlyTaxable <= 12000) {
          tax = monthlyTaxable * 0.1 - 210;
        } else if (monthlyTaxable <= 25000) {
          tax = monthlyTaxable * 0.2 - 1410;
        } else if (monthlyTaxable <= 35000) {
          tax = monthlyTaxable * 0.25 - 2660;
        } else if (monthlyTaxable <= 55000) {
          tax = monthlyTaxable * 0.3 - 4410;
        } else if (monthlyTaxable <= 80000) {
          tax = monthlyTaxable * 0.35 - 7160;
        } else {
          tax = monthlyTaxable * 0.45 - 15160;
        }

        return Math.max(0, tax);
      }

      function calculate() {
        var grossSalary = parseFloat(document.getElementById("grossSalary").value) || 0;
        var socialBase = parseFloat(document.getElementById("socialBase").value) || grossSalary;
        var fundBase = parseFloat(document.getElementById("fundBase").value) || grossSalary;
        var fundRate = parseFloat(document.getElementById("fundRate").value) / 100 || 0.12;

        // 专项附加扣除
        var specialDeductions =
          (parseFloat(document.getElementById("childEducation").value) || 0) +
          (parseFloat(document.getElementById("continuingEducation").value) || 0) +
          (parseFloat(document.getElementById("housingLoan").value) || 0) +
          (parseFloat(document.getElementById("housingRent").value) || 0) +
          (parseFloat(document.getElementById("elderlySupport").value) || 0) +
          (parseFloat(document.getElementById("babycare").value) || 0);

        // 社保个人部分
        var pension = socialBase * 0.08;
        var medical = socialBase * 0.02;
        var unemployment = socialBase * 0.005;
        var socialPersonal = pension + medical + unemployment;

        // 公积金个人部分
        var fundPersonal = fundBase * fundRate;

        // 应纳税所得额
        var taxableIncome = grossSalary - socialPersonal - fundPersonal - 5000 - specialDeductions;
        var incomeTax = calculateTax(taxableIncome);

        // 实发工资
        var totalDeduction = socialPersonal + fundPersonal + incomeTax;
        var netSalary = grossSalary - totalDeduction;

        // 企业部分
        var socialCompany = socialBase * (0.16 + 0.08 + 0.005 + 0.004); // 养老16%+医疗8%+失业0.5%+工伤0.4%
        var fundCompany = fundBase * fundRate;
        var totalCost = grossSalary + socialCompany + fundCompany;

        // 显示结果
        document.getElementById("resultSection").classList.remove("hidden");

        document.getElementById("netSalary").textContent = formatMoney(netSalary);
        document.getElementById("socialPersonal").textContent = formatMoney(socialPersonal);
        document.getElementById("fundPersonal").textContent = formatMoney(fundPersonal);
        document.getElementById("incomeTax").textContent = formatMoney(incomeTax);
        document.getElementById("totalDeduction").textContent = formatMoney(totalDeduction);

        document.getElementById("detailGross").textContent = formatMoney(grossSalary);
        document.getElementById("detailPension").textContent = "-" + formatMoney(pension);
        document.getElementById("detailMedical").textContent = "-" + formatMoney(medical);
        document.getElementById("detailUnemployment").textContent = "-" + formatMoney(unemployment);
        document.getElementById("detailFund").textContent = "-" + formatMoney(fundPersonal);
        document.getElementById("detailSpecial").textContent = formatMoney(specialDeductions);
        document.getElementById("detailTaxable").textContent = formatMoney(
          Math.max(0, taxableIncome)
        );
        document.getElementById("detailTax").textContent = "-" + formatMoney(incomeTax);
        document.getElementById("detailNet").textContent = formatMoney(netSalary);

        document.getElementById("socialCompany").textContent = formatMoney(socialCompany);
        document.getElementById("fundCompany").textContent = formatMoney(fundCompany);
        document.getElementById("totalCost").textContent = formatMoney(totalCost);
      }

      calculate();
    </script>
  </body>
</html>
