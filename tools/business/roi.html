<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>投资回报率计算器 - WebUtils</title>
    <meta
      name="description"
      content="在线计算投资回报率ROI，帮助评估投资效益和项目收益，支持多种计算方式"
    />
    <meta name="keywords" content="投资回报率, ROI计算, 投资收益, 项目评估, 投资分析, 收益率" />
    <meta property="og:title" content="投资回报率计算器 - WebUtils" />
    <meta
      property="og:description"
      content="在线计算投资回报率ROI，帮助评估投资效益和项目收益，支持多种计算方式"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tools.realtime-ai.chat/tools/business/roi.html" />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/business/roi.html" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
        font-size: 0.9rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 1.8rem;
      }
      .subtitle {
        text-align: center;
        color: var(--text-secondary);
        margin-bottom: 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .card-title {
        font-weight: 600;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background: var(--bg-deep);
        color: var(--text-primary);
        font-size: 1rem;
      }
      input:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      }
      .highlight {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
        border-radius: 12px;
        padding: 24px;
        color: white;
        text-align: center;
        margin-bottom: 16px;
      }
      .highlight-label {
        font-size: 0.9rem;
        opacity: 0.9;
        margin-bottom: 8px;
      }
      .highlight-value {
        font-size: 3rem;
        font-weight: 700;
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
      }
      .result-item {
        background: var(--bg-deep);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .result-label {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .result-value {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--accent-cyan);
      }
      .result-value.green {
        color: var(--accent-green);
      }
      .result-value.red {
        color: var(--accent-red);
      }
      .formula {
        background: var(--bg-deep);
        border-radius: 8px;
        padding: 16px;
        margin-top: 16px;
        font-family: var(--font-mono);
        color: var(--text-secondary);
        text-align: center;
      }
      .hidden {
        display: none;
      }
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌓">
        🌓
      </button>
      <h1>📈 投资回报率计算器</h1>
      <p class="subtitle">计算投资项目的ROI和投资回收期</p>

      <div class="card">
        <div class="card-title">💰 投资信息</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-----------">初始投资金额 (元)</label>
            <input
              type="number"
              id="initialInvestment"
              value="100000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">投资期限 (年)</label>
            <input
              type="number"
              id="investmentPeriod"
              value="3"
              min="1"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📊 收益信息</div>
        <div class="grid">
          <div class="form-group">
            <label for="input----------">预期总收益 (元)</label>
            <input
              type="number"
              id="totalReturn"
              value="150000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---------">年均收益 (元)</label>
            <input
              type="number"
              id="annualReturn"
              value="50000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <button class="btn btn-primary" onclick="calculate()" aria-label="计算ROI">计算ROI</button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="highlight">
          <div class="highlight-label">投资回报率 (ROI)</div>
          <div class="highlight-value" id="roi"></div>
        </div>

        <div class="card">
          <div class="card-title">📈 投资分析</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">净收益</div>
              <div class="result-value" id="netProfit"></div>
            </div>
            <div class="result-item">
              <div class="result-label">年化ROI</div>
              <div class="result-value" id="annualRoi"></div>
            </div>
            <div class="result-item">
              <div class="result-label">投资回收期</div>
              <div class="result-value" id="paybackPeriod"></div>
            </div>
            <div class="result-item">
              <div class="result-label">投资倍数</div>
              <div class="result-value" id="multiple"></div>
            </div>
          </div>

          <div class="formula">ROI = (总收益 - 初始投资) / 初始投资 × 100%</div>
        </div>
      </div>
    </div>

    <script>
      function toggleTheme() {
        var theme = document.body.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      }
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved) {
          document.body.setAttribute("data-theme", saved);
        } else if (window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.body.setAttribute("data-theme", "light");
        }
      })();

      function formatMoney(num) {
        if (Math.abs(num) >= 10000) {
          return (num / 10000).toFixed(2) + "万";
        }
        return num.toFixed(0) + "元";
      }

      function calculate() {
        var initialInvestment = parseFloat(document.getElementById("initialInvestment").value) || 0;
        var investmentPeriod = parseInt(document.getElementById("investmentPeriod").value) || 1;
        var totalReturn = parseFloat(document.getElementById("totalReturn").value) || 0;
        var annualReturn = parseFloat(document.getElementById("annualReturn").value) || 0;

        var netProfit = totalReturn - initialInvestment;
        var roi = initialInvestment > 0 ? (netProfit / initialInvestment) * 100 : 0;
        var annualRoi = roi / investmentPeriod;
        var paybackPeriod = annualReturn > 0 ? initialInvestment / annualReturn : 0;
        var multiple = initialInvestment > 0 ? totalReturn / initialInvestment : 0;

        document.getElementById("resultSection").classList.remove("hidden");

        var roiEl = document.getElementById("roi");
        roiEl.textContent = roi.toFixed(2) + "%";

        var netProfitEl = document.getElementById("netProfit");
        netProfitEl.textContent = formatMoney(netProfit);
        netProfitEl.className = "result-value " + (netProfit >= 0 ? "green" : "red");

        var annualRoiEl = document.getElementById("annualRoi");
        annualRoiEl.textContent = annualRoi.toFixed(2) + "%";
        annualRoiEl.className =
          "result-value " + (annualRoi >= 10 ? "green" : annualRoi >= 0 ? "" : "red");

        document.getElementById("paybackPeriod").textContent = paybackPeriod.toFixed(1) + "年";
        document.getElementById("multiple").textContent = multiple.toFixed(2) + "x";
      }

      calculate();
    </script>
  </body>
</html>
