<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>宠物年龄计算 - WebUtils</title>
    <meta property="og:title" content="宠物年龄计算 - WebUtils" />
    <meta property="og:description" content="宠物年龄计算：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/pets/pet-age-calculator.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="计算宠物相当于人类的年龄,支持狗、猫等常见宠物" />
    <meta name="keywords" content="宠物 年龄 狗 猫 pet age dog cat calculator" />
    <meta name="author" content="WebUtils" />
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/pets/pet-age-calculator.html"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 600px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-pink));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .input-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--color-text-secondary);
        font-size: 0.9rem;
      }
      .form-group select,
      .form-group input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: inherit;
      }
      .calc-btn {
        width: 100%;
        padding: 0.75rem;
        border: none;
        border-radius: var(--radius-sm);
        background: var(--accent-pink);
        color: #000;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .calc-btn:hover {
        background: var(--color-accent-cyan);
      }
      .result-card {
        background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(77, 159, 255, 0.1));
        border: 2px solid var(--accent-pink);
        border-radius: var(--radius-lg);
        padding: 2rem;
        margin-bottom: 1.5rem;
        display: none;
        text-align: center;
      }
      .result-card.show {
        display: block;
      }
      .result-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }
      .result-value {
        font-family: var(--font-mono);
        font-size: 3rem;
        font-weight: 700;
        color: var(--color-accent-cyan);
        margin-bottom: 0.5rem;
      }
      .result-label {
        font-size: 1.2rem;
        color: var(--color-text-secondary);
      }
      .result-detail {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--text-muted);
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <a href="../../index.html#pets">宠物工具</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">宠物年龄</span>
      </nav>

      <h1>🐾 宠物年龄计算</h1>
      <p class="subtitle">换算成人类年龄</p>

      <div class="input-card">
        <div class="form-group">
          <label>宠物类型</label>
          <select id="petType">
            <option value="dog">狗 🐕</option>
            <option value="cat">猫 🐈</option>
            <option value="rabbit">兔子 🐰</option>
            <option value="hamster">仓鼠 🐹</option>
          </select>
        </div>

        <div class="form-group">
          <label>宠物年龄（岁）</label>
          <input type="number" id="petAge" placeholder="5" min="0" max="30" step="0.1" />
        </div>

        <button class="calc-btn" onclick="calculate()">计算人类年龄</button>
      </div>

      <div class="result-card" id="resultCard">
        <div class="result-icon" id="icon">🐕</div>
        <div class="result-value" id="humanAge">35</div>
        <div class="result-label">
          相当于人类
          <span id="humanAgeText">35</span>
          岁
        </div>
        <div class="result-detail" id="detail"></div>
      </div>
    </div>

    <script>
      function calculateAge(petType, petAge) {
        let humanAge = 0;
        let detail = "";

        switch (petType) {
          case "dog":
            // First 2 years: 10.5 years each, then 4 years per year
            if (petAge <= 1) {
              humanAge = petAge * 15;
              detail = "幼犬期：1岁相当于人类15岁";
            } else if (petAge <= 2) {
              humanAge = 15 + (petAge - 1) * 9;
              detail = "青年犬：2岁相当于人类24岁";
            } else {
              humanAge = 24 + (petAge - 2) * 4;
              detail = "成年犬：每增加1岁相当于人类4岁";
            }
            break;

          case "cat":
            // First year: 15, second year: 24, then 4 years per year
            if (petAge <= 1) {
              humanAge = petAge * 15;
              detail = "幼猫期：1岁相当于人类15岁";
            } else if (petAge <= 2) {
              humanAge = 15 + (petAge - 1) * 9;
              detail = "青年猫：2岁相当于人类24岁";
            } else {
              humanAge = 24 + (petAge - 2) * 4;
              detail = "成年猫：每增加1岁相当于人类4岁";
            }
            break;

          case "rabbit":
            // Rabbits: ~8 years per year
            humanAge = petAge * 8;
            detail = "兔子的寿命通常为8-12年";
            break;

          case "hamster":
            // Hamsters: ~25 years per year
            humanAge = petAge * 25;
            detail = "仓鼠的寿命通常为2-3年";
            break;
        }

        return { humanAge: Math.round(humanAge), detail };
      }

      function calculate() {
        const petType = document.getElementById("petType").value;
        const petAge = parseFloat(document.getElementById("petAge").value);

        if (!petAge || petAge < 0) {
          alert("请输入有效的宠物年龄");
          return;
        }

        const result = calculateAge(petType, petAge);

        const icons = {
          dog: "🐕",
          cat: "🐈",
          rabbit: "🐰",
          hamster: "🐹"
        };

        document.getElementById("icon").textContent = icons[petType];
        document.getElementById("humanAge").textContent = result.humanAge;
        document.getElementById("humanAgeText").textContent = result.humanAge;
        document.getElementById("detail").textContent = result.detail;

        document.getElementById("resultCard").classList.add("show");
      }

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
