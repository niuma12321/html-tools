<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>宠物喂食量计算器 - WebUtils</title>
    <meta property="og:title" content="宠物喂食量计算器 - WebUtils" />
    <meta
      property="og:description"
      content="宠物喂食量计算器：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/pets/pet-food-calc.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="根据宠物体重、年龄、活动量计算每日喂食量，科学喂养更健康" />
    <meta name="keywords" content="宠物 喂食 狗粮 猫粮 pet food calculator feeding" />
    <meta name="author" content="WebUtils" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/pets/pet-food-calc.html" />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        font-size: 16px;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 600px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-brown));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
      }
      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .card-title {
        font-size: 1rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: 1rem;
      }
      .pet-selector {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .pet-btn {
        flex: 1;
        padding: 1.5rem;
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        background: var(--color-bg-surface);
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
      }
      .pet-btn:hover {
        border-color: var(--color-accent-cyan);
      }
      .pet-btn.active {
        border-color: var(--accent-orange);
        background: rgba(255, 159, 67, 0.1);
      }
      .pet-icon {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
      }
      .pet-name {
        font-weight: 500;
      }
      .form-group {
        margin-bottom: 1.25rem;
      }
      .form-group label {
        display: block;
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-bottom: 0.5rem;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: inherit;
        font-size: 1rem;
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .result-card {
        background: linear-gradient(135deg, rgba(255, 159, 67, 0.1), rgba(193, 127, 89, 0.1));
        border: 1px solid var(--accent-orange);
      }
      .result-main {
        text-align: center;
        padding: 2rem 0;
      }
      .result-icon {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }
      .result-value {
        font-family: var(--font-mono);
        font-size: 3rem;
        font-weight: 700;
        color: var(--accent-orange);
      }
      .result-unit {
        font-size: 1.25rem;
        color: var(--color-text-secondary);
      }
      .result-label {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin-top: 0.5rem;
      }
      .schedule {
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
      }
      .schedule-title {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-bottom: 1rem;
        text-align: center;
      }
      .schedule-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
      }
      .schedule-item {
        padding: 0.75rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
        text-align: center;
      }
      .schedule-time {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
      }
      .schedule-amount {
        font-family: var(--font-mono);
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--color-accent-cyan);
      }
      .tips {
        margin-top: 1.5rem;
        padding: 1rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
        border-left: 3px solid var(--accent-orange);
      }
      .tips-title {
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: var(--accent-orange);
      }
      .tips-content {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        line-height: 1.8;
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌙">
        🌙
      </button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">宠物喂食量计算器</span>
      </nav>

      <h1>宠物喂食量计算器</h1>
      <p class="subtitle">科学计算每日喂食量，守护毛孩健康</p>

      <div class="card">
        <div class="card-title">🐾 选择宠物类型</div>
        <div class="pet-selector">
          <div class="pet-btn active" onclick="setPetType('dog')">
            <div class="pet-icon">🐕</div>
            <div class="pet-name">狗狗</div>
          </div>
          <div class="pet-btn" onclick="setPetType('cat')">
            <div class="pet-icon">🐱</div>
            <div class="pet-name">猫咪</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📋 宠物信息</div>
        <div class="form-row">
          <div class="form-group">
            <label for="input-----kg-">体重 (kg)</label>
            <input
              type="number"
              id="weight"
              value="10"
              min="0.5"
              max="100"
              step="0.5"
              oninput="calculate()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label>年龄阶段</label>
            <select id="age" onchange="calculate()">
              <option value="puppy">幼年 (&lt; 1岁)</option>
              <option value="adult" selected>成年 (1-7岁)</option>
              <option value="senior">老年 (&gt; 7岁)</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>活动量</label>
            <select id="activity" onchange="calculate()">
              <option value="low">较少运动（室内为主）</option>
              <option value="moderate" selected>适中运动（每天散步）</option>
              <option value="high">大量运动（工作犬/运动犬）</option>
            </select>
          </div>
          <div class="form-group">
            <label>体型状态</label>
            <select id="condition" onchange="calculate()">
              <option value="underweight">偏瘦（需增重）</option>
              <option value="normal" selected>正常</option>
              <option value="overweight">偏胖（需减重）</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="input-------kcal-100g-----">粮食热量 (kcal/100g) - 参见包装说明</label>
          <input
            type="number"
            id="calories"
            value="350"
            min="200"
            max="500"
            step="10"
            oninput="calculate()"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
      </div>

      <div class="card result-card">
        <div class="card-title">📊 喂食建议</div>
        <div class="result-main">
          <div class="result-icon" id="resultIcon">🍽️</div>
          <div class="result-value" id="dailyAmount">0</div>
          <div class="result-unit">克/天</div>
          <div class="result-label" id="caloriesNeeded">每日所需热量: 0 kcal</div>
        </div>

        <div class="schedule">
          <div class="schedule-title">建议喂食安排</div>
          <div class="schedule-grid" id="scheduleGrid">
            <!-- Schedule will be rendered here -->
          </div>
        </div>
      </div>

      <div class="tips">
        <div class="tips-title">💡 喂养建议</div>
        <div class="tips-content" id="tips">计算后显示喂养建议...</div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
        <p style="margin-top: 0.5rem; font-size: 0.75rem">
          * 本工具仅供参考，具体喂食量请参考宠物粮包装说明或咨询兽医
        </p>
      </footer>
    </div>

    <script>
      let petType = "dog";

      // RER (Resting Energy Requirement) = 70 × (body weight in kg)^0.75
      // DER (Daily Energy Requirement) = RER × activity factor

      const factors = {
        dog: {
          puppy: { low: 2.0, moderate: 2.5, high: 3.0 },
          adult: { low: 1.4, moderate: 1.6, high: 2.0 },
          senior: { low: 1.2, moderate: 1.4, high: 1.6 }
        },
        cat: {
          puppy: { low: 2.0, moderate: 2.5, high: 3.0 },
          adult: { low: 1.2, moderate: 1.4, high: 1.6 },
          senior: { low: 1.0, moderate: 1.2, high: 1.4 }
        }
      };

      const conditionFactors = {
        underweight: 1.2,
        normal: 1.0,
        overweight: 0.8
      };

      function setPetType(type) {
        petType = type;
        document.querySelectorAll(".pet-btn").forEach((btn) => btn.classList.remove("active"));
        document
          .querySelector(`.pet-btn:nth-child(${type === "dog" ? 1 : 2})`)
          .classList.add("active");
        calculate();
      }

      function calculate() {
        const weight = parseFloat(document.getElementById("weight").value) || 5;
        const age = document.getElementById("age").value;
        const activity = document.getElementById("activity").value;
        const condition = document.getElementById("condition").value;
        const calories = parseFloat(document.getElementById("calories").value) || 350;

        // Calculate RER
        const rer = 70 * Math.pow(weight, 0.75);

        // Get activity factor
        const activityFactor = factors[petType][age][activity];

        // Get condition factor
        const conditionFactor = conditionFactors[condition];

        // Calculate DER
        const der = rer * activityFactor * conditionFactor;

        // Calculate daily food amount
        const dailyAmount = Math.round((der / calories) * 100);

        // Update display
        document.getElementById("dailyAmount").textContent = dailyAmount;
        document.getElementById("caloriesNeeded").textContent =
          `每日所需热量: ${Math.round(der)} kcal`;
        document.getElementById("resultIcon").textContent = petType === "dog" ? "🐕" : "🐱";

        // Update schedule
        renderSchedule(dailyAmount, age);

        // Update tips
        generateTips(weight, age, activity, condition, dailyAmount);
      }

      function renderSchedule(dailyAmount, age) {
        const grid = document.getElementById("scheduleGrid");

        if (age === "puppy") {
          // 3 meals for puppies
          const perMeal = Math.round(dailyAmount / 3);
          grid.innerHTML = `
          <div class="schedule-item">
            <div class="schedule-time">早餐 7:00</div>
            <div class="schedule-amount">${perMeal}g</div>
          </div>
          <div class="schedule-item">
            <div class="schedule-time">午餐 12:00</div>
            <div class="schedule-amount">${perMeal}g</div>
          </div>
          <div class="schedule-item">
            <div class="schedule-time">晚餐 18:00</div>
            <div class="schedule-amount">${perMeal}g</div>
          </div>
        `;
        } else {
          // 2 meals for adults and seniors
          const perMeal = Math.round(dailyAmount / 2);
          grid.innerHTML = `
          <div class="schedule-item">
            <div class="schedule-time">早餐 8:00</div>
            <div class="schedule-amount">${perMeal}g</div>
          </div>
          <div class="schedule-item" style="grid-column:span 2">
            <div class="schedule-time">晚餐 18:00</div>
            <div class="schedule-amount">${perMeal}g</div>
          </div>
        `;
        }
      }

      function generateTips(weight, age, activity, condition, amount) {
        const tips = [];
        const icon = petType === "dog" ? "🐕" : "🐱";

        if (age === "puppy") {
          tips.push(`${icon} 幼年期建议分3餐喂食，少量多餐更易消化`);
          tips.push("📈 幼年期是发育关键期，可适当增加蛋白质摄入");
        } else if (age === "senior") {
          tips.push(`${icon} 老年期代谢减慢，注意控制体重`);
          tips.push("🏥 建议定期体检，关注关节和肾脏健康");
        }

        if (condition === "overweight") {
          tips.push("⚖️ 减重期间建议增加运动，缓慢减少食量");
          tips.push("🥗 可选择低脂配方粮食");
        } else if (condition === "underweight") {
          tips.push("💪 增重期间可适当增加喂食次数");
          tips.push("🥩 选择高蛋白高热量的优质粮食");
        }

        if (activity === "high") {
          tips.push("🏃 运动量大的宠物需要更多蛋白质和能量");
        }

        tips.push("💧 保证充足的清洁饮水");
        tips.push("⏰ 固定喂食时间有助于消化规律");

        document.getElementById("tips").innerHTML = tips.join("<br>");
      }

      // Initialize
      calculate();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
