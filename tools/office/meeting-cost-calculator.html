<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>会议成本计算器 - WebUtils</title>
    <meta property="og:title" content="会议成本计算器 - WebUtils" />
    <meta
      property="og:description"
      content="会议成本计算器：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/office/meeting-cost-calculator.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="计算会议的人力成本，优化会议效率" />
    <meta name="keywords" content="会议 成本 时间 效率 meeting cost calculator productivity" />
    <meta name="author" content="WebUtils" />
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/office/meeting-cost-calculator.html"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-red));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .timer-display {
        background: linear-gradient(135deg, rgba(255, 107, 107, 0.1), rgba(255, 159, 67, 0.1));
        border: 3px solid var(--accent-red);
        border-radius: var(--radius-lg);
        padding: 2rem;
        text-align: center;
        margin-bottom: 2rem;
      }
      .timer-value {
        font-family: var(--font-mono);
        font-size: 4rem;
        font-weight: 700;
        color: var(--accent-red);
        margin: 1rem 0;
      }
      .cost-value {
        font-family: var(--font-mono);
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--accent-orange);
        margin-top: 1rem;
      }
      .timer-label {
        font-size: 1rem;
        color: var(--color-text-secondary);
      }
      .controls {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-bottom: 2rem;
        flex-wrap: wrap;
      }
      .btn {
        padding: 1rem 2rem;
        border: 2px solid;
        border-radius: var(--radius-md);
        font-family: inherit;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-primary {
        background: var(--accent-green);
        border-color: var(--accent-green);
        color: #000;
      }
      .btn-primary:hover {
        background: var(--color-accent-cyan);
        border-color: var(--color-accent-cyan);
      }
      .btn-secondary {
        background: transparent;
        border-color: var(--border-subtle);
        color: var(--color-text-primary);
      }
      .btn-secondary:hover {
        border-color: var(--color-accent-cyan);
      }
      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .card-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--color-accent-cyan);
      }
      .participants-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .participant-row {
        display: flex;
        gap: 0.75rem;
        align-items: center;
      }
      .participant-row input {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: inherit;
      }
      .participant-row input:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .participant-row button {
        padding: 0.5rem 1rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.2s;
      }
      .participant-row button:hover {
        border-color: var(--accent-red);
        color: var(--accent-red);
      }
      .add-btn {
        width: 100%;
        padding: 0.75rem;
        border: 2px dashed var(--border-subtle);
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 0.75rem;
      }
      .add-btn:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
      }
      .stat-item {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 1rem;
        text-align: center;
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--color-accent-cyan);
        margin-bottom: 0.25rem;
      }
      .stat-label {
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
      @media (max-width: 600px) {
        .timer-value {
          font-size: 3rem;
        }
        .cost-value {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <a href="../../index.html#office">办公效率</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">会议成本计算</span>
      </nav>

      <h1>💸 会议成本计算器</h1>
      <p class="subtitle">实时显示会议的人力成本</p>

      <div class="timer-display">
        <div class="timer-label">会议时长</div>
        <div class="timer-value" id="timerValue">00:00:00</div>
        <div class="timer-label">累计成本</div>
        <div class="cost-value" id="costValue">¥0.00</div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="startBtn" onclick="startTimer()">开始会议</button>
        <button class="btn btn-secondary" onclick="pauseTimer()">暂停</button>
        <button class="btn btn-secondary" onclick="resetTimer()">重置</button>
      </div>

      <div class="card">
        <div class="card-title">👥 参会人员 (小时工资)</div>
        <div class="participants-list" id="participantsList">
          <!-- Participants will be rendered here -->
        </div>
        <button class="add-btn" onclick="addParticipant()">+ 添加参会者</button>
      </div>

      <div class="card">
        <div class="card-title">📊 统计数据</div>
        <div class="stats">
          <div class="stat-item">
            <div class="stat-value" id="participantCount">0</div>
            <div class="stat-label">参会人数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="avgSalary">¥0</div>
            <div class="stat-label">平均时薪</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="costPerMinute">¥0</div>
            <div class="stat-label">每分钟成本</div>
          </div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      let participants = [
        { id: 1, name: "产品经理", hourlySalary: 200 },
        { id: 2, name: "开发工程师", hourlySalary: 180 },
        { id: 3, name: "设计师", hourlySalary: 150 }
      ];

      let timer = null;
      let seconds = 0;
      let isRunning = false;

      function addParticipant() {
        participants.push({
          id: Date.now(),
          name: "新参会者",
          hourlySalary: 150
        });
        render();
      }

      function removeParticipant(id) {
        if (participants.length <= 1) {
          alert("至少需要1位参会者");
          return;
        }
        participants = participants.filter((p) => p.id !== id);
        render();
      }

      function updateParticipant(id, field, value) {
        const participant = participants.find((p) => p.id === id);
        if (participant) {
          participant[field] = field === "hourlySalary" ? parseFloat(value) || 0 : value;
          calculateCost();
          updateStats();
        }
      }

      function render() {
        const container = document.getElementById("participantsList");

        container.innerHTML = participants
          .map(
            (p) => `
        <div class="participant-row">
          <input type="text" value="${p.name}" onchange="updateParticipant(${p.id}, 'name', this.value)" placeholder="姓名/职位">
          <input type="number" value="${p.hourlySalary}" onchange="updateParticipant(${p.id}, 'hourlySalary', this.value)" placeholder="时薪" min="0" step="10" style="max-width:120px">
          <button onclick="removeParticipant(${p.id})">×</button>
        </div>
      `
          )
          .join("");

        updateStats();
        calculateCost();
      }

      function updateStats() {
        document.getElementById("participantCount").textContent = participants.length;

        const avgSalary =
          participants.reduce((sum, p) => sum + p.hourlySalary, 0) / participants.length;
        document.getElementById("avgSalary").textContent = "¥" + avgSalary.toFixed(0);

        const totalHourlyCost = participants.reduce((sum, p) => sum + p.hourlySalary, 0);
        const costPerMin = totalHourlyCost / 60;
        document.getElementById("costPerMinute").textContent = "¥" + costPerMin.toFixed(2);
      }

      function startTimer() {
        if (isRunning) return;
        isRunning = true;
        document.getElementById("startBtn").textContent = "进行中...";

        timer = setInterval(() => {
          seconds++;
          updateTimerDisplay();
          calculateCost();
        }, 1000);
      }

      function pauseTimer() {
        isRunning = false;
        clearInterval(timer);
        document.getElementById("startBtn").textContent = "继续";
      }

      function resetTimer() {
        pauseTimer();
        seconds = 0;
        updateTimerDisplay();
        calculateCost();
        document.getElementById("startBtn").textContent = "开始会议";
      }

      function updateTimerDisplay() {
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;

        document.getElementById("timerValue").textContent =
          `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      function calculateCost() {
        const totalHourlyCost = participants.reduce((sum, p) => sum + p.hourlySalary, 0);
        const hours = seconds / 3600;
        const cost = totalHourlyCost * hours;

        document.getElementById("costValue").textContent = "¥" + cost.toFixed(2);
      }

      // Initialize
      render();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
