    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .matrices {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 20px;
        align-items: start;
        margin-bottom: 20px;
      }
      .matrix-section h3 {
        margin: 0 0 12px;
        font-size: 1rem;
      }
      .matrix-size {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
        font-size: 0.9rem;
      }
      .matrix-size input {
        width: 50px;
        padding: 6px;
        text-align: center;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .matrix-grid {
        display: grid;
        gap: 4px;
      }
      .matrix-grid input {
        width: 60px;
        padding: 8px;
        text-align: center;
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        font-family: ui-monospace, monospace;
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      .operator {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-top: 60px;
      }
      .operator button {
        padding: 10px 16px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 1.2rem;
      }
      .operator button:hover {
        border-color: var(--accent-cyan);
        background: var(--accent-cyan);
        color: #fff;
      }
      .single-ops {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      .single-ops button {
        padding: 8px 16px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 0.9rem;
      }
      .single-ops button:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }
      .result-section {
        margin-top: 20px;
        padding: 20px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
      }
      .result-section h3 {
        margin: 0 0 12px;
      }
      .result-matrix {
        display: grid;
        gap: 4px;
      }
      .result-matrix span {
        padding: 10px;
        text-align: center;
        background: var(--bg-card);
        border-radius: 4px;
        font-family: ui-monospace, monospace;
        font-weight: 500;
      }
      .error {
        color: var(--accent-red);
        font-size: 0.9rem;
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
      @media (max-width: 700px) {
        .matrices {
          grid-template-columns: 1fr;
        }
        .operator {
          flex-direction: row;
          padding-top: 0;
          justify-content: center;
        }
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>矩阵计算器</h1>
      <p class="desc">进行矩阵运算：加减乘、转置、行列式</p>

      <div class="card">
        <div class="matrices">
          <div class="matrix-section">
            <h3>矩阵 A</h3>
            <div class="matrix-size">
              <input
                type="number"
                id="rowsA"
                value="2"
                min="1"
                max="5"
                onchange="updateMatrix('A')"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
              <span>×</span>
              <input
                type="number"
                id="colsA"
                value="2"
                min="1"
                max="5"
                onchange="updateMatrix('A')"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="matrix-grid" id="matrixA"></div>
            <div class="single-ops" style="margin-top: 12px">
              <button onclick="transpose('A')" aria-label="转置 Aᵀ">转置 Aᵀ</button>
              <button onclick="determinant('A')" aria-label="行列式 |A|">行列式 |A|</button>
            </div>
          </div>

          <div class="operator">
            <button onclick="operate('+')" aria-label="+">+</button>
            <button onclick="operate('-')" aria-label="−">−</button>
            <button onclick="operate('*')" aria-label="×">×</button>
          </div>

          <div class="matrix-section">
            <h3>矩阵 B</h3>
            <div class="matrix-size">
              <input
                type="number"
                id="rowsB"
                value="2"
                min="1"
                max="5"
                onchange="updateMatrix('B')"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
              <span>×</span>
              <input
                type="number"
                id="colsB"
                value="2"
                min="1"
                max="5"
                onchange="updateMatrix('B')"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="matrix-grid" id="matrixB"></div>
            <div class="single-ops" style="margin-top: 12px">
              <button onclick="transpose('B')" aria-label="转置 Bᵀ">转置 Bᵀ</button>
              <button onclick="determinant('B')" aria-label="行列式 |B|">行列式 |B|</button>
            </div>
          </div>
        </div>

        <div class="result-section" id="result" style="display: none">
          <h3 id="resultTitle">结果</h3>
          <div class="result-matrix" id="resultMatrix"></div>
          <p class="error" id="error" style="display: none"></p>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function updateMatrix(name) {
        const rows = parseInt(document.getElementById("rows" + name).value) || 2;
        const cols = parseInt(document.getElementById("cols" + name).value) || 2;
        const container = document.getElementById("matrix" + name);

        container.style.gridTemplateColumns = `repeat(${cols}, 60px)`;
        container.innerHTML = "";

        for (let i = 0; i < rows; i++) {
          for (let j = 0; j < cols; j++) {
            const input = document.createElement("input");
            input.type = "number";
            input.value = i === j ? "1" : "0";
            input.id = `${name}_${i}_${j}`;
            container.appendChild(input);
          }
        }
      }

      function getMatrix(name) {
        const rows = parseInt(document.getElementById("rows" + name).value);
        const cols = parseInt(document.getElementById("cols" + name).value);
        const matrix = [];

        for (let i = 0; i < rows; i++) {
          const row = [];
          for (let j = 0; j < cols; j++) {
            row.push(parseFloat(document.getElementById(`${name}_${i}_${j}`).value) || 0);
          }
          matrix.push(row);
        }
        return matrix;
      }

      function displayResult(matrix, title) {
        const container = document.getElementById("resultMatrix");
        const cols = matrix[0].length;
        container.style.gridTemplateColumns = `repeat(${cols}, 80px)`;
        container.innerHTML = "";

        matrix.forEach((row) => {
          row.forEach((val) => {
            const span = document.createElement("span");
            span.textContent = Number.isInteger(val) ? val : val.toFixed(4);
            container.appendChild(span);
          });
        });

        document.getElementById("resultTitle").textContent = title;
        document.getElementById("result").style.display = "block";
        document.getElementById("error").style.display = "none";
      }

      function showError(msg) {
        document.getElementById("error").textContent = msg;
        document.getElementById("error").style.display = "block";
        document.getElementById("resultMatrix").innerHTML = "";
        document.getElementById("resultTitle").textContent = "错误";
        document.getElementById("result").style.display = "block";
      }

      function operate(op) {
        const A = getMatrix("A");
        const B = getMatrix("B");

        if (op === "+" || op === "-") {
          if (A.length !== B.length || A[0].length !== B[0].length) {
            showError("加减运算要求两个矩阵维度相同");
            return;
          }
          const result = A.map((row, i) =>
            row.map((val, j) => (op === "+" ? val + B[i][j] : val - B[i][j]))
          );
          displayResult(result, `A ${op} B`);
        } else if (op === "*") {
          if (A[0].length !== B.length) {
            showError("矩阵乘法要求 A 的列数等于 B 的行数");
            return;
          }
          const result = [];
          for (let i = 0; i < A.length; i++) {
            const row = [];
            for (let j = 0; j < B[0].length; j++) {
              let sum = 0;
              for (let k = 0; k < A[0].length; k++) {
                sum += A[i][k] * B[k][j];
              }
              row.push(sum);
            }
            result.push(row);
          }
          displayResult(result, "A × B");
        }
      }

      function transpose(name) {
        const M = getMatrix(name);
        const result = M[0].map((_, j) => M.map((row) => row[j]));
        displayResult(result, `${name}ᵀ (转置)`);
      }

      function determinant(name) {
        const M = getMatrix(name);
        if (M.length !== M[0].length) {
          showError("只有方阵才有行列式");
          return;
        }

        function det(m) {
          const n = m.length;
          if (n === 1) return m[0][0];
          if (n === 2) return m[0][0] * m[1][1] - m[0][1] * m[1][0];

          let result = 0;
          for (let j = 0; j < n; j++) {
            const minor = m.slice(1).map((row) => row.filter((_, col) => col !== j));
            result += Math.pow(-1, j) * m[0][j] * det(minor);
          }
          return result;
        }

        const result = det(M);
        displayResult(
          [[result]],
          `|${name}| = ${Number.isInteger(result) ? result : result.toFixed(4)}`
        );
      }

      updateMatrix("A");
      updateMatrix("B");

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
