  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>GCD/LCM 计算器</h1>
      <p class="desc">计算最大公约数和最小公倍数</p>

      <div class="card">
        <label>输入数字（用逗号或空格分隔）</label>
        <input type="text" id="numbers" placeholder="例如: 12, 18, 24 或 12 18 24" value="12, 18" />
        <button class="btn" onclick="calculate()">计算</button>

        <div class="results" id="results" style="display: none">
          <div class="result-box">
            <div class="label">最大公约数 (GCD)</div>
            <div class="value" id="gcdResult">-</div>
          </div>
          <div class="result-box">
            <div class="label">最小公倍数 (LCM)</div>
            <div class="value" id="lcmResult">-</div>
          </div>
        </div>

        <div class="steps" id="steps" style="display: none">
          <h4>计算过程</h4>
          <div id="stepsContent"></div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function gcd(a, b) {
        a = Math.abs(a);
        b = Math.abs(b);
        while (b !== 0) {
          const t = b;
          b = a % b;
          a = t;
        }
        return a;
      }

      function lcm(a, b) {
        return Math.abs(a * b) / gcd(a, b);
      }

      function gcdArray(arr) {
        return arr.reduce((acc, val) => gcd(acc, val));
      }

      function lcmArray(arr) {
        return arr.reduce((acc, val) => lcm(acc, val));
      }

      function calculate() {
        const input = document.getElementById("numbers").value;
        const numbers = input
          .split(/[,\s]+/)
          .map((s) => parseInt(s.trim()))
          .filter((n) => !isNaN(n) && n > 0);

        if (numbers.length < 2) {
          alert("请输入至少两个正整数");
          return;
        }

        const gcdResult = gcdArray(numbers);
        const lcmResult = lcmArray(numbers);

        document.getElementById("gcdResult").textContent = gcdResult;
        document.getElementById("lcmResult").textContent = lcmResult;

        // 显示计算步骤
        let steps = `输入数字: <code>${numbers.join(", ")}</code><br><br>`;
        steps += `<strong>GCD 计算 (辗转相除法):</strong><br>`;

        let tempGcd = numbers[0];
        for (let i = 1; i < numbers.length; i++) {
          const oldGcd = tempGcd;
          tempGcd = gcd(tempGcd, numbers[i]);
          steps += `gcd(${oldGcd}, ${numbers[i]}) = ${tempGcd}<br>`;
        }

        steps += `<br><strong>LCM 计算:</strong><br>`;
        steps += `LCM = ${numbers.join(" × ")} / GCD = ${lcmResult}<br>`;
        steps += `<br>公式: <code>LCM(a,b) = |a×b| / GCD(a,b)</code>`;

        document.getElementById("stepsContent").innerHTML = steps;
        document.getElementById("results").style.display = "grid";
        document.getElementById("steps").style.display = "block";
      }

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
