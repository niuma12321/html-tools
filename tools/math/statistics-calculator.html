<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta property="og:title" content="统计计算器 - WebUtils" />
    <meta property="og:description" content="统计计算器：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/math/statistics-calculator.html"
    />

    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/math/statistics-calculator.html"
    />
    <meta name="description" content="计算平均值、中位数、众数、标准差、方差等统计指标" />
    <meta name="keywords" content="统计计算 平均值 中位数 标准差 方差 statistics" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .input-section label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .input-section textarea {
        width: 100%;
        height: 100px;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        font-family: ui-monospace, monospace;
        font-size: 0.9rem;
        resize: vertical;
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      .input-hint {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 6px;
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        font-size: 1rem;
        margin-top: 16px;
      }
      .btn.primary {
        background: var(--accent-cyan);
        color: #fff;
      }
      .btn:hover {
        opacity: 0.9;
      }
      .results {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-top: 24px;
      }
      .result-item {
        background: var(--bg-deep);
        padding: 16px;
        border-radius: var(--radius-md);
        text-align: center;
      }
      .result-item .label {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      .result-item .value {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--accent-cyan);
        font-family: ui-monospace, monospace;
      }
      .data-summary {
        margin-top: 20px;
        padding: 16px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
      }
      .data-summary h4 {
        margin: 0 0 8px;
        font-size: 0.95rem;
      }
      .data-summary p {
        margin: 4px 0;
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>统计计算器</h1>
      <p class="desc">输入数据集，计算各种统计指标</p>

      <div class="card">
        <div class="input-section">
          <label>输入数据</label>
          <textarea
            id="dataInput"
            placeholder="输入数字，用逗号、空格或换行分隔&#10;例如: 1, 2, 3, 4, 5&#10;或: 1 2 3 4 5"
          >
85, 90, 78, 92, 88, 76, 95, 82, 89, 91</textarea
          >
          <p class="input-hint">支持逗号、空格、换行分隔的数字</p>
        </div>

        <button class="btn primary" onclick="calculate()">计算统计指标</button>

        <div class="results" id="results" style="display: none">
          <div class="result-item">
            <div class="label">数据个数 (n)</div>
            <div class="value" id="count">-</div>
          </div>
          <div class="result-item">
            <div class="label">总和 (Σx)</div>
            <div class="value" id="sum">-</div>
          </div>
          <div class="result-item">
            <div class="label">平均值 (x̄)</div>
            <div class="value" id="mean">-</div>
          </div>
          <div class="result-item">
            <div class="label">中位数</div>
            <div class="value" id="median">-</div>
          </div>
          <div class="result-item">
            <div class="label">众数</div>
            <div class="value" id="mode">-</div>
          </div>
          <div class="result-item">
            <div class="label">极差</div>
            <div class="value" id="range">-</div>
          </div>
          <div class="result-item">
            <div class="label">最小值</div>
            <div class="value" id="min">-</div>
          </div>
          <div class="result-item">
            <div class="label">最大值</div>
            <div class="value" id="max">-</div>
          </div>
          <div class="result-item">
            <div class="label">方差 (σ²)</div>
            <div class="value" id="variance">-</div>
          </div>
          <div class="result-item">
            <div class="label">标准差 (σ)</div>
            <div class="value" id="stddev">-</div>
          </div>
          <div class="result-item">
            <div class="label">样本方差 (s²)</div>
            <div class="value" id="sampleVariance">-</div>
          </div>
          <div class="result-item">
            <div class="label">样本标准差 (s)</div>
            <div class="value" id="sampleStddev">-</div>
          </div>
        </div>

        <div class="data-summary" id="summary" style="display: none">
          <h4>数据摘要</h4>
          <p id="sortedData"></p>
          <p id="quartiles"></p>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function parseData(input) {
        return input
          .split(/[,\s\n]+/)
          .map((s) => s.trim())
          .filter((s) => s !== "")
          .map((s) => parseFloat(s))
          .filter((n) => !isNaN(n));
      }

      function calculate() {
        const input = document.getElementById("dataInput").value;
        const data = parseData(input);

        if (data.length === 0) {
          alert("请输入有效的数字数据");
          return;
        }

        const sorted = [...data].sort((a, b) => a - b);
        const n = data.length;
        const sum = data.reduce((a, b) => a + b, 0);
        const mean = sum / n;

        // 中位数
        const median =
          n % 2 === 0 ? (sorted[n / 2 - 1] + sorted[n / 2]) / 2 : sorted[Math.floor(n / 2)];

        // 众数
        const frequency = {};
        data.forEach((x) => (frequency[x] = (frequency[x] || 0) + 1));
        const maxFreq = Math.max(...Object.values(frequency));
        const modes = Object.keys(frequency)
          .filter((k) => frequency[k] === maxFreq)
          .map(Number);
        const modeStr = maxFreq === 1 ? "无" : modes.join(", ");

        // 极差
        const min = sorted[0];
        const max = sorted[n - 1];
        const range = max - min;

        // 方差和标准差（总体）
        const variance = data.reduce((acc, x) => acc + Math.pow(x - mean, 2), 0) / n;
        const stddev = Math.sqrt(variance);

        // 样本方差和标准差
        const sampleVariance =
          n > 1 ? data.reduce((acc, x) => acc + Math.pow(x - mean, 2), 0) / (n - 1) : 0;
        const sampleStddev = Math.sqrt(sampleVariance);

        // 四分位数
        const q1 = sorted[Math.floor(n * 0.25)];
        const q3 = sorted[Math.floor(n * 0.75)];

        // 更新显示
        document.getElementById("count").textContent = n;
        document.getElementById("sum").textContent = formatNum(sum);
        document.getElementById("mean").textContent = formatNum(mean);
        document.getElementById("median").textContent = formatNum(median);
        document.getElementById("mode").textContent = modeStr;
        document.getElementById("range").textContent = formatNum(range);
        document.getElementById("min").textContent = formatNum(min);
        document.getElementById("max").textContent = formatNum(max);
        document.getElementById("variance").textContent = formatNum(variance);
        document.getElementById("stddev").textContent = formatNum(stddev);
        document.getElementById("sampleVariance").textContent = formatNum(sampleVariance);
        document.getElementById("sampleStddev").textContent = formatNum(sampleStddev);

        document.getElementById("sortedData").textContent =
          `排序后: ${sorted.map(formatNum).join(", ")}`;
        document.getElementById("quartiles").textContent =
          `四分位数: Q1=${formatNum(q1)}, Q2(中位数)=${formatNum(median)}, Q3=${formatNum(q3)}`;

        document.getElementById("results").style.display = "grid";
        document.getElementById("summary").style.display = "block";
      }

      function formatNum(n) {
        if (Number.isInteger(n)) return n.toString();
        return parseFloat(n.toFixed(4)).toString();
      }

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
