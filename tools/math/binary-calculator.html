<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>二进制计算器 - WebUtils</title>
    <meta property="og:title" content="二进制计算器 - WebUtils" />
    <meta property="og:description" content="二进制计算器：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/math/binary-calculator.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/math/binary-calculator.html" />
    <meta name="description" content="二进制位运算和逻辑运算计算器" />
    <meta name="keywords" content="binary calculator 二进制 位运算 AND OR XOR NOT" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .input-group {
        margin-bottom: 16px;
      }
      .input-group label {
        display: block;
        font-weight: 500;
        margin-bottom: 8px;
      }
      .input-row {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .input-row input {
        flex: 1;
        padding: 12px;
        font-family: ui-monospace, monospace;
        font-size: 1rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      .input-row select {
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      .operators {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin: 20px 0;
      }
      .op-btn {
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .op-btn:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }
      .op-btn.active {
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
        color: #fff;
      }
      .result-section {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--border-subtle);
      }
      .result-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        margin-bottom: 8px;
      }
      .result-item .label {
        font-weight: 500;
      }
      .result-item .value {
        font-family: ui-monospace, monospace;
        font-weight: 600;
        color: var(--accent-cyan);
        word-break: break-all;
      }
      .bit-display {
        display: flex;
        gap: 2px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .bit {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: ui-monospace, monospace;
        font-size: 0.9rem;
        border-radius: 4px;
      }
      .bit.one {
        background: var(--accent-cyan);
        color: #fff;
      }
      .bit.zero {
        background: var(--bg-deep);
        color: var(--text-muted);
        border: 1px solid var(--border-subtle);
      }
      .bit-separator {
        width: 8px;
      }
      h4 {
        margin: 16px 0 8px;
        font-size: 0.95rem;
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>二进制计算器</h1>
      <p class="desc">位运算和逻辑运算</p>

      <div class="card">
        <div class="input-group">
          <label>数值 A</label>
          <div class="input-row">
            <input
              type="text"
              id="inputA"
              value="42"
              oninput="calculate()"
              aria-label="文本输入框"
              placeholder="请输入文本输入框"
            />
            <select id="baseA" onchange="calculate()">
              <option value="10">十进制</option>
              <option value="2">二进制</option>
              <option value="16">十六进制</option>
            </select>
          </div>
        </div>

        <div class="operators">
          <button class="op-btn active" onclick="setOp('AND', this)" aria-label="AND">AND</button>
          <button class="op-btn" onclick="setOp('OR', this)" aria-label="OR">OR</button>
          <button class="op-btn" onclick="setOp('XOR', this)" aria-label="XOR">XOR</button>
          <button class="op-btn" onclick="setOp('NOT', this)" aria-label="NOT">NOT</button>
          <button class="op-btn" onclick="setOp('LSHIFT', this)" aria-label="左移 &lt;&lt;">
            左移 &lt;&lt;
          </button>
          <button class="op-btn" onclick="setOp('RSHIFT', this)" aria-label="右移 &gt;&gt;">
            右移 &gt;&gt;
          </button>
          <button class="op-btn" onclick="setOp('ADD', this)" aria-label="加">加</button>
          <button class="op-btn" onclick="setOp('SUB', this)" aria-label="减">减</button>
        </div>

        <div class="input-group" id="inputBGroup">
          <label>数值 B</label>
          <div class="input-row">
            <input
              type="text"
              id="inputB"
              value="15"
              oninput="calculate()"
              aria-label="文本输入框"
              placeholder="请输入文本输入框"
            />
            <select id="baseB" onchange="calculate()">
              <option value="10">十进制</option>
              <option value="2">二进制</option>
              <option value="16">十六进制</option>
            </select>
          </div>
        </div>

        <div class="result-section">
          <h4>数值 A 二进制表示</h4>
          <div class="bit-display" id="bitsA"></div>

          <h4 id="bitsBlabel">数值 B 二进制表示</h4>
          <div class="bit-display" id="bitsB"></div>

          <h4>计算结果</h4>
          <div class="result-item">
            <span class="label">二进制</span>
            <span class="value" id="resultBin">-</span>
          </div>
          <div class="result-item">
            <span class="label">十进制</span>
            <span class="value" id="resultDec">-</span>
          </div>
          <div class="result-item">
            <span class="label">十六进制</span>
            <span class="value" id="resultHex">-</span>
          </div>

          <h4>结果二进制表示</h4>
          <div class="bit-display" id="bitsResult"></div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      let currentOp = "AND";

      function setOp(op, btn) {
        currentOp = op;
        document.querySelectorAll(".op-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        const isSingleOp = op === "NOT";
        document.getElementById("inputBGroup").style.display = isSingleOp ? "none" : "block";
        document.getElementById("bitsBlabel").style.display = isSingleOp ? "none" : "block";
        document.getElementById("bitsB").style.display = isSingleOp ? "none" : "flex";

        calculate();
      }

      function parseValue(input, base) {
        const val = input.trim();
        if (!val) return NaN;
        return parseInt(val, base);
      }

      function renderBits(num, containerId) {
        const container = document.getElementById(containerId);
        if (isNaN(num)) {
          container.innerHTML = '<span style="color:var(--text-muted)">-</span>';
          return;
        }

        const isNeg = num < 0;
        const absNum = Math.abs(num);
        let binary = absNum.toString(2).padStart(8, "0");
        if (binary.length > 32) binary = binary.slice(-32);
        while (binary.length < 8 || binary.length % 4 !== 0) {
          binary = "0" + binary;
        }

        let html = "";
        for (let i = 0; i < binary.length; i++) {
          if (i > 0 && i % 4 === 0) {
            html += '<div class="bit-separator"></div>';
          }
          html += `<div class="bit ${binary[i] === "1" ? "one" : "zero"}">${binary[i]}</div>`;
        }
        container.innerHTML =
          (isNeg ? '<span style="margin-right:8px;color:var(--accent-cyan)">-</span>' : "") + html;
      }

      function calculate() {
        const baseA = parseInt(document.getElementById("baseA").value);
        const baseB = parseInt(document.getElementById("baseB").value);
        const a = parseValue(document.getElementById("inputA").value, baseA);
        const b = parseValue(document.getElementById("inputB").value, baseB);

        renderBits(a, "bitsA");
        renderBits(b, "bitsB");

        if (isNaN(a) || (currentOp !== "NOT" && isNaN(b))) {
          document.getElementById("resultBin").textContent = "-";
          document.getElementById("resultDec").textContent = "-";
          document.getElementById("resultHex").textContent = "-";
          document.getElementById("bitsResult").innerHTML =
            '<span style="color:var(--text-muted)">-</span>';
          return;
        }

        let result;
        switch (currentOp) {
          case "AND":
            result = a & b;
            break;
          case "OR":
            result = a | b;
            break;
          case "XOR":
            result = a ^ b;
            break;
          case "NOT":
            result = ~a;
            break;
          case "LSHIFT":
            result = a << b;
            break;
          case "RSHIFT":
            result = a >> b;
            break;
          case "ADD":
            result = a + b;
            break;
          case "SUB":
            result = a - b;
            break;
        }

        const absResult = Math.abs(result);
        document.getElementById("resultBin").textContent =
          (result < 0 ? "-" : "") + absResult.toString(2);
        document.getElementById("resultDec").textContent = result.toString(10);
        document.getElementById("resultHex").textContent =
          (result < 0 ? "-" : "") + absResult.toString(16).toUpperCase();
        renderBits(result, "bitsResult");
      }

      calculate();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
