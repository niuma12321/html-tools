<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>百分比计算器 - WebUtils</title>
    <meta property="og:title" content="百分比计算器 - WebUtils" />
    <meta property="og:description" content="百分比计算器：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/math/percentage-calculator.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/math/percentage-calculator.html"
    />
    <meta name="description" content="多种百分比计算模式，涨幅、折扣、占比计算" />
    <meta name="keywords" content="百分比计算器 percentage 涨幅 折扣 占比" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .card h3 {
        margin: 0 0 16px;
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .calc-row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .calc-row input {
        flex: 1;
        min-width: 80px;
        padding: 12px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        font-size: 1rem;
        text-align: center;
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .calc-row span {
        color: var(--text-muted);
        font-weight: 500;
      }
      .result {
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        padding: 16px;
        text-align: center;
        margin-top: 16px;
      }
      .result .value {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--accent-cyan);
      }
      .result .label {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 4px;
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>百分比计算器</h1>
      <p class="desc">多种百分比计算模式</p>

      <div class="card">
        <h3>📊 X 的 Y% 是多少？</h3>
        <div class="calc-row">
          <input type="number" id="calc1_x" placeholder="数值" oninput="calc1()" />
          <span>的</span>
          <input type="number" id="calc1_y" placeholder="百分比" oninput="calc1()" />
          <span>%</span>
        </div>
        <div class="result">
          <div class="value" id="result1">-</div>
          <div class="label">结果</div>
        </div>
      </div>

      <div class="card">
        <h3>📈 X 是 Y 的百分之多少？</h3>
        <div class="calc-row">
          <input type="number" id="calc2_x" placeholder="部分" oninput="calc2()" />
          <span>是</span>
          <input type="number" id="calc2_y" placeholder="整体" oninput="calc2()" />
          <span>的</span>
        </div>
        <div class="result">
          <div class="value" id="result2">-</div>
          <div class="label">占比</div>
        </div>
      </div>

      <div class="card">
        <h3>💰 从 X 变到 Y 的涨跌幅</h3>
        <div class="calc-row">
          <input type="number" id="calc3_x" placeholder="原值" oninput="calc3()" />
          <span>→</span>
          <input type="number" id="calc3_y" placeholder="现值" oninput="calc3()" />
        </div>
        <div class="result">
          <div class="value" id="result3">-</div>
          <div class="label">变化率</div>
        </div>
      </div>

      <div class="card">
        <h3>🏷️ X 打 Y 折后的价格</h3>
        <div class="calc-row">
          <input type="number" id="calc4_x" placeholder="原价" oninput="calc4()" />
          <span>打</span>
          <input type="number" id="calc4_y" placeholder="折扣" value="8" oninput="calc4()" />
          <span>折</span>
        </div>
        <div class="result">
          <div class="value" id="result4">-</div>
          <div class="label">折后价</div>
        </div>
      </div>

      <div class="card">
        <h3>➕ X 加上 Y% 是多少？</h3>
        <div class="calc-row">
          <input type="number" id="calc5_x" placeholder="数值" oninput="calc5()" />
          <span>+</span>
          <input type="number" id="calc5_y" placeholder="百分比" oninput="calc5()" />
          <span>%</span>
        </div>
        <div class="result">
          <div class="value" id="result5">-</div>
          <div class="label">增加后</div>
        </div>
      </div>

      <div class="card">
        <h3>➖ X 减去 Y% 是多少？</h3>
        <div class="calc-row">
          <input type="number" id="calc6_x" placeholder="数值" oninput="calc6()" />
          <span>-</span>
          <input type="number" id="calc6_y" placeholder="百分比" oninput="calc6()" />
          <span>%</span>
        </div>
        <div class="result">
          <div class="value" id="result6">-</div>
          <div class="label">减少后</div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function formatNum(n) {
        if (isNaN(n) || !isFinite(n)) return "-";
        return n.toLocaleString("zh-CN", { maximumFractionDigits: 4 });
      }

      function calc1() {
        const x = parseFloat(document.getElementById("calc1_x").value);
        const y = parseFloat(document.getElementById("calc1_y").value);
        const result = (x * y) / 100;
        document.getElementById("result1").textContent = formatNum(result);
      }

      function calc2() {
        const x = parseFloat(document.getElementById("calc2_x").value);
        const y = parseFloat(document.getElementById("calc2_y").value);
        const result = (x / y) * 100;
        document.getElementById("result2").textContent = formatNum(result) + "%";
      }

      function calc3() {
        const x = parseFloat(document.getElementById("calc3_x").value);
        const y = parseFloat(document.getElementById("calc3_y").value);
        const result = ((y - x) / x) * 100;
        const prefix = result >= 0 ? "+" : "";
        document.getElementById("result3").textContent = prefix + formatNum(result) + "%";
        document.getElementById("result3").style.color = result >= 0 ? "#10b981" : "#ef4444";
      }

      function calc4() {
        const x = parseFloat(document.getElementById("calc4_x").value);
        const y = parseFloat(document.getElementById("calc4_y").value);
        const result = (x * y) / 10;
        document.getElementById("result4").textContent = formatNum(result);
      }

      function calc5() {
        const x = parseFloat(document.getElementById("calc5_x").value);
        const y = parseFloat(document.getElementById("calc5_y").value);
        const result = x * (1 + y / 100);
        document.getElementById("result5").textContent = formatNum(result);
      }

      function calc6() {
        const x = parseFloat(document.getElementById("calc6_x").value);
        const y = parseFloat(document.getElementById("calc6_y").value);
        const result = x * (1 - y / 100);
        document.getElementById("result6").textContent = formatNum(result);
      }

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
