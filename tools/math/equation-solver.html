<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>方程求解器 - WebUtils</title>
    <meta property="og:title" content="方程求解器 - WebUtils" />
    <meta property="og:description" content="方程求解器：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/math/equation-solver.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/math/equation-solver.html" />
    <meta name="description" content="求解一元一次方程、一元二次方程" />
    <meta name="keywords" content="方程求解 equation solver 一元二次方程 数学计算" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }
      .tab {
        padding: 10px 20px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        cursor: pointer;
        background: var(--bg-card);
        color: var(--text-primary);
        font-size: 0.9rem;
      }
      .tab:hover {
        border-color: var(--accent-cyan);
      }
      .tab.active {
        background: var(--accent-cyan);
        color: #fff;
        border-color: var(--accent-cyan);
      }
      .equation-form {
        margin-bottom: 20px;
      }
      .equation-display {
        font-size: 1.5rem;
        text-align: center;
        padding: 20px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        margin-bottom: 20px;
        font-family: "Times New Roman", serif;
      }
      .coefficients {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .coef-group {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .coef-group label {
        font-weight: 500;
        font-size: 1.1rem;
      }
      .coef-group input {
        width: 80px;
        padding: 10px;
        text-align: center;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        font-size: 1rem;
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        font-size: 1rem;
      }
      .btn.primary {
        background: var(--accent-cyan);
        color: #fff;
      }
      .btn.primary:hover {
        opacity: 0.9;
      }
      .btn-row {
        display: flex;
        gap: 12px;
      }
      .result {
        margin-top: 20px;
        padding: 20px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
      }
      .result h3 {
        margin: 0 0 12px;
        font-size: 1rem;
      }
      .result-value {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--accent-cyan);
        margin-bottom: 8px;
      }
      .result-detail {
        font-size: 0.9rem;
        color: var(--text-muted);
        line-height: 1.6;
      }
      .error {
        color: var(--accent-red);
      }
      .formula-info {
        margin-top: 20px;
        padding: 16px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        font-size: 0.85rem;
      }
      .formula-info h4 {
        margin: 0 0 8px;
      }
      .formula-info code {
        background: var(--bg-card);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: ui-monospace, monospace;
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>方程求解器</h1>
      <p class="desc">求解一元一次方程和一元二次方程</p>

      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="switchType('linear')" aria-label="一元一次方程">
            一元一次方程
          </button>
          <button class="tab" onclick="switchType('quadratic')" aria-label="一元二次方程">
            一元二次方程
          </button>
        </div>

        <div id="linearForm" class="equation-form">
          <div class="equation-display">ax + b = 0</div>
          <div class="coefficients">
            <div class="coef-group">
              <label for="input-a--">a =</label>
              <input
                type="number"
                id="linear_a"
                value="2"
                step="any"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="coef-group">
              <label for="input-b--">b =</label>
              <input
                type="number"
                id="linear_b"
                value="6"
                step="any"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
          </div>
        </div>

        <div id="quadraticForm" class="equation-form" style="display: none">
          <div class="equation-display">ax² + bx + c = 0</div>
          <div class="coefficients">
            <div class="coef-group">
              <label for="input-a--">a =</label>
              <input
                type="number"
                id="quad_a"
                value="1"
                step="any"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="coef-group">
              <label for="input-b--">b =</label>
              <input
                type="number"
                id="quad_b"
                value="-5"
                step="any"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="coef-group">
              <label for="input-c--">c =</label>
              <input
                type="number"
                id="quad_c"
                value="6"
                step="any"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn primary" onclick="solve()" aria-label="求解">求解</button>
        </div>

        <div class="result" id="result" style="display: none">
          <h3>解</h3>
          <div class="result-value" id="resultValue"></div>
          <div class="result-detail" id="resultDetail"></div>
        </div>

        <div class="formula-info" id="formulaInfo">
          <h4>一元一次方程 ax + b = 0</h4>
          <p>
            解:
            <code>x = -b/a</code>
            (a ≠ 0)
          </p>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      let currentType = "linear";

      function switchType(type) {
        currentType = type;
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document
          .querySelector(`.tab:nth-child(${type === "linear" ? 1 : 2})`)
          .classList.add("active");

        document.getElementById("linearForm").style.display = type === "linear" ? "block" : "none";
        document.getElementById("quadraticForm").style.display =
          type === "quadratic" ? "block" : "none";
        document.getElementById("result").style.display = "none";

        const formulaInfo = document.getElementById("formulaInfo");
        if (type === "linear") {
          formulaInfo.innerHTML = `<h4>一元一次方程 ax + b = 0</h4><p>解: <code>x = -b/a</code> (a ≠ 0)</p>`;
        } else {
          formulaInfo.innerHTML = `<h4>一元二次方程 ax² + bx + c = 0</h4><p>判别式: <code>Δ = b² - 4ac</code></p><p>求根公式: <code>x = (-b ± √Δ) / 2a</code></p>`;
        }
      }

      function solve() {
        const resultEl = document.getElementById("result");
        const valueEl = document.getElementById("resultValue");
        const detailEl = document.getElementById("resultDetail");

        if (currentType === "linear") {
          const a = parseFloat(document.getElementById("linear_a").value);
          const b = parseFloat(document.getElementById("linear_b").value);

          if (a === 0) {
            if (b === 0) {
              valueEl.innerHTML = "无穷多解";
              detailEl.textContent = "方程 0 = 0 对任意 x 成立";
            } else {
              valueEl.innerHTML = '<span class="error">无解</span>';
              detailEl.textContent = `方程 ${b} = 0 不成立`;
            }
          } else {
            const x = -b / a;
            valueEl.textContent = `x = ${formatNumber(x)}`;
            detailEl.innerHTML = `
            方程: ${formatCoef(a)}x ${formatSign(b)} = 0<br>
            解: x = -${formatNumber(b)} / ${formatNumber(a)} = ${formatNumber(x)}<br>
            验证: ${formatNumber(a)} × ${formatNumber(x)} + ${formatNumber(b)} = ${formatNumber(a * x + b)}
          `;
          }
        } else {
          const a = parseFloat(document.getElementById("quad_a").value);
          const b = parseFloat(document.getElementById("quad_b").value);
          const c = parseFloat(document.getElementById("quad_c").value);

          if (a === 0) {
            valueEl.innerHTML = '<span class="error">a 不能为 0</span>';
            detailEl.textContent = "这不是一个二次方程，请使用一元一次方程求解";
          } else {
            const delta = b * b - 4 * a * c;
            let solutions;

            if (delta > 0) {
              const x1 = (-b + Math.sqrt(delta)) / (2 * a);
              const x2 = (-b - Math.sqrt(delta)) / (2 * a);
              valueEl.textContent = `x₁ = ${formatNumber(x1)}, x₂ = ${formatNumber(x2)}`;
              solutions = "两个不相等的实根";
            } else if (delta === 0) {
              const x = -b / (2 * a);
              valueEl.textContent = `x = ${formatNumber(x)}`;
              solutions = "两个相等的实根（重根）";
            } else {
              const realPart = -b / (2 * a);
              const imagPart = Math.sqrt(-delta) / (2 * a);
              valueEl.textContent = `x₁ = ${formatNumber(realPart)} + ${formatNumber(imagPart)}i, x₂ = ${formatNumber(realPart)} - ${formatNumber(imagPart)}i`;
              solutions = "两个共轭复根";
            }

            detailEl.innerHTML = `
            方程: ${formatCoef(a)}x² ${formatSign(b)}x ${formatSign(c)} = 0<br>
            判别式: Δ = ${formatNumber(b)}² - 4 × ${formatNumber(a)} × ${formatNumber(c)} = ${formatNumber(delta)}<br>
            结论: ${solutions}
          `;
          }
        }

        resultEl.style.display = "block";
      }

      function formatNumber(n) {
        if (Number.isInteger(n)) return n.toString();
        return parseFloat(n.toFixed(6)).toString();
      }

      function formatCoef(n) {
        if (n === 1) return "";
        if (n === -1) return "-";
        return n.toString();
      }

      function formatSign(n) {
        return n >= 0 ? `+ ${Math.abs(n)}` : `- ${Math.abs(n)}`;
      }

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
