      }

      .perm-option {

      .command-title {

        font-size: 12px;

      }

      .common-permissions {

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      Chmod 计算器
    </nav>
    <div class="container">
      <h1>🔐 Chmod权限计算器</h1>
      <div class="card">
        <div class="result">
          <div class="result-numeric" id="numeric">755</div>
          <div class="result-symbolic" id="symbolic">rwxr-xr-x</div>
        </div>
        <div class="permissions">
          <div class="perm-group">
            <div class="perm-title owner">所有者 (Owner)</div>
            <div class="perm-option">
              <input type="checkbox" id="or" checked onchange="calc()" />
              <label for="or">读取 (r) = 4</label>
            </div>
            <div class="perm-option">
              <input type="checkbox" id="ow" checked onchange="calc()" />
              <label for="ow">写入 (w) = 2</label>
            </div>
            <div class="perm-option">
              <input type="checkbox" id="ox" checked onchange="calc()" />
              <label for="ox">执行 (x) = 1</label>
            </div>
          </div>
          <div class="perm-group">
            <div class="perm-title group">用户组 (Group)</div>
            <div class="perm-option">
              <input type="checkbox" id="gr" checked onchange="calc()" />
              <label for="gr">读取 (r) = 4</label>
            </div>
            <div class="perm-option">
              <input type="checkbox" id="gw" onchange="calc()" />
              <label for="gw">写入 (w) = 2</label>
            </div>
            <div class="perm-option">
              <input type="checkbox" id="gx" checked onchange="calc()" />
              <label for="gx">执行 (x) = 1</label>
            </div>
          </div>
          <div class="perm-group">
            <div class="perm-title other">其他人 (Other)</div>
            <div class="perm-option">
              <input type="checkbox" id="tr" checked onchange="calc()" />
              <label for="tr">读取 (r) = 4</label>
            </div>
            <div class="perm-option">
              <input type="checkbox" id="tw" onchange="calc()" />
              <label for="tw">写入 (w) = 2</label>
            </div>
            <div class="perm-option">
              <input type="checkbox" id="tx" checked onchange="calc()" />
              <label for="tx">执行 (x) = 1</label>
            </div>
          </div>
        </div>
        <div class="command">
          <div class="command-title">Linux命令</div>
          <div class="command-text" id="command">chmod 755 filename</div>
          <div class="action-buttons">
            <button class="btn btn-primary" onclick="copyCommand()">📋 复制命令</button>
            <button class="btn btn-secondary" onclick="resetPerms()">🔄 重置</button>
          </div>
        </div>
        <div class="common-permissions">
          <div class="common-title">常用权限</div>
          <div class="common-grid">
            <div class="common-item" onclick="setPerms(7, 7, 7)">
              <div class="common-value">777</div>
              <div class="common-desc">完全开放</div>
            </div>
            <div class="common-item" onclick="setPerms(7, 5, 5)">
              <div class="common-value">755</div>
              <div class="common-desc">可执行文件</div>
            </div>
            <div class="common-item" onclick="setPerms(7, 4, 4)">
              <div class="common-value">744</div>
              <div class="common-desc">脚本文件</div>
            </div>
            <div class="common-item" onclick="setPerms(6, 4, 4)">
              <div class="common-value">644</div>
              <div class="common-desc">普通文件</div>
            </div>
            <div class="common-item" onclick="setPerms(6, 0, 0)">
              <div class="common-value">600</div>
              <div class="common-desc">私密文件</div>
            </div>
            <div class="common-item" onclick="setPerms(7, 0, 0)">
              <div class="common-value">700</div>
              <div class="common-desc">私密目录</div>
            </div>
            <div class="common-item" onclick="setPerms(4, 0, 0)">
              <div class="common-value">400</div>
              <div class="common-desc">只读私密</div>
            </div>
            <div class="common-item" onclick="setPerms(0, 0, 0)">
              <div class="common-value">000</div>
              <div class="common-desc">无权限</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      function calc() {
        const o =
          (document.getElementById("or").checked ? 4 : 0) +
          (document.getElementById("ow").checked ? 2 : 0) +
          (document.getElementById("ox").checked ? 1 : 0);
        const g =
          (document.getElementById("gr").checked ? 4 : 0) +
          (document.getElementById("gw").checked ? 2 : 0) +
          (document.getElementById("gx").checked ? 1 : 0);
        const t =
          (document.getElementById("tr").checked ? 4 : 0) +
          (document.getElementById("tw").checked ? 2 : 0) +
          (document.getElementById("tx").checked ? 1 : 0);
        const numeric = `${o}${g}${t}`;
        const toSymbolic = (n) => (n & 4 ? "r" : "-") + (n & 2 ? "w" : "-") + (n & 1 ? "x" : "-");
        const symbolic = toSymbolic(o) + toSymbolic(g) + toSymbolic(t);
        document.getElementById("numeric").textContent = numeric;
        document.getElementById("symbolic").textContent = symbolic;
        document.getElementById("command").textContent = `chmod ${numeric} filename`;
      }
      function setPerms(o, g, t) {
        document.getElementById("or").checked = o & 4;
        document.getElementById("ow").checked = o & 2;
        document.getElementById("ox").checked = o & 1;
        document.getElementById("gr").checked = g & 4;
        document.getElementById("gw").checked = g & 2;
        document.getElementById("gx").checked = g & 1;
        document.getElementById("tr").checked = t & 4;
        document.getElementById("tw").checked = t & 2;
        document.getElementById("tx").checked = t & 1;
        calc();
      }
      function copyCommand() {
        const command = document.getElementById("command").textContent;
        navigator.clipboard.writeText(command).then(() => {
          const btn = event.target;
          const originalText = btn.textContent;
          btn.textContent = "✅ 已复制！";
          setTimeout(() => {
            btn.textContent = originalText;
          }, 2000);
        });
      }
      function resetPerms() {
        setPerms(7, 5, 5); // 默认 755
      }
      calc();
    </script>
  </body>
