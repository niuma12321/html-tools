    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;

        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:

        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;

        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 245, 212, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 245, 212, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;

        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 2rem;
        padding: 0.5rem 0.75rem;
        border-radius: var(--radius-sm);
        transition: all 0.2s;
      }
      .back-link:hover {
        color: var(--color-accent-cyan);
        background: var(--color-bg-card);
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--color-accent-cyan));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
      }
      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .card-title {
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: 1rem;
        font-size: 0.9rem;
      }
      textarea {
        width: 100%;
        height: 100px;
        padding: 1rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        font-size: 0.9rem;
        resize: vertical;
        margin-bottom: 1rem;
      }
      textarea:focus {
        outline: none;
        border-color: var(--color-accent-cyan);
      }
      .btn {
        padding: 0.5rem 1rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--bg-hover);
        color: var(--color-text-primary);
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s;
        margin-right: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .btn:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }
      .output {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 1rem;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        word-break: break-all;
        min-height: 60px;
      }
      .char-table {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 0.75rem;
        margin-top: 1rem;
      }
      .char-item {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 0.75rem;
        text-align: center;
      }

        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      .char-info {
        font-size: 0.75rem;
        color: var(--text-muted);
        font-family: var(--font-mono);

      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      Unicode 转换器
    </nav>
    <div class="bg-grid"></div>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
      <h1>Unicode 转换器</h1>
      <p class="subtitle">字符与 Unicode 编码互转</p>

      <div class="card">
        <div class="card-title">文本 → Unicode</div>
        <textarea id="textInput" placeholder="输入文本...">你好世界 Hello</textarea>
        <button class="btn" onclick="toUnicodeEscape()">转 \uXXXX</button>
        <button class="btn" onclick="toHtmlEntity()">转 HTML 实体</button>
        <button class="btn" onclick="toCodePoints()">转码位</button>
        <button class="btn" onclick="toUtf8Hex()">转 UTF-8 Hex</button>
        <div class="output" id="encodeOutput"></div>
      </div>

      <div class="card">
        <div class="card-title">Unicode → 文本</div>
        <textarea
          id="unicodeInput"
          placeholder="输入 Unicode (如 \u4f60\u597d 或 &#x4f60; 或 U+4F60)"
        ></textarea>
        <button class="btn" onclick="fromUnicode()">解码</button>
        <div class="output" id="decodeOutput"></div>
      </div>

      <div class="card">
        <div class="card-title">字符详情</div>
        <div class="char-table" id="charTable"></div>
      </div>

      <footer>
        <a href="https://github.com/chicogong/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>
    <script>
      const textInput = document.getElementById("textInput");
      const encodeOutput = document.getElementById("encodeOutput");
      const unicodeInput = document.getElementById("unicodeInput");
      const decodeOutput = document.getElementById("decodeOutput");
      const charTable = document.getElementById("charTable");

      textInput.addEventListener("input", updateCharTable);

      function toUnicodeEscape() {
        const text = textInput.value;
        const result = Array.from(text)
          .map((c) => {
            const code = c.codePointAt(0);
            if (code > 0xffff) {
              return "\\u{" + code.toString(16).toUpperCase() + "}";
            }
            return "\\u" + code.toString(16).toUpperCase().padStart(4, "0");
          })
          .join("");
        encodeOutput.textContent = result;
      }

      window.toHtmlEntity = function () {
        const text = textInput.value;
        const result = Array.from(text)
          .map((c) => {
            return "&#x" + c.codePointAt(0).toString(16).toUpperCase() + ";";
          })
          .join("");
        encodeOutput.textContent = result;
      };

      window.toCodePoints = function () {
        const text = textInput.value;
        const result = Array.from(text)
          .map((c) => {
            return "U+" + c.codePointAt(0).toString(16).toUpperCase().padStart(4, "0");
          })
          .join(" ");
        encodeOutput.textContent = result;
      };

      window.toUtf8Hex = function () {
        const text = textInput.value;
        const encoder = new TextEncoder();
        const bytes = encoder.encode(text);
        const result = Array.from(bytes)
          .map((b) => b.toString(16).toUpperCase().padStart(2, "0"))
          .join(" ");
        encodeOutput.textContent = result;
      };

      window.fromUnicode = function () {
        let text = unicodeInput.value;
        // Handle \uXXXX and \u{XXXXX}
        text = text.replace(/\\u\{([0-9a-fA-F]+)\}/g, (_, hex) =>
          String.fromCodePoint(parseInt(hex, 16))
        );
        text = text.replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) =>
          String.fromCharCode(parseInt(hex, 16))
        );
        // Handle &#xXXXX; and &#NNNN;
        text = text.replace(/&#x([0-9a-fA-F]+);/gi, (_, hex) =>
          String.fromCodePoint(parseInt(hex, 16))
        );
        text = text.replace(/&#(\d+);/g, (_, dec) => String.fromCodePoint(parseInt(dec, 10)));
        // Handle U+XXXX
        text = text.replace(/U\+([0-9a-fA-F]+)/gi, (_, hex) =>
          String.fromCodePoint(parseInt(hex, 16))
        );
        decodeOutput.textContent = text;
      };

      function updateCharTable() {
        const text = textInput.value;
        const chars = Array.from(text).slice(0, 20); // Limit to 20 chars
        charTable.innerHTML = chars
          .map((c) => {
            const code = c.codePointAt(0);
            return `<div class="char-item">
          <div class="char-display">${c}</div>
          <div class="char-info">U+${code.toString(16).toUpperCase().padStart(4, "0")}<br>${code}</div>
        </div>`;
          })
          .join("");
      }

      updateCharTable();
      toUnicodeEscape();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
