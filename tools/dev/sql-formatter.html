    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;

        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;

        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;

        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        background: #1a1a2e;
        min-height: 100vh;

        color: #00d9ff;

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;

      .card {
        background: #16213e;
        border-radius: 12px;
        padding: 20px;
      }
      h3 {
        color: #00d9ff;
        margin-bottom: 12px;
        font-size: 14px;
      }
      textarea {
        width: 100%;
        height: 350px;
        padding: 16px;
        background: #0f3460;
        border: 1px solid #00d9ff;
        border-radius: 8px;

        resize: vertical;
      }
      .output {
        width: 100%;
        height: 350px;
        padding: 16px;
        background: #0f3460;
        border: 1px solid #00d9ff;
        border-radius: 8px;
        color: #e0e0e0;
        font-family: Monaco, Menlo, monospace;
        font-size: 13px;
        overflow: auto;
        white-space: pre-wrap;
      }
      .options {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 16px;
      }
      .option {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .option label {
        font-size: 13px;
        color: #aaa;
      }
      select,
      input[type="number"] {
        padding: 8px 12px;
        background: #0f3460;
        border: 1px solid #00d9ff;
        border-radius: 6px;
        color: white;
      }
      .btn {
        padding: 10px 20px;
        background: #00d9ff;
        border: none;
        border-radius: 8px;
        color: #1a1a2e;
        font-weight: 600;
        cursor: pointer;
        margin-right: 8px;
      }
      .btn:hover {
        background: #0f8;
      }
      .templates {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }
      .template {
        padding: 6px 12px;
        background: #0f3460;
        border: 1px solid #555;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
      }
      .template:hover {
        border-color: #00d9ff;
      }
      .keyword {
        color: #569cd6;
        font-weight: bold;
      }
      .string {
        color: #ce9178;
      }
      .number {
        color: #b5cea8;
      }
      .function {
        color: #dcdcaa;
      }
      .comment {
        color: #6a9955;
      }

      .breadcrumb {
        background: rgba(255, 255, 255, 0.95);
        padding: 8px 15px;

      }

        color: #667eea;

      }

      }
      .breadcrumb span {

        margin: 0 5px;

        overflow: hidden;

      }

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"

  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      SQL 格式化
    </nav>
    <div class="container">
      <h1>📊 SQL格式化工具</h1>
      <div class="templates">
        <div class="template" onclick="setTemplate('select')">SELECT示例</div>
        <div class="template" onclick="setTemplate('join')">JOIN示例</div>
        <div class="template" onclick="setTemplate('subquery')">子查询示例</div>
        <div class="template" onclick="setTemplate('insert')">INSERT示例</div>
        <div class="template" onclick="setTemplate('update')">UPDATE示例</div>
        <div class="template" onclick="setTemplate('create')">CREATE示例</div>
      </div>
      <div class="layout">
        <div class="card">
          <h3>输入SQL</h3>
          <textarea id="sqlInput" oninput="formatSQL()" placeholder="输入SQL语句...">
SELECT u.id, u.name, u.email, o.order_id, o.total_amount FROM users u INNER JOIN orders o ON u.id = o.user_id WHERE u.status = 'active' AND o.created_at &gt;= '2024-01-01' ORDER BY o.total_amount DESC LIMIT 100;</textarea
          >
        </div>
        <div class="card">
          <h3>格式化结果</h3>
          <div class="output" id="sqlOutput"></div>
        </div>
      </div>
      <div class="card" style="margin-top: 20px">
        <div class="options">
          <div class="option">
            <label>关键字大小写</label>
            <select id="keywordCase" onchange="formatSQL()">
              <option value="upper">大写</option>
              <option value="lower">小写</option>
              <option value="capitalize">首字母大写</option>
            </select>
          </div>
          <div class="option">
            <label for="input------">缩进空格数</label>
            <input
              type="number"
              id="indentSize"
              value="2"
              min="1"
              max="8"
              onchange="formatSQL()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="option">
            <label for="input-------">每个子句换行</label>
            <input type="checkbox" id="newlineClause" checked onchange="formatSQL()" />
          </div>
        </div>
        <button class="btn" onclick="copySQL()" aria-label="📋 复制结果">📋 复制结果</button>
        <button class="btn" onclick="minifySQL()" aria-label="压缩SQL">压缩SQL</button>
        <button class="btn" onclick="clearAll()" aria-label="清空">清空</button>
      </div>
    </div>
    <script>
      const keywords = [
        "SELECT",
        "FROM",
        "WHERE",
        "AND",
        "OR",
        "NOT",
        "IN",
        "LIKE",
        "BETWEEN",
        "IS",
        "NULL",
        "JOIN",
        "INNER",
        "LEFT",
        "RIGHT",
        "OUTER",
        "FULL",
        "CROSS",
        "ON",
        "AS",
        "GROUP",
        "BY",
        "HAVING",
        "ORDER",
        "ASC",
        "DESC",
        "LIMIT",
        "OFFSET",
        "INSERT",
        "INTO",
        "VALUES",
        "UPDATE",
        "SET",
        "DELETE",
        "CREATE",
        "TABLE",
        "ALTER",
        "DROP",
        "INDEX",
        "VIEW",
        "DATABASE",
        "PRIMARY",
        "KEY",
        "FOREIGN",
        "REFERENCES",
        "UNIQUE",
        "DEFAULT",
        "CHECK",
        "CONSTRAINT",
        "CASCADE",
        "TRUNCATE",
        "DISTINCT",
        "ALL",
        "UNION",
        "EXCEPT",
        "INTERSECT",
        "CASE",
        "WHEN",
        "THEN",
        "ELSE",
        "END",
        "EXISTS",
        "ANY",
        "SOME"
      ];

      const functions = [
        "COUNT",
        "SUM",
        "AVG",
        "MIN",
        "MAX",
        "COALESCE",
        "NULLIF",
        "CAST",
        "CONVERT",
        "CONCAT",
        "SUBSTRING",
        "TRIM",
        "UPPER",
        "LOWER",
        "LENGTH",
        "REPLACE",
        "DATE",
        "NOW",
        "CURDATE",
        "YEAR",
        "MONTH",
        "DAY",
        "DATEDIFF",
        "DATE_FORMAT",
        "ROUND",
        "FLOOR",
        "CEIL",
        "ABS",
        "MOD",
        "POWER",
        "SQRT",
        "IF",
        "IFNULL",
        "IIF",
        "NVL",
        "DECODE"
      ];

      const mainClauses = [
        "SELECT",
        "FROM",
        "WHERE",
        "GROUP BY",
        "HAVING",
        "ORDER BY",
        "LIMIT",
        "INNER JOIN",
        "LEFT JOIN",
        "RIGHT JOIN",
        "FULL JOIN",
        "CROSS JOIN",
        "JOIN",
        "ON",
        "INSERT INTO",
        "VALUES",
        "UPDATE",
        "SET",
        "DELETE FROM",
        "CREATE TABLE",
        "ALTER TABLE",
        "DROP TABLE",
        "UNION",
        "UNION ALL"
      ];

      const templates = {
        select:
          "SELECT id, name, email FROM users WHERE status = 'active' ORDER BY created_at DESC LIMIT 10;",
        join: "SELECT u.name, o.order_id, o.total FROM users u INNER JOIN orders o ON u.id = o.user_id LEFT JOIN products p ON o.product_id = p.id WHERE u.status = 'active';",
        subquery:
          "SELECT * FROM users WHERE id IN (SELECT user_id FROM orders WHERE total_amount > 1000) AND created_at >= (SELECT MIN(created_at) FROM users WHERE status = 'vip');",
        insert:
          "INSERT INTO users (name, email, status, created_at) VALUES ('张三', 'zhangsan@example.com', 'active', NOW());",
        update:
          "UPDATE users SET status = 'inactive', updated_at = NOW() WHERE last_login < '2023-01-01' AND status = 'active';",
        create:
          "CREATE TABLE orders (id INT PRIMARY KEY AUTO_INCREMENT, user_id INT NOT NULL, product_name VARCHAR(255), quantity INT DEFAULT 1, total_amount DECIMAL(10,2), created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP, FOREIGN KEY (user_id) REFERENCES users(id));"
      };

      function setTemplate(name) {
        document.getElementById("sqlInput").value = templates[name];
        formatSQL();
      }

      function formatSQL() {
        let sql = document.getElementById("sqlInput").value.trim();
        if (!sql) {
          document.getElementById("sqlOutput").innerHTML = "";
          return;
        }

        const keywordCase = document.getElementById("keywordCase").value;
        const indentSize = parseInt(document.getElementById("indentSize").value);
        const newlineClause = document.getElementById("newlineClause").checked;
        const indent = " ".repeat(indentSize);

        // Normalize whitespace
        sql = sql.replace(/\s+/g, " ").trim();

        // Format main clauses
        if (newlineClause) {
          mainClauses.forEach((clause) => {
            const regex = new RegExp(`\\b(${clause})\\b`, "gi");
            sql = sql.replace(regex, "\n$1");
          });

          // Indent after some keywords
          sql = sql.replace(/\bAND\b/gi, "\n" + indent + "AND");
          sql = sql.replace(/\bOR\b/gi, "\n" + indent + "OR");
        }

        // Apply keyword case
        keywords.forEach((kw) => {
          const regex = new RegExp(`\\b(${kw})\\b`, "gi");
          sql = sql.replace(regex, (match) => {
            switch (keywordCase) {
              case "upper":
                return kw.toUpperCase();
              case "lower":
                return kw.toLowerCase();
              case "capitalize":
                return kw.charAt(0).toUpperCase() + kw.slice(1).toLowerCase();
              default:
                return match;
            }
          });
        });

        // Clean up
        sql = sql.replace(/^\n+/, "").replace(/\n{3,}/g, "\n\n");

        // Syntax highlight
        document.getElementById("sqlOutput").innerHTML = highlightSQL(sql);
      }

      function highlightSQL(sql) {
        let result = escapeHtml(sql);

        // Highlight keywords
        keywords.forEach((kw) => {
          const regex = new RegExp(`\\b(${kw})\\b`, "gi");
          result = result.replace(regex, '<span class="keyword">$1</span>');
        });

        // Highlight functions
        functions.forEach((fn) => {
          const regex = new RegExp(`\\b(${fn})\\s*\\(`, "gi");
          result = result.replace(regex, '<span class="function">$1</span>(');
        });

        // Highlight strings
        result = result.replace(/'([^']*)'/g, "<span class=\"string\">'$1'</span>");

        // Highlight numbers
        result = result.replace(/\b(\d+\.?\d*)\b/g, '<span class="number">$1</span>');

        // Highlight comments
        result = result.replace(/--(.*?)(\n|$)/g, '<span class="comment">--$1</span>$2');
        result = result.replace(/\/\*([\s\S]*?)\*\//g, '<span class="comment">/*$1*/</span>');

        return result;
      }

      function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function minifySQL() {
        let sql = document.getElementById("sqlInput").value;
        sql = sql
          .replace(/\s+/g, " ")
          .replace(/\s*([,()])\s*/g, "$1")
          .trim();
        document.getElementById("sqlInput").value = sql;
        formatSQL();
      }

      function copySQL() {
        const output = document.getElementById("sqlOutput").textContent;
        navigator.clipboard.writeText(output);
        alert("已复制到剪贴板!");
      }

      function clearAll() {
        document.getElementById("sqlInput").value = "";
        document.getElementById("sqlOutput").innerHTML = "";
      }

      formatSQL();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>
