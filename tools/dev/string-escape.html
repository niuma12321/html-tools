    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"

  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>字符串转义工具</h1>
      <p class="desc">转义和反转义字符串</p>

      <div class="card">
        <div class="options">
          <label>语言/格式:</label>
          <select id="format">
            <option value="javascript">JavaScript / JSON</option>
            <option value="html">HTML</option>
            <option value="url">URL</option>
            <option value="unicode">Unicode</option>
            <option value="regex">正则表达式</option>
          </select>
        </div>

        <div class="btn-row">
          <button class="btn primary" onclick="escapeStr()">转义 →</button>
          <button class="btn primary" onclick="unescapeStr()">← 反转义</button>
          <button class="btn" onclick="copyOutput()">复制结果</button>
          <button class="btn" onclick="clearAll()">清空</button>
        </div>

        <div class="editor-grid">
          <div class="editor-section">
            <h4>输入</h4>
            <textarea id="input" placeholder="输入要转义的文本...">
Hello "World"
This is a	tab and
new line.</textarea
            >
          </div>
          <div class="editor-section">
            <h4>输出</h4>
            <textarea id="output" readonly></textarea>
          </div>
        </div>

        <div class="escape-table">
          <h4>常用转义字符</h4>
          <table>
            <tr>
              <th>字符</th>
              <th>JavaScript</th>
              <th>HTML</th>
              <th>URL</th>
              <th>描述</th>
            </tr>
            <tr>
              <td>换行</td>
              <td><code>\n</code></td>
              <td><code>&lt;br&gt;</code></td>
              <td><code>%0A</code></td>
              <td>换行符</td>
            </tr>
            <tr>
              <td>Tab</td>
              <td><code>\t</code></td>
              <td><code>&amp;#9;</code></td>
              <td><code>%09</code></td>
              <td>制表符</td>
            </tr>
            <tr>
              <td>"</td>
              <td><code>\"</code></td>
              <td><code>&amp;quot;</code></td>
              <td><code>%22</code></td>
              <td>双引号</td>
            </tr>
            <tr>
              <td>'</td>
              <td><code>\'</code></td>
              <td><code>&amp;#39;</code></td>
              <td><code>%27</code></td>
              <td>单引号</td>
            </tr>
            <tr>
              <td>\</td>
              <td><code>\\</code></td>
              <td><code>\</code></td>
              <td><code>%5C</code></td>
              <td>反斜杠</td>
            </tr>
          </table>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function escapeStr() {
        const input = document.getElementById("input").value;
        const format = document.getElementById("format").value;
        let output = "";

        switch (format) {
          case "javascript":
            output = JSON.stringify(input);
            break;
          case "html":
            output = input
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;")
              .replace(/'/g, "&#39;");
            break;
          case "url":
            output = encodeURIComponent(input);
            break;
          case "unicode":
            output = input
              .split("")
              .map((char) => {
                const code = char.charCodeAt(0);
                if (code > 127) {
                  return "\\u" + code.toString(16).padStart(4, "0");
                }
                return char;
              })
              .join("");
            break;
          case "regex":
            output = input.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            break;
        }

        document.getElementById("output").value = output;
      }

      function unescapeStr() {
        const input = document.getElementById("input").value;
        const format = document.getElementById("format").value;
        let output = "";

        try {
          switch (format) {
            case "javascript":
              output = JSON.parse(input);
              break;
            case "html":
              const textarea = document.createElement("textarea");
              textarea.innerHTML = input;
              output = textarea.value;
              break;
            case "url":
              output = decodeURIComponent(input);
              break;
            case "unicode":
              output = input.replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) =>
                String.fromCharCode(parseInt(hex, 16))
              );
              break;
            case "regex":
              output = input.replace(/\\([.*+?^${}()|[\]\\])/g, "$1");
              break;
          }
        } catch (e) {
          output = "反转义错误: " + e.message;
        }

        document.getElementById("output").value = output;
      }

      function copyOutput() {
        const output = document.getElementById("output").value;
        if (output) {
          navigator.clipboard.writeText(output);
        }
      }

      function clearAll() {
        document.getElementById("input").value = "";
        document.getElementById("output").value = "";
      }

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
