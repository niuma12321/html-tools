<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lorem Ipsum 生成器 - WebUtils</title>
    <meta property="og:title" content="Lorem Ipsum 生成器 - WebUtils" />
    <meta
      property="og:description"
      content="Lorem Ipsum 生成器：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tools.realtime-ai.chat/tools/dev/lorem-ipsum.html" />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/dev/lorem-ipsum.html" />
    <meta name="description" content="生成 Lorem Ipsum 占位文本" />
    <meta name="keywords" content="lorem ipsum 占位文本 假文 生成器" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .options {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 20px;
        align-items: center;
      }
      .options label {
        font-weight: 500;
      }
      .options select,
      .options input {
        padding: 8px 12px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .options input[type="number"] {
        width: 80px;
      }
      .btn {
        padding: 10px 20px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
      }
      .btn:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }
      .btn.primary {
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
        color: #fff;
      }
      .output {
        margin-top: 20px;
      }
      .output textarea {
        width: 100%;
        height: 300px;
        padding: 16px;
        font-size: 0.95rem;
        line-height: 1.7;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        resize: vertical;
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      .btn-row {
        display: flex;
        gap: 12px;
        margin-top: 12px;
      }
      .stats {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 8px;
      }
      .status {
        font-size: 0.85rem;
        color: var(--accent-green);
        margin-top: 8px;
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>Lorem Ipsum 生成器</h1>
      <p class="desc">生成 Lorem Ipsum 占位文本</p>

      <div class="card">
        <div class="options">
          <label>类型:</label>
          <select id="type">
            <option value="paragraphs">段落</option>
            <option value="sentences">句子</option>
            <option value="words">单词</option>
          </select>
          <label>数量:</label>
          <input type="number" id="count" value="3" min="1" max="100" />
          <label>
            <input type="checkbox" id="startWithLorem" checked />
            以 Lorem ipsum 开头
          </label>
          <button class="btn primary" onclick="generate()">生成</button>
        </div>

        <div class="output">
          <textarea id="output" readonly placeholder="生成的文本将显示在这里..."></textarea>
          <div class="btn-row">
            <button class="btn" onclick="copyText()">复制</button>
            <button class="btn" onclick="generate()">重新生成</button>
          </div>
          <div class="stats" id="stats"></div>
          <div class="status" id="status"></div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      const words = [
        "lorem",
        "ipsum",
        "dolor",
        "sit",
        "amet",
        "consectetur",
        "adipiscing",
        "elit",
        "sed",
        "do",
        "eiusmod",
        "tempor",
        "incididunt",
        "ut",
        "labore",
        "et",
        "dolore",
        "magna",
        "aliqua",
        "enim",
        "ad",
        "minim",
        "veniam",
        "quis",
        "nostrud",
        "exercitation",
        "ullamco",
        "laboris",
        "nisi",
        "aliquip",
        "ex",
        "ea",
        "commodo",
        "consequat",
        "duis",
        "aute",
        "irure",
        "in",
        "reprehenderit",
        "voluptate",
        "velit",
        "esse",
        "cillum",
        "fugiat",
        "nulla",
        "pariatur",
        "excepteur",
        "sint",
        "occaecat",
        "cupidatat",
        "non",
        "proident",
        "sunt",
        "culpa",
        "qui",
        "officia",
        "deserunt",
        "mollit",
        "anim",
        "id",
        "est",
        "laborum",
        "at",
        "vero",
        "eos",
        "accusamus",
        "iusto",
        "odio",
        "dignissimos",
        "ducimus",
        "blanditiis",
        "praesentium",
        "voluptatum",
        "deleniti",
        "atque",
        "corrupti",
        "quos",
        "dolores",
        "quas",
        "molestias",
        "excepturi",
        "obcaecati",
        "cupiditate",
        "provident",
        "similique",
        "mollitia",
        "animi",
        "ratione",
        "voluptatem"
      ];

      function randomWord() {
        return words[Math.floor(Math.random() * words.length)];
      }

      function capitalize(str) {
        return str.charAt(0).toUpperCase() + str.slice(1);
      }

      function generateSentence(startWithLorem, index) {
        const length = Math.floor(Math.random() * 10) + 6;
        const sentence = [];

        if (startWithLorem && index === 0) {
          sentence.push("Lorem", "ipsum", "dolor", "sit", "amet");
          for (let i = 5; i < length; i++) {
            sentence.push(randomWord());
          }
        } else {
          for (let i = 0; i < length; i++) {
            sentence.push(randomWord());
          }
        }

        // 偶尔添加逗号
        if (length > 6 && Math.random() > 0.6) {
          const commaPos = Math.floor(length / 2) + Math.floor(Math.random() * 3);
          sentence[commaPos] = sentence[commaPos] + ",";
        }

        sentence[0] = capitalize(sentence[0]);
        return sentence.join(" ") + ".";
      }

      function generateParagraph(startWithLorem, index) {
        const sentenceCount = Math.floor(Math.random() * 4) + 4;
        const sentences = [];

        for (let i = 0; i < sentenceCount; i++) {
          sentences.push(generateSentence(startWithLorem && index === 0, i));
        }

        return sentences.join(" ");
      }

      function generate() {
        const type = document.getElementById("type").value;
        const count = parseInt(document.getElementById("count").value) || 1;
        const startWithLorem = document.getElementById("startWithLorem").checked;

        let result = "";

        if (type === "words") {
          const wordList = [];
          if (startWithLorem) {
            wordList.push("Lorem", "ipsum", "dolor", "sit", "amet");
            for (let i = 5; i < count; i++) {
              wordList.push(randomWord());
            }
          } else {
            for (let i = 0; i < count; i++) {
              wordList.push(randomWord());
            }
          }
          result = wordList.join(" ");
        } else if (type === "sentences") {
          const sentences = [];
          for (let i = 0; i < count; i++) {
            sentences.push(generateSentence(startWithLorem, i));
          }
          result = sentences.join(" ");
        } else {
          const paragraphs = [];
          for (let i = 0; i < count; i++) {
            paragraphs.push(generateParagraph(startWithLorem, i));
          }
          result = paragraphs.join("\n\n");
        }

        document.getElementById("output").value = result;

        // 统计
        const wordCount = result.split(/\s+/).length;
        const charCount = result.length;
        document.getElementById("stats").textContent = `${wordCount} 个单词, ${charCount} 个字符`;
      }

      function copyText() {
        const text = document.getElementById("output").value;
        if (!text) return;

        navigator.clipboard.writeText(text).then(() => {
          document.getElementById("status").textContent = "已复制到剪贴板";
          setTimeout(() => (document.getElementById("status").textContent = ""), 2000);
        });
      }

      generate();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
