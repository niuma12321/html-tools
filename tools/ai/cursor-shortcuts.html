    <script>

            },

            { desc: "搜索并替换", mac: ["⌘", "H"], win: ["Ctrl", "H"] },

            { desc: "切换编辑器组", mac: ["⌘", "1/2/3"], win: ["Ctrl", "1/2/3"] },

            { desc: "重新打开关闭的标签", mac: ["⌘", "⇧", "T"], win: ["Ctrl", "Shift", "T"] },

          items: [
            { desc: "打开 Source Control", mac: ["⌃", "⇧", "G"], win: ["Ctrl", "Shift", "G"] },
            { desc: "查看文件更改", mac: ["⌘", "K", "D"], win: ["Ctrl", "K", "D"] },
            { desc: "暂存所有更改", mac: ["⌘", "K", "⌘", "S"], win: ["Ctrl", "K", "Ctrl", "S"] }
          ]
        }

      function init() {
        renderShortcuts();
        setupOSToggle();
        setupSearch();
        loadTheme();
      }

      function renderShortcuts(filter = "") {
        const container = document.getElementById("shortcutsContainer");
        const filterLower = filter.toLowerCase();

        container.innerHTML = shortcuts
          .map((cat) => {
            const filteredItems = cat.items.filter(
              (item) => !filter || item.desc.toLowerCase().includes(filterLower)
            );

            if (filteredItems.length === 0) return "";

            return `
          <div class="category">
            <div class="category-title">
              <span class="category-icon">${cat.icon}</span>
              ${cat.category}
            </div>
            <div class="shortcuts-grid">
              ${filteredItems.map((item) => renderShortcutItem(item)).join("")}
            </div>
          </div>
        `;
          })
          .join("");
      }

      function renderShortcutItem(item) {
        const keys = currentOS === "mac" ? item.mac : item.win;
        return `
        <div class="shortcut-item ${item.highlight ? "highlight" : ""}">
          <span class="shortcut-desc">
            ${item.desc}
            ${item.ai ? '<span class="ai-badge">✨ AI</span>' : ""}
          </span>
          <div class="shortcut-keys">
            ${keys
              .map(
                (key, i) => `
              <span class="key ${item.ai && i === keys.length - 1 ? "special" : ""}">${key}</span>
              ${i < keys.length - 1 ? '<span class="key-plus">+</span>' : ""}
            `
              )
              .join("")}
          </div>
        </div>
      `;
      }

      function setupOSToggle() {
        document.querySelectorAll(".os-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".os-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            currentOS = btn.dataset.os;
            renderShortcuts(document.getElementById("searchInput").value);
          });
        });
      }

      function setupSearch() {
        const input = document.getElementById("searchInput");
        input.addEventListener("input", (e) => {
          renderShortcuts(e.target.value);
        });
      }

      window.toggleTheme = function () {
        const html = document.documentElement;
        const isDark = html.getAttribute("data-theme") !== "light";
        html.setAttribute("data-theme", isDark ? "light" : "dark");
        document.querySelector(".theme-toggle").textContent = isDark ? "☀️" : "🌙";
        localStorage.setItem("theme", isDark ? "light" : "dark");
      };

      function loadTheme() {
        const saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.documentElement.setAttribute("data-theme", "light");
          document.querySelector(".theme-toggle").textContent = "☀️";
        }
      }

      init();
    </script>
  </body>
</html>
