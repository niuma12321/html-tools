    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgb(0, 245, 212, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgb(0, 245, 212, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px;
        min-height: 100vh;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
        user-select: none;
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      .title-section {
        flex: 1;
      }
      .title-section h1 {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .title-section h1 .icon {
        font-size: 1.8rem;
      }
      .title-section p {
        color: var(--color-text-secondary);
        margin-top: 4px;
        font-size: 0.9rem;
      }

      .panel {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 24px;
      }
      .panel-title {
        font-family: var(--font-mono);
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-subtle);
      }

      textarea {
        width: 100%;
        min-height: 150px;
        padding: 12px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        color: var(--color-text-primary);
        resize: vertical;
      }
      textarea:focus {
        outline: none;
        border-color: var(--color-accent-cyan);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        overflow-x: auto;
        display: block;
      }
      thead {
        background: var(--bg-input);
        position: sticky;
        top: 0;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border: 1px solid var(--border-subtle);
      }
      th {
        color: var(--color-text-secondary);
        font-weight: 600;
      }
      td {
        color: var(--color-text-primary);
      }
      tbody tr:hover {
        background: var(--color-bg-surface);
      }

      .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .btn {
        flex: 1;
        min-width: 120px;
        padding: 12px 20px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-primary {
        background: var(--color-accent-cyan);
        color: var(--color-bg-deep);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(0, 245, 212, 0.3);
      }
      .btn-secondary {
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        border: 1px solid var(--border-subtle);
      }
      .btn-secondary:hover {
        border-color: var(--color-accent-cyan);
        color: var(--color-accent-cyan);
      }

      .stats {
        display: flex;
        gap: 16px;
        margin-top: 16px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
      }
      .stat-item {
        padding: 8px 12px;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
      }
      .stat-label {
        color: var(--color-text-secondary);
      }
      .stat-value {
        color: var(--color-accent-cyan);
        font-weight: 600;
        margin-left: 8px;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--accent-green);
        color: #fff;
        padding: 12px 24px;
        border-radius: var(--radius-md);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        opacity: 0;
        transition: all 0.3s;
        z-index: 1000;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>

    <div class="container">
      <header class="header">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="../../index.html">首页</a>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-current">CSV 查看器</span>
        </nav>
        <div class="title-section">
          <h1>
            <span class="icon">📊</span>
            CSV 查看器
          </h1>
          <p>在线 CSV 文件查看和编辑工具</p>
        </div>
      </header>

      <main>
        <div class="panel">
          <div class="panel-title">输入 CSV 数据</div>
          <textarea
            id="csvInput"
            placeholder="粘贴 CSV 数据或手动输入，例如：&#10;姓名,年龄,城市&#10;张三,25,北京&#10;李四,30,上海"
          ></textarea>
          <div class="btn-row" style="margin-top: 16px">
            <button class="btn btn-primary" onclick="parseCSV()">📊 解析 CSV</button>
            <button class="btn btn-secondary" onclick="clearAll()">🔄 清空</button>
            <button class="btn btn-secondary" onclick="downloadCSV()">📥 下载 CSV</button>
          </div>
          <div class="stats" id="stats" style="display: none">
            <div class="stat-item">
              <span class="stat-label">行数:</span>
              <span class="stat-value" id="rowCount">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">列数:</span>
              <span class="stat-value" id="colCount">0</span>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">数据表格</div>
          <div id="tableContainer" style="max-height: 500px; overflow: auto"></div>
        </div>
      </main>
    </div>

    <div class="toast" id="toast">操作成功</div>

    <script>
      function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute("data-theme") !== "light";
        body.setAttribute("data-theme", isDark ? "light" : "dark");
        localStorage.setItem("theme", isDark ? "light" : "dark");
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved === "light") document.body.setAttribute("data-theme", "light");
      })();

      function parseCSV() {
        const input = document.getElementById("csvInput").value.trim();
        if (!input) {
          showToast("请输入 CSV 数据");
          return;
        }

        const lines = input.split("\n").filter((line) => line.trim());
        if (lines.length === 0) {
          showToast("没有有效数据");
          return;
        }

        const rows = lines.map((line) => line.split(",").map((cell) => cell.trim()));
        const headers = rows[0];
        const data = rows.slice(1);

        // 使用 DOM API 防止 XSS
        const container = document.getElementById("tableContainer");
        container.textContent = "";
        const table = document.createElement("table");
        const thead = document.createElement("thead");
        const headerRow = document.createElement("tr");
        headers.forEach((h) => {
          const th = document.createElement("th");
          th.textContent = h;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        data.forEach((row) => {
          const tr = document.createElement("tr");
          row.forEach((cell) => {
            const td = document.createElement("td");
            td.textContent = cell;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        container.appendChild(table);

        document.getElementById("stats").style.display = "flex";
        document.getElementById("rowCount").textContent = data.length;
        document.getElementById("colCount").textContent = headers.length;
        showToast("解析成功");
      }

      function clearAll() {
        document.getElementById("csvInput").value = "";
        document.getElementById("tableContainer").textContent = "";
        document.getElementById("stats").style.display = "none";
        showToast("已清空");
      }

      function downloadCSV() {
        const input = document.getElementById("csvInput").value;
        if (!input) {
          showToast("没有数据可下载");
          return;
        }
        const blob = new Blob([input], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "data.csv";
        a.click();
        URL.revokeObjectURL(url);
        showToast("下载成功");
      }

      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }
    </script>
  </body>
