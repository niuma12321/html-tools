      input:focus,

      }
      .btn {
        padding: 12px 24px;

      .btn-primary {
        background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));

        width: 100%;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(247, 147, 26, 0.4);
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
      }
      .result-item {
        background: var(--bg-deep);
        border-radius: 12px;

      .result-label {

  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      网格交易计算器
    </nav>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <h1>📊 网格交易计算器</h1>
      <p class="subtitle">计算网格交易的参数和预期收益</p>

      <div class="card">
        <div class="card-title">💰 资金设置</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-------usdt-">投入资金 (USDT)</label>
            <input
              type="number"
              id="totalFund"
              value="10000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label>网格类型</label>
            <select id="gridType">
              <option value="arithmetic">等差网格</option>
              <option value="geometric">等比网格</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📈 价格区间</div>
        <div class="grid">
          <div class="form-group">
            <label for="input-------usdt-">价格上限 (USDT)</label>
            <input
              type="number"
              id="upperPrice"
              value="35000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-------usdt-">价格下限 (USDT)</label>
            <input
              type="number"
              id="lowerPrice"
              value="25000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-----">网格数量</label>
            <input
              type="number"
              id="gridCount"
              value="10"
              min="2"
              max="100"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input-------usdt-">当前价格 (USDT)</label>
            <input
              type="number"
              id="currentPrice"
              value="30000"
              min="0"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <button class="btn btn-primary" onclick="calculate()" aria-label="计算网格">
          计算网格
        </button>
      </div>

      <div id="resultSection" class="hidden">
        <div class="card">
          <div class="card-title">📊 网格参数</div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-label">网格间距</div>
              <div class="result-value" id="gridSpacing"></div>
            </div>
            <div class="result-item">
              <div class="result-label">每格投入</div>
              <div class="result-value" id="perGridFund"></div>
            </div>
            <div class="result-item">
              <div class="result-label">单格利润率</div>
              <div class="result-value" id="perGridProfit"></div>
            </div>
            <div class="result-item">
              <div class="result-label">预期年化</div>
              <div class="result-value" id="annualReturn"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📋 网格价位</div>
          <div class="grid-visual" id="gridVisual"></div>
        </div>
      </div>
    </div>

    <script>
      function formatMoney(num) {
        if (Math.abs(num) >= 10000) {
          return (num / 10000).toFixed(2) + "万";
        }
        return num.toFixed(2);
      }

      function calculate() {
        var totalFund = parseFloat(document.getElementById("totalFund").value) || 0;
        var gridType = document.getElementById("gridType").value;
        var upperPrice = parseFloat(document.getElementById("upperPrice").value) || 0;
        var lowerPrice = parseFloat(document.getElementById("lowerPrice").value) || 0;
        var gridCount = parseInt(document.getElementById("gridCount").value) || 10;
        var currentPrice = parseFloat(document.getElementById("currentPrice").value) || 0;

        if (upperPrice <= lowerPrice) {
          alert("价格上限必须大于下限");
          return;
        }

        var gridPrices = [];
        var gridSpacing, gridSpacingPercent;

        if (gridType === "arithmetic") {
          gridSpacing = (upperPrice - lowerPrice) / gridCount;
          gridSpacingPercent = (gridSpacing / ((upperPrice + lowerPrice) / 2)) * 100;
          for (var i = 0; i <= gridCount; i++) {
            gridPrices.push(lowerPrice + i * gridSpacing);
          }
        } else {
          var ratio = Math.pow(upperPrice / lowerPrice, 1 / gridCount);
          gridSpacingPercent = (ratio - 1) * 100;
          gridSpacing = 0;
          for (var j = 0; j <= gridCount; j++) {
            gridPrices.push(lowerPrice * Math.pow(ratio, j));
          }
        }

        var perGridFund = totalFund / gridCount;
        var perGridProfit = gridSpacingPercent;
        var annualReturn = (perGridProfit * 365) / 7;

        document.getElementById("resultSection").classList.remove("hidden");

        document.getElementById("gridSpacing").textContent =
          gridType === "arithmetic"
            ? formatMoney(gridSpacing) + " USDT"
            : gridSpacingPercent.toFixed(2) + "%";
        document.getElementById("perGridFund").textContent = formatMoney(perGridFund) + " USDT";
        document.getElementById("perGridProfit").textContent = perGridProfit.toFixed(2) + "%";
        document.getElementById("annualReturn").textContent = annualReturn.toFixed(0) + "%";

        var gridVisual = document.getElementById("gridVisual");
        while (gridVisual.firstChild) {
          gridVisual.removeChild(gridVisual.firstChild);
        }

        gridPrices.reverse().forEach(function (price, idx) {
          var line = document.createElement("div");
          line.className = "grid-line";

          var isBuy = price < currentPrice;
          line.classList.add(isBuy ? "buy" : "sell");

          var label = document.createElement("span");
          label.textContent = "网格 " + (gridCount - idx + 1);

          var priceSpan = document.createElement("span");
          priceSpan.textContent = price.toFixed(2) + " USDT";

          var action = document.createElement("span");
          action.textContent = isBuy ? "买入" : "卖出";

          line.appendChild(label);
          line.appendChild(priceSpan);
          line.appendChild(action);
          gridVisual.appendChild(line);
        });
      }

      calculate();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
