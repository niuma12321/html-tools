<html lang="zh-CN">
  <head>

    />

    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/generator/lorem-ipsum.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/generator/lorem-ipsum.html" />
    <meta name="description" content="生成 Lorem Ipsum 占位文本" />
    <meta name="keywords" content="Lorem Ipsum placeholder text 占位符 假文 填充文本" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      .form-group select,
      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 20px;
      }
      .checkbox-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }
      .btn-row {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
      }
      .btn {
        padding: 10px 20px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
      }
      .btn:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }
      .btn.primary {
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
        color: #fff;
      }
      .output {
        padding: 20px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        font-size: 0.95rem;
        line-height: 1.7;
        max-height: 500px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
      .stats {
        display: flex;
        gap: 20px;
        margin-top: 16px;
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .tab {
        padding: 8px 16px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 0.9rem;
      }
      .tab:hover {
        border-color: var(--accent-cyan);
      }
      .tab.active {
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
        color: #fff;
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>Lorem Ipsum 生成器</h1>
      <p class="desc">生成设计和排版用的占位文本</p>

      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="setType('latin')">拉丁文</button>
          <button class="tab" onclick="setType('chinese')">中文假文</button>
          <button class="tab" onclick="setType('hipster')">Hipster</button>
        </div>

        <div class="controls">
          <div class="form-group">
            <label>生成类型</label>
            <select id="unit" onchange="generate()">
              <option value="paragraphs">段落</option>
              <option value="sentences">句子</option>
              <option value="words">单词</option>
            </select>
          </div>
          <div class="form-group">
            <label>数量</label>
            <input type="number" id="count" value="3" min="1" max="100" oninput="generate()" />
          </div>
        </div>

        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="startLorem" checked onchange="generate()" />
            以 "Lorem ipsum" 开头
          </label>
          <label>
            <input type="checkbox" id="addPTags" onchange="generate()" />
            添加 &lt;p&gt; 标签
          </label>
        </div>

        <div class="btn-row">
          <button class="btn primary" onclick="generate()">生成</button>
          <button class="btn" onclick="copyText()">复制</button>
        </div>

        <div class="output" id="output"></div>

        <div class="stats">
          <span>
            段落:
            <strong id="statParagraphs">0</strong>
          </span>
          <span>
            句子:
            <strong id="statSentences">0</strong>
          </span>
          <span>
            单词:
            <strong id="statWords">0</strong>
          </span>
          <span>
            字符:
            <strong id="statChars">0</strong>
          </span>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      const words = {
        latin: [
          "lorem",
          "ipsum",
          "dolor",
          "sit",
          "amet",
          "consectetur",
          "adipiscing",
          "elit",
          "sed",
          "do",
          "eiusmod",
          "tempor",
          "incididunt",
          "ut",
          "labore",
          "et",
          "dolore",
          "magna",
          "aliqua",
          "enim",
          "ad",
          "minim",
          "veniam",
          "quis",
          "nostrud",
          "exercitation",
          "ullamco",
          "laboris",
          "nisi",
          "aliquip",
          "ex",
          "ea",
          "commodo",
          "consequat",
          "duis",
          "aute",
          "irure",
          "in",
          "reprehenderit",
          "voluptate",
          "velit",
          "esse",
          "cillum",
          "fugiat",
          "nulla",
          "pariatur",
          "excepteur",
          "sint",
          "occaecat",
          "cupidatat",
          "non",
          "proident",
          "sunt",
          "culpa",
          "qui",
          "officia",
          "deserunt",
          "mollit",
          "anim",
          "id",
          "est",
          "laborum",
          "proin",
          "nibh",
          "nisl",
          "condimentum",
          "venenatis",
          "a",
          "scelerisque",
          "mauris",
          "vitae",
          "nunc"
        ],
        chinese: [
          "这是",
          "一段",
          "中文",
          "假文",
          "用于",
          "测试",
          "排版",
          "效果",
          "设计师",
          "经常",
          "使用",
          "占位",
          "文本",
          "来",
          "展示",
          "页面",
          "布局",
          "和",
          "字体",
          "样式",
          "这些",
          "文字",
          "没有",
          "实际",
          "意义",
          "只是",
          "填充",
          "空白",
          "区域",
          "方便",
          "预览",
          "整体",
          "视觉",
          "呈现",
          "内容",
          "可以",
          "根据",
          "需要",
          "调整",
          "长度",
          "创意",
          "无限",
          "可能",
          "探索",
          "更多",
          "精彩",
          "世界",
          "等你"
        ],
        hipster: [
          "artisan",
          "authentic",
          "sustainable",
          "craft",
          "organic",
          "local",
          "vintage",
          "handmade",
          "ethical",
          "vegan",
          "gluten-free",
          "aesthetic",
          "minimalist",
          "curated",
          "bespoke",
          "farm-to-table",
          "cold-pressed",
          "small-batch",
          "slow",
          "mindful",
          "conscious",
          "eco-friendly",
          "fair-trade",
          "biodegradable",
          "upcycled",
          "reclaimed",
          "natural",
          "raw",
          "unprocessed",
          "artisanal",
          "heritage",
          "tradition",
          "passion",
          "story",
          "journey",
          "experience",
          "lifestyle",
          "wellness",
          "balance",
          "harmony",
          "zen"
        ]
      };

      let currentType = "latin";

      function setType(type) {
        currentType = type;
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        event.target.classList.add("active");
        generate();
      }

      function getRandomWord() {
        const list = words[currentType];
        return list[Math.floor(Math.random() * list.length)];
      }

      function generateSentence(wordCount) {
        const count = wordCount || Math.floor(Math.random() * 10) + 5;
        let sentence = [];
        for (let i = 0; i < count; i++) {
          sentence.push(getRandomWord());
        }
        sentence[0] = sentence[0].charAt(0).toUpperCase() + sentence[0].slice(1);
        return (
          sentence.join(currentType === "chinese" ? "" : " ") +
          (currentType === "chinese" ? "。" : ".")
        );
      }

      function generateParagraph(sentenceCount) {
        const count = sentenceCount || Math.floor(Math.random() * 4) + 3;
        let sentences = [];
        for (let i = 0; i < count; i++) {
          sentences.push(generateSentence());
        }
        return sentences.join(" ");
      }

      function generate() {
        const unit = document.getElementById("unit").value;
        const count = parseInt(document.getElementById("count").value) || 1;
        const startLorem = document.getElementById("startLorem").checked;
        const addPTags = document.getElementById("addPTags").checked;

        let result = [];

        switch (unit) {
          case "paragraphs":
            for (let i = 0; i < count; i++) {
              let para = generateParagraph();
              if (i === 0 && startLorem && currentType === "latin") {
                para = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. " + para;
              }
              result.push(addPTags ? `<p>${para}</p>` : para);
            }
            break;

          case "sentences":
            for (let i = 0; i < count; i++) {
              let sentence = generateSentence();
              if (i === 0 && startLorem && currentType === "latin") {
                sentence = "Lorem ipsum dolor sit amet, consectetur adipiscing elit.";
              }
              result.push(sentence);
            }
            break;

          case "words":
            for (let i = 0; i < count; i++) {
              if (i === 0 && startLorem && currentType === "latin") {
                result.push("Lorem");
              } else if (i === 1 && startLorem && currentType === "latin") {
                result.push("ipsum");
              } else {
                result.push(getRandomWord());
              }
            }
            break;
        }

        const output =
          unit === "words"
            ? result.join(currentType === "chinese" ? "" : " ")
            : result.join("\n\n");
        document.getElementById("output").textContent = output;

        // Stats
        const text = output.replace(/<[^>]*>/g, "");
        const paragraphs = text.split(/\n\n+/).filter((p) => p.trim()).length;
        const sentences = text.split(/[.。!?]+/).filter((s) => s.trim()).length;
        const wordCount =
          currentType === "chinese"
            ? text.replace(/\s/g, "").length
            : text.split(/\s+/).filter((w) => w).length;

        document.getElementById("statParagraphs").textContent = paragraphs;
        document.getElementById("statSentences").textContent = sentences;
        document.getElementById("statWords").textContent = wordCount;
        document.getElementById("statChars").textContent = text.length;
      }

      function copyText() {
        navigator.clipboard.writeText(document.getElementById("output").textContent);
      }

      generate();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
