<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meta标签生成器</title>
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/generator/meta-tag-generator.html"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-sans);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        color: white;
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        margin-bottom: 20px;
      }
      .card-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #f0f0f0;
      }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
      .input-group {
        margin-bottom: 15px;
      }
      .input-group.full {
        grid-column: span 2;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        color: #333;
        font-size: 14px;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
      }
      textarea {
        resize: vertical;
        min-height: 80px;
      }
      .output {
        background: #1a1a2e;
        padding: 20px;
        border-radius: 12px;
        color: #e0e0e0;
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1.8;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 400px;
        overflow-y: auto;
      }
      .copy-btn {
        width: 100%;
        margin-top: 15px;
        padding: 12px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }
      @media (max-width: 600px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
        .input-group.full {
          grid-column: span 1;
        }
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      Meta标签生成
    </nav>
    <div class="container">
      <h1>🏷️ Meta标签生成器</h1>
      <div class="card">
        <div class="card-title">基本信息</div>
        <div class="form-grid">
          <div class="input-group full">
            <label>页面标题</label>
            <input type="text" id="title" placeholder="网站标题" value="我的网站 - 最佳在线工具" />
          </div>
          <div class="input-group full">
            <label>页面描述 (建议150-160字符)</label>
            <textarea id="description" placeholder="网站描述">
这是一个提供各种在线工具的网站，包括开发工具、文本处理、图片处理等功能。</textarea
            >
          </div>
          <div class="input-group full">
            <label>关键词 (用逗号分隔)</label>
            <input
              type="text"
              id="keywords"
              placeholder="关键词1, 关键词2"
              value="在线工具, 开发工具, 免费工具"
            />
          </div>
          <div class="input-group">
            <label>作者</label>
            <input type="text" id="author" placeholder="作者名称" />
          </div>
          <div class="input-group">
            <label>网站URL</label>
            <input type="url" id="url" placeholder="https://example.com" />
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Open Graph (社交分享)</div>
        <div class="form-grid">
          <div class="input-group">
            <label>OG类型</label>
            <select id="ogType">
              <option value="website">网站</option>
              <option value="article">文章</option>
              <option value="product">产品</option>
            </select>
          </div>
          <div class="input-group">
            <label>分享图片URL</label>
            <input type="url" id="ogImage" placeholder="https://example.com/image.jpg" />
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Twitter卡片</div>
        <div class="form-grid">
          <div class="input-group">
            <label>卡片类型</label>
            <select id="twitterCard">
              <option value="summary">摘要</option>
              <option value="summary_large_image">大图摘要</option>
            </select>
          </div>
          <div class="input-group">
            <label>Twitter账号</label>
            <input type="text" id="twitterSite" placeholder="@username" />
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">生成的Meta标签</div>
        <div class="output" id="output"></div>
        <button class="copy-btn" onclick="copyCode()">复制代码</button>
      </div>
    </div>
    <script>
      function generate() {
        const title = document.getElementById("title").value;
        const desc = document.getElementById("description").value;
        const keywords = document.getElementById("keywords").value;
        const author = document.getElementById("author").value;
        const url = document.getElementById("url").value;
        const ogType = document.getElementById("ogType").value;
        const ogImage = document.getElementById("ogImage").value;
        const twitterCard = document.getElementById("twitterCard").value;
        const twitterSite = document.getElementById("twitterSite").value;

        let output = `<!-- 基本Meta标签 -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${title}</title>
<meta name="description" content="${desc}">`;

        if (keywords) output += `\n<meta name="keywords" content="${keywords}">`;
        if (author) output += `\n<meta name="author" content="${author}">`;

        output += `\n\n<!-- Open Graph / Facebook -->
<meta property="og:type" content="${ogType}">
<meta property="og:title" content="${title}">
<meta property="og:description" content="${desc}">`;
        if (url) output += `\n<meta property="og:url" content="${url}">`;
        if (ogImage) output += `\n<meta property="og:image" content="${ogImage}">`;

        output += `\n\n<!-- Twitter -->
<meta name="twitter:card" content="${twitterCard}">
<meta name="twitter:title" content="${title}">
<meta name="twitter:description" content="${desc}">`;
        if (twitterSite) output += `\n<meta name="twitter:site" content="${twitterSite}">`;
        if (ogImage) output += `\n<meta name="twitter:image" content="${ogImage}">`;

        document.getElementById("output").textContent = output;
      }
      function copyCode() {
        navigator.clipboard.writeText(document.getElementById("output").textContent);
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "已复制!";
        setTimeout(() => (btn.textContent = "复制代码"), 1500);
      }
      document
        .querySelectorAll("input, textarea, select")
        .forEach((el) => el.addEventListener("input", generate));
      generate();
    </script>
  </body>
</html>
