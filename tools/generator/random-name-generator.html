<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>随机姓名生成器 - WebUtils</title>
    <meta property="og:title" content="随机姓名生成器 - WebUtils" />
    <meta
      property="og:description"
      content="随机姓名生成器：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/generator/random-name-generator.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/generator/random-name-generator.html"
    />
    <meta name="description" content="生成随机中英文姓名，支持性别选择" />
    <meta name="keywords" content="随机姓名 名字生成器 假名 测试数据" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .options {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 20px;
        align-items: center;
      }
      .options select,
      .options input {
        padding: 10px 14px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .options input[type="number"] {
        width: 80px;
      }
      .btn {
        padding: 10px 20px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
      }
      .btn:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }
      .btn.primary {
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
        color: #fff;
      }
      .result {
        margin-top: 20px;
      }
      .name-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
      }
      .name-item {
        padding: 16px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }
      .name-item:hover {
        transform: scale(1.02);
      }
      .name-item .name {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .name-item .type {
        font-size: 0.8rem;
        color: var(--text-muted);
      }
      .output {
        margin-top: 20px;
      }
      .output textarea {
        width: 100%;
        height: 150px;
        padding: 12px;
        font-size: 0.95rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        resize: vertical;
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      .btn-row {
        display: flex;
        gap: 12px;
        margin-top: 12px;
      }
      .status {
        font-size: 0.85rem;
        color: var(--accent-green);
        margin-top: 8px;
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>随机姓名生成器</h1>
      <p class="desc">生成随机中英文姓名，适合测试数据</p>

      <div class="card">
        <div class="options">
          <label>类型:</label>
          <select id="type">
            <option value="chinese">中文姓名</option>
            <option value="english">英文姓名</option>
            <option value="both">中英文混合</option>
          </select>
          <label>性别:</label>
          <select id="gender">
            <option value="random">随机</option>
            <option value="male">男性</option>
            <option value="female">女性</option>
          </select>
          <label for="input----">数量:</label>
          <input
            type="number"
            id="count"
            value="10"
            min="1"
            max="100"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
          <button class="btn primary" onclick="generate()" aria-label="生成">生成</button>
        </div>

        <div class="result">
          <div class="name-list" id="nameList"></div>
        </div>

        <div class="output">
          <textarea id="output" readonly></textarea>
          <div class="btn-row">
            <button class="btn" onclick="copyText()" aria-label="复制全部">复制全部</button>
            <button class="btn" onclick="generate()" aria-label="重新生成">重新生成</button>
          </div>
          <div class="status" id="status"></div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      const chineseSurnames = [
        "王",
        "李",
        "张",
        "刘",
        "陈",
        "杨",
        "黄",
        "赵",
        "周",
        "吴",
        "徐",
        "孙",
        "马",
        "朱",
        "胡",
        "郭",
        "林",
        "何",
        "高",
        "罗"
      ];
      const chineseMaleNames = [
        "伟",
        "强",
        "磊",
        "洋",
        "勇",
        "军",
        "杰",
        "涛",
        "明",
        "辉",
        "鹏",
        "飞",
        "超",
        "宇",
        "俊",
        "浩",
        "峰",
        "华",
        "建",
        "志"
      ];
      const chineseFemaleNames = [
        "芳",
        "娟",
        "敏",
        "静",
        "丽",
        "婷",
        "雪",
        "燕",
        "玲",
        "华",
        "红",
        "梅",
        "秀",
        "英",
        "莉",
        "桂",
        "兰",
        "萍",
        "霞",
        "颖"
      ];

      const englishMaleFirstNames = [
        "James",
        "John",
        "Robert",
        "Michael",
        "William",
        "David",
        "Richard",
        "Joseph",
        "Thomas",
        "Christopher",
        "Daniel",
        "Matthew",
        "Anthony",
        "Mark",
        "Steven"
      ];
      const englishFemaleFirstNames = [
        "Mary",
        "Patricia",
        "Jennifer",
        "Linda",
        "Elizabeth",
        "Barbara",
        "Susan",
        "Jessica",
        "Sarah",
        "Karen",
        "Lisa",
        "Nancy",
        "Emily",
        "Ashley",
        "Amanda"
      ];
      const englishLastNames = [
        "Smith",
        "Johnson",
        "Williams",
        "Brown",
        "Jones",
        "Garcia",
        "Miller",
        "Davis",
        "Rodriguez",
        "Martinez",
        "Anderson",
        "Taylor",
        "Thomas",
        "Moore",
        "Jackson"
      ];

      function random(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function generateChineseName(gender) {
        const surname = random(chineseSurnames);
        const g = gender === "random" ? (Math.random() > 0.5 ? "male" : "female") : gender;
        const names = g === "male" ? chineseMaleNames : chineseFemaleNames;
        const nameLength = Math.random() > 0.5 ? 1 : 2;
        let name = "";
        for (let i = 0; i < nameLength; i++) {
          name += random(names);
        }
        return { name: surname + name, type: "中文", gender: g === "male" ? "男" : "女" };
      }

      function generateEnglishName(gender) {
        const g = gender === "random" ? (Math.random() > 0.5 ? "male" : "female") : gender;
        const firstNames = g === "male" ? englishMaleFirstNames : englishFemaleFirstNames;
        const firstName = random(firstNames);
        const lastName = random(englishLastNames);
        return {
          name: firstName + " " + lastName,
          type: "English",
          gender: g === "male" ? "男" : "女"
        };
      }

      function generate() {
        const type = document.getElementById("type").value;
        const gender = document.getElementById("gender").value;
        const count = parseInt(document.getElementById("count").value) || 10;

        const names = [];
        for (let i = 0; i < count; i++) {
          let name;
          if (type === "chinese") {
            name = generateChineseName(gender);
          } else if (type === "english") {
            name = generateEnglishName(gender);
          } else {
            name = Math.random() > 0.5 ? generateChineseName(gender) : generateEnglishName(gender);
          }
          names.push(name);
        }

        // 显示名字卡片
        document.getElementById("nameList").innerHTML = names
          .map(
            (n) => `
        <div class="name-item" onclick="copyName('${n.name}')">
          <div class="name">${n.name}</div>
          <div class="type">${n.type} · ${n.gender}</div>
        </div>
      `
          )
          .join("");

        // 显示文本列表
        document.getElementById("output").value = names.map((n) => n.name).join("\n");
      }

      function copyName(name) {
        navigator.clipboard.writeText(name).then(() => {
          document.getElementById("status").textContent = "已复制: " + name;
          setTimeout(() => (document.getElementById("status").textContent = ""), 2000);
        });
      }

      function copyText() {
        const text = document.getElementById("output").value;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
          document.getElementById("status").textContent = "已复制全部姓名";
          setTimeout(() => (document.getElementById("status").textContent = ""), 2000);
        });
      }

      generate();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
