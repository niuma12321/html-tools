  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>

      NanoID 生成器
    </nav>
    <div class="bg-grid"></div>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌙">
        🌙
      </button>
      <h1>NanoID 生成器</h1>
      <p class="subtitle">生成紧凑、URL安全的唯一ID</p>

      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <label for="input---">长度</label>
            <input
              type="number"
              id="length"
              value="21"
              min="1"
              max="64"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label for="input---">数量</label>
            <input
              type="number"
              id="count"
              value="10"
              min="1"
              max="100"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="form-group">
            <label>字符集</label>
            <select id="alphabet">
              <option value="default">默认 (A-Za-z0-9_-)</option>
              <option value="alphanumeric">字母数字 (A-Za-z0-9)</option>
              <option value="lowercase">小写字母数字 (a-z0-9)</option>
              <option value="hex">十六进制 (0-9a-f)</option>
              <option value="numbers">纯数字 (0-9)</option>
              <option value="custom">自定义</option>
            </select>
          </div>
        </div>
        <div class="form-group" id="customAlphabetGroup" style="display: none">
          <label for="input-------">自定义字符集</label>
          <input
            type="text"
            id="customAlphabet"
            value="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"
            aria-label="文本输入框"
            placeholder="请输入文本输入框"
          />
        </div>
        <button class="btn" onclick="generate()" aria-label="生成">生成</button>
        <button class="btn btn-secondary" onclick="copyAll()" aria-label="复制全部">
          复制全部
        </button>

        <div class="output" id="output"></div>

        <div class="info" id="info"></div>
      </div>

      <footer>
        <a href="https://github.com/chicogong/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>
    <script>
      const ALPHABETS = {
        default: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-",
        alphanumeric: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789",
        lowercase: "abcdefghijklmnopqrstuvwxyz0123456789",
        hex: "0123456789abcdef",
        numbers: "0123456789"
      };

      // 存储生成的 ID，用于复制
      let generatedIds = [];

      document.getElementById("alphabet").addEventListener("change", (e) => {
        document.getElementById("customAlphabetGroup").style.display =
          e.target.value === "custom" ? "block" : "none";
      });

      function nanoid(size, alphabet) {
        const array = new Uint8Array(size);
        crypto.getRandomValues(array);
        let id = "";
        for (let i = 0; i < size; i++) {
          id += alphabet[array[i] % alphabet.length];
        }
        return id;
      }

      window.generate = function () {
        const length = parseInt(document.getElementById("length").value);
        const count = parseInt(document.getElementById("count").value);
        const alphabetType = document.getElementById("alphabet").value;
        const alphabet =
          alphabetType === "custom"
            ? document.getElementById("customAlphabet").value
            : ALPHABETS[alphabetType];

        generatedIds = [];
        for (let i = 0; i < count; i++) {
          generatedIds.push(nanoid(length, alphabet));
        }

        // 使用 DOM API 安全构建元素，避免 XSS
        const output = document.getElementById("output");
        output.innerHTML = "";
        generatedIds.forEach((id, i) => {
          const item = document.createElement("div");
          item.className = "id-item";

          const code = document.createElement("code");
          code.textContent = id;

          const btn = document.createElement("button");
          btn.textContent = "复制";
          btn.onclick = () => copyId(i);

          item.appendChild(code);
          item.appendChild(btn);
          output.appendChild(item);
        });

        // Calculate collision probability
        const bitsPerChar = Math.log2(alphabet.length);
        const totalBits = length * bitsPerChar;
        const speedInfo = totalBits >= 128 ? "非常安全" : totalBits >= 64 ? "安全" : "较弱";

        document.getElementById("info").innerHTML = `
        <strong>统计信息:</strong><br>
        字符集大小: ${alphabet.length} 字符<br>
        每字符熵: ${bitsPerChar.toFixed(2)} 位<br>
        总熵: ${totalBits.toFixed(0)} 位<br>
        安全性: ${speedInfo}<br>
        生日悖论碰撞概率: ~2^-${(totalBits / 2).toFixed(0)}
      `;
      };

      function copyId(index) {
        navigator.clipboard.writeText(generatedIds[index]);
      }

      window.copyAll = function () {
        navigator.clipboard.writeText(generatedIds.join("\n"));
      };

      generate();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          const btn = document.querySelector(".theme-toggle");
          if (btn) btn.textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
