    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      :root {
        --primary-color: #8b5cf6;
      }
      body {
        padding: 1rem;
        min-height: 100vh;
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      header h1 {
        margin: 0;
        font-size: 1.5rem;
      }
      .theme-toggle {
        background: var(--primary-color);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        color: white;
        cursor: pointer;
      }
      .main-grid {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 1rem;
      }
      @media (max-width: 900px) {
        .main-grid {
          grid-template-columns: 1fr;
        }
      }
      .panel {
        background: var(--card-background-color);
        border-radius: 12px;
        padding: 1rem;
        border: 1px solid var(--muted-border-color);
      }
      .panel h3 {
        margin: 0 0 1rem;
        font-size: 1rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 0.25rem;
      }
      .form-group textarea {
        min-height: 100px;
        resize: vertical;
      }
      .color-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      .color-row input[type="color"] {
        width: 50px;
        height: 36px;
        padding: 0;
        border: none;
        cursor: pointer;
      }
      .presets {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .preset {
        padding: 0.25rem 0.5rem;
        border-radius: 6px;
        font-size: 0.75rem;
        cursor: pointer;
        border: 2px solid transparent;
      }
      .preset:hover {
        border-color: var(--primary-color);
      }
      .preview-area {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 400px;
        background: repeating-conic-gradient(#80808020 0% 25%, transparent 0% 50%) 50% / 20px 20px;
        border-radius: 8px;
        padding: 1rem;
      }
      .preview-area canvas {
        max-width: 100%;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }
      .actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      .actions button {
        flex: 1;
      }
      .size-presets {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .size-presets button {
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 1rem 1.5rem;
        background: var(--primary-color);
        color: white;
        border-radius: 8px;
        z-index: 1000;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      文字卡片生成器
    </nav>
    <div class="container">
      <header>
        <h1>🖼️ 文字卡片生成器</h1>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓">🌓</button>
      </header>
      <div class="main-grid">
        <div class="panel">
          <h3>⚙️ 设置</h3>
          <div class="form-group">
            <label>文字内容</label>
            <textarea id="textContent" placeholder="输入文字内容..." oninput="render()">
Hello World</textarea
            >
          </div>
          <div class="form-group">
            <label>预设样式</label>
            <div class="presets">
              <span
                class="preset"
                style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white"
                onclick="applyPreset('gradient1')"
              >
                渐变紫
              </span>
              <span
                class="preset"
                style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white"
                onclick="applyPreset('gradient2')"
              >
                渐变粉
              </span>
              <span
                class="preset"
                style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white"
                onclick="applyPreset('gradient3')"
              >
                渐变蓝
              </span>
              <span
                class="preset"
                style="background: #1a1a2e; color: #eee"
                onclick="applyPreset('dark')"
              >
                深色
              </span>
              <span
                class="preset"
                style="background: #fff; color: #333; border: 1px solid #ddd"
                onclick="applyPreset('light')"
              >
                浅色
              </span>
            </div>
          </div>
          <div class="form-group">
            <label>背景颜色</label>
            <div class="color-row">
              <input
                type="color"
                id="bgColor"
                value="#667eea"
                oninput="render()"
                aria-label="颜色选择器"
              />
              <input
                type="text"
                id="bgColorText"
                value="#667eea"
                oninput="
                  document.getElementById('bgColor').value = this.value;
                  render();
                "
                style="flex: 1"
                aria-label="文本输入框"
                placeholder="请输入文本输入框"
              />
            </div>
          </div>
          <div class="form-group">
            <label>文字颜色</label>
            <div class="color-row">
              <input
                type="color"
                id="textColor"
                value="#ffffff"
                oninput="render()"
                aria-label="颜色选择器"
              />
              <input
                type="text"
                id="textColorText"
                value="#ffffff"
                oninput="
                  document.getElementById('textColor').value = this.value;
                  render();
                "
                style="flex: 1"
                aria-label="文本输入框"
                placeholder="请输入文本输入框"
              />
            </div>
          </div>
          <div class="form-group">
            <label>尺寸预设</label>
            <div class="size-presets">
              <button class="outline" onclick="setSize(800, 600)" aria-label="4:3">4:3</button>
              <button class="outline" onclick="setSize(1200, 630)" aria-label="社交">社交</button>
              <button class="outline" onclick="setSize(1080, 1080)" aria-label="方形">方形</button>
              <button class="outline" onclick="setSize(1080, 1920)" aria-label="故事">故事</button>
            </div>
            <div style="display: flex; gap: 0.5rem">
              <input
                type="number"
                id="canvasWidth"
                value="800"
                min="100"
                max="2000"
                oninput="render()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
              <span style="line-height: 2.5">×</span>
              <input
                type="number"
                id="canvasHeight"
                value="600"
                min="100"
                max="2000"
                oninput="render()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
          </div>
          <div class="form-group">
            <label>
              字体大小:
              <span id="fontSizeValue">48</span>
              px
            </label>
            <input
              type="range"
              id="fontSize"
              value="48"
              min="12"
              max="200"
              oninput="
                document.getElementById('fontSizeValue').textContent = this.value;
                render();
              "
            />
          </div>
          <div class="form-group">
            <label>字体</label>
            <select id="fontFamily" onchange="render()">
              <option value="sans-serif">无衬线</option>
              <option value="serif">衬线</option>
              <option value="monospace">等宽</option>
              <option value="'Microsoft YaHei'">微软雅黑</option>
              <option value="'PingFang SC'">苹方</option>
            </select>
          </div>
          <div class="form-group">
            <label>文字对齐</label>
            <select id="textAlign" onchange="render()">
              <option value="center">居中</option>
              <option value="left">左对齐</option>
              <option value="right">右对齐</option>
            </select>
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" id="enableShadow" checked onchange="render()" />
              文字阴影
            </label>
          </div>
        </div>
        <div class="panel">
          <h3>👁️ 预览</h3>
          <div class="preview-area">
            <canvas id="canvas"></canvas>
          </div>
          <div class="actions">
            <button onclick="download('png')" aria-label="💾 下载 PNG">💾 下载 PNG</button>
            <button onclick="download('jpg')" aria-label="💾 下载 JPG">💾 下载 JPG</button>
            <button onclick="copyImage()" aria-label="📋 复制图片">📋 复制图片</button>
          </div>
        </div>
      </div>
    </div>
    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        render();
      });

      function initTheme() {
        const s = localStorage.getItem("theme");
        if (s) document.documentElement.setAttribute("data-theme", s);
      }
      window.toggleTheme = function () {
        const c = document.documentElement.getAttribute("data-theme");
        const n = c === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", n);
        localStorage.setItem("theme", n);
      };

      window.setSize = function (w, h) {
        document.getElementById("canvasWidth").value = w;
        document.getElementById("canvasHeight").value = h;
        render();
      };

      window.applyPreset = function (name) {
        const presets = {
          gradient1: { bg: "#667eea", text: "#ffffff" },
          gradient2: { bg: "#f5576c", text: "#ffffff" },
          gradient3: { bg: "#4facfe", text: "#ffffff" },
          dark: { bg: "#1a1a2e", text: "#eeeeee" },
          light: { bg: "#ffffff", text: "#333333" }
        };
        const p = presets[name];
        document.getElementById("bgColor").value = p.bg;
        document.getElementById("bgColorText").value = p.bg;
        document.getElementById("textColor").value = p.text;
        document.getElementById("textColorText").value = p.text;
        render();
      };

      function render() {
        const w = parseInt(document.getElementById("canvasWidth").value) || 800;
        const h = parseInt(document.getElementById("canvasHeight").value) || 600;
        canvas.width = w;
        canvas.height = h;

        // Background
        ctx.fillStyle = document.getElementById("bgColor").value;
        ctx.fillRect(0, 0, w, h);

        // Text
        const text = document.getElementById("textContent").value || "";
        const fontSize = parseInt(document.getElementById("fontSize").value);
        const fontFamily = document.getElementById("fontFamily").value;
        const textColor = document.getElementById("textColor").value;
        const textAlign = document.getElementById("textAlign").value;
        const enableShadow = document.getElementById("enableShadow").checked;

        ctx.fillStyle = textColor;
        ctx.font = fontSize + "px " + fontFamily;
        ctx.textAlign = textAlign;
        ctx.textBaseline = "middle";

        if (enableShadow) {
          ctx.shadowColor = "rgba(0,0,0,0.3)";
          ctx.shadowBlur = 10;
          ctx.shadowOffsetX = 3;
          ctx.shadowOffsetY = 3;
        }

        const lines = text.split("\n");
        const lineHeight = fontSize * 1.4;
        const startY = h / 2 - ((lines.length - 1) * lineHeight) / 2;
        const x = textAlign === "center" ? w / 2 : textAlign === "left" ? 40 : w - 40;

        lines.forEach((line, i) => {
          ctx.fillText(line, x, startY + i * lineHeight);
        });

        ctx.shadowColor = "transparent";
      }

      window.download = function (format) {
        const link = document.createElement("a");
        link.download = "text-card." + format;
        link.href = canvas.toDataURL("image/" + (format === "jpg" ? "jpeg" : "png"), 0.95);
        link.click();
        showToast("图片已下载");
      };

      window.copyImage = async function () {
        try {
          const blob = await new Promise((r) => canvas.toBlob(r, "image/png"));
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          showToast("图片已复制");
        } catch (e) {
          showToast("复制失败");
        }
      };

      function showToast(m) {
        const t = document.createElement("div");
        t.className = "toast";
        t.textContent = m;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
      }
    </script>
  </body>
</html>
