    <script>
      // 默认选项
      const defaultOptions = [
        { text: "一等奖", color: "#ff6b6b" },
        { text: "二等奖", color: "#feca57" },
        { text: "三等奖", color: "#48dbfb" },
        { text: "参与奖", color: "#1dd1a1" },
        { text: "再来一次", color: "#5f27cd" },
        { text: "谢谢参与", color: "#ff9ff3" }
      ];

      // 预设颜色
      const presetColors = [
        "#ff6b6b",
        "#feca57",
        "#48dbfb",
        "#1dd1a1",
        "#5f27cd",
        "#ff9ff3",
        "#00d2d3",
        "#54a0ff",
        "#5f27cd",
        "#ee5a24",
        "#009432",
        "#0652DD"
      ];

      let options = JSON.parse(localStorage.getItem("wheelOptions")) || [...defaultOptions];
      let isSpinning = false;
      let currentRotation = 0;
      let totalSpins = parseInt(localStorage.getItem("wheelTotalSpins") || "0");
      let history = JSON.parse(localStorage.getItem("wheelHistory") || "[]");

      const canvas = document.getElementById("wheelCanvas");
      const ctx = canvas.getContext("2d");

      // HTML 转义函数 (防止 XSS)
      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      // 音频上下文
      let audioCtx = null;

      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      function playTickSound() {
        if (!document.getElementById("soundEnabled").checked) return;
        initAudio();

        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.frequency.value = 800;
        oscillator.type = "sine";

        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);

        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.05);
      }

      function playWinSound() {
        if (!document.getElementById("soundEnabled").checked) return;
        initAudio();

        const notes = [523.25, 659.25, 783.99, 1046.5]; // C5, E5, G5, C6
        notes.forEach((freq, i) => {
          setTimeout(() => {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.frequency.value = freq;
            oscillator.type = "sine";

            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
          }, i * 100);
        });
      }

      // 使用加密安全的随机数
      function secureRandom() {
        const array = new Uint32Array(1);
        crypto.getRandomValues(array);
        return array[0] / (0xffffffff + 1);
      }

      function drawWheel() {
        const size = Math.min(canvas.parentElement.clientWidth, 400);
        canvas.width = size;
        canvas.height = size;

        const centerX = size / 2;
        const centerY = size / 2;
        const radius = size / 2 - 5;

        if (options.length === 0) {
          ctx.fillStyle = "#333";
          ctx.beginPath();
          ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
          ctx.fill();
          return;
        }

        const arc = (Math.PI * 2) / options.length;

        options.forEach((option, i) => {
          const angle = i * arc;

          // 绘制扇形
          ctx.beginPath();
          ctx.fillStyle = option.color;
          ctx.moveTo(centerX, centerY);
          ctx.arc(centerX, centerY, radius, angle, angle + arc);
          ctx.closePath();
          ctx.fill();

          // 绘制边框
          ctx.strokeStyle = "rgba(255,255,255,0.3)";
          ctx.lineWidth = 2;
          ctx.stroke();

          // 绘制文字
          ctx.save();
          ctx.translate(centerX, centerY);
          ctx.rotate(angle + arc / 2);
          ctx.textAlign = "right";
          ctx.fillStyle = "#fff";
          ctx.font = `bold ${Math.max(12, size / 25)}px sans-serif`;
          ctx.shadowColor = "rgba(0,0,0,0.5)";
          ctx.shadowBlur = 3;

          const text = option.text.length > 8 ? option.text.slice(0, 7) + "…" : option.text;
          ctx.fillText(text, radius - 20, 5);
          ctx.restore();
        });

        // 外圈装饰
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 10;
        ctx.stroke();
      }

      function spin() {
        if (isSpinning || options.length < 2) return;

        isSpinning = true;
        initAudio();

        // 使用加密随机数
        const randomValue = secureRandom();
        const winnerIndex = Math.floor(randomValue * options.length);

        // 计算旋转角度
        const arc = 360 / options.length;
        const targetAngle = 360 - (winnerIndex * arc + arc / 2);
        const spins = 5 + Math.floor(secureRandom() * 3); // 5-7圈
        const totalRotation = spins * 360 + targetAngle;

        currentRotation += totalRotation;
        canvas.style.transform = `rotate(${currentRotation}deg)`;
        canvas.classList.add("spinning");

        // 播放滴答声
        let tickCount = 0;
        const tickInterval = setInterval(() => {
          playTickSound();
          tickCount++;
          if (tickCount > 30) clearInterval(tickInterval);
        }, 100);

        setTimeout(() => {
          clearInterval(tickInterval);
          canvas.classList.remove("spinning");
          isSpinning = false;

          // 显示结果
          const winner = options[winnerIndex];
          showResult(winner);

          // 更新统计
          totalSpins++;
          localStorage.setItem("wheelTotalSpins", totalSpins);
          document.getElementById("totalSpins").textContent = totalSpins;

          // 添加历史记录
          addHistory(winner.text);

          // 如果开启了移除获胜者
          if (document.getElementById("removeWinner").checked) {
            options.splice(winnerIndex, 1);
            saveOptions();
            renderOptions();
            drawWheel();
          }
        }, 5000);
      }

      function showResult(winner) {
        document.getElementById("resultValue").textContent = winner.text;
        document.getElementById("resultValue").style.color = winner.color;
        document.getElementById("resultModal").classList.add("show");

        playWinSound();

        if (document.getElementById("confettiEnabled").checked) {
          createConfetti();
        }
      }

      function closeModal(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById("resultModal").classList.remove("show");
      }

      function createConfetti() {
        const colors = ["#ff6b6b", "#feca57", "#48dbfb", "#1dd1a1", "#5f27cd", "#ff9ff3"];
        for (let i = 0; i < 50; i++) {
          setTimeout(() => {
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.top = "-10px";
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
            confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(confetti);

            const animation = confetti.animate(
              [
                { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
                { transform: `translateY(100vh) rotate(${Math.random() * 720}deg)`, opacity: 0 }
              ],
              {
                duration: 2000 + Math.random() * 1000,
                easing: "cubic-bezier(0.25, 0.46, 0.45, 0.94)"
              }
            );

            animation.onfinish = () => confetti.remove();
          }, i * 30);
        }
      }

      function renderOptions() {
        const list = document.getElementById("optionsList");
        list.innerHTML = options
          .map(
            (opt, i) => `
                <div class="option-item">
                    <input type="color" class="option-color" value="${escapeHtml(opt.color)}" 
                           onchange="updateOptionColor(${i}, this.value)" aria-label="颜色选择器">
                    <input type="text" class="option-input" value="${escapeHtml(opt.text)}" 
                           onchange="updateOptionText(${i}, this.value)" 
                           placeholder="输入选项内容" aria-label="文本输入框">
                    <button class="option-delete" onclick="deleteOption(${i})" aria-label="✕">✕</button>
                </div>
            `
          )
          .join("");

        document.getElementById("optionCount").textContent = options.length;
      }

      function addOption() {
        const colorIndex = options.length % presetColors.length;
        options.push({
          text: `选项 ${options.length + 1}`,
          color: presetColors[colorIndex]
        });
        saveOptions();
        renderOptions();
        drawWheel();
      }

      function deleteOption(index) {
        if (options.length <= 2) {
          alert("至少需要保留2个选项");
          return;
        }
        options.splice(index, 1);
        saveOptions();
        renderOptions();
        drawWheel();
      }

      function updateOptionText(index, text) {
        options[index].text = text || `选项 ${index + 1}`;
        saveOptions();
        drawWheel();
      }

      function updateOptionColor(index, color) {
        options[index].color = color;
        saveOptions();
        drawWheel();
      }

      function saveOptions() {
        localStorage.setItem("wheelOptions", JSON.stringify(options));
      }

      function addHistory(result) {
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}`;
        history.unshift({ result, time: timeStr });
        if (history.length > 20) history.pop();
        localStorage.setItem("wheelHistory", JSON.stringify(history));
        renderHistory();
      }

      function renderHistory() {
        const list = document.getElementById("historyList");
        if (history.length === 0) {
          list.innerHTML =
            '<div style="text-align:center;color:var(--color-text-secondary);padding:20px;font-size:13px;">暂无抽奖记录</div>';
          return;
        }
        list.innerHTML = history
          .map(
            (h) => `
                <div class="history-item">
                    <span>${escapeHtml(h.result)}</span>
                    <span class="time">${escapeHtml(h.time)}</span>
                </div>
            `
          )
          .join("");
      }

      function clearHistory() {
        history = [];
        localStorage.setItem("wheelHistory", "[]");
        renderHistory();
      }

      function toggleTheme() {
        const body = document.body;
        const current = body.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        body.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      }

      // 初始化
      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
      document.getElementById("totalSpins").textContent = totalSpins;
      renderOptions();
      renderHistory();
      drawWheel();

      // 响应式重绘
      window.addEventListener("resize", drawWheel);
    </script>
  </body>
</html>
