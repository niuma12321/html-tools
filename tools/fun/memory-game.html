    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        padding: 20px;
        line-height: 1.6;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
      }
      h1 {
        color: white;
        text-align: center;
        margin-bottom: 20px;
      }
      .stats {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
        color: white;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .card {
        aspect-ratio: 1;
        background: white;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        transition: transform 0.3s;
      }
      .card.flipped {
        background: #667eea;
        transform: rotateY(180deg);
      }
      .card.matched {
        background: #48bb78;
        pointer-events: none;
      }
      .btn {
        display: block;
        margin: 20px auto;
        padding: 10px 30px;
        background: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      记忆翻牌
    </nav>
    <div class="container">
      <h1>🧠 记忆翻牌</h1>
      <div class="stats">
        <span>
          移动:
          <span id="moves">0</span>
        </span>
        <span>
          配对:
          <span id="pairs">0</span>
          /8
        </span>
      </div>
      <div class="grid" id="grid"></div>
      <button class="btn" onclick="initGame()">重新开始</button>
    </div>
    <script>
      const emojis = ["🎮", "🎲", "🎯", "🎨", "🎭", "🎪", "🎸", "🎹"];
      let cards = [],
        flipped = [],
        moves = 0,
        pairs = 0;
      function initGame() {
        const deck = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
        cards = deck;
        flipped = [];
        moves = 0;
        pairs = 0;
        document.getElementById("moves").textContent = "0";
        document.getElementById("pairs").textContent = "0";
        const grid = document.getElementById("grid");
        grid.innerHTML = deck
          .map((e, i) => '<div class="card" data-index="' + i + '">?</div>')
          .join("");
        grid.querySelectorAll(".card").forEach((c) => (c.onclick = () => flipCard(c)));
      }
      function flipCard(card) {
        if (flipped.length >= 2 || card.classList.contains("flipped")) return;
        const idx = card.dataset.index;
        card.textContent = cards[idx];
        card.classList.add("flipped");
        flipped.push({ card, idx });
        if (flipped.length === 2) {
          moves++;
          document.getElementById("moves").textContent = moves;
          if (cards[flipped[0].idx] === cards[flipped[1].idx]) {
            flipped.forEach((f) => f.card.classList.add("matched"));
            pairs++;
            document.getElementById("pairs").textContent = pairs;
            flipped = [];
            if (pairs === 8) setTimeout(() => alert("恭喜! 用了 " + moves + " 步完成!"), 300);
          } else {
            setTimeout(() => {
              flipped.forEach((f) => {
                f.card.classList.remove("flipped");
                f.card.textContent = "?";
              });
              flipped = [];
            }, 1000);
          }
        }
      }
      initGame();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
