    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        padding: 20px;
        line-height: 1.6;
      }
      .container {
        max-width: 500px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
      }
      h1 {
        margin-bottom: 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        margin: 20px 0;
        padding: 20px;
        background: #f7fafc;
        border-radius: 10px;
      }
      .cell {
        aspect-ratio: 1;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .cell:hover {
        transform: scale(1.1);
      }
      .info {
        color: #666;
        margin-bottom: 20px;
      }
      .score {
        font-size: 1.5rem;
        font-weight: bold;
        color: #667eea;
      }
      .btn {
        padding: 12px 24px;
        background: var(--color-accent-cyan);
        color: var(--color-bg-deep);
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s ease;
      }

      .btn:hover {
        background: #00dfc4;
        box-shadow: 0 0 20px var(--glow-cyan);
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      色盲测试
    </nav>
    <div class="container">
      <h1>👁️ 色盲测试</h1>
      <div class="info">找出颜色不同的方块</div>
      <div class="grid" id="grid"></div>
      <div class="score">
        得分:
        <span id="score">0</span>
      </div>
      <button class="btn" onclick="newRound()">新一轮</button>
    </div>
    <script>
      let score = 0,
        level = 1;
      function newRound() {
        const size = Math.min(5 + Math.floor(level / 3), 8);
        const diff = Math.max(50 - level * 3, 10);
        const hue = Math.random() * 360;
        const sat = 50 + Math.random() * 30;
        const light = 40 + Math.random() * 20;
        const target = Math.floor(Math.random() * size * size);
        const grid = document.getElementById("grid");
        grid.style.gridTemplateColumns = "repeat(" + size + ", 1fr)";
        grid.innerHTML = "";
        for (let i = 0; i < size * size; i++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (i === target) {
            cell.style.background = "hsl(" + hue + "," + sat + "%," + (light + diff / 2) + "%)";
            cell.onclick = () => {
              score++;
              level++;
              document.getElementById("score").textContent = score;
              newRound();
            };
          } else {
            cell.style.background = "hsl(" + hue + "," + sat + "%," + light + "%)";
            cell.onclick = () => {
              level = 1;
              alert("游戏结束! 得分: " + score);
              score = 0;
              document.getElementById("score").textContent = "0";
              newRound();
            };
          }
          grid.appendChild(cell);
        }
      }
      newRound();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
  </body>
</html>
