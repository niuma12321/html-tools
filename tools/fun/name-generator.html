      [data-theme="light"] {

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-sans);

        line-height: 1.6;
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);

        padding: 20px;

        max-width: 600px;
        margin: 0 auto;

      h1 {
        color: white;
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .options {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .option-group {
        flex: 1;
        min-width: 120px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
        font-size: 14px;
      }
      select,
      input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
      }
      select:focus,
      input:focus {
        outline: none;
        border-color: #f093fb;
      }
      .generate-btn {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #f093fb, #f5576c);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        margin-bottom: 20px;
      }
      .generate-btn:hover {
        opacity: 0.9;
      }
      .results {
        display: grid;
        gap: 10px;
      }
      .name-item {
        background: #f8f9fa;
        padding: 15px 20px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .name-text {
        font-size: 20px;
        font-weight: 600;
      }
      .copy-btn {

        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 6px;

        font-size: 12px;

  <body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <span id="theme-icon">🌙</span>
    </button>

    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      随机名字生成
    </nav>
    <div class="container">
      <h1>👤 随机名字生成器</h1>
      <div class="card">
        <div class="options">
          <div class="option-group">
            <label>语言</label>
            <select id="language">
              <option value="chinese">中文</option>
              <option value="english">英文</option>
              <option value="japanese">日文</option>
            </select>
          </div>
          <div class="option-group">
            <label>性别</label>
            <select id="gender">
              <option value="random">随机</option>
              <option value="male">男</option>
              <option value="female">女</option>
            </select>
          </div>
          <div class="option-group">
            <label for="input---">数量</label>
            <input
              type="number"
              id="count"
              value="5"
              min="1"
              max="20"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <button class="generate-btn" onclick="generate()" aria-label="生成名字">生成名字</button>
        <div class="results" id="results"></div>
      </div>
    </div>

          ]

      };

      function random(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function generateName(lang, gender) {
        const d = data[lang];
        const g = gender === "random" ? (Math.random() > 0.5 ? "male" : "female") : gender;

        if (lang === "chinese") {
          return random(d.surnames) + random(d[g]) + (Math.random() > 0.5 ? random(d[g]) : "");
        } else if (lang === "english") {
          return random(d[g]) + " " + random(d.surnames);
        } else {
          return random(d.surnames) + " " + random(d[g]);
        }
      }

      function generate() {
        const lang = document.getElementById("language").value;
        const gender = document.getElementById("gender").value;
        const count = Math.min(
          20,
          Math.max(1, parseInt(document.getElementById("count").value) || 5)
        );

        const names = [];
        for (let i = 0; i < count; i++) {
          names.push(generateName(lang, gender));
        }

        document.getElementById("results").innerHTML = names
          .map(
            (name) => `
                <div class="name-item">
                    <span class="name-text">${name}</span>
                    <button class="copy-btn" onclick="navigator.clipboard.writeText('${name}'); this.textContent='已复制'; setTimeout(() => this.textContent='复制', 1000)" aria-label="复制">复制</button>
                </div>
            `
          )
          .join("");
      }

      generate();

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        html.setAttribute("data-theme", newTheme);
        document.getElementById("theme-icon").textContent = newTheme === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", newTheme);
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "dark";
      if (savedTheme === "light") {
        document.documentElement.setAttribute("data-theme", "light");
        document.getElementById("theme-icon").textContent = "☀️";
      }
    </script>
