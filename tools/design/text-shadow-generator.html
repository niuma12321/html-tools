<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>文字阴影生成器 - WebUtils</title>
    <meta property="og:title" content="文字阴影生成器 - WebUtils" />
    <meta
      property="og:description"
      content="文字阴影生成器：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/design/text-shadow-generator.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/design/text-shadow-generator.html"
    />
    <meta name="description" content="CSS text-shadow 可视化生成器" />
    <meta name="keywords" content="text-shadow CSS 文字阴影 生成器" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .preview {
        min-height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        margin-bottom: 20px;
      }
      .preview-text {
        font-size: 4rem;
        font-weight: 700;
        transition: all 0.3s;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .control-group label {
        font-weight: 500;
        font-size: 0.9rem;
      }
      .control-group input[type="range"] {
        width: 100%;
      }
      .control-group input[type="text"],
      .control-group input[type="color"] {
        padding: 8px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .control-group input[type="color"] {
        width: 60px;
        height: 36px;
        padding: 2px;
        cursor: pointer;
      }
      .value {
        font-family: ui-monospace, monospace;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      .output {
        margin-top: 20px;
      }
      .output textarea {
        width: 100%;
        height: 80px;
        padding: 12px;
        font-family: ui-monospace, monospace;
        font-size: 0.9rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        resize: vertical;
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      .btn {
        padding: 10px 20px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
      }
      .btn:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }
      .btn.primary {
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
        color: #fff;
      }
      .presets {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      .preset {
        padding: 8px 14px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 0.85rem;
      }
      .preset:hover {
        border-color: var(--accent-cyan);
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>文字阴影生成器</h1>
      <p class="desc">可视化生成 CSS text-shadow 效果</p>

      <div class="card">
        <div class="presets">
          <button class="preset" onclick="applyPreset('simple')" aria-label="简单阴影">
            简单阴影
          </button>
          <button class="preset" onclick="applyPreset('glow')" aria-label="发光效果">
            发光效果
          </button>
          <button class="preset" onclick="applyPreset('neon')" aria-label="霓虹灯">霓虹灯</button>
          <button class="preset" onclick="applyPreset('retro')" aria-label="复古3D">复古3D</button>
          <button class="preset" onclick="applyPreset('outline')" aria-label="描边效果">
            描边效果
          </button>
        </div>

        <div class="preview">
          <div class="preview-text" id="previewText">文字阴影</div>
        </div>

        <div class="controls">
          <div class="control-group">
            <label for="input-----">预览文字</label>
            <input
              type="text"
              id="textInput"
              value="文字阴影"
              oninput="updatePreview()"
              aria-label="文本输入框"
              placeholder="请输入文本输入框"
            />
          </div>
          <div class="control-group">
            <label for="input-----">文字颜色</label>
            <input
              type="color"
              id="textColor"
              value="#212529"
              oninput="updatePreview()"
              aria-label="颜色选择器"
            />
          </div>
          <div class="control-group">
            <label for="input-----">阴影颜色</label>
            <input
              type="color"
              id="shadowColor"
              value="#000000"
              oninput="updatePreview()"
              aria-label="颜色选择器"
            />
          </div>
          <div class="control-group">
            <label>
              水平偏移:
              <span class="value" id="hOffsetVal">2px</span>
            </label>
            <input
              type="range"
              id="hOffset"
              min="-50"
              max="50"
              value="2"
              oninput="updatePreview()"
            />
          </div>
          <div class="control-group">
            <label>
              垂直偏移:
              <span class="value" id="vOffsetVal">2px</span>
            </label>
            <input
              type="range"
              id="vOffset"
              min="-50"
              max="50"
              value="2"
              oninput="updatePreview()"
            />
          </div>
          <div class="control-group">
            <label>
              模糊半径:
              <span class="value" id="blurVal">4px</span>
            </label>
            <input type="range" id="blur" min="0" max="50" value="4" oninput="updatePreview()" />
          </div>
          <div class="control-group">
            <label>
              透明度:
              <span class="value" id="opacityVal">0.5</span>
            </label>
            <input
              type="range"
              id="opacity"
              min="0"
              max="100"
              value="50"
              oninput="updatePreview()"
            />
          </div>
        </div>

        <div class="output">
          <textarea id="output" readonly></textarea>
          <button class="btn" onclick="copyCSS()" style="margin-top: 12px" aria-label="复制 CSS">
            复制 CSS
          </button>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function updatePreview() {
        const text = document.getElementById("textInput").value || "文字阴影";
        const textColor = document.getElementById("textColor").value;
        const shadowColor = document.getElementById("shadowColor").value;
        const hOffset = document.getElementById("hOffset").value;
        const vOffset = document.getElementById("vOffset").value;
        const blur = document.getElementById("blur").value;
        const opacity = document.getElementById("opacity").value / 100;

        document.getElementById("hOffsetVal").textContent = hOffset + "px";
        document.getElementById("vOffsetVal").textContent = vOffset + "px";
        document.getElementById("blurVal").textContent = blur + "px";
        document.getElementById("opacityVal").textContent = opacity.toFixed(2);

        const rgba = hexToRgba(shadowColor, opacity);
        const shadow = `${hOffset}px ${vOffset}px ${blur}px ${rgba}`;

        const preview = document.getElementById("previewText");
        preview.textContent = text;
        preview.style.color = textColor;
        preview.style.textShadow = shadow;

        document.getElementById("output").value = `color: ${textColor};\ntext-shadow: ${shadow};`;
      }

      function applyPreset(name) {
        const presets = {
          simple: { h: 2, v: 2, blur: 4, opacity: 50, shadowColor: "#000000" },
          glow: { h: 0, v: 0, blur: 20, opacity: 80, shadowColor: "#00f5d4" },
          neon: { h: 0, v: 0, blur: 10, opacity: 100, shadowColor: "#ff00ff" },
          retro: { h: 4, v: 4, blur: 0, opacity: 100, shadowColor: "#ff6b6b" },
          outline: { h: 1, v: 1, blur: 0, opacity: 100, shadowColor: "#000000" }
        };

        const p = presets[name];
        document.getElementById("hOffset").value = p.h;
        document.getElementById("vOffset").value = p.v;
        document.getElementById("blur").value = p.blur;
        document.getElementById("opacity").value = p.opacity;
        document.getElementById("shadowColor").value = p.shadowColor;
        updatePreview();
      }

      function copyCSS() {
        const css = document.getElementById("output").value;
        navigator.clipboard.writeText(css);
      }

      updatePreview();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
