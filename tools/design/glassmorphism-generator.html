    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .preview-area {
        min-height: 350px;
        border-radius: var(--radius-md);
        position: relative;
        overflow: hidden;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .preview-shapes {
        position: absolute;
        inset: 0;
      }
      .shape {
        position: absolute;
        border-radius: 50%;
      }
      .shape1 {
        width: 200px;
        height: 200px;
        background: #ff6b6b;
        top: 20%;
        left: 10%;
      }
      .shape2 {
        width: 150px;
        height: 150px;
        background: #4ecdc4;
        top: 50%;
        right: 15%;
      }
      .shape3 {
        width: 100px;
        height: 100px;
        background: #ffe66d;
        bottom: 20%;
        left: 30%;
      }
      .glass-card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300px;
        padding: 30px;
        text-align: center;
        color: #fff;
      }
      .glass-card h3 {
        margin: 0 0 10px;
      }
      .glass-card p {
        margin: 0;
        opacity: 0.9;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }
      .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .control-group label {
        font-weight: 500;
        font-size: 0.9rem;
      }
      .control-group input[type="range"] {
        width: 100%;
      }
      .control-group input[type="color"] {
        width: 60px;
        height: 36px;
        padding: 2px;
        cursor: pointer;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
      }
      .value {
        font-family: ui-monospace, monospace;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      .output {
        margin-top: 20px;
      }
      .output textarea {
        width: 100%;
        height: 150px;
        padding: 12px;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        resize: vertical;
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      .btn {
        padding: 10px 20px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
      }
      .btn:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>玻璃拟态生成器</h1>
      <p class="desc">生成 Glassmorphism 毛玻璃效果 CSS</p>

      <div class="card">
        <div class="preview-area">
          <div class="preview-shapes">
            <div class="shape shape1"></div>
            <div class="shape shape2"></div>
            <div class="shape shape3"></div>
          </div>
          <div class="glass-card" id="glassCard">
            <h3>Glass Card</h3>
            <p>毛玻璃效果示例</p>
          </div>
        </div>

        <div class="controls">
          <div class="control-group">
            <label>
              背景透明度:
              <span class="value" id="opacityVal">0.25</span>
            </label>
            <input type="range" id="opacity" min="0" max="100" value="25" oninput="updateGlass()" />
          </div>
          <div class="control-group">
            <label>
              模糊程度:
              <span class="value" id="blurVal">16px</span>
            </label>
            <input type="range" id="blur" min="0" max="50" value="16" oninput="updateGlass()" />
          </div>
          <div class="control-group">
            <label>
              边框透明度:
              <span class="value" id="borderOpacityVal">0.18</span>
            </label>
            <input
              type="range"
              id="borderOpacity"
              min="0"
              max="100"
              value="18"
              oninput="updateGlass()"
            />
          </div>
          <div class="control-group">
            <label>
              圆角:
              <span class="value" id="radiusVal">16px</span>
            </label>
            <input type="range" id="radius" min="0" max="50" value="16" oninput="updateGlass()" />
          </div>
          <div class="control-group">
            <label for="input-----">背景颜色</label>
            <input
              type="color"
              id="bgColor"
              value="#ffffff"
              oninput="updateGlass()"
              aria-label="颜色选择器"
            />
          </div>
          <div class="control-group">
            <label for="input-----">边框颜色</label>
            <input
              type="color"
              id="borderColor"
              value="#ffffff"
              oninput="updateGlass()"
              aria-label="颜色选择器"
            />
          </div>
        </div>

        <div class="output">
          <textarea id="output" readonly></textarea>
          <button class="btn" onclick="copyCSS()" style="margin-top: 12px" aria-label="复制 CSS">
            复制 CSS
          </button>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function updateGlass() {
        const opacity = document.getElementById("opacity").value / 100;
        const blur = document.getElementById("blur").value;
        const borderOpacity = document.getElementById("borderOpacity").value / 100;
        const radius = document.getElementById("radius").value;
        const bgColor = document.getElementById("bgColor").value;
        const borderColor = document.getElementById("borderColor").value;

        document.getElementById("opacityVal").textContent = opacity.toFixed(2);
        document.getElementById("blurVal").textContent = blur + "px";
        document.getElementById("borderOpacityVal").textContent = borderOpacity.toFixed(2);
        document.getElementById("radiusVal").textContent = radius + "px";

        const bgRgba = hexToRgba(bgColor, opacity);
        const borderRgba = hexToRgba(borderColor, borderOpacity);

        const glassCard = document.getElementById("glassCard");
        glassCard.style.background = bgRgba;
        glassCard.style.backdropFilter = `blur(${blur}px)`;
        glassCard.style.webkitBackdropFilter = `blur(${blur}px)`;
        glassCard.style.borderRadius = `${radius}px`;
        glassCard.style.border = `1px solid ${borderRgba}`;
        glassCard.style.boxShadow = "0 8px 32px 0 rgba(31, 38, 135, 0.37)";

        const css = `/* Glassmorphism Effect */
background: ${bgRgba};
backdrop-filter: blur(${blur}px);
-webkit-backdrop-filter: blur(${blur}px);
border-radius: ${radius}px;
border: 1px solid ${borderRgba};
box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);`;

        document.getElementById("output").value = css;
      }

      function copyCSS() {
        const css = document.getElementById("output").value;
        navigator.clipboard.writeText(css);
      }

      updateGlass();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
