<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS 阴影生成器 - WebUtils</title>
    <meta property="og:title" content="CSS 阴影生成器 - WebUtils" />
    <meta

      content="CSS 阴影生成器：在线实用工具，免费在线使用，无需安装"
    />

      property="og:url"

    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/design/box-shadow-generator.html"
    />
    <meta name="description" content="可视化创建 CSS box-shadow 和 text-shadow" />
    <meta name="keywords" content="css shadow box-shadow text-shadow 阴影 生成器" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .preview-area {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 250px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        margin-bottom: 20px;
      }
      .preview-box {
        width: 160px;
        height: 160px;
        background: var(--bg-card);
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 0.9rem;
        color: var(--text-muted);
      }
      .controls {
        display: grid;
        gap: 16px;
      }
      .control-group {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .control-group label {
        min-width: 100px;
        font-weight: 500;
        font-size: 0.9rem;
      }
      input[type="range"] {
        flex: 1;
        min-width: 150px;
      }
      input[type="number"] {
        width: 70px;
        padding: 6px 8px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      input[type="color"] {
        width: 50px;
        height: 32px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        cursor: pointer;
      }
      .value-display {
        min-width: 50px;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
      }
      .checkbox-label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .output {
        margin-top: 20px;
      }
      .output textarea {
        width: 100%;
        height: 60px;
        padding: 12px;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-deep);
        color: var(--text-primary);
        resize: none;
      }
      .btn {
        padding: 10px 16px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
      }
      .btn:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }
      .btn.primary {
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
        color: #fff;
      }
      .btn-row {
        display: flex;
        gap: 12px;
        margin-top: 12px;
      }
      .status {
        font-size: 0.85rem;
        color: var(--accent-green);
        margin-top: 8px;
      }
      .presets {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .preset {
        padding: 6px 12px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        cursor: pointer;
        font-size: 0.85rem;
        background: var(--bg-card);
      }
      .preset:hover {
        border-color: var(--accent-cyan);
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>CSS 阴影生成器</h1>
      <p class="desc">可视化创建 CSS box-shadow 效果</p>

      <div class="card">
        <div class="presets">
          <button class="preset" onclick="applyPreset('soft')" aria-label="柔和">柔和</button>
          <button class="preset" onclick="applyPreset('medium')" aria-label="中等">中等</button>
          <button class="preset" onclick="applyPreset('hard')" aria-label="硬朗">硬朗</button>
          <button class="preset" onclick="applyPreset('layered')" aria-label="层叠">层叠</button>
          <button class="preset" onclick="applyPreset('inset')" aria-label="内阴影">内阴影</button>
          <button class="preset" onclick="applyPreset('neon')" aria-label="霓虹">霓虹</button>
        </div>

        <div class="preview-area">
          <div class="preview-box" id="previewBox">预览效果</div>
        </div>

        <div class="controls">
          <div class="control-group">
            <label for="input-----">水平偏移</label>
            <input
              type="range"
              id="offsetX"
              min="-50"
              max="50"
              value="5"
              oninput="updateShadow()"
            />
            <span class="value-display" id="offsetXVal">5px</span>
          </div>
          <div class="control-group">
            <label for="input-----">垂直偏移</label>
            <input
              type="range"
              id="offsetY"
              min="-50"
              max="50"
              value="5"
              oninput="updateShadow()"
            />
            <span class="value-display" id="offsetYVal">5px</span>
          </div>
          <div class="control-group">
            <label for="input-----">模糊半径</label>
            <input type="range" id="blur" min="0" max="100" value="15" oninput="updateShadow()" />
            <span class="value-display" id="blurVal">15px</span>
          </div>
          <div class="control-group">
            <label for="input-----">扩展半径</label>
            <input type="range" id="spread" min="-50" max="50" value="0" oninput="updateShadow()" />
            <span class="value-display" id="spreadVal">0px</span>
          </div>
          <div class="control-group">
            <label for="input-----">阴影颜色</label>
            <input
              type="color"
              id="shadowColor"
              value="#000000"
              oninput="updateShadow()"
              aria-label="颜色选择器"
            />
            <label for="input----">透明度</label>
            <input
              type="range"
              id="opacity"
              min="0"
              max="100"
              value="20"
              oninput="updateShadow()"
            />
            <span class="value-display" id="opacityVal">20%</span>
          </div>
          <div class="control-group">
            <label class="checkbox-label">
              <input type="checkbox" id="inset" onchange="updateShadow()" />
              内阴影 (inset)
            </label>
          </div>
        </div>

        <div class="output">
          <textarea id="cssOutput" readonly></textarea>
          <div class="btn-row">
            <button class="btn primary" onclick="copyCSS()" aria-label="复制 CSS">复制 CSS</button>
            <button class="btn" onclick="resetShadow()" aria-label="重置">重置</button>
          </div>
          <div class="status" id="status"></div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      const previewBox = document.getElementById("previewBox");
      const outputEl = document.getElementById("cssOutput");
      const statusEl = document.getElementById("status");

      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function updateShadow() {
        const x = document.getElementById("offsetX").value;
        const y = document.getElementById("offsetY").value;
        const blur = document.getElementById("blur").value;
        const spread = document.getElementById("spread").value;
        const color = document.getElementById("shadowColor").value;
        const opacity = document.getElementById("opacity").value / 100;
        const inset = document.getElementById("inset").checked;

        document.getElementById("offsetXVal").textContent = x + "px";
        document.getElementById("offsetYVal").textContent = y + "px";
        document.getElementById("blurVal").textContent = blur + "px";
        document.getElementById("spreadVal").textContent = spread + "px";
        document.getElementById("opacityVal").textContent = Math.round(opacity * 100) + "%";

        const rgba = hexToRgba(color, opacity);
        const shadow = `${inset ? "inset " : ""}${x}px ${y}px ${blur}px ${spread}px ${rgba}`;

        previewBox.style.boxShadow = shadow;
        outputEl.value = `box-shadow: ${shadow};`;
      }

      function applyPreset(name) {
        const presets = {
          soft: { x: 0, y: 10, blur: 40, spread: -10, color: "#000000", opacity: 15, inset: false },
          medium: { x: 5, y: 5, blur: 15, spread: 0, color: "#000000", opacity: 25, inset: false },
          hard: { x: 8, y: 8, blur: 0, spread: 0, color: "#000000", opacity: 30, inset: false },
          layered: {
            x: 0,
            y: 25,
            blur: 50,
            spread: -12,
            color: "#000000",
            opacity: 25,
            inset: false
          },
          inset: { x: 0, y: 4, blur: 8, spread: 0, color: "#000000", opacity: 30, inset: true },
          neon: { x: 0, y: 0, blur: 20, spread: 5, color: "#00ffff", opacity: 80, inset: false }
        };

        const p = presets[name];
        document.getElementById("offsetX").value = p.x;
        document.getElementById("offsetY").value = p.y;
        document.getElementById("blur").value = p.blur;
        document.getElementById("spread").value = p.spread;
        document.getElementById("shadowColor").value = p.color;
        document.getElementById("opacity").value = p.opacity;
        document.getElementById("inset").checked = p.inset;
        updateShadow();
      }

      function resetShadow() {
        document.getElementById("offsetX").value = 5;
        document.getElementById("offsetY").value = 5;
        document.getElementById("blur").value = 15;
        document.getElementById("spread").value = 0;
        document.getElementById("shadowColor").value = "#000000";
        document.getElementById("opacity").value = 20;
        document.getElementById("inset").checked = false;
        updateShadow();
      }

      function copyCSS() {
        navigator.clipboard.writeText(outputEl.value).then(() => {
          statusEl.textContent = "已复制到剪贴板";
          setTimeout(() => (statusEl.textContent = ""), 2000);
        });
      }

      updateShadow();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
