<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>字体预览器 - WebUtils</title>
    <meta property="og:title" content="字体预览器 - WebUtils" />
    <meta property="og:description" content="字体预览器：在线实用工具，免费在线使用，无需安装" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/design/font-preview.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/design/font-preview.html" />
    <meta name="description" content="预览和比较不同字体的显示效果" />
    <meta name="keywords" content="字体预览 font preview 字体对比 typography" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .controls {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      .controls input,
      .controls select {
        padding: 10px 14px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        font-size: 0.9rem;
      }
      .controls input[type="text"] {
        flex: 1;
        min-width: 200px;
      }
      .font-size-control {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .font-size-control input[type="range"] {
        width: 100px;
      }
      .preview-text {
        padding: 24px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        margin-bottom: 20px;
        font-size: 24px;
        line-height: 1.6;
        min-height: 100px;
      }
      .font-list {
        display: grid;
        gap: 12px;
      }
      .font-item {
        padding: 16px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.2s;
        border: 2px solid transparent;
      }
      .font-item:hover {
        border-color: var(--accent-cyan);
      }
      .font-item.active {
        border-color: var(--accent-cyan);
        background: var(--bg-card);
      }
      .font-item-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .font-item-name {
        font-weight: 600;
        font-size: 0.9rem;
      }
      .font-item-type {
        font-size: 0.75rem;
        color: var(--text-muted);
        padding: 2px 8px;
        background: var(--bg-card);
        border-radius: 4px;
      }
      .font-item-preview {
        font-size: 1.5rem;
      }
      .custom-font {
        margin-bottom: 20px;
      }
      .custom-font label {
        display: block;
        font-weight: 500;
        margin-bottom: 8px;
      }
      .custom-font input {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>字体预览器</h1>
      <p class="desc">预览不同字体的显示效果，支持自定义文本</p>

      <div class="card">
        <div class="controls">
          <input
            type="text"
            id="previewText"
            value="The quick brown fox jumps over the lazy dog. 敏捷的棕色狐狸跳过懒狗。"
            placeholder="输入预览文本..."
            oninput="updatePreview()"
          />
          <div class="font-size-control">
            <span>字号:</span>
            <input
              type="range"
              id="fontSize"
              min="12"
              max="72"
              value="24"
              oninput="updatePreview()"
            />
            <span id="fontSizeVal">24px</span>
          </div>
        </div>

        <div class="preview-text" id="previewArea">
          The quick brown fox jumps over the lazy dog. 敏捷的棕色狐狸跳过懒狗。
        </div>

        <div class="custom-font">
          <label>自定义字体名称</label>
          <input
            type="text"
            id="customFont"
            placeholder="输入字体名称，如: Arial, Helvetica, PingFang SC"
            oninput="addCustomFont()"
          />
        </div>

        <div class="font-list" id="fontList"></div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      const fonts = [
        { name: "System UI", family: "system-ui, -apple-system, sans-serif", type: "系统" },
        { name: "Arial", family: "Arial, sans-serif", type: "西文" },
        { name: "Helvetica", family: "Helvetica, Arial, sans-serif", type: "西文" },
        { name: "Georgia", family: "Georgia, serif", type: "衬线" },
        { name: "Times New Roman", family: '"Times New Roman", Times, serif', type: "衬线" },
        { name: "Courier New", family: '"Courier New", monospace', type: "等宽" },
        { name: "Monaco", family: "Monaco, monospace", type: "等宽" },
        { name: "Consolas", family: "Consolas, monospace", type: "等宽" },
        { name: "Verdana", family: "Verdana, sans-serif", type: "西文" },
        { name: "Trebuchet MS", family: '"Trebuchet MS", sans-serif', type: "西文" },
        { name: "Comic Sans MS", family: '"Comic Sans MS", cursive', type: "手写" },
        { name: "Impact", family: "Impact, sans-serif", type: "装饰" },
        { name: "PingFang SC", family: '"PingFang SC", sans-serif', type: "中文" },
        { name: "Microsoft YaHei", family: '"Microsoft YaHei", sans-serif', type: "中文" },
        { name: "SimSun", family: "SimSun, serif", type: "中文" },
        { name: "SimHei", family: "SimHei, sans-serif", type: "中文" },
        { name: "STHeiti", family: "STHeiti, sans-serif", type: "中文" },
        { name: "Noto Sans SC", family: '"Noto Sans SC", sans-serif', type: "中文" }
      ];

      let selectedFont = fonts[0];
      const previewArea = document.getElementById("previewArea");
      const fontListEl = document.getElementById("fontList");

      function renderFontList() {
        fontListEl.innerHTML = "";
        fonts.forEach((font, index) => {
          const div = document.createElement("div");
          div.className = "font-item" + (font === selectedFont ? " active" : "");
          div.innerHTML = `
          <div class="font-item-header">
            <span class="font-item-name">${font.name}</span>
            <span class="font-item-type">${font.type}</span>
          </div>
          <div class="font-item-preview" style="font-family: ${font.family}">${document.getElementById("previewText").value.slice(0, 40) || "Preview Text 预览文字"}</div>
        `;
          div.onclick = () => selectFont(font);
          fontListEl.appendChild(div);
        });
      }

      function selectFont(font) {
        selectedFont = font;
        updatePreview();
        renderFontList();
      }

      function updatePreview() {
        const text =
          document.getElementById("previewText").value ||
          "The quick brown fox jumps over the lazy dog.";
        const size = document.getElementById("fontSize").value;
        document.getElementById("fontSizeVal").textContent = size + "px";

        previewArea.style.fontFamily = selectedFont.family;
        previewArea.style.fontSize = size + "px";
        previewArea.textContent = text;

        // 更新字体列表预览
        document.querySelectorAll(".font-item-preview").forEach((el) => {
          el.textContent = text.slice(0, 40) || "Preview Text 预览文字";
        });
      }

      function addCustomFont() {
        const customFontName = document.getElementById("customFont").value.trim();
        if (customFontName && !fonts.find((f) => f.name === customFontName)) {
          const newFont = { name: customFontName, family: customFontName, type: "自定义" };
          fonts.unshift(newFont);
          selectedFont = newFont;
          renderFontList();
          updatePreview();
        }
      }

      renderFontList();
      updatePreview();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
