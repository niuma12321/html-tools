<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS 按钮生成器 - WebUtils</title>
    <meta property="og:title" content="CSS 按钮生成器 - WebUtils" />
    <meta
      property="og:description"
      content="CSS 按钮生成器：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/design/css-button-generator.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <link
      rel="canonical"
      href="https://tools.realtime-ai.chat/tools/design/css-button-generator.html"
    />
    <meta name="description" content="可视化生成各种风格的 CSS 按钮" />
    <meta name="keywords" content="button CSS 按钮 生成器 样式" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .preview-area {
        min-height: 150px;
        background: var(--bg-deep);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
      }
      #previewBtn {
        cursor: pointer;
        transition: all 0.2s;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
      }
      .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .control-group label {
        font-weight: 500;
        font-size: 0.85rem;
      }
      .control-group input,
      .control-group select {
        padding: 8px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .control-group input[type="range"] {
        padding: 0;
      }
      .control-group input[type="color"] {
        width: 50px;
        height: 32px;
        padding: 2px;
        cursor: pointer;
      }
      .value {
        font-family: ui-monospace, monospace;
        color: var(--text-muted);
        font-size: 0.8rem;
      }
      .presets {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      .preset {
        padding: 8px 14px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 0.85rem;
      }
      .preset:hover {
        border-color: var(--accent-cyan);
      }
      .output {
        margin-top: 20px;
      }
      .output textarea {
        width: 100%;
        height: 200px;
        padding: 12px;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        resize: vertical;
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      .btn {
        padding: 10px 20px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
        margin-top: 12px;
      }
      .btn:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>CSS 按钮生成器</h1>
      <p class="desc">可视化生成各种风格的按钮样式</p>

      <div class="card">
        <div class="presets">
          <button class="preset" onclick="applyPreset('primary')" aria-label="主要按钮">
            主要按钮
          </button>
          <button class="preset" onclick="applyPreset('outline')" aria-label="描边按钮">
            描边按钮
          </button>
          <button class="preset" onclick="applyPreset('gradient')" aria-label="渐变按钮">
            渐变按钮
          </button>
          <button class="preset" onclick="applyPreset('rounded')" aria-label="圆角按钮">
            圆角按钮
          </button>
          <button class="preset" onclick="applyPreset('shadow')" aria-label="阴影按钮">
            阴影按钮
          </button>
          <button class="preset" onclick="applyPreset('minimal')" aria-label="简约按钮">
            简约按钮
          </button>
        </div>

        <div class="preview-area">
          <button id="previewBtn">点击按钮</button>
        </div>

        <div class="controls">
          <div class="control-group">
            <label for="input-----">按钮文字</label>
            <input
              type="text"
              id="btnText"
              value="点击按钮"
              oninput="updateButton()"
              aria-label="文本输入框"
              placeholder="请输入文本输入框"
            />
          </div>
          <div class="control-group">
            <label for="input-----">背景颜色</label>
            <input
              type="color"
              id="bgColor"
              value="#0d6efd"
              oninput="updateButton()"
              aria-label="颜色选择器"
            />
          </div>
          <div class="control-group">
            <label for="input-----">文字颜色</label>
            <input
              type="color"
              id="textColor"
              value="#ffffff"
              oninput="updateButton()"
              aria-label="颜色选择器"
            />
          </div>
          <div class="control-group">
            <label for="input-----">边框颜色</label>
            <input
              type="color"
              id="borderColor"
              value="#0d6efd"
              oninput="updateButton()"
              aria-label="颜色选择器"
            />
          </div>
          <div class="control-group">
            <label>
              字体大小:
              <span class="value" id="fontSizeVal">16px</span>
            </label>
            <input
              type="range"
              id="fontSize"
              min="12"
              max="24"
              value="16"
              oninput="updateButton()"
            />
          </div>
          <div class="control-group">
            <label>
              内边距 X:
              <span class="value" id="paddingXVal">24px</span>
            </label>
            <input
              type="range"
              id="paddingX"
              min="8"
              max="48"
              value="24"
              oninput="updateButton()"
            />
          </div>
          <div class="control-group">
            <label>
              内边距 Y:
              <span class="value" id="paddingYVal">12px</span>
            </label>
            <input
              type="range"
              id="paddingY"
              min="4"
              max="24"
              value="12"
              oninput="updateButton()"
            />
          </div>
          <div class="control-group">
            <label>
              圆角:
              <span class="value" id="radiusVal">6px</span>
            </label>
            <input type="range" id="radius" min="0" max="50" value="6" oninput="updateButton()" />
          </div>
          <div class="control-group">
            <label>
              边框宽度:
              <span class="value" id="borderWidthVal">1px</span>
            </label>
            <input
              type="range"
              id="borderWidth"
              min="0"
              max="5"
              value="1"
              oninput="updateButton()"
            />
          </div>
          <div class="control-group">
            <label>字重</label>
            <select id="fontWeight" onchange="updateButton()">
              <option value="400">Normal</option>
              <option value="500" selected>Medium</option>
              <option value="600">Semibold</option>
              <option value="700">Bold</option>
            </select>
          </div>
        </div>

        <div class="output">
          <textarea id="output" readonly></textarea>
          <button class="btn" onclick="copyCSS()" aria-label="复制 CSS">复制 CSS</button>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function updateButton() {
        const btn = document.getElementById("previewBtn");
        const text = document.getElementById("btnText").value;
        const bgColor = document.getElementById("bgColor").value;
        const textColor = document.getElementById("textColor").value;
        const borderColor = document.getElementById("borderColor").value;
        const fontSize = document.getElementById("fontSize").value;
        const paddingX = document.getElementById("paddingX").value;
        const paddingY = document.getElementById("paddingY").value;
        const radius = document.getElementById("radius").value;
        const borderWidth = document.getElementById("borderWidth").value;
        const fontWeight = document.getElementById("fontWeight").value;

        document.getElementById("fontSizeVal").textContent = fontSize + "px";
        document.getElementById("paddingXVal").textContent = paddingX + "px";
        document.getElementById("paddingYVal").textContent = paddingY + "px";
        document.getElementById("radiusVal").textContent = radius + "px";
        document.getElementById("borderWidthVal").textContent = borderWidth + "px";

        btn.textContent = text;
        btn.style.background = bgColor;
        btn.style.color = textColor;
        btn.style.border = `${borderWidth}px solid ${borderColor}`;
        btn.style.fontSize = fontSize + "px";
        btn.style.padding = `${paddingY}px ${paddingX}px`;
        btn.style.borderRadius = radius + "px";
        btn.style.fontWeight = fontWeight;

        const css = `.button {
  background: ${bgColor};
  color: ${textColor};
  border: ${borderWidth}px solid ${borderColor};
  padding: ${paddingY}px ${paddingX}px;
  border-radius: ${radius}px;
  font-size: ${fontSize}px;
  font-weight: ${fontWeight};
  cursor: pointer;
  transition: all 0.2s ease;
}

.button:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}`;

        document.getElementById("output").value = css;
      }

      function applyPreset(preset) {
        const presets = {
          primary: { bg: "#0d6efd", text: "#ffffff", border: "#0d6efd", radius: 6, borderWidth: 0 },
          outline: { bg: "#ffffff", text: "#0d6efd", border: "#0d6efd", radius: 6, borderWidth: 2 },
          gradient: {
            bg: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
            text: "#ffffff",
            border: "transparent",
            radius: 8,
            borderWidth: 0
          },
          rounded: {
            bg: "#10b981",
            text: "#ffffff",
            border: "#10b981",
            radius: 50,
            borderWidth: 0
          },
          shadow: { bg: "#6366f1", text: "#ffffff", border: "#6366f1", radius: 8, borderWidth: 0 },
          minimal: { bg: "#f8f9fa", text: "#212529", border: "#dee2e6", radius: 4, borderWidth: 1 }
        };

        const p = presets[preset];
        document.getElementById("bgColor").value = p.bg.startsWith("#") ? p.bg : "#667eea";
        document.getElementById("textColor").value = p.text;
        document.getElementById("borderColor").value = p.border.startsWith("#")
          ? p.border
          : "#667eea";
        document.getElementById("radius").value = p.radius;
        document.getElementById("borderWidth").value = p.borderWidth;

        if (preset === "gradient") {
          document.getElementById("previewBtn").style.background = p.bg;
        }

        updateButton();
      }

      function copyCSS() {
        navigator.clipboard.writeText(document.getElementById("output").value);
      }

      updateButton();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
