    <style>

      .btn {

      }
      @media (max-width: 480px) {

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
      <h1>宽高比计算器</h1>
      <p class="desc">计算和转换图片视频宽高比</p>

      <div class="card">
        <div class="input-row">
          <div class="input-group">
            <label>宽度</label>
            <input type="number" id="width" value="1920" oninput="calculateRatio()" />
          </div>
          <span class="separator">×</span>
          <div class="input-group">
            <label>高度</label>
            <input type="number" id="height" value="1080" oninput="calculateRatio()" />
          </div>
        </div>

        <div class="result">
          <div class="ratio" id="ratio">16:9</div>
          <div class="decimal" id="decimal">比值: 1.7778</div>
        </div>

        <div class="preview">
          <div class="preview-box" id="previewBox" style="width: 200px; height: 112px">预览</div>
        </div>

        <div class="presets">
          <h4>常用宽高比</h4>
          <div class="preset-grid">
            <button class="preset-btn" onclick="setPreset(1, 1)">1:1</button>
            <button class="preset-btn" onclick="setPreset(4, 3)">4:3</button>
            <button class="preset-btn" onclick="setPreset(3, 2)">3:2</button>
            <button class="preset-btn" onclick="setPreset(16, 9)">16:9</button>
            <button class="preset-btn" onclick="setPreset(16, 10)">16:10</button>
            <button class="preset-btn" onclick="setPreset(21, 9)">21:9</button>
            <button class="preset-btn" onclick="setPreset(9, 16)">9:16</button>
            <button class="preset-btn" onclick="setPreset(2, 3)">2:3</button>
          </div>
        </div>

        <div class="converter">
          <h4>尺寸换算</h4>
          <div class="input-row">
            <div class="input-group">
              <label>目标宽度</label>
              <input
                type="number"
                id="targetWidth"
                placeholder="输入宽度"
                oninput="convertSize('width')"
              />
            </div>
            <span class="separator">或</span>
            <div class="input-group">
              <label>目标高度</label>
              <input
                type="number"
                id="targetHeight"
                placeholder="输入高度"
                oninput="convertSize('height')"
              />
            </div>
          </div>
          <div
            id="convertResult"
            style="text-align: center; color: var(--text-muted); margin-top: 12px"
          ></div>
        </div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      function gcd(a, b) {
        a = Math.abs(Math.round(a));
        b = Math.abs(Math.round(b));
        while (b) {
          [a, b] = [b, a % b];
        }
        return a;
      }

      function calculateRatio() {
        const width = parseInt(document.getElementById("width").value) || 1;
        const height = parseInt(document.getElementById("height").value) || 1;

        const g = gcd(width, height);
        const ratioW = width / g;
        const ratioH = height / g;
        const decimal = (width / height).toFixed(4);

        document.getElementById("ratio").textContent = `${ratioW}:${ratioH}`;
        document.getElementById("decimal").textContent = `比值: ${decimal}`;

        // Update preview
        const maxWidth = 200;
        const maxHeight = 150;
        let previewW, previewH;

        if (width / height > maxWidth / maxHeight) {
          previewW = maxWidth;
          previewH = (maxWidth * height) / width;
        } else {
          previewH = maxHeight;
          previewW = (maxHeight * width) / height;
        }

        const preview = document.getElementById("previewBox");
        preview.style.width = previewW + "px";
        preview.style.height = previewH + "px";
        preview.textContent = `${width}×${height}`;
      }

      function setPreset(w, h) {
        // Set to a common resolution with this ratio
        const resolutions = {
          "1:1": [1080, 1080],
          "4:3": [1600, 1200],
          "3:2": [1920, 1280],
          "16:9": [1920, 1080],
          "16:10": [1920, 1200],
          "21:9": [2560, 1080],
          "9:16": [1080, 1920],
          "2:3": [1280, 1920]
        };

        const key = `${w}:${h}`;
        if (resolutions[key]) {
          document.getElementById("width").value = resolutions[key][0];
          document.getElementById("height").value = resolutions[key][1];
        } else {
          document.getElementById("width").value = w * 100;
          document.getElementById("height").value = h * 100;
        }
        calculateRatio();
      }

      function convertSize(mode) {
        const width = parseInt(document.getElementById("width").value) || 1;
        const height = parseInt(document.getElementById("height").value) || 1;
        const ratio = width / height;

        let result = "";

        if (mode === "width") {
          const targetW = parseInt(document.getElementById("targetWidth").value);
          if (targetW) {
            const targetH = Math.round(targetW / ratio);
            result = `宽度 ${targetW}px 对应高度: ${targetH}px`;
            document.getElementById("targetHeight").value = "";
          }
        } else {
          const targetH = parseInt(document.getElementById("targetHeight").value);
          if (targetH) {
            const targetW = Math.round(targetH * ratio);
            result = `高度 ${targetH}px 对应宽度: ${targetW}px`;
            document.getElementById("targetWidth").value = "";
          }
        }

        document.getElementById("convertResult").textContent = result;
      }

      calculateRatio();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
