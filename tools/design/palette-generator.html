    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;

        --bg-input: #0e0e14;

        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;

        --font-sans:

      [data-theme="light"] {

        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);

      input[type="color"] {
        width: 60px;

        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        cursor: pointer;
      }
      select {
        padding: 10px 16px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        font-size: 0.9rem;
      }
      .btn {
        padding: 10px 16px;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
      }
      .btn:hover {
        border-color: var(--accent-cyan);

      }
      .btn.primary {
        background: var(--accent-cyan);

      }
      .palette {
        display: flex;
        border-radius: var(--radius-md);
        overflow: hidden;
        margin-bottom: 20px;
      }
      .color-swatch {
        flex: 1;
        height: 150px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 12px;
        cursor: pointer;
        transition: transform 0.2s;
        position: relative;

      .color-swatch:hover {
        transform: scale(1.02);

      .color-swatch .hex {

      }
      .color-swatch.light .hex,
      .color-swatch.light .rgb {
        color: var(--color-text-primary);
        text-shadow: none;
      }
      .color-swatch.dark .hex,
      .color-swatch.dark .rgb {
        color: #fff;
      }
      .export-section {
        margin-top: 20px;
      }
      .export-section h3 {
        margin: 0 0 12px;

      .export-grid {

      }

      footer {

      }

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>调色板生成器</h1>
      <p class="desc">基于色彩理论生成和谐的配色方案</p>

      <div class="card">
        <div class="controls">
          <label for="input----">基准色</label>
          <input
            type="color"
            id="baseColor"
            value="#667eea"
            onchange="generatePalette()"
            aria-label="颜色选择器"
          />
          <label>方案</label>
          <select id="scheme" onchange="generatePalette()">
            <option value="complementary">互补色</option>
            <option value="analogous">类似色</option>
            <option value="triadic">三色组</option>
            <option value="split">分裂互补</option>
            <option value="tetradic">四色组</option>
            <option value="monochromatic">单色</option>
          </select>
          <button class="btn" onclick="randomBase()" aria-label="随机">随机</button>
        </div>

        <div class="palette" id="palette"></div>

        <div class="export-section">
          <h3>导出格式</h3>
          <div class="export-grid" id="exportGrid"></div>
        </div>
        <div class="status" id="status"></div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      const baseColorEl = document.getElementById("baseColor");
      const schemeEl = document.getElementById("scheme");
      const paletteEl = document.getElementById("palette");
      const exportEl = document.getElementById("exportGrid");
      const statusEl = document.getElementById("status");

      function hexToHsl(hex) {
        let r = parseInt(hex.slice(1, 3), 16) / 255;
        let g = parseInt(hex.slice(3, 5), 16) / 255;
        let b = parseInt(hex.slice(5, 7), 16) / 255;
        const max = Math.max(r, g, b),
          min = Math.min(r, g, b);
        let h,
          s,
          l = (max + min) / 2;
        if (max === min) {
          h = s = 0;
        } else {
          const d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
            case r:
              h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
              break;
            case g:
              h = ((b - r) / d + 2) / 6;
              break;
            case b:
              h = ((r - g) / d + 4) / 6;
              break;
          }
        }
        return { h: h * 360, s: s * 100, l: l * 100 };
      }

      function hslToHex(h, s, l) {
        h = ((h % 360) + 360) % 360;
        s /= 100;
        l /= 100;
        const a = s * Math.min(l, 1 - l);
        const f = (n) => {
          const k = (n + h / 30) % 12;
          const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
          return Math.round(255 * color)
            .toString(16)
            .padStart(2, "0");
        };
        return `#${f(0)}${f(8)}${f(4)}`;
      }

      function isLight(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return (r * 299 + g * 587 + b * 114) / 1000 > 128;
      }

      function hexToRgb(hex) {
        return {
          r: parseInt(hex.slice(1, 3), 16),
          g: parseInt(hex.slice(3, 5), 16),
          b: parseInt(hex.slice(5, 7), 16)
        };
      }

      function generateScheme(baseHex, scheme) {
        const hsl = hexToHsl(baseHex);
        let colors = [];

        switch (scheme) {
          case "complementary":
            colors = [hslToHex(hsl.h, hsl.s, hsl.l), hslToHex(hsl.h + 180, hsl.s, hsl.l)];
            break;
          case "analogous":
            colors = [
              hslToHex(hsl.h - 30, hsl.s, hsl.l),
              hslToHex(hsl.h, hsl.s, hsl.l),
              hslToHex(hsl.h + 30, hsl.s, hsl.l)
            ];
            break;
          case "triadic":
            colors = [
              hslToHex(hsl.h, hsl.s, hsl.l),
              hslToHex(hsl.h + 120, hsl.s, hsl.l),
              hslToHex(hsl.h + 240, hsl.s, hsl.l)
            ];
            break;
          case "split":
            colors = [
              hslToHex(hsl.h, hsl.s, hsl.l),
              hslToHex(hsl.h + 150, hsl.s, hsl.l),
              hslToHex(hsl.h + 210, hsl.s, hsl.l)
            ];
            break;
          case "tetradic":
            colors = [
              hslToHex(hsl.h, hsl.s, hsl.l),
              hslToHex(hsl.h + 90, hsl.s, hsl.l),
              hslToHex(hsl.h + 180, hsl.s, hsl.l),
              hslToHex(hsl.h + 270, hsl.s, hsl.l)
            ];
            break;
          case "monochromatic":
            colors = [
              hslToHex(hsl.h, hsl.s, Math.max(hsl.l - 30, 10)),
              hslToHex(hsl.h, hsl.s, Math.max(hsl.l - 15, 20)),
              hslToHex(hsl.h, hsl.s, hsl.l),
              hslToHex(hsl.h, hsl.s, Math.min(hsl.l + 15, 80)),
              hslToHex(hsl.h, hsl.s, Math.min(hsl.l + 30, 90))
            ];
            break;
        }
        return colors;
      }

      function generatePalette() {
        const baseHex = baseColorEl.value;
        const scheme = schemeEl.value;
        const colors = generateScheme(baseHex, scheme);

        paletteEl.innerHTML = "";
        colors.forEach((hex) => {
          const rgb = hexToRgb(hex);
          const div = document.createElement("div");
          div.className = `color-swatch ${isLight(hex) ? "light" : "dark"}`;
          div.style.background = hex;
          div.innerHTML = `
          <div class="hex">${hex.toUpperCase()}</div>
          <div class="rgb">rgb(${rgb.r}, ${rgb.g}, ${rgb.b})</div>
        `;
          div.onclick = () => copyColor(hex);
          paletteEl.appendChild(div);
        });

        // 导出格式
        exportEl.innerHTML = `
        <div class="export-item" onclick="copyText('${colors.join(", ")}')">${colors.join(", ")}</div>
        <div class="export-item" onclick="copyText('${colors
          .map((c) => hexToRgb(c))
          .map((r) => `rgb(${r.r},${r.g},${r.b})`)
          .join(", ")}')">${colors
          .map((c) => hexToRgb(c))
          .map((r) => `rgb(${r.r},${r.g},${r.b})`)
          .join(", ")}</div>
        <div class="export-item" onclick="copyText(':root { ${colors.map((c, i) => `--color-${i + 1}: ${c}`).join("; ")}; }')">CSS Variables</div>
        <div class="export-item" onclick="copyText('${JSON.stringify(colors)}')">${JSON.stringify(colors)}</div>
      `;
      }

      function randomBase() {
        const hex =
          "#" +
          Math.floor(Math.random() * 16777215)
            .toString(16)
            .padStart(6, "0");
        baseColorEl.value = hex;
        generatePalette();
      }

      function copyColor(hex) {
        navigator.clipboard.writeText(hex).then(() => {
          statusEl.textContent = `已复制: ${hex}`;
          setTimeout(() => (statusEl.textContent = ""), 2000);
        });
      }

      function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
          statusEl.textContent = "已复制到剪贴板";
          setTimeout(() => (statusEl.textContent = ""), 2000);
        });
      }

      generatePalette();

      function toggleTheme() {
        const html = document.documentElement;
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        document.querySelector(".theme-toggle").textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
