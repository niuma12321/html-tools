<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>颜色选择器 - WebUtils</title>
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/design/color-picker.html" />
    <meta name="description" content="强大的颜色选择器，支持 HEX、RGB、HSL、HSV 格式转换" />
    <meta name="keywords" content="颜色选择器 color picker hex rgb hsl hsv 调色板" />
    <meta name="author" content="WebUtils" />
    <meta property="og:title" content="颜色选择器 - WebUtils" />
    <meta property="og:description" content="强大的颜色选择器，支持 HEX、RGB、HSL、HSV 格式转换" />
    <meta property="og:type" content="website" />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 16px;
        line-height: 1.6;
        background: var(--bg-deep);
        color: var(--text-primary);
        margin: 0;
        padding: 24px;
        min-height: 100vh;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--accent-cyan);
        text-decoration: none;
        font-size: 0.9rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      .desc {
        color: var(--text-muted);
        margin: 0 0 24px;
        font-size: 0.95rem;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
      }
      .picker-container {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
      }
      .color-area {
        flex: 1;
        min-width: 280px;
      }
      .color-preview {
        width: 100%;
        height: 200px;
        border-radius: var(--radius-md);
        border: 2px solid var(--border-subtle);
        margin-bottom: 16px;
        position: relative;
        overflow: hidden;
      }
      .color-preview-inner {
        width: 100%;
        height: 100%;
      }
      input[type="color"] {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
      }
      .color-values {
        flex: 1;
        min-width: 280px;
      }
      .color-input {
        margin-bottom: 16px;
      }
      .color-input label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        font-size: 0.9rem;
      }
      .color-input input {
        width: 100%;
        padding: 10px 12px;
        font-size: 0.95rem;
        font-family: ui-monospace, monospace;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-deep);
        color: var(--text-primary);
      }
      .color-input input:focus {
        outline: none;
        border-color: var(--accent-cyan);
      }
      .copy-btn {
        padding: 10px 16px;
        font-size: 0.9rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
        margin-top: 8px;
      }
      .copy-btn:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
      }
      .swatches {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 16px;
      }
      .swatch {
        width: 36px;
        height: 36px;
        border-radius: 6px;
        cursor: pointer;
        border: 2px solid var(--border-subtle);
        transition: transform 0.2s;
      }
      .swatch:hover {
        transform: scale(1.1);
      }
      .status {
        font-size: 0.85rem;
        margin-top: 12px;
        color: var(--accent-green);
        min-height: 20px;
      }
      footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-cyan);
        text-decoration: none;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <a href="../../index.html" class="back-link">← 返回工具列表</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="☀️">☀️</button>
      <h1>颜色选择器</h1>
      <p class="desc">选择颜色并获取 HEX、RGB、HSL、HSV 格式值</p>

      <div class="card">
        <div class="picker-container">
          <div class="color-area">
            <div class="color-preview">
              <div class="color-preview-inner" id="colorPreview"></div>
              <input type="color" id="colorPicker" value="#0d6efd" aria-label="颜色选择器" />
            </div>
            <p style="font-size: 0.85rem; color: var(--text-muted); text-align: center">
              点击上方区域选择颜色
            </p>
            <div class="swatches" id="swatches"></div>
          </div>
          <div class="color-values">
            <div class="color-input">
              <label for="input-hex">HEX</label>
              <input
                type="text"
                id="hexValue"
                value="#0d6efd"
                aria-label="文本输入框"
                placeholder="请输入文本输入框"
              />
              <button class="copy-btn" onclick="copyValue('hex')" aria-label="复制">复制</button>
            </div>
            <div class="color-input">
              <label for="input-rgb">RGB</label>
              <input
                type="text"
                id="rgbValue"
                readonly
                aria-label="文本输入框"
                placeholder="请输入文本输入框"
              />
              <button class="copy-btn" onclick="copyValue('rgb')" aria-label="复制">复制</button>
            </div>
            <div class="color-input">
              <label for="input-hsl">HSL</label>
              <input
                type="text"
                id="hslValue"
                readonly
                aria-label="文本输入框"
                placeholder="请输入文本输入框"
              />
              <button class="copy-btn" onclick="copyValue('hsl')" aria-label="复制">复制</button>
            </div>
            <div class="color-input">
              <label for="input-hsv-hsb">HSV/HSB</label>
              <input
                type="text"
                id="hsvValue"
                readonly
                aria-label="文本输入框"
                placeholder="请输入文本输入框"
              />
              <button class="copy-btn" onclick="copyValue('hsv')" aria-label="复制">复制</button>
            </div>
          </div>
        </div>
        <div class="status" id="status"></div>
      </div>

      <footer>
        纯前端工具 · 无服务器 ·
        <a href="../../index.html">WebUtils</a>
      </footer>
    </div>

    <script>
      const colorPicker = document.getElementById("colorPicker");
      const colorPreview = document.getElementById("colorPreview");
      const hexInput = document.getElementById("hexValue");
      const rgbInput = document.getElementById("rgbValue");
      const hslInput = document.getElementById("hslValue");
      const hsvInput = document.getElementById("hsvValue");
      const statusEl = document.getElementById("status");
      const swatchesEl = document.getElementById("swatches");

      const defaultColors = [
        "#ff6b6b",
        "#feca57",
        "#48dbfb",
        "#1dd1a1",
        "#5f27cd",
        "#ff9ff3",
        "#54a0ff",
        "#00d2d3",
        "#ff9f43",
        "#2e86de"
      ];

      function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result
          ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) }
          : null;
      }

      function rgbToHsl(r, g, b) {
        r /= 255;
        g /= 255;
        b /= 255;
        const max = Math.max(r, g, b),
          min = Math.min(r, g, b);
        let h,
          s,
          l = (max + min) / 2;
        if (max === min) {
          h = s = 0;
        } else {
          const d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
            case r:
              h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
              break;
            case g:
              h = ((b - r) / d + 2) / 6;
              break;
            case b:
              h = ((r - g) / d + 4) / 6;
              break;
          }
        }
        return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
      }

      function rgbToHsv(r, g, b) {
        r /= 255;
        g /= 255;
        b /= 255;
        const max = Math.max(r, g, b),
          min = Math.min(r, g, b);
        let h,
          s,
          v = max;
        const d = max - min;
        s = max === 0 ? 0 : d / max;
        if (max === min) {
          h = 0;
        } else {
          switch (max) {
            case r:
              h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
              break;
            case g:
              h = ((b - r) / d + 2) / 6;
              break;
            case b:
              h = ((r - g) / d + 4) / 6;
              break;
          }
        }
        return { h: Math.round(h * 360), s: Math.round(s * 100), v: Math.round(v * 100) };
      }

      function updateColor(hex) {
        if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) return;
        colorPreview.style.background = hex;
        colorPicker.value = hex;
        const rgb = hexToRgb(hex);
        if (rgb) {
          rgbInput.value = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
          const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
          hslInput.value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
          const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
          hsvInput.value = `hsv(${hsv.h}, ${hsv.s}%, ${hsv.v}%)`;
        }
      }

      colorPicker.addEventListener("input", (e) => {
        const hex = e.target.value;
        hexInput.value = hex;
        updateColor(hex);
      });

      hexInput.addEventListener("input", (e) => {
        let hex = e.target.value;
        if (!hex.startsWith("#")) hex = "#" + hex;
        if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
          updateColor(hex);
        }
      });

      function copyValue(type) {
        let value;
        switch (type) {
          case "hex":
            value = hexInput.value;
            break;
          case "rgb":
            value = rgbInput.value;
            break;
          case "hsl":
            value = hslInput.value;
            break;
          case "hsv":
            value = hsvInput.value;
            break;
        }
        navigator.clipboard.writeText(value).then(() => {
          statusEl.textContent = "已复制: " + value;
          setTimeout(() => (statusEl.textContent = ""), 2000);
        });
      }

      // 创建色板
      defaultColors.forEach((color) => {
        const swatch = document.createElement("div");
        swatch.className = "swatch";
        swatch.style.background = color;
        swatch.onclick = () => {
          hexInput.value = color;
          updateColor(color);
        };
        swatchesEl.appendChild(swatch);
      });

      // 初始化
      updateColor("#0d6efd");

      // 主题切换
      function toggleTheme() {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "dark" ? "🌙" : "☀️";
        localStorage.setItem("theme", next);
      }
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "dark" ? "🌙" : "☀️";
        }
      })();
    </script>
  </body>
</html>
