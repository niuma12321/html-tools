  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      宽高比计算器
    </nav>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="🌓 主题">🌓 主题</button>

    <div class="container">
      <header>
        <h1>📐 宽高比计算器</h1>
        <p class="subtitle">计算和转换宽高比，支持常见视频、图片分辨率</p>
      </header>

      <div class="card">
        <div class="card-title">输入尺寸</div>
        <div class="presets">
          <button class="preset-btn" onclick="setPreset(1920, 1080)" aria-label="1920×1080">
            1920×1080
          </button>
          <button class="preset-btn" onclick="setPreset(1280, 720)" aria-label="1280×720">
            1280×720
          </button>
          <button class="preset-btn" onclick="setPreset(3840, 2160)" aria-label="4K UHD">
            4K UHD
          </button>
          <button class="preset-btn" onclick="setPreset(1080, 1920)" aria-label="手机竖屏">
            手机竖屏
          </button>
          <button class="preset-btn" onclick="setPreset(1200, 630)" aria-label="OG Image">
            OG Image
          </button>
          <button class="preset-btn" onclick="setPreset(800, 600)" aria-label="4:3">4:3</button>
        </div>
        <div class="input-group">
          <div class="input-item">
            <label for="width">宽度 (W)</label>
            <input
              type="number"
              id="width"
              value="1920"
              min="1"
              oninput="calculate()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div style="font-size: 24px; padding-top: 20px">×</div>
          <div class="input-item">
            <label for="height">高度 (H)</label>
            <input
              type="number"
              id="height"
              value="1080"
              min="1"
              oninput="calculate()"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
        </div>
        <div class="ratio-display">
          <div class="ratio-value" id="ratioValue">16:9</div>
          <div class="ratio-decimal" id="ratioDecimal">≈ 1.778 (宽÷高)</div>
        </div>
        <div class="preview-container">
          <div class="preview-box" id="previewBox" style="width: 160px; height: 90px">16:9</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">尺寸换算</div>
        <div class="calc-grid">
          <div class="calc-section">
            <h4>根据宽度计算高度</h4>
            <div class="calc-row">
              <span>宽度:</span>
              <input
                type="number"
                id="calcWidth"
                value="1280"
                min="1"
                oninput="calcFromWidth()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="calc-row">
              <span>高度:</span>
              <div class="result-value" id="calcHeightResult">720</div>
            </div>
          </div>
          <div class="calc-section">
            <h4>根据高度计算宽度</h4>
            <div class="calc-row">
              <span>高度:</span>
              <input
                type="number"
                id="calcHeight"
                value="720"
                min="1"
                oninput="calcFromHeight()"
                aria-label="数字输入框"
                placeholder="请输入数字输入框"
              />
            </div>
            <div class="calc-row">
              <span>宽度:</span>
              <div class="result-value" id="calcWidthResult">1280</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">常见宽高比</div>
        <div class="common-ratios">
          <div class="ratio-item" onclick="setRatio(16, 9)">
            <div class="ratio">16:9</div>
            <div class="name">高清视频 / 显示器</div>
          </div>
          <div class="ratio-item" onclick="setRatio(4, 3)">
            <div class="ratio">4:3</div>
            <div class="name">传统显示器</div>
          </div>
          <div class="ratio-item" onclick="setRatio(21, 9)">
            <div class="ratio">21:9</div>
            <div class="name">超宽屏显示器</div>
          </div>
          <div class="ratio-item" onclick="setRatio(1, 1)">
            <div class="ratio">1:1</div>
            <div class="name">正方形 / Instagram</div>
          </div>
          <div class="ratio-item" onclick="setRatio(9, 16)">
            <div class="ratio">9:16</div>
            <div class="name">手机竖屏 / 短视频</div>
          </div>
          <div class="ratio-item" onclick="setRatio(3, 2)">
            <div class="ratio">3:2</div>
            <div class="name">35mm 胶片</div>
          </div>
          <div class="ratio-item" onclick="setRatio(2, 3)">
            <div class="ratio">2:3</div>
            <div class="name">证件照</div>
          </div>
          <div class="ratio-item" onclick="setRatio(1.91, 1)">
            <div class="ratio">1.91:1</div>
            <div class="name">Facebook / OG</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.toggleTheme = function () {
        const html = document.documentElement;
        const newTheme = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("theme", newTheme);
      };
      (function () {
        const savedTheme =
          localStorage.getItem("theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();

      function gcd(a, b) {
        a = Math.abs(Math.round(a));
        b = Math.abs(Math.round(b));
        while (b) {
          [a, b] = [b, a % b];
        }
        return a;
      }

      window.calculate = function () {
        const width = parseFloat(document.getElementById("width").value) || 1;
        const height = parseFloat(document.getElementById("height").value) || 1;

        const divisor = gcd(width, height);
        const ratioW = width / divisor;
        const ratioH = height / divisor;
        const decimal = (width / height).toFixed(3);

        document.getElementById("ratioValue").textContent = `${ratioW}:${ratioH}`;
        document.getElementById("ratioDecimal").textContent = `≈ ${decimal} (宽÷高)`;

        // Update preview
        const maxSize = 160;
        let previewW, previewH;
        if (width >= height) {
          previewW = maxSize;
          previewH = (maxSize * height) / width;
        } else {
          previewH = maxSize;
          previewW = (maxSize * width) / height;
        }
        const preview = document.getElementById("previewBox");
        preview.style.width = previewW + "px";
        preview.style.height = previewH + "px";
        preview.textContent = `${ratioW}:${ratioH}`;

        // Update calculations
        calcFromWidth();
        calcFromHeight();
      };

      window.setPreset = function (w, h) {
        document.getElementById("width").value = w;
        document.getElementById("height").value = h;
        calculate();
      };

      window.setRatio = function (w, h) {
        const baseWidth = 1920;
        const baseHeight = Math.round((baseWidth * h) / w);
        setPreset(baseWidth, baseHeight);
      };

      function calcFromWidth() {
        const width = parseFloat(document.getElementById("width").value) || 1;
        const height = parseFloat(document.getElementById("height").value) || 1;
        const calcWidth = parseFloat(document.getElementById("calcWidth").value) || 0;
        const result = Math.round((calcWidth * height) / width);
        document.getElementById("calcHeightResult").textContent = result;
      }

      function calcFromHeight() {
        const width = parseFloat(document.getElementById("width").value) || 1;
        const height = parseFloat(document.getElementById("height").value) || 1;
        const calcHeight = parseFloat(document.getElementById("calcHeight").value) || 0;
        const result = Math.round((calcHeight * width) / height);
        document.getElementById("calcWidthResult").textContent = result;
      }

      calculate();
    </script>
