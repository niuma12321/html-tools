    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #12121a;
        --bg-tertiary: #1a1a24;
        --color-text-primary: #fff;
        --color-text-secondary: #a0a0a0;
        --accent: #3b82f6;
        --border: #2a2a3a;
        --success: #10b981;
        --error: #ef4444;
        --warning: #f59e0b;
      }
      [data-theme="light"] {
        --bg-primary: #f5f5f5;
        --bg-secondary: #fff;
        --bg-tertiary: #e5e5e5;
        --color-text-primary: #1a1a2e;
        --color-text-secondary: #666;
        --border: #ddd;
      }
      body {
        font-family: var(--font-sans);
        background: var(--bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
      }
      .header {
        background: linear-gradient(135deg, #3b82f6, #60a5fa);
        padding: 15px 20px;
        text-align: center;
        position: relative;
      }
      .header h1 {
        font-size: 24px;
        color: #fff;
        margin-bottom: 3px;
      }
      .header p {
        font-size: 12px;
        opacity: 0.8;
        color: #fff;
      }
      .back-link {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #fff;
        text-decoration: none;
        font-size: 14px;
      }
      .theme-toggle {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.3);
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      }
      .container {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
      }
      .game-info {
        display: flex;
        justify-content: space-around;
        margin-bottom: 20px;
        background: var(--bg-secondary);
        border-radius: 10px;
        padding: 15px;
        border: 1px solid var(--border-subtle);
      }
      .info-item {
        text-align: center;
      }
      .info-value {
        font-size: 28px;
        font-weight: bold;
        color: var(--accent-cyan);
      }
      .info-label {
        font-size: 12px;
        color: var(--color-text-secondary);
      }
      .difficulty-select {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 20px;
      }
      .diff-btn {
        padding: 10px 20px;
        border-radius: 8px;
        border: 1px solid var(--border-subtle);
        background: var(--bg-secondary);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all 0.2s;
      }
      .diff-btn.active {
        background: var(--accent-cyan);
        color: #fff;
        border-color: var(--accent-cyan);
      }
      .game-area {
        background: var(--bg-secondary);
        border-radius: 12px;
        padding: 25px;
        border: 1px solid var(--border-subtle);
        margin-bottom: 20px;
      }
      .range-display {
        text-align: center;
        font-size: 18px;
        margin-bottom: 20px;
        color: var(--color-text-secondary);
      }
      .range-display span {
        color: var(--accent-cyan);
        font-weight: bold;
      }
      .input-area {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .number-input {
        flex: 1;
        padding: 15px;
        font-size: 24px;
        text-align: center;
        background: var(--bg-tertiary);
        border: 2px solid var(--border-subtle);
        border-radius: 8px;
        color: var(--color-text-primary);
        outline: none;
      }
      .number-input:focus {
        border-color: var(--accent-cyan);
      }
      .btn {
        padding: 15px 25px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.2s;
        background: var(--accent-cyan);
        color: #fff;
        font-weight: 600;
      }
      .btn:hover {
        transform: scale(1.05);
      }
      .btn.secondary {
        background: var(--bg-tertiary);
        color: var(--color-text-primary);
        border: 1px solid var(--border-subtle);
      }
      .hint {
        text-align: center;
        padding: 20px;
        border-radius: 10px;
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 20px;
      }
      .hint.higher {
        background: rgba(239, 68, 68, 0.2);
        color: var(--error);
      }
      .hint.lower {
        background: rgba(59, 130, 246, 0.2);
        color: var(--accent-cyan);
      }
      .hint.correct {
        background: rgba(16, 185, 129, 0.2);
        color: var(--accent-green);
      }
      .hint.empty {
        background: var(--bg-tertiary);
        color: var(--color-text-secondary);
      }
      .history {
        background: var(--bg-secondary);
        border-radius: 12px;
        padding: 20px;
        border: 1px solid var(--border-subtle);
      }
      .history h3 {
        font-size: 14px;
        margin-bottom: 15px;
        color: var(--color-text-secondary);
      }
      .history-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .guess-item {
        padding: 8px 15px;
        border-radius: 20px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .guess-item.high {
        background: rgba(239, 68, 68, 0.2);
        color: var(--error);
      }
      .guess-item.low {
        background: rgba(59, 130, 246, 0.2);
        color: var(--accent-cyan);
      }
      .controls {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"

  <body>
    <div class="header">
      <a href="../../index.html" class="back-link">← 返回</a>
      <h1>猜数字</h1>
      <p>猜出隐藏的数字</p>
      <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>

    <div class="container">
      <div class="game-info">
        <div class="info-item">
          <div class="info-value" id="attempts">0</div>
          <div class="info-label">尝试次数</div>
        </div>
        <div class="info-item">
          <div class="info-value" id="maxAttempts">10</div>
          <div class="info-label">剩余机会</div>
        </div>
        <div class="info-item">
          <div class="info-value" id="bestScore">-</div>
          <div class="info-label">最佳成绩</div>
        </div>
      </div>

      <div class="difficulty-select">
        <button class="diff-btn active" data-range="100">1-100</button>
        <button class="diff-btn" data-range="500">1-500</button>
        <button class="diff-btn" data-range="1000">1-1000</button>
      </div>

      <div class="game-area">
        <div class="range-display">
          猜一个
          <span>1</span>
          到
          <span id="maxNumber">100</span>
          之间的数字
        </div>

        <div class="input-area">
          <input
            type="number"
            class="number-input"
            id="guessInput"
            min="1"
            max="100"
            placeholder="?"
          />
          <button class="btn" onclick="makeGuess()">猜！</button>
        </div>

        <div class="hint empty" id="hint">输入你的猜测</div>
      </div>

      <div class="history">
        <h3>猜测历史</h3>
        <div class="history-list" id="historyList"></div>
      </div>

      <div class="controls">
        <button class="btn secondary" onclick="resetGame()">新游戏</button>
      </div>
    </div>

    <script>
      let targetNumber = 0;
      let maxNumber = 100;
      let attempts = 0;
      let maxAttempts = 10;
      let gameOver = false;
      let history = [];
      let bestScores = JSON.parse(localStorage.getItem("guessNumberBest") || "{}");

      function initGame() {
        targetNumber = Math.floor(Math.random() * maxNumber) + 1;
        attempts = 0;
        gameOver = false;
        history = [];

        // 根据范围设置尝试次数
        if (maxNumber <= 100) maxAttempts = 10;
        else if (maxNumber <= 500) maxAttempts = 12;
        else maxAttempts = 15;

        updateDisplay();
        document.getElementById("hint").className = "hint empty";
        document.getElementById("hint").textContent = "输入你的猜测";
        document.getElementById("guessInput").value = "";
        document.getElementById("guessInput").disabled = false;
        document.getElementById("historyList").textContent = "";
      }

      function updateDisplay() {
        document.getElementById("attempts").textContent = attempts;
        document.getElementById("maxAttempts").textContent = maxAttempts - attempts;
        document.getElementById("maxNumber").textContent = maxNumber;
        document.getElementById("guessInput").max = maxNumber;

        const best = bestScores[maxNumber];
        document.getElementById("bestScore").textContent = best || "-";
      }

      function makeGuess() {
        if (gameOver) return;

        const input = document.getElementById("guessInput");
        const guess = parseInt(input.value);

        if (isNaN(guess) || guess < 1 || guess > maxNumber) {
          document.getElementById("hint").className = "hint empty";
          document.getElementById("hint").textContent = "请输入有效数字 (1-" + maxNumber + ")";
          return;
        }

        attempts++;
        updateDisplay();

        const hint = document.getElementById("hint");
        const historyItem = document.createElement("span");
        historyItem.className = "guess-item";

        if (guess === targetNumber) {
          hint.className = "hint correct";
          hint.textContent = "恭喜！答案就是 " + targetNumber + "！用了 " + attempts + " 次";
          gameOver = true;
          input.disabled = true;

          // 保存最佳成绩
          if (!bestScores[maxNumber] || attempts < bestScores[maxNumber]) {
            bestScores[maxNumber] = attempts;
            localStorage.setItem("guessNumberBest", JSON.stringify(bestScores));
            updateDisplay();
          }

          historyItem.textContent = guess + " ✓";
          historyItem.style.background = "rgba(16, 185, 129, 0.2)";
          historyItem.style.color = "#10b981";
        } else if (guess < targetNumber) {
          hint.className = "hint higher";
          hint.textContent = "太小了！再大一点 ↑";
          historyItem.className = "guess-item low";
          historyItem.textContent = guess + " ↑";
          history.push({ value: guess, type: "low" });
        } else {
          hint.className = "hint lower";
          hint.textContent = "太大了！再小一点 ↓";
          historyItem.className = "guess-item high";
          historyItem.textContent = guess + " ↓";
          history.push({ value: guess, type: "high" });
        }

        document.getElementById("historyList").appendChild(historyItem);

        if (attempts >= maxAttempts && !gameOver) {
          hint.className = "hint higher";
          hint.textContent = "游戏结束！答案是 " + targetNumber;
          gameOver = true;
          input.disabled = true;
        }

        input.value = "";
        input.focus();
      }

      function resetGame() {
        initGame();
      }

      // 难度选择
      document.querySelectorAll(".diff-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          document.querySelectorAll(".diff-btn").forEach(function (b) {
            b.classList.remove("active");
          });
          this.classList.add("active");
          maxNumber = parseInt(this.dataset.range);
          initGame();
        });
      });

      // 回车提交
      document.getElementById("guessInput").addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          makeGuess();
        }
      });

      function toggleTheme() {
        const current = document.body.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        document.body.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      }

      document.body.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
      initGame();
    </script>
  </body>
