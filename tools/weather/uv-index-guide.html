<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>紫外线指数指南 - WebUtils</title>
    <meta property="og:title" content="紫外线指数指南 - WebUtils" />
    <meta
      property="og:description"
      content="紫外线指数指南：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta

    />

    <meta name="description" content="了解UV指数等级，获取防晒建议，保护皮肤健康" />
    <meta name="keywords" content="紫外线 UV 防晒 指数 皮肤 健康 sun protection sunscreen" />
    <meta name="author" content="WebUtils" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/weather/uv-index-guide.html" />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        font-size: 16px;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--accent-orange));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .uv-input {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 2rem;
        margin-bottom: 1.5rem;
        text-align: center;
      }
      .uv-input label {
        display: block;
        margin-bottom: 1rem;
        color: var(--color-text-secondary);
      }
      .uv-input input {
        width: 200px;
        padding: 1rem;
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        font-size: 2rem;
        text-align: center;
      }
      .uv-input input:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .uv-slider {
        width: 100%;
        max-width: 500px;
        margin: 1.5rem auto 0;
        -webkit-appearance: none;
        appearance: none;
        height: 10px;
        border-radius: 5px;
        background: linear-gradient(90deg, #00d26a 0%, #ffd93d 33%, #ff9f43 66%, #ff6b6b 100%);
        outline: none;
      }
      .uv-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--color-text-primary);
        cursor: pointer;
        border: 3px solid var(--color-bg-card);
      }
      .uv-slider::-moz-range-thumb {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--color-text-primary);
        cursor: pointer;
        border: 3px solid var(--color-bg-card);
      }
      .result-card {
        background: var(--color-bg-card);
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 2rem;
        margin-bottom: 1.5rem;
        display: none;
      }
      .result-card.show {
        display: block;
      }
      .uv-level {
        text-align: center;
        margin-bottom: 2rem;
      }
      .uv-level-value {
        font-family: var(--font-mono);
        font-size: 4rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      .uv-level-name {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .uv-level-range {
        font-size: 1rem;
        color: var(--text-muted);
      }
      .advice-section {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 1.5rem;
        margin-bottom: 1rem;
      }
      .advice-title {
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--color-accent-cyan);
        font-size: 1.1rem;
      }
      .advice-list {
        list-style: none;
        padding: 0;
      }
      .advice-list li {
        padding: 0.5rem 0;
        padding-left: 1.5rem;
        position: relative;
        line-height: 1.6;
      }
      .advice-list li::before {
        content: "•";
        position: absolute;
        left: 0;
        color: var(--color-accent-cyan);
      }
      .uv-scale {
        margin-top: 2rem;
      }
      .scale-title {
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--color-text-secondary);
      }
      .scale-grid {
        display: grid;
        gap: 0.75rem;
      }
      .scale-item {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 1rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .scale-color {
        width: 60px;
        height: 40px;
        border-radius: var(--radius-sm);
        flex-shrink: 0;
      }
      .scale-info {
        flex: 1;
      }
      .scale-level {
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .scale-range {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }
      .low {
        background: #00d26a;
      }
      .moderate {
        background: #ffd93d;
      }
      .high {
        background: #ff9f43;
      }
      .very-high {
        background: #ff6b6b;
      }
      .extreme {
        background: #9d4edd;
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌙">
        🌙
      </button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <a href="../../index.html#weather">天气工具</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">紫外线指数</span>
      </nav>

      <h1>☀️ 紫外线指数指南</h1>
      <p class="subtitle">了解UV指数，做好防晒准备</p>

      <div class="uv-input">
        <label for="input----uv----0-15--">输入 UV 指数（0-15+）</label>
        <input
          type="number"
          id="uvInput"
          min="0"
          max="15"
          step="0.1"
          value="5"
          oninput="updateFromInput()"
          aria-label="数字输入框"
          placeholder="请输入数字输入框"
        />
        <input
          type="range"
          id="uvSlider"
          class="uv-slider"
          min="0"
          max="15"
          step="0.1"
          value="5"
          oninput="updateFromSlider()"
        />
      </div>

      <div class="result-card show" id="resultCard">
        <div class="uv-level" id="uvLevel">
          <div class="uv-level-value" id="uvValue">5</div>
          <div class="uv-level-name" id="uvName">中等</div>
          <div class="uv-level-range" id="uvRange">UV 3-5</div>
        </div>

        <div class="advice-section">
          <div class="advice-title">🧴 防护建议</div>
          <ul class="advice-list" id="adviceList">
            <!-- Advice items will be rendered here -->
          </ul>
        </div>

        <div class="uv-scale">
          <div class="scale-title">📊 UV 指数等级</div>
          <div class="scale-grid">
            <div class="scale-item">
              <div class="scale-color low"></div>
              <div class="scale-info">
                <div class="scale-level">低</div>
                <div class="scale-range">0-2</div>
              </div>
            </div>
            <div class="scale-item">
              <div class="scale-color moderate"></div>
              <div class="scale-info">
                <div class="scale-level">中等</div>
                <div class="scale-range">3-5</div>
              </div>
            </div>
            <div class="scale-item">
              <div class="scale-color high"></div>
              <div class="scale-info">
                <div class="scale-level">高</div>
                <div class="scale-range">6-7</div>
              </div>
            </div>
            <div class="scale-item">
              <div class="scale-color very-high"></div>
              <div class="scale-info">
                <div class="scale-level">很高</div>
                <div class="scale-range">8-10</div>
              </div>
            </div>
            <div class="scale-item">
              <div class="scale-color extreme"></div>
              <div class="scale-info">
                <div class="scale-level">极高</div>
                <div class="scale-range">11+</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const UV_LEVELS = [
        {
          min: 0,
          max: 2,
          name: "低",
          nameEn: "Low",
          color: "#00d26a",
          advice: ["可以安全地在户外活动", "戴太阳镜（如果日照强烈）", "雪地或沙滩上仍需防护"]
        },
        {
          min: 3,
          max: 5,
          name: "中等",
          nameEn: "Moderate",
          color: "#ffd93d",
          advice: [
            "中午时段尽量待在阴凉处",
            "户外活动时戴帽子和太阳镜",
            "涂抹 SPF 30+ 防晒霜",
            "穿着长袖衣物"
          ]
        },
        {
          min: 6,
          max: 7,
          name: "高",
          nameEn: "High",
          color: "#ff9f43",
          advice: [
            "减少上午10点至下午4点的户外活动",
            "必须使用 SPF 30+ 防晒霜",
            "戴宽边帽和太阳镜",
            "穿着长袖衣物",
            "寻找阴凉处"
          ]
        },
        {
          min: 8,
          max: 10,
          name: "很高",
          nameEn: "Very High",
          color: "#ff6b6b",
          advice: [
            "尽量避免上午10点至下午4点外出",
            "必须使用 SPF 50+ 防晒霜，每2小时补涂",
            "穿着防晒衣物和宽边帽",
            "必须戴太阳镜",
            "待在阴凉处或室内"
          ]
        },
        {
          min: 11,
          max: 99,
          name: "极高",
          nameEn: "Extreme",
          color: "#9d4edd",
          advice: [
            "避免上午10点至下午4点外出",
            "必须使用 SPF 50+ 防晒霜，频繁补涂",
            "穿着全身防护服装",
            "戴宽边帽和太阳镜",
            "尽可能待在室内或完全阴凉处",
            "皮肤可能在几分钟内晒伤"
          ]
        }
      ];

      function getUVLevel(uv) {
        return UV_LEVELS.find((level) => uv >= level.min && uv <= level.max);
      }

      function updateDisplay(uv) {
        const level = getUVLevel(uv);

        document.getElementById("uvValue").textContent = uv.toFixed(1);
        document.getElementById("uvValue").style.color = level.color;
        document.getElementById("uvName").textContent = level.name;
        document.getElementById("uvName").style.color = level.color;
        document.getElementById("uvRange").textContent =
          `UV ${level.min}-${level.max === 99 ? "15+" : level.max}`;

        const adviceList = document.getElementById("adviceList");
        adviceList.innerHTML = level.advice.map((item) => `<li>${item}</li>`).join("");

        document.getElementById("resultCard").style.borderColor = level.color;
      }

      function updateFromInput() {
        const value = parseFloat(document.getElementById("uvInput").value) || 0;
        const clamped = Math.max(0, Math.min(15, value));
        document.getElementById("uvSlider").value = clamped;
        updateDisplay(clamped);
      }

      function updateFromSlider() {
        const value = parseFloat(document.getElementById("uvSlider").value);
        document.getElementById("uvInput").value = value.toFixed(1);
        updateDisplay(value);
      }

      // Initialize
      updateDisplay(5);

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
