<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>紫外线指数参考 - WebUtils</title>
    <meta property="og:title" content="紫外线指数参考 - WebUtils" />
    <meta
      property="og:description"
      content="紫外线指数参考：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tools.realtime-ai.chat/tools/weather/uv-index.html" />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="了解紫外线指数含义，获取防晒建议和户外活动指导" />
    <meta name="keywords" content="紫外线 UV指数 防晒 户外 uv index sunscreen" />
    <meta name="author" content="WebUtils" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/weather/uv-index.html" />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        font-size: 16px;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 600px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--accent-yellow), var(--accent-orange));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
      }
      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .card-title {
        font-size: 1rem;
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: 1rem;
      }
      .uv-selector {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .uv-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .uv-label span {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
      }
      .uv-value {
        font-family: var(--font-mono);
        font-size: 2rem;
        font-weight: 700;
      }
      input[type="range"] {
        width: 100%;
        height: 12px;
        border-radius: 6px;
        background: linear-gradient(
          90deg,
          #00d26a 0%,
          #ffd93d 25%,
          #ff9f43 50%,
          #ff6b6b 75%,
          #a55eea 100%
        );
        appearance: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #fff;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      }
      .range-labels {
        display: flex;
        justify-content: space-between;
        margin-top: 0.5rem;
        font-size: 0.75rem;
        color: var(--text-muted);
      }
      .result-card {
        text-align: center;
        padding: 2rem;
      }
      .result-icon {
        font-size: 4rem;
        margin-bottom: 0.5rem;
      }
      .result-level {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .result-desc {
        color: var(--color-text-secondary);
        margin-bottom: 1.5rem;
      }
      .advice-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        text-align: left;
      }
      .advice-item {
        padding: 1rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
      }
      .advice-icon {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      .advice-title {
        font-weight: 500;
        margin-bottom: 0.25rem;
        font-size: 0.9rem;
      }
      .advice-text {
        font-size: 0.8rem;
        color: var(--text-muted);
      }
      .uv-scale {
        margin-top: 1.5rem;
      }
      .scale-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
        margin-bottom: 0.5rem;
      }
      .scale-color {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        color: #000;
      }
      .scale-info {
        flex: 1;
      }
      .scale-level {
        font-weight: 500;
        margin-bottom: 0.15rem;
      }
      .scale-range {
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      .scale-item.active {
        border: 2px solid var(--color-accent-cyan);
      }
      .spf-card {
        background: linear-gradient(135deg, rgba(255, 217, 61, 0.1), rgba(255, 159, 67, 0.1));
        border: 1px solid var(--accent-yellow);
      }
      .spf-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
      }
      .spf-item {
        padding: 0.75rem;
        background: var(--color-bg-surface);
        border-radius: var(--radius-sm);
        text-align: center;
      }
      .spf-value {
        font-family: var(--font-mono);
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--accent-orange);
      }
      .spf-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌙">
        🌙
      </button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">紫外线指数参考</span>
      </nav>

      <h1>紫外线指数参考</h1>
      <p class="subtitle">了解UV指数，科学防晒</p>

      <div class="card">
        <div class="card-title">☀️ 选择紫外线指数</div>
        <div class="uv-selector">
          <div class="uv-label">
            <span>当前UV指数</span>
            <span class="uv-value" id="uvValue">5</span>
          </div>
          <input
            type="range"
            id="uvSlider"
            min="0"
            max="11"
            value="5"
            step="1"
            oninput="updateUV()"
          />
          <div class="range-labels">
            <span>0 低</span>
            <span>3</span>
            <span>6</span>
            <span>8</span>
            <span>11+ 极高</span>
          </div>
        </div>
      </div>

      <div class="card result-card" id="resultCard">
        <div class="result-icon" id="resultIcon">🌤️</div>
        <div class="result-level" id="resultLevel">中等</div>
        <div class="result-desc" id="resultDesc">加载中...</div>

        <div class="advice-grid" id="adviceGrid">
          <!-- Advice will be rendered here -->
        </div>
      </div>

      <div class="card spf-card">
        <div class="card-title">🧴 推荐防晒系数</div>
        <div class="spf-grid" id="spfGrid">
          <!-- SPF recommendations will be rendered here -->
        </div>
      </div>

      <div class="card">
        <div class="card-title">📊 UV指数等级表</div>
        <div class="uv-scale" id="uvScale">
          <!-- Scale will be rendered here -->
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      const uvData = [
        {
          range: [0, 2],
          level: "低",
          color: "#00d26a",
          icon: "😎",
          desc: "无需防护，可安全户外活动",
          spf: "SPF15+",
          reapply: "不需要",
          hat: "可选",
          sunglasses: "可选",
          shade: "不需要",
          advice: [
            { icon: "✅", title: "可放心外出", text: "紫外线强度低，无需特别防护" },
            { icon: "🧴", title: "基础防晒即可", text: "敏感肌肤可涂抹SPF15防晒霜" }
          ]
        },
        {
          range: [3, 5],
          level: "中等",
          color: "#ffd93d",
          icon: "🌤️",
          desc: "需要一定防护，避免长时间暴晒",
          spf: "SPF30+",
          reapply: "2-3小时",
          hat: "建议",
          sunglasses: "建议",
          shade: "中午时段",
          advice: [
            { icon: "🧴", title: "涂抹防晒霜", text: "建议使用SPF30+防晒产品" },
            { icon: "👒", title: "佩戴帽子", text: "帽檐宽度建议7cm以上" },
            { icon: "🕐", title: "避开正午", text: "10:00-14:00减少户外活动" },
            { icon: "🕶️", title: "戴太阳镜", text: "选择UV400防护等级" }
          ]
        },
        {
          range: [6, 7],
          level: "高",
          color: "#ff9f43",
          icon: "☀️",
          desc: "需要防护，尽量减少正午外出",
          spf: "SPF50+",
          reapply: "2小时",
          hat: "必须",
          sunglasses: "必须",
          shade: "必须",
          advice: [
            { icon: "🧴", title: "高倍防晒", text: "使用SPF50+防晒霜，PA+++以上" },
            { icon: "👒", title: "物理防护", text: "穿长袖、戴宽檐帽、打伞" },
            { icon: "🏠", title: "避免正午外出", text: "10:00-16:00尽量待在室内" },
            { icon: "💧", title: "及时补涂", text: "每2小时补涂一次防晒" }
          ]
        },
        {
          range: [8, 10],
          level: "很高",
          color: "#ff6b6b",
          icon: "🔥",
          desc: "必须严格防护，尽量避免户外活动",
          spf: "SPF50+",
          reapply: "1.5小时",
          hat: "必须",
          sunglasses: "必须",
          shade: "必须",
          advice: [
            { icon: "⚠️", title: "减少外出", text: "非必要不要在户外活动" },
            { icon: "🧴", title: "最高防护", text: "SPF50+ PA++++，全身涂抹" },
            { icon: "🌳", title: "寻找阴凉", text: "必须外出时走阴凉处" },
            { icon: "💦", title: "频繁补涂", text: "出汗后立即补涂防晒" }
          ]
        },
        {
          range: [11, 15],
          level: "极高",
          color: "#a55eea",
          icon: "☢️",
          desc: "极度危险，应避免任何户外活动",
          spf: "SPF50+",
          reapply: "1小时",
          hat: "必须",
          sunglasses: "必须",
          shade: "必须",
          advice: [
            { icon: "🚫", title: "避免外出", text: "尽可能待在室内" },
            { icon: "⏰", title: "仅限早晚", text: "如需外出，选择早晨或傍晚" },
            { icon: "🛡️", title: "全副武装", text: "长袖长裤+帽子+墨镜+防晒霜" },
            { icon: "🏥", title: "注意晒伤", text: "短时间暴露即可能导致晒伤" }
          ]
        }
      ];

      function getUVData(uv) {
        return (
          uvData.find((d) => uv >= d.range[0] && uv <= d.range[1]) || uvData[uvData.length - 1]
        );
      }

      function updateUV() {
        const uv = parseInt(document.getElementById("uvSlider").value);
        const data = getUVData(uv);

        document.getElementById("uvValue").textContent = uv;
        document.getElementById("uvValue").style.color = data.color;
        document.getElementById("resultIcon").textContent = data.icon;
        document.getElementById("resultLevel").textContent = data.level;
        document.getElementById("resultLevel").style.color = data.color;
        document.getElementById("resultDesc").textContent = data.desc;

        // Render advice
        document.getElementById("adviceGrid").innerHTML = data.advice
          .map(
            (a) => `
        <div class="advice-item">
          <div class="advice-icon">${a.icon}</div>
          <div class="advice-title">${a.title}</div>
          <div class="advice-text">${a.text}</div>
        </div>
      `
          )
          .join("");

        // Render SPF recommendations
        document.getElementById("spfGrid").innerHTML = `
        <div class="spf-item">
          <div class="spf-value">${data.spf}</div>
          <div class="spf-label">推荐防晒系数</div>
        </div>
        <div class="spf-item">
          <div class="spf-value">${data.reapply}</div>
          <div class="spf-label">补涂间隔</div>
        </div>
        <div class="spf-item">
          <div class="spf-value">${data.hat}</div>
          <div class="spf-label">遮阳帽</div>
        </div>
      `;

        // Update scale
        renderScale(uv);
      }

      function renderScale(currentUV) {
        const scale = document.getElementById("uvScale");
        scale.innerHTML = uvData
          .map((d) => {
            const isActive = currentUV >= d.range[0] && currentUV <= d.range[1];
            return `
          <div class="scale-item ${isActive ? "active" : ""}">
            <div class="scale-color" style="background:${d.color}">${d.range[0]}-${d.range[1]}</div>
            <div class="scale-info">
              <div class="scale-level">${d.level}</div>
              <div class="scale-range">${d.desc}</div>
            </div>
          </div>
        `;
          })
          .join("");
      }

      // Initialize
      updateUV();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
