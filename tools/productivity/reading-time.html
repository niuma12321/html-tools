    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--color-accent-cyan));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .input-area {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .input-area textarea {
        width: 100%;
        min-height: 300px;
        padding: 1rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: inherit;
        font-size: 1rem;
        line-height: 1.8;
        resize: vertical;
      }
      .input-area textarea:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .settings {
        display: flex;
        gap: 1rem;
        align-items: center;
        margin-top: 1rem;
        flex-wrap: wrap;
      }
      .settings label {
        color: var(--color-text-secondary);
        font-size: 0.9rem;
      }
      .settings select {
        padding: 0.5rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: inherit;
      }
      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .result-card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 1.5rem;
        text-align: center;
      }
      .result-value {
        font-family: var(--font-mono);
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--color-accent-cyan);
        margin-bottom: 0.5rem;
      }
      .result-label {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
      }
      .speed-comparison {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
      }
      .speed-title {
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--color-accent-cyan);
      }
      .speed-grid {
        display: grid;
        gap: 0.75rem;
      }
      .speed-item {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .speed-level {
        font-weight: 500;
      }
      .speed-time {
        font-family: var(--font-mono);
        color: var(--color-accent-cyan);
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <a href="../../index.html#productivity">生产力</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">阅读时间</span>
      </nav>

      <h1>📖 阅读时间计算</h1>
      <p class="subtitle">预估文章阅读所需时间</p>

      <div class="input-area">
        <textarea
          id="textInput"
          placeholder="粘贴或输入文章内容..."
          oninput="calculate()"
        ></textarea>
        <div class="settings">
          <label>阅读速度：</label>
          <select id="speedSelect" onchange="calculate()">
            <option value="200">慢速（200字/分）</option>
            <option value="300" selected>中速（300字/分）</option>
            <option value="400">快速（400字/分）</option>
            <option value="500">很快（500字/分）</option>
          </select>
        </div>
      </div>

      <div class="result-grid">
        <div class="result-card">
          <div class="result-value" id="charCount">0</div>
          <div class="result-label">字符数</div>
        </div>
        <div class="result-card">
          <div class="result-value" id="wordCount">0</div>
          <div class="result-label">词数</div>
        </div>
        <div class="result-card">
          <div class="result-value" id="readingTime">0 分钟</div>
          <div class="result-label">阅读时间</div>
        </div>
      </div>

      <div class="speed-comparison">
        <div class="speed-title">📊 不同速度预估</div>
        <div class="speed-grid" id="speedGrid">
          <div class="speed-item">
            <span class="speed-level">慢速阅读（200字/分）</span>
            <span class="speed-time" id="slow">-</span>
          </div>
          <div class="speed-item">
            <span class="speed-level">中速阅读（300字/分）</span>
            <span class="speed-time" id="medium">-</span>
          </div>
          <div class="speed-item">
            <span class="speed-level">快速阅读（400字/分）</span>
            <span class="speed-time" id="fast">-</span>
          </div>
          <div class="speed-item">
            <span class="speed-level">扫读（500字/分）</span>
            <span class="speed-time" id="veryFast">-</span>
          </div>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      function formatTime(minutes) {
        if (minutes < 1) {
          return "< 1 分钟";
        } else if (minutes < 60) {
          return Math.round(minutes) + " 分钟";
        } else {
          const hours = Math.floor(minutes / 60);
          const mins = Math.round(minutes % 60);
          return `${hours} 小时 ${mins} 分钟`;
        }
      }

      function countChinese(text) {
        // Count Chinese characters
        const chineseChars = text.match(/[\u4e00-\u9fa5]/g);
        return chineseChars ? chineseChars.length : 0;
      }

      function countEnglishWords(text) {
        // Count English words (sequences of Latin letters)
        const englishWords = text.match(/[a-zA-Z]+/g);
        return englishWords ? englishWords.length : 0;
      }

      function calculate() {
        const text = document.getElementById("textInput").value;
        const speed = parseInt(document.getElementById("speedSelect").value);

        // Character count
        const charCount = text.length;
        document.getElementById("charCount").textContent = charCount.toLocaleString();

        // Word count (Chinese chars + English words)
        const chineseCount = countChinese(text);
        const englishCount = countEnglishWords(text);
        const totalWords = chineseCount + englishCount;
        document.getElementById("wordCount").textContent = totalWords.toLocaleString();

        // Reading time calculation
        if (totalWords === 0) {
          document.getElementById("readingTime").textContent = "0 分钟";
          document.getElementById("slow").textContent = "-";
          document.getElementById("medium").textContent = "-";
          document.getElementById("fast").textContent = "-";
          document.getElementById("veryFast").textContent = "-";
          return;
        }

        const minutes = totalWords / speed;
        document.getElementById("readingTime").textContent = formatTime(minutes);

        // Different speeds
        document.getElementById("slow").textContent = formatTime(totalWords / 200);
        document.getElementById("medium").textContent = formatTime(totalWords / 300);
        document.getElementById("fast").textContent = formatTime(totalWords / 400);
        document.getElementById("veryFast").textContent = formatTime(totalWords / 500);
      }

      // Initialize
      calculate();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
