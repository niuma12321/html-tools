    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.6;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        max-width: 400px;
        width: 100%;
        background: white;
        padding: 30px;
        border-radius: 15px;
      }
      h1 {
        text-align: center;
        margin-bottom: 20px;
      }
      .preview {
        width: 100%;
        height: 150px;
        border-radius: 10px;
        margin-bottom: 20px;
        border: 2px solid #e2e8f0;
      }
      .picker {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        align-items: center;
      }
      input[type="color"] {
        width: 60px;
        height: 60px;
        border: none;
        cursor: pointer;
        border-radius: 10px;
      }
      .values {
        background: #f7fafc;
        padding: 15px;
        border-radius: 10px;
      }
      .value-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid #e2e8f0;
      }
      .value-item:last-child {
        border-bottom: none;
      }
      .value-code {
        font-family: var(--font-mono);
        background: #e2e8f0;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
      }
      .value-code:hover {
        background: #cbd5e0;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 20px;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: #999;
        margin: 0 5px;
      }
    </style>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      颜色选择器
    </nav>
    <div class="container">
      <h1>🎨 颜色选择器</h1>
      <div class="preview" id="preview" style="background: #667eea"></div>
      <div class="picker">
        <input
          type="color"
          id="colorPicker"
          value="#667eea"
          oninput="updateColor()"
          aria-label="颜色选择器"
        />
        <span>点击选择颜色</span>
      </div>
      <div class="values">
        <div class="value-item">
          <span>HEX</span>
          <span class="value-code" id="hex" onclick="copy(this)">#667eea</span>
        </div>
        <div class="value-item">
          <span>RGB</span>
          <span class="value-code" id="rgb" onclick="copy(this)">rgb(102, 126, 234)</span>
        </div>
        <div class="value-item">
          <span>HSL</span>
          <span class="value-code" id="hsl" onclick="copy(this)">hsl(229, 76%, 66%)</span>
        </div>
      </div>
    </div>
    <script>
      function updateColor() {
        const hex = document.getElementById("colorPicker").value;
        document.getElementById("preview").style.background = hex;
        document.getElementById("hex").textContent = hex;
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        document.getElementById("rgb").textContent = "rgb(" + r + ", " + g + ", " + b + ")";
        const max = Math.max(r, g, b) / 255,
          min = Math.min(r, g, b) / 255;
        const l = (max + min) / 2;
        let h = 0,
          s = 0;
        if (max !== min) {
          const d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          if (max === r / 255) h = ((g - b) / 255 / d + (g < b ? 6 : 0)) / 6;
          else if (max === g / 255) h = ((b - r) / 255 / d + 2) / 6;
          else h = ((r - g) / 255 / d + 4) / 6;
        }
        document.getElementById("hsl").textContent =
          "hsl(" +
          Math.round(h * 360) +
          ", " +
          Math.round(s * 100) +
          "%, " +
          Math.round(l * 100) +
          "%)";
      }
      function copy(el) {
        navigator.clipboard.writeText(el.textContent);
        el.style.background = "#48bb78";
        setTimeout(() => (el.style.background = ""), 500);
      }
    </script>
  </body>
