    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;

        --bg-input: #0e0e14;

        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;

        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-sans);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      h1 {
        color: white;
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .upload-area {
        border: 3px dashed #ddd;
        border-radius: 15px;
        padding: 50px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        margin-bottom: 20px;
      }
      .upload-area:hover {
        border-color: #667eea;
        background: #f8f9ff;
      }
      .upload-area.active {
        border-color: #667eea;
        background: #f0f4ff;
      }
      .upload-icon {
        font-size: 48px;
        margin-bottom: 15px;
      }
      .preview-container {
        display: none;
        margin-bottom: 20px;
      }
      .preview-container.show {
        display: block;
      }
      .preview {
        max-width: 100%;
        max-height: 300px;
        border-radius: 10px;
        display: block;
        margin: 0 auto;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
        font-size: 14px;
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
      }
      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        grid-column: span 2;
      }
      .checkbox-group input {
        width: auto;
      }
      .info {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 5px;
      }
      .info-row:last-child {
        margin-bottom: 0;
      }
      .btn {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .breadcrumb {
        display: flex;
        align-items: center;

        font-family: var(--font-mono);

        border: 1px solid var(--border-subtle);

      .breadcrumb a {

        transition: color 0.2s ease;

      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }

        margin: 0 5px;

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span>›</span>
      图片尺寸调整
    </nav>
    <div class="container">
      <h1>🖼️ 图片调整大小</h1>
      <div class="card">
        <div
          class="upload-area"
          id="uploadArea"
          onclick="document.getElementById('fileInput').click()"
        >
          <div class="upload-icon">📁</div>
          <p>点击或拖拽图片到这里</p>
          <input type="file" id="fileInput" accept="image/*" hidden />
        </div>
        <div class="preview-container" id="previewContainer">
          <img id="preview" class="preview" alt="图片预览" />
        </div>
        <div class="info" id="info" style="display: none">
          <div class="info-row">
            <span>原始尺寸:</span>
            <span id="originalSize">-</span>
          </div>
          <div class="info-row">
            <span>新尺寸:</span>
            <span id="newSize">-</span>
          </div>
        </div>
        <div class="controls">
          <div class="input-group">
            <label for="input-----px-">宽度 (px)</label>
            <input type="number" id="width" placeholder="自动" min="1" aria-label="数字输入框" />
          </div>
          <div class="input-group">
            <label for="input-----px-">高度 (px)</label>
            <input type="number" id="height" placeholder="自动" min="1" aria-label="数字输入框" />
          </div>
          <div class="input-group">
            <label for="input---------">缩放比例 (%)</label>
            <input
              type="number"
              id="scale"
              value="100"
              min="1"
              max="500"
              aria-label="数字输入框"
              placeholder="请输入数字输入框"
            />
          </div>
          <div class="input-group">
            <label>输出格式</label>
            <select id="format">
              <option value="image/jpeg">JPEG</option>
              <option value="image/png">PNG</option>
              <option value="image/webp">WebP</option>
            </select>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="keepRatio" checked />
            <label for="keepRatio" style="margin-bottom: 0">保持宽高比</label>
          </div>
        </div>
        <button
          class="btn"
          id="downloadBtn"
          onclick="download()"
          disabled
          aria-label="下载调整后的图片"
        >
          下载调整后的图片
        </button>
      </div>
    </div>
    <script>
      let originalImage = null;
      let originalWidth = 0,
        originalHeight = 0;

      const uploadArea = document.getElementById("uploadArea");
      const fileInput = document.getElementById("fileInput");

      ["dragenter", "dragover"].forEach((e) =>
        uploadArea.addEventListener(e, () => uploadArea.classList.add("active"))
      );
      ["dragleave", "drop"].forEach((e) =>
        uploadArea.addEventListener(e, () => uploadArea.classList.remove("active"))
      );
      uploadArea.addEventListener("dragover", (e) => e.preventDefault());
      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        handleFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener("change", (e) => handleFile(e.target.files[0]));

      function handleFile(file) {
        if (!file || !file.type.startsWith("image/")) return alert("请选择图片文件");
        const reader = new FileReader();
        reader.onload = (e) => {
          originalImage = new Image();
          originalImage.onload = () => {
            originalWidth = originalImage.width;
            originalHeight = originalImage.height;
            document.getElementById("preview").src = e.target.result;
            document.getElementById("previewContainer").classList.add("show");
            document.getElementById("info").style.display = "block";
            document.getElementById("originalSize").textContent =
              `${originalWidth} × ${originalHeight}`;
            document.getElementById("width").value = originalWidth;
            document.getElementById("height").value = originalHeight;
            document.getElementById("downloadBtn").disabled = false;
            updateNewSize();
          };
          originalImage.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      function updateNewSize() {
        if (!originalImage) return;
        let w = parseInt(document.getElementById("width").value) || originalWidth;
        let h = parseInt(document.getElementById("height").value) || originalHeight;
        const scale = parseInt(document.getElementById("scale").value) || 100;
        w = Math.round((w * scale) / 100);
        h = Math.round((h * scale) / 100);
        document.getElementById("newSize").textContent = `${w} × ${h}`;
      }

      document.getElementById("width").addEventListener("input", function () {
        if (document.getElementById("keepRatio").checked && originalImage) {
          const ratio = originalHeight / originalWidth;
          document.getElementById("height").value = Math.round(this.value * ratio);
        }
        updateNewSize();
      });

      document.getElementById("height").addEventListener("input", function () {
        if (document.getElementById("keepRatio").checked && originalImage) {
          const ratio = originalWidth / originalHeight;
          document.getElementById("width").value = Math.round(this.value * ratio);
        }
        updateNewSize();
      });

      document.getElementById("scale").addEventListener("input", updateNewSize);

      function download() {
        if (!originalImage) return;
        let w = parseInt(document.getElementById("width").value) || originalWidth;
        let h = parseInt(document.getElementById("height").value) || originalHeight;
        const scale = parseInt(document.getElementById("scale").value) || 100;
        const format = document.getElementById("format").value;
        w = Math.round((w * scale) / 100);
        h = Math.round((h * scale) / 100);

        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(originalImage, 0, 0, w, h);

        const link = document.createElement("a");
        link.download = `resized_${w}x${h}.${format.split("/")[1]}`;
        link.href = canvas.toDataURL(format, 0.9);
        link.click();
      }
    </script>
  </body>
